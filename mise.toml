"""

[tasks.help-linux]
description = "📖 Linux Diagnose & Fixes (Host/SSH)"
run = """
echo '🐧 LINUX — DIAGNOSE   (wo klemmt es?)'
echo ''
echo '  CPU / LOAD'
echo '    uptime                  Load 1/5/15min  (> #Cores = überlastet)'
echo '    top                     live; P=CPU, M=RAM sortieren, q=quit'
echo '    htop                    bunter, scrollbar'
echo '    vmstat 1                wa=io-wait, si/so=swap'
echo '    mpstat -P ALL 1         Last pro Core (Paket: sysstat)'
echo ''
echo '  RAM / SWAP'
echo '    free -h                 available zählt, NICHT free'
echo '    ps aux --sort=-%mem     Top RAM-Fresser'
echo '    dmesg -T | grep -i oom  vom OOM-Killer gekillt?'
echo '    swapon --show           Swap-Nutzung'
echo ''
echo '  DISK-PLATZ'
echo '    df -h                   Füllstand pro Mount'
echo '    df -i                   Inodes voll? (viele Mini-Files)'
echo '    du -sh /* | sort -rh    größte Ordner top-down'
echo '    ncdu /                  interaktiver Disk-Browser'
echo ''
echo '  DISK-I/O'
echo '    iostat -xz 1            %util~100 = Limit, await = Latenz(ms)'
echo '    iotop                   wer liest/schreibt'
echo '    lsblk                   Block-Devices + Mounts'
echo ''
echo '  ZFS'
echo '    zpool status            Pool-Gesundheit (DEGRADED?)'
echo '    zpool list              Kapazität / Füllgrad'
echo '    zpool iostat 1          live Read/Write pro Pool'
echo '    arc_summary             ARC (RAM-Cache) + Hit-Rate'
echo '    zfs list                Datasets + Verbrauch'
echo ''
echo '  NETZWERK'
echo '    ss -tulpn               offene Ports + Prozess'
echo '    ss -s                   Socket-Summary'
echo '    ip -s link              Interface-Stats (errors/drops!)'
echo '    ip a                    IPs + Interfaces'
echo ''
echo '  PROZESSE'
echo '    ps aux --sort=-%cpu     Top CPU-Verbraucher'
echo '    lsof -i :PORT           wer hört auf Port'
echo '    lsof -p PID             offene Files von PID'
echo '    pidstat 1               CPU/IO pro Prozess (sysstat)'
echo ''
echo '  LOGS'
echo '    journalctl -xe          letzte Logs + Fehler-Kontext'
echo '    journalctl -p err -b    nur Errors seit Boot'
echo '    journalctl -u <svc> -f  Service-Logs live'
echo '    dmesg -T --level=err,warn   Kernel Errors/Warnings'
echo ''
echo '🔧 LINUX — FIXES   (Symptom → Befehl)'
echo ''
echo '  PORT BELEGT'
echo '    kill -9 $(lsof -t -i:PORT)   Prozess auf Port killen'
echo '    fuser -k PORT/tcp            Alternative'
echo ''
echo '  PROZESS HÄNGT'
echo '    kill <pid>                   SIGTERM — sauber, IMMER zuerst'
echo '    kill -9 <pid>                SIGKILL — hart, nur wenn nötig'
echo '    pkill -f <name>              nach Name  (zombie → kill PPID)'
echo ''
echo '  DISK VOLL'
echo '    truncate -s 0 <log>          Logfile leeren (FD bleibt)'
echo '    journalctl --vacuum-size=200M    journald kürzen'
echo '    lsof | grep deleted          gelöscht aber FD offen → restart'
echo ''
echo '  RAM / SWAP'
echo '    ps aux --sort=-%mem          Fresser finden → killen'
echo '    swapoff -a && swapon -a      ⚠ disruptiv: braucht freien RAM'
echo ''
echo '  SERVICE'
echo '    systemctl --failed           was ist hin'
echo '    systemctl status <svc>       warum'
echo '    systemctl restart <svc>      neustarten'
echo ''
echo '  MOUNT BUSY'
echo '    fuser -vm /mnt               wer hält den Mount'
echo '    lsof +D /mnt                 offene Files → killen, dann umount'
echo ''
echo '  NETZ HÄNGT'
echo '    conntrack -F                 ⚠ disruptiv: kappt NAT-Sessions'
echo '    resolvectl flush-caches      DNS-Cache leeren'
echo '    ip link set <if> up          Interface hochziehen'
echo ''
echo '  PROXMOX'
echo '    qm stop <id> --skiplock      VM hart stoppen'
echo '    zpool clear <pool>           ZFS-Fehler quittieren nach Fix'
echo '    pve-firewall stop            ⚠ Security · Runbook #6'
"""

[tasks.help-gitops]
description = "📖 SealedSecrets / ArgoCD / Kubeconfig"
run = """
echo '🔒 SEALED SECRETS'
echo '  kubeseal --fetch-cert --controller-name=sealed-secrets --controller-namespace=sealed-secrets > pub-cert.pem'
echo '  kubectl create secret generic <name> --from-literal=k=v --dry-run=client -o yaml | kubeseal --cert pub-cert.pem -o yaml'
echo ''
echo '🔑 ARGOCD'
echo '  ⚠ erst login: argocd login <host> --sso   (ODER: kubectl get applications -n argocd)'
echo '  argocd app list · sync <app> · diff <app> · get <app> · history <app> · rollback <app> <id>'
echo ''
echo '🔐 KUBECONFIG — wo · wechseln · OIDC'
echo '  Aktiv prüfen:   echo $KUBECONFIG   ·   mise run kube-status'
echo '  Dateien (~/.kube/):'
echo '    homelab-admin.yaml   default (in .zshrc gesetzt)'
echo '    config-oidc          OIDC Daily-Driver (timour@iam.timourhomelab.org)'
echo '    config-break-glass   🚨 X.509 Admin (Notfall, cert-based)'
echo '  Wechseln (.zshrc-Aliase):'
echo '    kube-oidc            → config-oidc (OIDC, daily)'
echo '    kube-admin           → config (break-glass, cert-based)'
echo '    export KUBECONFIG=~/.kube/config-oidc        # manuell'
echo '    mise run kube-oidc | kube-break-glass        # zeigt export-Befehl (selbst ausführen!)'
echo '  Contexts (innerhalb einer config):'
echo '    kubectl config get-contexts        # alle · current-context · use-context <name>'
echo '    kubectl config view --minify       # aktiven Context im Detail'
echo '  Mergen:    KUBECONFIG=a:b kubectl config view --flatten > ~/.kube/merged'
echo '  Nach Rebuild neu (neue CA!):  talosctl kubeconfig ~/.kube/config-break-glass'
echo '  OIDC re-auth:  einfach kubectl-Befehl absetzen → Browser-Login öffnet automatisch'
"""

