[tools]
kubectl = "1.36"
"ubi:derailed/k9s" = "latest"
"ubi:mikefarah/yq" = "latest"
jq = "latest"
opentofu = "1.12.0"
talosctl = "latest"
helm = "latest"
kustomize = "latest"
argocd = "latest"
"ubi:bitnami-labs/sealed-secrets[exe=kubeseal]" = "latest"

[settings]
experimental = true

# ════════════════════════════════════════════════════════════════════════
# KUBECONFIG-MANAGEMENT — 2 parallele Auth-Pfade zum Talos-Cluster
# ════════════════════════════════════════════════════════════════════════
#
# Datei                              | Wer du bist          | Wann nutzen
# ──────────────────────────────────  | ──────────────────── | ──────────────
# ~/.kube/config-oidc                | oidc:<your-user>     | Daily-Driver
#   ↑ kubelogin → KC-Login + 2FA    | OIDC-User aus LDAP   | (Default-Pfad)
#                                    |                      |
# ~/.kube/config-break-glass         | admin (system:masters)| KC kaputt /
#   ↑ X.509 Talos-Admin-Cert        | Cluster-Admin direkt  | OIDC tot /
#                                    |                      | Notfall-Recovery
#                                    |                      |
# ~/.kube/config-talos-backup        | (Talos-API-Cert)     | Backup von ~/.talos/config
#   ↑ NICHT für kubectl —           |                      | für talosctl
#   sondern für talosctl-Notfall    |                      |
#
# ─── Wie wechseln ────────────────────────────────────────────────────────
#
# Option A: Mit mise (auto, in diesem Repo)
#   cd ~/Desktop/.../talos-homelab-scratch    # → mise lädt KUBECONFIG=config-oidc
#
# Option B: Per Hand (überall)
#   export KUBECONFIG=~/.kube/config-oidc        # OIDC daily
#   export KUBECONFIG=~/.kube/config-break-glass # Notfall
#   export KUBECONFIG=~/.kube/config             # Default-Mac-config
#
# Option C: Einmal-Befehl (ohne shell-export)
#   KUBECONFIG=~/.kube/config-break-glass kubectl get nodes
#
# ─── Erstellen / Re-generieren ───────────────────────────────────────────
#
# Wenn config-break-glass kaputt/abgelaufen:
#   talosctl --talosconfig ~/.talos/config --nodes 192.168.0.101 \
#     kubeconfig ~/.kube/config-break-glass
#   chmod 600 ~/.kube/config-break-glass
#
# Wenn config-oidc kaputt: kubelogin-Setup wiederholen.
#
# ════════════════════════════════════════════════════════════════════════
[env]
# Default beim `cd`: aktuelle Admin-Kubeconfig (X.509, post-rebuild CA).
# config-break-glass war stale (pre-2026-05-22-rebuild CA) → ECDSA failure.
KUBECONFIG = "{{ env.HOME }}/.kube/homelab-admin.yaml"

# Aliases via mise tasks (siehe unten):
#   mise run kube-oidc        → zeigt OIDC-Pfad an
#   mise run kube-break-glass → zeigt X.509 Notfall-Pfad an
#   mise run kube-status      → welche config aktuell aktiv + welcher User

[tasks.setup]
description = "Trust and install all tools"
run = """
mise trust
mise install
"""

[tasks.cluster-info]
description = "Show cluster information"
run = """
echo " Talos Cluster Info:"
kubectl get nodes -o wide
kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded
"""

[tasks.cluster-status]
description = "Check cluster health (Talos + Kubernetes)"
run = """
echo "🏥 Talos Cluster Health:"
ENDPOINT="192.168.0.101"
CP_IPS=$(kubectl get nodes -l node-role.kubernetes.io/control-plane -o jsonpath='{range .items[*]}{.status.addresses[?(@.type=="InternalIP")].address}{","}{end}' 2>/dev/null | sed 's/,$//')
WORKER_IPS=$(kubectl get nodes -l '!node-role.kubernetes.io/control-plane' -o jsonpath='{range .items[*]}{.status.addresses[?(@.type=="InternalIP")].address}{","}{end}' 2>/dev/null | sed 's/,$//')
[ -z "$CP_IPS" ] && CP_IPS="$ENDPOINT"
talosctl -n "$ENDPOINT" -e "$ENDPOINT" health \
  --control-plane-nodes "$CP_IPS" \
  --worker-nodes "$WORKER_IPS" \
  --wait-timeout 1m

echo ""
echo "☸️ Kubernetes Nodes:"
kubectl get nodes -o wide

echo ""
echo "⚠️ Not Running Pods:"
kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded
"""

[tasks.apply-manifests]
description = "Apply Kubernetes manifests"
confirm = "kubectl apply -f kubernetes/ — wirklich anwenden?"
run = """
echo " Applying manifests..."
kubectl apply -f kubernetes/
"""

[tasks.tofu-plan]
description = "Plan infrastructure changes"
run = """
echo " Planning infrastructure changes..."
cd tofu
tofu plan
"""

[tasks.tofu-apply]
description = "Apply infrastructure changes"
confirm = "tofu apply — Infrastruktur ändern (parallelism beachten!)?"
run = """
echo " Applying infrastructure changes..."
cd tofu
tofu apply
"""

# ─── Kubeconfig-Switcher ────────────────────────────────────────────────
[tasks.kube-oidc]
description = "🔑 ZEIGT den OIDC-export-Befehl (Task kann Parent-Shell nicht ändern → selbst ausführen)"
run = """
echo "export KUBECONFIG=$HOME/.kube/config-oidc"
echo ""
echo " OIDC kubeconfig active:"
echo "   • User: oidc:<your-keycloak-user>"
echo "   • Auth: kubelogin → Browser → KC Login + 2FA"
echo "   • Permissions: cluster-admin via group cluster-admins"
"""

[tasks.kube-break-glass]
description = "🚨 ZEIGT den Break-Glass-export-Befehl (Task kann Parent-Shell nicht ändern → selbst ausführen)"
run = """
echo "export KUBECONFIG=$HOME/.kube/config-break-glass"
echo ""
echo "🚨 BREAK-GLASS kubeconfig active:"
echo "   • User: admin (system:masters)"
echo "   • Auth: X.509 cert (umgeht OIDC + KC komplett)"
echo "   • NUR im Notfall! Cert valid bis: $(openssl x509 -noout -enddate -in <(awk \\"/client-certificate-data/{print \\$2}\\" $HOME/.kube/config-break-glass | base64 -d 2>/dev/null) 2>/dev/null | cut -d= -f2)"
"""

[tasks.kube-status]
description = "Show which kubeconfig is active"
run = """
echo "Active KUBECONFIG: ${KUBECONFIG:-$HOME/.kube/config (default)}"
echo ""
echo "Available configs:"
ls -la $HOME/.kube/config* 2>/dev/null
echo ""
echo "Current user:"
kubectl config current-context 2>/dev/null
kubectl auth whoami 2>/dev/null || true
"""

# ─── Network / Cilium Debugging ─────────────────────────────────────────
[tasks.cilium-health]
description = "🌐 Cilium Node-zu-Node Datapath-Matrix (DAS Tool für Netzwerk-Outages)"
run = "kubectl exec -n kube-system ds/cilium -c cilium-agent -- cilium-health status"

[tasks.cilium-status]
description = "🌐 Cilium Agent-Status (Encryption/WireGuard/Controller)"
run = "kubectl exec -n kube-system ds/cilium -c cilium-agent -- cilium-dbg status"

[tasks.cilium-overview]
description = "🌐 Cilium Deployment-Überblick (lokale CLI: DaemonSets/Operator/Hubble/Images)"
run = "cilium status"

# ─── Rook-Ceph ──────────────────────────────────────────────────────────
[tasks.ceph-status]
description = "💾 Rook-Ceph Cluster-Status (via Toolbox)"
run = "kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph status"

[tasks.ceph-health]
description = "💾 Rook-Ceph health detail + OSD-Status + Auslastung"
run = """
echo '-- ceph health detail --'; kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph health detail
echo '-- osd status --';         kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph osd status
echo '-- df --';                 kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph df
"""

# ─── Elasticsearch (ECK, elastic-system) ────────────────────────────────
[tasks.es-status]
description = "🔎 Elasticsearch Cluster-Health + Nodes (ECK)"
run = "kubectl get elasticsearch,kibana -n elastic-system"

[tasks.es-health]
description = "🔎 Elasticsearch _cluster/health + gelbe/rote Indizes"
run = """
PW=$(kubectl get secret -n elastic-system production-cluster-es-elastic-user -o jsonpath='{.data.elastic}' | base64 -d)
P=production-cluster-es-master-data-0
echo '-- cluster health --'
kubectl exec -n elastic-system $P -c elasticsearch -- curl -s -k -u "elastic:$PW" "https://localhost:9200/_cluster/health?pretty"
echo '-- gelbe/rote Indizes (leer = alles gruen) --'
kubectl exec -n elastic-system $P -c elasticsearch -- curl -s -k -u "elastic:$PW" "https://localhost:9200/_cat/indices?v&health=yellow,red&h=health,index,pri,rep,store.size"
"""

# ─── Kafka / Strimzi (namespace drova) ──────────────────────────────────
[tasks.kafka-status]
description = "📨 Kafka/Strimzi Status — Cluster + NodePools + Topics + Pods (drova)"
run = """
echo '-- kafka cluster + nodepools --'; kubectl get kafka,kafkanodepool -n drova
echo '-- topics --';                    kubectl get kafkatopic -n drova
echo '-- broker/controller pods --';    kubectl get pods -n drova -l strimzi.io/cluster=drova-kafka -o wide
"""

[tasks.help-mise]
description = "📖 mise Tasks & Tool-Management"
run = """
echo '⚡ MISE — Tasks & Tools'
echo '  ── TASKS ──'
echo '  mise run <task>          Task ausführen'
echo '  mise run                 interaktiver Task-Picker'
echo '  mise tasks ls [--all]    Tasks auflisten (--all = auch versteckte)'
echo '  mise tasks info <task>   Details + run-Block eines Tasks'
echo '  mise watch <task>        Task bei Datei-Änderung neu ausführen'
echo '  ── TOOLS ──'
echo '  mise install             alle Tools aus mise.toml installieren'
echo '  mise use <tool>@<ver>    Tool pinnen (z.B. mise use kubectl@1.31)'
echo '  mise use -g <tool>@latest   global pinnen'
echo '  mise ls                  installierte Tools + Versionen'
echo '  mise current             aktive Versionen im Verzeichnis'
echo '  mise upgrade             Tools auf neueste erlaubte Version'
echo '  mise x -- <cmd>          Befehl mit mise-Tool-Env ausführen'
echo '  ── CONFIG / ENV ──'
echo '  mise trust               mise.toml vertrauen (nach jeder Änderung!)'
echo '  mise env                 exportierte Env-Variablen zeigen'
echo '  mise config              geladene Config-Dateien zeigen'
echo '  mise doctor              Setup-Probleme diagnostizieren'
"""

[tasks.events]
description = "📰 Aktuellste Cluster-Events (alle Namespaces)"
run = "kubectl get events -A --sort-by=.lastTimestamp | tail -30"

[tasks.help-tricks]
description = "📖 Pro-Tricks (Tools die du hast)"
run = """
echo '🪄 PRO-TRICKS'
echo ''
echo '  CLUSTER-EVENTS  (aktuellste zuerst)'
echo '    mise run events                         letzte 30 Events, alle NS'
echo '    kubectl get events -A -w                live mitlaufen'
echo '    kubectl get events -n <ns> --field-selector type=Warning'
echo ''
echo '  CNPG (Postgres)'
echo '    kubectl cnpg status <cluster> -n <ns>   DB-Dashboard (Lag/Backups/WAL)'
echo '    kubectl cnpg psql <cluster> -n <ns>     direkt psql rein'
echo '    kubectl cnpg promote <cluster> <inst>   Failover testen'
echo '    kubectl cnpg backup <cluster> -n <ns>   Backup triggern'
echo ''
echo '  ROOK-CEPH'
echo '    kubectl rook-ceph ceph status           HEALTH + OSDs'
echo '    kubectl rook-ceph health                health detail'
echo '    kubectl rook-ceph rook purge-osd <id>   OSD entfernen'
echo ''
echo '  LOGS (stern)'
echo '    stern -n drova .                        alle drova-Pods live, farbig'
echo '    stern -l app=<x> --since 5m             nach Label, letzte 5min'
