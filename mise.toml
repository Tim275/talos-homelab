echo '    (System-Indizes regeln sich via auto_expand_replicas: 0-1 selbst)'
"""

[tasks.help-kafka]
description = "📖 Kafka/Strimzi Cheatsheet (drova)"
run = """
echo '📨 KAFKA / STRIMZI (namespace drova)'
echo '  mise run kafka-status     # Cluster + NodePools + Topics + Pods'
