echo '  TUI / HISTORY'
echo '    k9s   →  :popeye (Linter) · :xray deploy · Ctrl-D (delete)'
echo '    Ctrl-R  →  atuin Fuzzy-History'
echo '    lazygit                                 Git-TUI (Branches/PRs)'
echo ''
echo '  CHECKS'
echo '    popeye                                  Cluster-Sanitizer (tote PVs/Misconfigs)'
echo '    pluto detect-all-in-cluster             deprecated APIs VOR k8s-Upgrade'
echo '    kubectl resource-capacity --util --pods requests vs ECHTE Nutzung (RAM-Ueberreservierer!)'
echo '    kubectl access-matrix [--sa <ns>:<sa>]  RBAC: wer darf was'
