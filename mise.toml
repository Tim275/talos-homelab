echo '  DEBUG (Talos/distroless Pods)'
echo '    kubectl debug -it <pod> -n <ns> --image=nicolaka/netshoot -- bash'
echo '    kubectl debug node/<node> -it --image=nicolaka/netshoot   Node-Debug'
echo ''
echo '  KONTEXT / NAMESPACE'
echo '    kubens <ns>                             Default-Namespace setzen'
echo '    kubectx -                               zum vorherigen Context'
echo ''
echo '  SECRETS / YAML / BAUM'
echo '    kubectl view-secret <name> -n <ns>      Secret decoden'
echo '    kubectl neat get <kind> <n> -o yaml     sauberes YAML'
echo '    kubectl tree <kind> <name> -n <ns>      Owner-Baum (CRDs/Operatoren)'
