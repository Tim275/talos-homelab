[tools]
kubectl = "latest"     # ⚓ Kubernetes CLI
k9s = "latest"         #  Kubernetes dashboard TUI
yq = "latest"          #  YAML processor
opentofu = "latest"    #  Infrastructure as Code
talosctl = "latest"    # 🐧 Talos Linux CLI
helm = "latest"        # ⛵ Helm package manager
kustomize = "latest"   #  Kustomize for manifests
argocd = "latest"      #  ArgoCD CLI
kubeseal = "latest"    #  Sealed Secrets CLI
"int128/kubelogin" = "latest"   # 🔑 OIDC kubectl-Plugin (kubectl-oidc_login)

[settings]
experimental = true

# ════════════════════════════════════════════════════════════════════════
# KUBECONFIG-MANAGEMENT — 2 parallele Auth-Pfade zum Talos-Cluster
# ════════════════════════════════════════════════════════════════════════
#
# Datei                              | Wer du bist          | Wann nutzen
# ──────────────────────────────────  | ──────────────────── | ──────────────
# ~/.kube/config-oidc                | oidc:<your-user>     | Daily-Driver
#   ↑ kubelogin → KC-Login + 2FA    | OIDC-User aus LDAP   | (Default-Pfad)
#                                    |                      |
# ~/.kube/config-break-glass         | admin (system:masters)| KC kaputt /
#   ↑ X.509 Talos-Admin-Cert        | Cluster-Admin direkt  | OIDC tot /
#                                    |                      | Notfall-Recovery
#                                    |                      |
# ~/.kube/config-talos-backup        | (Talos-API-Cert)     | Backup von ~/.talos/config
#   ↑ NICHT für kubectl —           |                      | für talosctl
#   sondern für talosctl-Notfall    |                      |
#
# ─── Wie wechseln ────────────────────────────────────────────────────────
#
# Option A: Mit mise (auto, in diesem Repo)
#   cd ~/Desktop/.../talos-homelab-scratch    # → mise lädt KUBECONFIG=config-oidc
#
# Option B: Per Hand (überall)
#   export KUBECONFIG=~/.kube/config-oidc        # OIDC daily
#   export KUBECONFIG=~/.kube/config-break-glass # Notfall
#   export KUBECONFIG=~/.kube/config             # Default-Mac-config
#
# Option C: Einmal-Befehl (ohne shell-export)
#   KUBECONFIG=~/.kube/config-break-glass kubectl get nodes
#
# ─── Erstellen / Re-generieren ───────────────────────────────────────────
#
# Wenn config-break-glass kaputt/abgelaufen:
#   talosctl --talosconfig ~/.talos/config --nodes 192.168.0.101 \
#     kubeconfig ~/.kube/config-break-glass
#   chmod 600 ~/.kube/config-break-glass
#
# Wenn config-oidc kaputt: einfach diese Datei wieder erstellen mit
# dem User-Block aus CLAUDE.md "Phase 8 — kubelogin Setup".
#
# ════════════════════════════════════════════════════════════════════════
[env]
# Default beim `cd` in dieses Repo: OIDC-Pfad (Keycloak-Login Pflicht)
KUBECONFIG = "{{ env.HOME }}/.kube/config-oidc"

# Aliases via mise tasks (siehe unten):
#   mise run kube-oidc        → zeigt OIDC-Pfad an
#   mise run kube-break-glass → zeigt X.509 Notfall-Pfad an
#   mise run kube-status      → welche config aktuell aktiv + welcher User

[tasks.setup]
description = "Trust and install all tools"
run = """
mise trust
mise install
"""

[tasks.cluster-info]
description = "Show cluster information"
run = """
echo " Talos Cluster Info:"
kubectl get nodes -o wide
kubectl get pods -A --field-selector=status.phase!=Running
"""

[tasks.cluster-status]
description = "Check cluster health (Talos + Kubernetes)"
run = """
echo "🏥 Talos Cluster Health:"
talosctl --talosconfig tofu/output/talos-config.yaml health

echo ""
echo "☸️ Kubernetes Nodes:"
kubectl --kubeconfig tofu/output/kube-config.yaml get nodes -o wide

echo ""
echo " Not Running Pods:"
kubectl --kubeconfig tofu/output/kube-config.yaml get pods -A --field-selector=status.phase!=Running
"""

[tasks.apply-manifests]
description = "Apply Kubernetes manifests"
run = """
echo " Applying manifests..."
kubectl apply -f kubernetes/
"""

[tasks.tofu-plan]
description = "Plan infrastructure changes"
run = """
echo " Planning infrastructure changes..."
cd tofu
tofu plan
"""

[tasks.tofu-apply]
description = "Apply infrastructure changes"
run = """
echo " Applying infrastructure changes..."
cd tofu
tofu apply
"""

# ─── Kubeconfig-Switcher ────────────────────────────────────────────────
[tasks.kube-oidc]
description = "🔑 Switch to OIDC kubeconfig (Daily-Driver via Keycloak)"
run = """
echo "export KUBECONFIG=$HOME/.kube/config-oidc"
echo ""
echo " OIDC kubeconfig active:"
echo "   • User: oidc:<your-keycloak-user>"
echo "   • Auth: kubelogin → Browser → KC Login + 2FA"
echo "   • Permissions: cluster-admin via group cluster-admins"
"""

[tasks.kube-break-glass]
description = "🚨 Switch to Break-Glass kubeconfig (X.509 admin, KC bypassen)"
run = """
echo "export KUBECONFIG=$HOME/.kube/config-break-glass"
echo ""
echo "🚨 BREAK-GLASS kubeconfig active:"
echo "   • User: admin (system:masters)"
echo "   • Auth: X.509 cert (umgeht OIDC + KC komplett)"
echo "   • NUR im Notfall! Cert valid bis: $(openssl x509 -noout -enddate -in <(awk \\"/client-certificate-data/{print \\$2}\\" $HOME/.kube/config-break-glass | base64 -d 2>/dev/null) 2>/dev/null | cut -d= -f2)"
"""

[tasks.kube-status]
description = "Show which kubeconfig is active"
run = """
echo "Active KUBECONFIG: ${KUBECONFIG:-$HOME/.kube/config (default)}"
echo ""
echo "Available configs:"
ls -la $HOME/.kube/config* 2>/dev/null
echo ""
echo "Current user:"
kubectl config current-context 2>/dev/null
kubectl auth whoami 2>/dev/null || true
"""

[hooks]
enter = """
mise trust --quiet 2>/dev/null || true
echo ''
echo '╔══════════════════════════════════════════════════════════════════╗'
echo '║  🐧 Talos Homelab — Command Reference                           ║'
echo '╚══════════════════════════════════════════════════════════════════╝'
echo ''
echo '🔧 TOOLS: ⚓ kubectl  📺 k9s  🐧 talosctl  ⛵ helm  🔒 kubeseal  🔑 argocd  📄 yq  🌍 tofu'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '🐧 TALOSCTL'
echo '══════════════════════════════════════════════════════════════════'
echo '  talosctl health                          # Cluster Health Check'
echo '  talosctl get members                     # Alle Nodes anzeigen'
echo '  talosctl version                         # Talos Version (client + server)'
echo '  talosctl dashboard                       # Live Node Dashboard (TUI)'
echo ''
echo '  talosctl dmesg --follow                  # Kernel-Logs (live)'
echo '  talosctl logs controller-runtime         # Controller Logs'
echo '  talosctl logs kubelet                    # Kubelet Logs'
echo '  talosctl logs etcd                       # etcd Logs'
echo ''
echo '  talosctl get nodestatus                  # Node Status'
echo '  talosctl get addresses                   # IPs der Nodes'
echo '  talosctl get routes                      # Routing-Tabelle'
echo '  talosctl get hostname                    # Hostname des Nodes'
echo ''
echo '  talosctl service list                    # Alle Services anzeigen'
echo '  talosctl service kubelet restart         # Kubelet neustarten'
echo '  talosctl service etcd restart            # etcd neustarten'
echo ''
echo '  talosctl kubeconfig ~/.kube/config-break-glass  # Admin Kubeconfig erzeugen'
echo '  talosctl apply-config --file config.yaml        # Config auf Node anwenden'
echo '  talosctl upgrade --image=<image>                # Talos upgraden'
echo '  talosctl upgrade-k8s --to <version>             # Kubernetes upgraden'
echo ''
echo '  talosctl etcd members                   # etcd Cluster Members'
echo '  talosctl etcd status                    # etcd Status + DB-Größe'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '⚓ KUBECTL — NODES & CLUSTER'
echo '══════════════════════════════════════════════════════════════════'
echo '  kubectl get nodes -o wide               # Nodes + IPs + Rollen'
echo '  kubectl describe node <name>            # Node Details (Events, Ressourcen)'
echo '  kubectl top nodes                       # CPU/RAM pro Node'
echo '  kubectl top pods -A                     # CPU/RAM pro Pod (alle NS)'
echo '  kubectl get events -A --sort-by=.lastTimestamp  # Cluster Events'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '⚓ KUBECTL — PODS & WORKLOADS'
echo '══════════════════════════════════════════════════════════════════'
echo '  kubectl get pods -A                     # Alle Pods aller Namespaces'
echo '  kubectl get pods -A --field-selector=status.phase!=Running  # Nicht-Running Pods'
echo '  kubectl get pods -n <ns> -o wide        # Pods mit Node-Zuweisung'
echo '  kubectl describe pod <name> -n <ns>     # Pod Details + Events'
echo '  kubectl logs <pod> -n <ns> -f           # Logs live verfolgen'
echo '  kubectl logs <pod> -n <ns> --previous   # Logs vor letztem Crash'
echo '  kubectl exec -it <pod> -n <ns> -- sh    # Shell in Pod'
echo '  kubectl delete pod <pod> -n <ns>        # Pod neustarten (wird neu erstellt)'
echo '  kubectl rollout restart deploy/<name> -n <ns>  # Deployment neustarten'
echo '  kubectl rollout status deploy/<name> -n <ns>   # Rollout Status'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '⚓ KUBECTL — DEBUGGING'
echo '══════════════════════════════════════════════════════════════════'
echo '  kubectl get events -n <ns> --sort-by=.lastTimestamp  # Namespace Events'
echo '  kubectl describe pod <pod> -n <ns>      # CrashLoop Ursache finden'
echo '  kubectl auth can-i <verb> <resource>    # RBAC Check'
echo '  kubectl auth whoami                     # Wer bin ich im Cluster?'
echo '  kubectl get endpoints -n <ns>           # Service → Pod Verbindung prüfen'
echo '  kubectl port-forward svc/<svc> 8080:80 -n <ns>  # Service lokal erreichbar'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '⚓ KUBECTL — RESSOURCEN & STORAGE'
echo '══════════════════════════════════════════════════════════════════'
echo '  kubectl get pv,pvc -A                   # Persistent Volumes'
echo '  kubectl get storageclass                # Storage Classes'
echo '  kubectl get secret -n <ns>             # Secrets auflisten'
echo '  kubectl get cm -n <ns>                 # ConfigMaps auflisten'
echo '  kubectl get svc -A                     # Alle Services'
echo '  kubectl get ingress -A                 # Alle Ingress / HTTPRoutes'
echo '  kubectl get httproute -A               # Gateway API Routes'
echo '  kubectl get crd                        # Alle installierten CRDs'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '🔒 SEALED SECRETS'
echo '══════════════════════════════════════════════════════════════════'
echo '  kubeseal --fetch-cert --controller-name=sealed-secrets --controller-namespace=sealed-secrets > pub-cert.pem'
echo '  kubectl create secret generic <name> --from-literal=key=val --dry-run=client -o yaml | kubeseal --cert pub-cert.pem -o yaml'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '🔑 ARGOCD'
echo '══════════════════════════════════════════════════════════════════'
echo '  argocd app list                         # Alle Apps + Sync Status'
echo '  argocd app sync <app>                   # App manuell syncen'
echo '  argocd app diff <app>                   # Was würde sich ändern?'
echo '  argocd app get <app>                    # App Details'
echo '  argocd app history <app>                # Deploy History'
echo '  argocd app rollback <app> <id>          # Rollback auf vorherige Version'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '🔐 KUBECONFIG SWITCHER'
echo '══════════════════════════════════════════════════════════════════'
echo '  export KUBECONFIG=~/.kube/config-oidc         # OIDC Daily-Driver (default)'
echo '  export KUBECONFIG=~/.kube/config-break-glass  # 🚨 X.509 Admin (Notfall)'
echo '  mise run kube-status                           # Aktive Config anzeigen'
echo ''
echo '══════════════════════════════════════════════════════════════════'
echo '⚡ MISE TASKS'
echo '══════════════════════════════════════════════════════════════════'
echo '  mise run setup            # Tools installieren + trust'
echo '  mise run cluster-status   # Talos Health + K8s Nodes'
echo '  mise run cluster-info     # Nodes + nicht-Running Pods'
echo '  mise run tofu-plan        # Infrastructure Plan'
echo '  mise run tofu-apply       # Infrastructure Apply'
echo '══════════════════════════════════════════════════════════════════'
echo ''
"""