[tasks.help-talos]
description = "📖 talosctl Cheatsheet"
run = """
echo '🐧 TALOSCTL'
echo '  mise run cluster-status                  # Cluster Health Check (auto-discover IPs)'
echo '  talosctl -n <cp-ip> health --control-plane-nodes <cp-ip> --worker-nodes <w1>,<w2>  # single -n!'
echo '  talosctl get members -n 192.168.0.101    # Alle Nodes + IPs'
echo '  talosctl version                         # Version (client + server)'
echo '  talosctl dashboard                       # Live Node Dashboard (TUI)'
echo '  talosctl dmesg --follow                  # Kernel-Logs live'
echo '  talosctl logs <controller-runtime|kubelet|etcd>   # Komponenten-Logs'
echo '  talosctl get <nodestatus|addresses|routes|hostname>   # Node-Infos'
echo '  talosctl service list | service kubelet restart | service etcd restart'
echo '  talosctl kubeconfig ~/.kube/config-break-glass   # Admin-Kubeconfig'
echo '  talosctl apply-config --file config.yaml         # Config anwenden'
echo '  talosctl upgrade --image=<image> | upgrade-k8s --to <version>'
echo '  talosctl etcd members | etcd status      # etcd Members + DB-Größe'
"""

[tasks.help-k8s]
description = "📖 kubectl Cheatsheet (nodes/pods/debug/storage)"
run = """
echo '⚓ KUBECTL'
echo ''
echo '  NODES'
echo '    kubectl get nodes -o wide           Nodes + IPs + Rollen'
echo '    kubectl describe node <n>           Details (Events, Ressourcen)'
echo '    kubectl top nodes                   CPU/RAM pro Node'
echo '    kubectl top pods -A                 CPU/RAM pro Pod'
echo '    kubectl get events -A --sort-by=.lastTimestamp'
echo ''
echo '  PODS'
echo '    kubectl get pods -A                 alle Namespaces'
echo '    kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded   Problem-Pods'
echo '    kubectl get pods -n <ns> -o wide    mit Node-Zuweisung'
echo '    kubectl describe pod <p> -n <ns>    Details + Events'
echo '    kubectl logs <p> -n <ns> -f         live  (--previous = vor Crash)'
echo '    kubectl exec -it <p> -n <ns> -- sh  Shell im Pod'
echo '    kubectl delete pod <p> -n <ns>      Pod neustarten'
echo '    kubectl rollout restart deploy/<n> -n <ns>'
echo ''
echo '  DEBUG'
echo '    kubectl get events -n <ns> --sort-by=.lastTimestamp   IMMER zuerst'
echo '    kubectl auth can-i <verb> <res>     RBAC-Check'
