echo '    kubectl get endpoints <svc> -n <ns> Service→Pod (leer = Selector/Readiness falsch)'
echo '    kubectl port-forward svc/<svc> 8080:80 -n <ns>'
echo ''
echo '  STORAGE / RESSOURCEN'
echo '    kubectl get pv,pvc -A · storageclass · svc -A · httproute -A · crd'
echo ''
echo '  🔌 KREW-PLUGINS (installiert)'
echo '    kubectl tree <kind> <name> -n <ns>      Owner-Baum — top bei CRDs/Operatoren'
echo '    kubectl view-secret <name> -n <ns>      Secret decoden (kein base64 -d mehr)'
echo '    kubectl neat get <kind> <n> -o yaml     sauberes YAML (managedFields/status raus)'
echo '    kubectl krew install <plugin>           weitere Plugins (krew-index)'
"""

[tasks.help-net]
description = "📖 Cilium / Network Debugging"
run = """
echo '🌐 CILIUM / NETWORK'
echo '  mise run cilium-health    # ⭐ Node-zu-Node Datapath-Matrix — DER Outage-Check'
echo '  mise run cilium-status    # Agent-Status (Encryption/WireGuard/Controller)'
echo '  POD=$(kubectl get pod -n kube-system -l k8s-app=cilium --field-selector spec.nodeName=worker-2 -o name|head -1)'
echo '  kubectl exec -n kube-system $POD -c cilium-agent -- cilium-health status   # Sicht EINES Nodes'
echo '  kubectl exec -n kube-system ds/cilium -c cilium-agent -- cilium-dbg bpf ct flush global'
echo '  hubble observe --verdict DROPPED -f     # Live gedroppte Pakete'
echo ''
echo '  🔍 Diagnose-Leiter "Pod kann nicht connecten":'
echo '   1. cilium-health → welcher Node-Pfad ist 0/1? (Ausreißer = Problem)'
echo '   2. Symptom+Ziel-Pod: welche NODES? (kubectl get pod -o wide)'
echo '   3. Test-Pod auf Quell-Node → nc zur AKTUELLEN Ziel-Pod-IP (nie stale!)'
echo '   4. Cross-host? → SSH Proxmox: pve-firewall (NIEMALS an!) + nft list ruleset'
echo '   5. Node stuck trotz fix? → cordon+drain+delete ciliumnode → reboot'
"""

[tasks.help-storage]
description = "📖 Rook-Ceph Cheatsheet"
run = """
echo '💾 ROOK-CEPH'
echo '  mise run ceph-status      # Cluster-Status (HEALTH_OK?)'
echo '  mise run ceph-health      # health detail + osd status + df'
echo '  kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph <cmd>'
echo '     ceph osd tree   # OSD-Baum (welche OSD auf welchem Node)'
echo '     ceph osd df     # Auslastung pro OSD'
echo '     ceph pg stat    # Placement-Group-Status'
echo '  kubectl get cephcluster -n rook-ceph · kubectl -n rook-ceph get pods'
echo ''
echo '🔎 ELASTICSEARCH (ECK, elastic-system)'
echo '  mise run es-status               Health + Nodes (ECK CR)'
echo '  mise run es-health               _cluster/health + gelbe/rote Indizes'
echo '  → yellow bei 1-Node-Cluster = unassigned Replica-Shards (1 Node hat'
