extends: default

yaml-files:
  - '*.yaml'
  - '*.yml'

ignore: |
  README.md
  LICENSE
  notes/
  **/charts/**
  **/templates/**
  **/*sealed*.yaml
  **/sealed-secret*.yaml
  kubernetes/infrastructure/observability/dashboards/
  tofu/

rules:
  document-start: disable
  line-length: disable
  indentation: disable
  comments-indentation: disable
  comments: disable
  empty-lines: disable
  truthy: disable
  brackets: disable
  braces: disable
  colons: disable
  commas: disable
  hyphens: disable
  key-duplicates: enable
  trailing-spaces: enable
  new-line-at-end-of-file: enable
