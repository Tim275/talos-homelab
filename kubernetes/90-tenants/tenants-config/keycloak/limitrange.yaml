apiVersion: v1
kind: LimitRange
metadata:
  name: keycloak-limits
  namespace: keycloak
spec:
  limits:
  - max:
      cpu: "4"
      memory: 4Gi
    min:
      cpu: 10m
      memory: 32Mi
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
