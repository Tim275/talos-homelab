apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ApplicationSets — 1 AppSet ersetzt N Applications via Cluster-Selector + List-Generator
# Multi-Cluster-Ready: neuer Cluster mit passendem Label → AppSet generiert auto die N Apps.
#
# Naming-Convention:
#   tenants/<tenant>-tenant.yaml       — pro Tenant (Drova, n8n, ...)
#   infrastructure/<stack>-stack.yaml  — pro Layer (observability, storage, network, controllers)
#   platform/<stack>-stack.yaml        — pro Platform-Layer (data, identity)
#   security/<stack>-stack.yaml        — security-Layer
resources:
  # === STACK-AppSets (cluster-shared infrastructure) ===
  - infrastructure/controllers-stack.yaml      # 5 Apps (argocd, argo-rollouts, cert-manager, operators, sealed-secrets)
  - infrastructure/network-stack.yaml          # 5 Apps (cilium, coredns, gateway, cloudflared, redis-gateway)
  - infrastructure/storage-stack.yaml          # 4 Apps (rook-ceph, rgw, csi-snapshot, velero) — velero-ui standalone
  - infrastructure/observability-stack.yaml    # 15 Apps (prom, loki, tempo, grafana, jaeger, ES, ...)
  - platform/data-stack.yaml                   # 2 Apps (keycloak-db, cloudbeaver)
  - platform/identity-stack.yaml               # 2 Apps (keycloak, lldap)
  - security/security-stack.yaml               # 3 Apps (foundation, compliance, kyverno)

  # observability-set.yaml REMOVED 2026-05-09 — superseded by infrastructure/observability-stack.yaml
  # Was generating kube-prometheus-stack-in-cluster — now owned by observability-stack AppSet.

  # === TENANT-AppSets (per-tenant components) ===
  - tenants/drova-tenant.yaml                  # 4 Apps (postgres, kafka, redis, app)
  - tenants/n8n-tenant.yaml                    # 3 Apps (postgres, redis, app)
