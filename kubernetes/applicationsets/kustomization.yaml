apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ApplicationSets — 1 AppSet ersetzt N Applications via Cluster-Selector + List-Generator
# Multi-Cluster-Ready: neuer Cluster mit passendem Label → AppSet generiert auto die N Apps.
#
# Tenant-AppSets: 1 pro Tenant (Drova, n8n, ...). Cluster-Label: <tenant>.tier=enabled
# Stack-AppSets:  1 pro Layer (observability, storage, ...). Cluster-Label: <stack>.tier=enabled
resources:
  # Stack-AppSets (cluster-shared infrastructure)
  - observability-set.yaml

  # Tenant-AppSets (per-tenant components)
  - tenants/drova-tenant.yaml
