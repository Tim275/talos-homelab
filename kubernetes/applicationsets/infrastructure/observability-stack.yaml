# Observability Stack — 1 ApplicationSet ersetzt 15 separate Application-CRs
#
# Selector: clusters mit Label observability.tier=enabled
# Multi-Cluster-Ready: Pi-Spoke registrieren mit Label → 15 Apps auto-generated
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    infrastructure.domain: observability
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  observability.tier: enabled
                  environment: prod
          - list:
              elements:
                # METRICS — Backends @ tier 40, post-deploy exporters/server @ tier 0/70
                - { component: prometheus,             appName: kube-prometheus-stack-in-cluster, path: kubernetes/infrastructure/observability/kube-prometheus-stack/overlays/prod, namespace: monitoring,   wave: "40" }
                - { component: metrics-server,         appName: metrics-server,                   path: kubernetes/infrastructure/observability/metrics-server/overlays/prod,         namespace: kube-system,  wave: "0" }
                - { component: blackbox-exporter,      appName: blackbox-exporter,                path: kubernetes/infrastructure/observability/blackbox-exporter/overlays/prod,      namespace: monitoring,   wave: "70" }
                - { component: gatus,                  appName: gatus,                            path: kubernetes/infrastructure/observability/gatus/overlays/prod,                  namespace: monitoring,   wave: "70" }
                - { component: pve-exporter,           appName: pve-exporter,                     path: kubernetes/infrastructure/observability/pve-exporter/overlays/prod,           namespace: monitoring,   wave: "70" }
                # LOGS — Backends @ 40, shippers @ 70 (after apps exist)
                - { component: elasticsearch,          appName: elasticsearch,                    path: kubernetes/infrastructure/observability/elasticsearch/overlays/prod,             namespace: elastic-system, wave: "40" }
                - { component: loki,                   appName: loki,                             path: kubernetes/infrastructure/observability/loki/overlays/prod,                     namespace: monitoring,   wave: "40" }
                - { component: vector,                 appName: vector,                           path: kubernetes/infrastructure/observability/vector/overlays/prod,                   namespace: monitoring,   wave: "70" }
                - { component: kibana,                 appName: kibana,                           path: kubernetes/infrastructure/observability/kibana/overlays/prod,                   namespace: elastic-system, wave: "40" }
                # TRACES — Backends @ 40, collector @ 70 (scrapes from apps)
                - { component: tempo,                  appName: tempo,                            path: kubernetes/infrastructure/observability/tempo/overlays/prod,                  namespace: monitoring,   wave: "40" }
                - { component: jaeger,                 appName: jaeger,                           path: kubernetes/infrastructure/observability/jaeger/overlays/prod,                 namespace: jaeger,       wave: "40" }
                - { component: opentelemetry,          appName: opentelemetry-collector,          path: kubernetes/infrastructure/observability/opentelemetry/overlays/prod,          namespace: opentelemetry, wave: "70" }
                # DASHBOARDS / UI — Grafana backend @ 40, dashboards-CRs @ 70 (after Grafana)
                - { component: grafana,                appName: grafana,                          path: kubernetes/infrastructure/observability/dashboards/grafana/overlays/prod,            namespace: grafana,      wave: "40" }
                - { component: dashboards,             appName: dashboards,                       path: kubernetes/infrastructure/observability/dashboards/configs/overlays/prod,            namespace: grafana,      wave: "70" }
                - { component: hubble,                 appName: hubble,                           path: kubernetes/infrastructure/observability/dashboards/hubble/overlays/prod,             namespace: kube-system,  wave: "70" }
                # ALERTING — PrometheusRules @ 70 (Prom CRDs available since wave 40)
                - { component: infrastructure-alerts,  appName: infrastructure-alerts,            path: kubernetes/infrastructure/observability/alerting/alerts/overlays/prod,               namespace: monitoring,   wave: "70" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        infrastructure.domain: observability
        infrastructure.component: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/Tim275/talos-homelab
        targetRevision: HEAD
        path: '{{.path}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      ignoreDifferences:
        - group: bitnami.com
          kind: SealedSecret
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
        - group: monitoring.coreos.com
          kind: ServiceMonitor
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
