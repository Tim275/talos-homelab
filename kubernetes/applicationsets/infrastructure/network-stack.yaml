# Network Stack — 1 ApplicationSet ersetzt 5 separate Application-CRs
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: network-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    infrastructure.domain: network
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # AppSet weg (z.B. PR-Zeile verloren) => Apps ueberleben als Orphans
  # statt Kaskaden-Delete+prune aller Layer-Workloads.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  environment: prod
          - list:
              elements:
                - { component: cilium,        appName: cilium,        path: kubernetes/infrastructure/network/cilium/overlays/prod,        namespace: kube-system,  wave: "0" }
                - { component: coredns,       appName: coredns,       path: kubernetes/infrastructure/network/coredns/base,                namespace: kube-system,  wave: "0" }
                - { component: istio,         appName: istio-control-plane, path: kubernetes/infrastructure/network/istio-control-plane,   namespace: istio-system, wave: "5" }
                - { component: gateway,       appName: gateway,       path: kubernetes/infrastructure/ingress/gateway/overlays/prod,       namespace: gateway,      wave: "70" }
                - { component: cloudflared,   appName: cloudflared,   path: kubernetes/infrastructure/ingress/cloudflared/overlays/prod,   namespace: cloudflared,  wave: "70" }
                - { component: redis-gateway, appName: redis-gateway, path: kubernetes/infrastructure/ingress/redis-gateway,               namespace: gateway,      wave: "70" }
                - { component: netbird-operator, appName: netbird-operator, path: kubernetes/infrastructure/network/netbird-operator/overlays/prod, namespace: netbird, wave: "70" }
                - { component: external-dns,  appName: external-dns,  path: kubernetes/infrastructure/ingress/external-dns/overlays/prod,  namespace: external-dns, wave: "71" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        infrastructure.domain: network
        infrastructure.component: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/Tim275/talos-homelab
        targetRevision: main
        path: '{{.path}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      ignoreDifferences:
        - group: bitnami.com
          kind: SealedSecret
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
        # Cilium operator generates + auto-rotates these TLS secrets.
        # Helm-template provides them via 'lookup' but live values diverge after
        # rotation → ArgoCD shows permanent OutOfSync. Ignore /data drift.
        - kind: Secret
          name: cilium-ca
          jsonPointers:
            - /data
        - kind: Secret
          name: hubble-relay-client-certs
          jsonPointers:
            - /data
        - kind: Secret
          name: hubble-server-certs
          jsonPointers:
            - /data
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
