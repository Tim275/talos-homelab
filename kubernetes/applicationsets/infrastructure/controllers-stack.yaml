# Controllers Stack — 1 ApplicationSet ersetzt 5 separate Application-CRs
# Includes: argocd (self-manage), argo-rollouts, cert-manager, operators, sealed-secrets
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: controllers-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    infrastructure.domain: controllers
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  environment: prod   # staging gets its own controllers via staging-edge AppSet
          - list:
              elements:
                - { component: sealed-secrets,  appName: sealed-secrets,  path: kubernetes/infrastructure/secrets/sealed-secrets/overlays/prod,  namespace: sealed-secrets,  wave: "-100" }
                - { component: cert-manager,    appName: cert-manager,    path: kubernetes/infrastructure/certificates/cert-manager/overlays/prod,    namespace: cert-manager,    wave: "-50" }
                # Operators — one ArgoCD app each (independent sync/health/rollback), all wave -50
                - { component: cnpg,              appName: cnpg,              path: kubernetes/infrastructure/operators/cloudnative-pg/overlays/prod, namespace: cnpg-system,           wave: "-50" }
                - { component: eck,               appName: eck,               path: kubernetes/infrastructure/operators/eck/overlays/prod,            namespace: elastic-system,        wave: "-50" }
                - { component: strimzi,           appName: strimzi,           path: kubernetes/infrastructure/operators/strimzi/overlays/prod,        namespace: kafka,                 wave: "-50" }
                - { component: redis,             appName: redis,             path: kubernetes/infrastructure/operators/redis/overlays/prod,          namespace: redis-operator-system, wave: "-50" }
                - { component: grafana-operator,  appName: grafana-operator,  path: kubernetes/infrastructure/operators/grafana/overlays/prod,        namespace: grafana,               wave: "-50" }
                - { component: opentelemetry,     appName: opentelemetry,     path: kubernetes/infrastructure/operators/opentelemetry/overlays/prod,  namespace: opentelemetry,         wave: "-50" }
                - { component: reloader,          appName: reloader,          path: kubernetes/infrastructure/operators/reloader/overlays/prod,       namespace: reloader,              wave: "-50" }
                - { component: renovate,          appName: renovate,          path: kubernetes/infrastructure/operators/renovate/overlays/prod,       namespace: renovate-operator,     wave: "-50" }
                - { component: renovate-jobs,     appName: renovate-jobs,     path: kubernetes/platform/gitops/renovate/base,                        namespace: renovate-operator,     wave: "10" }
                - { component: keycloak-operator, appName: keycloak-operator, path: kubernetes/infrastructure/operators/keycloak/overlays/prod,       namespace: keycloak,              wave: "-50" }
                - { component: argo-rollouts,   appName: argo-rollouts,   path: kubernetes/infrastructure/operators/argo-rollouts/overlays/prod,   namespace: argo-rollouts,   wave: "-50" }
                - { component: argocd,          appName: argocd,          path: kubernetes/infrastructure/argocd/overlays/prod,          namespace: argocd,          wave: "90" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        infrastructure.domain: controllers
        infrastructure.component: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/Tim275/talos-homelab
        targetRevision: HEAD
        path: '{{.path}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      ignoreDifferences:
        - group: bitnami.com
          kind: SealedSecret
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
