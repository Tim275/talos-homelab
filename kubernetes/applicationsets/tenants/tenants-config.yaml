apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants-config
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.homelab/layer: tenant-config
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # AppSet weg (z.B. PR-Zeile verloren) => Apps ueberleben als Orphans
  # statt Kaskaden-Delete+prune aller Layer-Workloads.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  environment: prod
          - list:
              elements:
                - { component: drova,    appName: drova-config,    appProject: platform, namespace: drova,    wave: "10" }
                - { component: n8n-prod, appName: n8n-prod-config, appProject: platform, namespace: n8n-prod, wave: "10" }
                - { component: keycloak, appName: keycloak-config, appProject: platform, namespace: keycloak, wave: "10" }
                - { component: lldap,    appName: lldap-config,    appProject: platform, namespace: lldap,    wave: "10" }
                - { component: ml,       appName: ml-config,       appProject: ml,       namespace: ml,       wave: "10" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        platform.homelab/layer: tenant-config
        platform.homelab/tenant: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: '{{.appProject}}'
      source:
        repoURL: https://github.com/Tim275/talos-homelab
        targetRevision: main
        path: 'kubernetes/tenants/{{.component}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        # automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
