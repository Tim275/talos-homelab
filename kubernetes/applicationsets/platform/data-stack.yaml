# Platform Data Stack — 1 ApplicationSet ersetzt 2 separate Application-CRs
# (drova-postgres + n8n-prod-cnpg + redis-* sind in Tenant-AppSets)
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-data-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.domain: data
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - { component: keycloak-db,  appName: keycloak-db,  path: kubernetes/platform/data/keycloak-db/overlays/prod, namespace: keycloak,    wave: "12" }
                - { component: cloudbeaver,  appName: cloudbeaver,  path: kubernetes/platform/data/cloudbeaver/overlays/prod, namespace: cloudbeaver, wave: "15" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        platform.domain: data
        platform.component: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/Tim275/talos-homelab
        targetRevision: HEAD
        path: '{{.path}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
