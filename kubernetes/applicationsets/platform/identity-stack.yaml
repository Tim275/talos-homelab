# Platform Identity Stack — DB + Identity apps (keycloak-db vor keycloak, wave 30 < 50)
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-identity-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.domain: identity
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # AppSet weg (z.B. PR-Zeile verloren) => Apps ueberleben als Orphans
  # statt Kaskaden-Delete+prune aller Layer-Workloads.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  environment: prod
          - list:
              elements:
                - { component: keycloak-db, appName: keycloak-db, repoURL: https://github.com/Tim275/talos-homelab, path: kubernetes/platform/identity/keycloak/db/overlays/prod, namespace: keycloak, wave: "30" }
                - { component: lldap,       appName: lldap,       repoURL: https://github.com/Tim275/talos-homelab,     path: kubernetes/platform/identity/lldap/overlays/prod,    namespace: lldap,    wave: "50" }
                - { component: keycloak,    appName: keycloak,    repoURL: https://github.com/Tim275/talos-homelab, path: kubernetes/platform/identity/keycloak/overlays/prod, namespace: keycloak, wave: "50" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        platform.domain: identity
        platform.component: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: platform
      source:
        repoURL: '{{.repoURL}}'
        targetRevision: main
        path: '{{.path}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      ignoreDifferences:
        - group: bitnami.com
          kind: SealedSecret
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
