# Platform Identity Stack — 1 ApplicationSet ersetzt 2 separate Application-CRs
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-identity-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.domain: identity
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
          - list:
              elements:
                - { component: lldap,    appName: lldap,    repoURL: https://github.com/Tim275/talos-homelab,     path: kubernetes/platform/identity/lldap/overlays/prod,    namespace: lldap,    wave: "12" }
                - { component: keycloak, appName: keycloak, repoURL: https://github.com/Tim275/talos-homelab.git, path: kubernetes/platform/identity/keycloak/overlays/prod, namespace: keycloak, wave: "13" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        platform.domain: identity
        platform.component: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: platform
      source:
        repoURL: '{{.repoURL}}'
        targetRevision: HEAD
        path: '{{.path}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      ignoreDifferences:
        - group: bitnami.com
          kind: SealedSecret
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
