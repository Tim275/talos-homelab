# Apps Stack — stateless tools + media apps (prod cluster)
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    platform.domain: apps
    team: timour
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  environment: prod
          - list:
              elements:
                - { component: audiobookshelf, appName: audiobookshelf, path: kubernetes/apps/audiobookshelf/overlays/prod,        namespace: audiobookshelf-prod, wave: "60" }
                - { component: cloudbeaver,    appName: cloudbeaver,    path: kubernetes/apps/cloudbeaver/overlays/prod,           namespace: cloudbeaver,         wave: "60" }
  template:
    metadata:
      name: '{{.appName}}'
      labels:
        app.kubernetes.io/managed-by: argocd
        platform.domain: apps
        platform.component: '{{.component}}'
        team: timour
      annotations:
        argocd.argoproj.io/sync-wave: '{{.wave}}'
    spec:
      project: apps
      source:
        repoURL: https://github.com/Tim275/talos-homelab
        targetRevision: HEAD
        path: '{{.path}}'
      destination:
        server: '{{.server}}'
        namespace: '{{.namespace}}'
      syncPolicy:
        # automated: { prune: true, selfHeal: true }
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff: { duration: 5s, factor: 2, maxDuration: 3m }
