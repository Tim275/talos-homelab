---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: oidc-provider
    app.kubernetes.io/part-of: platform-identity
spec:
  hostnames:
  - iam.timourhomelab.org
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: gateway
    sectionName: https  # TLS termination at Gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    # 2026-05-16 — Envoy default response_timeout = 15s, zu kurz für POST /login-actions/authenticate
    # KC braucht für OIDC-flow Token-Write in Infinispan → kann >15s dauern.
    # Symptom: 504 mit response_flags=UT (Upstream Timeout). Fix: 60s timeout.
    timeouts:
      request: 60s
      backendRequest: 55s
    backendRefs:
    - group: ""
      kind: Service
      name: keycloak-service          # ← Operator-managed (was: keycloak from plain Deployment)
      port: 8080
      weight: 1
