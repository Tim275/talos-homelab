apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: media-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: nginx:1.21
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: staging

namePrefix: staging-
nameSuffix: -v1