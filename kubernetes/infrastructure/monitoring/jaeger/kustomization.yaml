apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization


# 🌊 Sync Wave 5: Jaeger Tracing (After Storage)
commonAnnotations:
  argocd.argoproj.io/sync-wave: "5"

resources:
  # 🛡️ POD SECURITY: Baseline compliant namespace
  - pod-security-exception.yaml

  # 🔧 JAEGER V2: Production deployment with OpenTelemetry Operator
  - jaeger-v2.yaml  # Jaeger v2 with Elasticsearch storage
  - elasticsearch-sealed-secret.yaml  # Encrypted password
  - servicemonitor.yaml  # Prometheus metrics
  - poddisruptionbudgets.yaml  # HA: Ensure availability during voluntary disruptions
  # - httproute.yaml  # Gateway API route - DISABLED: No authentication, internal use only

namespace: jaeger
