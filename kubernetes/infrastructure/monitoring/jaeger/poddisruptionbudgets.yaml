---
# PodDisruptionBudget for Jaeger Collector
# Ensures at least 2 collectors are always available during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jaeger-collector-pdb
  namespace: jaeger
  labels:
    app: jaeger
    app.kubernetes.io/component: collector
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: jaeger
      app.kubernetes.io/component: collector

---
# PodDisruptionBudget for Jaeger Query
# Ensures at least 1 query pod is always available during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jaeger-query-pdb
  namespace: jaeger
  labels:
    app: jaeger
    app.kubernetes.io/component: query
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: jaeger
      app.kubernetes.io/component: query
