apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      pagerduty_url: https://events.pagerduty.com/v2/enqueue

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - matchers:
            - priority="p0"
          receiver: 'pagerduty-critical'
          continue: true

        - matchers:
            - priority="p0"
          receiver: 'slack-critical'

        - matchers:
            - priority="p1"
          receiver: 'pagerduty-high'
          continue: true

        - matchers:
            - priority="p1"
          receiver: 'slack-high'

        - matchers:
            - priority="p2"
          receiver: 'slack-medium'

        - matchers:
            - priority="p3"
          receiver: 'slack-info'

        - matchers:
            - priority="argocd-gitops"
          receiver: 'slack-argocd-gitops'

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname', 'namespace', 'instance']

      - source_matchers:
          - priority="p0"
        target_matchers:
          - priority=~"p1|p2|p3"
        equal: ['job', 'namespace']

      - source_matchers:
          - alertname="NodeDown"
        target_matchers:
          - alertname=~"Pod.*|Container.*"
        equal: ['node']

    receivers:
      - name: 'default'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url
            channel: '#alerts'
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Severity:* {{ .Labels.severity | toUpper }}
              {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`{{ end }}
              {{ if .Labels.pod }}*Pod:* `{{ .Labels.pod }}`{{ end }}
              {{ if .Labels.container }}*Container:* `{{ .Labels.container }}`{{ end }}
              {{ if .Labels.node }}*Node:* `{{ .Labels.node }}`{{ end }}
              {{ if .Labels.job }}*Job:* `{{ .Labels.job }}`{{ end }}
              *Summary:* {{ .Annotations.summary }}
              {{ if .Annotations.description }}*Description:* {{ .Annotations.description }}{{ end }}
              {{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}{{ end }}
              {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}
                {{ if eq .CommonLabels.severity "critical" }}danger{{ else if eq .CommonLabels.severity "warning" }}warning{{ else }}#439FE0{{ end }}
              {{ else }}good{{ end }}
            actions:
              - type: button
                text: '📊 Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: '📈 Grafana'
                url: 'https://grafana.timourhomelab.org'
              - type: button
                text: '🔕 Silence'
                url: '{{ .ExternalURL }}/#/silences/new'

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/pagerduty-integration-key/integration-key
            severity: critical
            description: '{{ .CommonAnnotations.summary }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'
              alertname: '{{ .CommonLabels.alertname }}'
              namespace: '{{ .CommonLabels.namespace }}'
              priority: '{{ .CommonLabels.priority }}'
              component: '{{ .CommonLabels.component }}'
              impact: '{{ .CommonAnnotations.impact }}'
            send_resolved: true

      - name: 'pagerduty-high'
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/pagerduty-integration-key/integration-key
            severity: warning
            description: '{{ .CommonAnnotations.summary }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'
              alertname: '{{ .CommonLabels.alertname }}'
              namespace: '{{ .CommonLabels.namespace }}'
              priority: '{{ .CommonLabels.priority }}'
            send_resolved: true

      - name: 'slack-critical'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url
            channel: '#alerts-critical'
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] 🚨 P0 CRITICAL: {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Priority:* P0 - CRITICAL OUTAGE
              *Severity:* {{ .Labels.severity | toUpper }}
              {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`{{ end }}
              {{ if .Labels.pod }}*Pod:* `{{ .Labels.pod }}`{{ end }}
              {{ if .Labels.container }}*Container:* `{{ .Labels.container }}`{{ end }}
              {{ if .Labels.node }}*Node:* `{{ .Labels.node }}`{{ end }}
              {{ if .Labels.component }}*Component:* {{ .Labels.component }}{{ end }}

              *Summary:* {{ .Annotations.summary }}
              {{ if .Annotations.description }}*Description:* {{ .Annotations.description }}{{ end }}
              {{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}{{ end }}
              {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}
            actions:
              - type: button
                text: '📊 Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: '📈 Grafana'
                url: 'https://grafana.timourhomelab.org'
              - type: button
                text: '🔕 Silence'
                url: '{{ .ExternalURL }}/#/silences/new'

      - name: 'slack-high'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url
            channel: '#alerts-high'
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] ⚠️ P1 HIGH: {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Priority:* P1 - HIGH (Immediate Action Required)
              *Severity:* {{ .Labels.severity | toUpper }}
              {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`{{ end }}
              {{ if .Labels.pod }}*Pod:* `{{ .Labels.pod }}`{{ end }}
              {{ if .Labels.container }}*Container:* `{{ .Labels.container }}`{{ end }}
              {{ if .Labels.node }}*Node:* `{{ .Labels.node }}`{{ end }}
              {{ if .Labels.component }}*Component:* {{ .Labels.component }}{{ end }}

              *Summary:* {{ .Annotations.summary }}
              {{ if .Annotations.description }}*Description:* {{ .Annotations.description }}{{ end }}
              {{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}{{ end }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}warning{{ else }}good{{ end }}
            actions:
              - type: button
                text: '📊 Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: '📈 Grafana'
                url: 'https://grafana.timourhomelab.org'
              - type: button
                text: '🔕 Silence'
                url: '{{ .ExternalURL }}/#/silences/new'

      - name: 'slack-medium'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url
            channel: '#alerts-medium'
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] ℹ️ P2 MEDIUM: {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Priority:* P2 - MEDIUM (Schedule Investigation)
              {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`{{ end }}
              {{ if .Labels.pod }}*Pod:* `{{ .Labels.pod }}`{{ end }}
              {{ if .Labels.node }}*Node:* `{{ .Labels.node }}`{{ end }}

              *Summary:* {{ .Annotations.summary }}
              {{ if .Annotations.description }}*Description:* {{ .Annotations.description }}{{ end }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}#439FE0{{ else }}good{{ end }}
            actions:
              - type: button
                text: '📊 Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: '📈 Grafana'
                url: 'https://grafana.timourhomelab.org'

      - name: 'slack-info'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url
            channel: '#alerts-info'
            send_resolved: false
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] 📝 P3 INFO: {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Priority:* P3 - INFORMATIONAL
              {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`{{ end }}
              {{ if .Labels.pod }}*Pod:* `{{ .Labels.pod }}`{{ end }}

              *Summary:* {{ .Annotations.summary }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}good{{ else }}#CCCCCC{{ end }}
            actions:
              - type: button
                text: '📊 View Details'
                url: '{{ (index .Alerts 0).GeneratorURL }}'

      - name: 'slack-argocd-gitops'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url
            channel: '#argocd-deployments'
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}] 🔄 GitOps: {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Type:* ArgoCD GitOps Alert
              {{ if .Annotations.application }}*Application:* `{{ .Annotations.application }}`{{ end }}
              {{ if .Annotations.project }}*Project:* {{ .Annotations.project }}{{ end }}
              {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`{{ end }}

              *Summary:* {{ .Annotations.summary }}
              {{ if .Annotations.sync_status }}*Sync Status:* {{ .Annotations.sync_status }}{{ end }}
              {{ if .Annotations.health_status }}*Health:* {{ .Annotations.health_status }}{{ end }}
              {{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}{{ end }}
              {{ end }}
            color: |-
              {{ if eq .Status "firing" }}#5B9BD5{{ else }}good{{ end }}
            actions:
              - type: button
                text: '🚀 ArgoCD UI'
                url: 'https://argo.timourhomelab.org'
              - type: button
                text: '📊 Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
