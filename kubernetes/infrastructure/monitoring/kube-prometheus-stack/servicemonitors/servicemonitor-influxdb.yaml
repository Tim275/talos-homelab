apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: influxdb
  namespace: monitoring
  labels:
    app.kubernetes.io/name: influxdb
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - influxdb
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
