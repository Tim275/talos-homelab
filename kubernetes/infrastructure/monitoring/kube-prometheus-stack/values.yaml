            send_resolved: true
            description: '{{ .CommonAnnotations.summary }}'
            severity: '{{ if eq .CommonLabels.priority "P1" }}critical{{ else }}warning{{ end }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'
              description: '{{ .CommonAnnotations.description }}'
              cluster: '{{ .CommonLabels.cnpg_cluster }}'
              namespace: '{{ .CommonLabels.namespace }}'
              action: '{{ .CommonAnnotations.action }}'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/database-slack-webhook/webhook-url
            channel: '#database-alerts'
            username: 'Database Monitoring'
            icon_emoji: ':database:'
            title: |-
              {{ if eq .Status "firing" }}{{ if eq .CommonLabels.priority "P1" }}🔴 [CRITICAL]{{ else }}⚠️ [WARNING]{{ end }} {{ .GroupLabels.alertname }}{{ else }}✅ [RESOLVED] {{ .GroupLabels.alertname }}{{ end }}
            title_link: '{{ template "__alertmanagerURL" . }}'
            color: |-
              {{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.priority "P1" }}danger{{ else }}warning{{ end }}
            text: |-
              {{ range .Alerts }}
              {{ if eq .Status "firing" }}{{ if eq .Labels.priority "P1" }}🔴 *CRITICAL Database Alert*{{ else }}⚠️ *Database Warning*{{ end }}{{ else }}✅ *Database Issue Resolved*{{ end }}

              🗄️ *Database Details*
              {{ if .Labels.cnpg_cluster }}• *Cluster:* `{{ .Labels.cnpg_cluster }}`{{ end }}
              {{ if .Labels.namespace }}• *Namespace:* `{{ .Labels.namespace }}`{{ end }}
              {{ if .Labels.pod }}• *Pod:* `{{ .Labels.pod }}`{{ end }}
              {{ if .Labels.component }}• *Component:* {{ .Labels.component }}{{ end }}

              🔍 *Problem Summary*
              {{ .Annotations.summary }}
              {{ if .Annotations.description }}
              *Details:* {{ .Annotations.description }}{{ end }}

              📊 *Metrics*
              {{ if .Annotations.current_value }}• *Current:* {{ .Annotations.current_value }}{{ end }}
              {{ if .Annotations.threshold }}• *Threshold:* {{ .Annotations.threshold }}{{ end }}

              🛠️ *Action Required*
              {{ .Annotations.action }}

              📋 *Priority:* {{ .Labels.priority }}
              {{ end }}
            actions:
              - type: button
                text: ':bar_chart: PostgreSQL Dashboard'
                url: '{{ (index .Alerts 0).Annotations.dashboard_url }}'
              - type: button
                text: ':chart_with_upwards_trend: Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
            send_resolved: true

      # ====== SECURITY ALERTS (#security-alerts) 🔒 ======
      - name: 'security-alerts'
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/pagerduty-integration-key/integration-key
            send_resolved: true
            description: '{{ .CommonAnnotations.summary }}'
            severity: '{{ if eq .CommonLabels.priority "P1" }}critical{{ else }}warning{{ end }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'
              description: '{{ .CommonAnnotations.description }}'
              action: '{{ .CommonAnnotations.action }}'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/security-slack-webhook/webhook-url
            channel: '#security-alerts'
            username: 'Security Monitoring'
            icon_emoji: ':lock:'
            title: |-
              {{ if eq .Status "firing" }}{{ if eq .CommonLabels.priority "P1" }}🔴 [CRITICAL SECURITY]{{ else }}⚠️ [SECURITY WARNING]{{ end }} {{ .GroupLabels.alertname }}{{ else }}✅ [RESOLVED] {{ .GroupLabels.alertname }}{{ end }}
            title_link: '{{ template "__alertmanagerURL" . }}'
            color: |-
              {{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.priority "P1" }}danger{{ else }}warning{{ end }}
            text: |-
              {{ range .Alerts }}
              {{ if eq .Status "firing" }}{{ if eq .Labels.priority "P1" }}🔴 *CRITICAL Security Alert*{{ else }}⚠️ *Security Warning*{{ end }}{{ else }}✅ *Security Issue Resolved*{{ end }}

              🔒 *Security Event*
              {{ if .Labels.name }}• *Certificate:* `{{ .Labels.name }}`{{ end }}
              {{ if .Labels.namespace }}• *Namespace:* `{{ .Labels.namespace }}`{{ end }}
              {{ if .Labels.component }}• *Component:* {{ .Labels.component }}{{ end }}

              🔍 *Problem Summary*
              {{ .Annotations.summary }}
              {{ if .Annotations.description }}
              *Details:* {{ .Annotations.description }}{{ end }}

              📊 *Metrics*
              {{ if .Annotations.current_value }}• *Current:* {{ .Annotations.current_value }}{{ end }}
              {{ if .Annotations.threshold }}• *Threshold:* {{ .Annotations.threshold }}{{ end }}

              🛠️ *Action Required*
              {{ .Annotations.action }}

              📋 *Priority:* {{ .Labels.priority }}
              {{ end }}
            actions:
              - type: button
                text: ':shield: Cert Manager'
                url: '{{ (index .Alerts 0).Annotations.dashboard_url }}'
              - type: button
                text: ':chart_with_upwards_trend: Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
            send_resolved: true

      # ====== DEFAULT RECEIVER ======
      - name: 'default'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhooks/critical
            channel: '#alerts'
            username: 'AlertManager'
            icon_emoji: ':prometheus:'
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: |-
              {{ range .Alerts }}
              *{{ .Labels.alertname }}*
              {{ .Annotations.summary }}
              {{ end }}
            send_resolved: true

    # 🚫 INHIBIT RULES - Prevent Alert Spam
    inhibit_rules:
      # Critical alerts suppress warnings for same target
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['namespace', 'alertname', 'instance']

      # P1 suppresses P2/P3 for same service
      - source_matchers:
          - priority="P1"
        target_matchers:
          - priority=~"P2|P3"
        equal: ['namespace', 'job']

      # Node down suppresses pod alerts on that node
      - source_matchers:
          - alertname="NodeDown"
        target_matchers:
          - alertname=~"Pod.*|Container.*"
        equal: ['node']
