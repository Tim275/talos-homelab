              {{ if .Labels.ceph_daemon }}• *OSD:* `{{ .Labels.ceph_daemon }}`{{ end }}
              {{ if .Labels.name }}• *Pool:* `{{ .Labels.name }}`{{ end }}
              {{ if .Labels.tier }}• *Tier:* {{ .Labels.tier }}{{ end }}

              🔍 *Problem Summary*
              {{ .Annotations.summary }}
              {{ if .Annotations.description }}
              *Details:* {{ .Annotations.description }}{{ end }}

              📊 *Metrics*
              {{ if .Annotations.current_value }}• *Current:* {{ .Annotations.current_value }}{{ end }}
              {{ if .Annotations.threshold }}• *Threshold:* {{ .Annotations.threshold }}{{ end }}

              🛠️ *Action Required*
              {{ .Annotations.action }}

              📋 *Priority:* {{ .Labels.priority }}
              {{ end }}
            actions:
              - type: button
                text: ':bar_chart: Ceph Dashboard'
                url: '{{ (index .Alerts 0).Annotations.dashboard_url }}'
              - type: button
                text: ':chart_with_upwards_trend: Prometheus'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
            send_resolved: true

      # ====== DATABASE ALERTS (#database-alerts) 🗄️ ======
      - name: 'database-alerts'
        pagerduty_configs:
