            title_link: '{{ template "__alertmanagerURL" . }}'
            color: |-
              {{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.priority "P1" }}danger{{ else }}warning{{ end }}
            text: |-
              {{ range .Alerts }}
              {{ if eq .Status "firing" }}{{ if eq .Labels.priority "P1" }}🔴 *CRITICAL Storage Alert*{{ else }}⚠️ *Storage Warning*{{ end }}{{ else }}✅ *Storage Issue Resolved*{{ end }}

