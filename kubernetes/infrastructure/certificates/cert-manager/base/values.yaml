crds:
  enabled: true
  keep: true

# Leader election in cert-manager namespace (avoids kube-system RBAC issues)
global:
  leaderElection:
    namespace: cert-manager
  priorityClassName: platform-critical

# Enable Gateway API support
extraArgs:
  - "--enable-gateway-api"

# HA (battle-tested 2026-05-14):
# 2 Replicas + PDB → Pod-Restart blockt nicht cert-issuance.
# Leader-election aktiv im cert-manager-NS → multi-replica-safe.
replicaCount: 2

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: cert-manager
            app.kubernetes.io/instance: cert-manager
        topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

webhook:
  replicaCount: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: webhook
              app.kubernetes.io/instance: cert-manager
          topologyKey: kubernetes.io/hostname
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

cainjector:
  replicaCount: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: cainjector
              app.kubernetes.io/instance: cert-manager
          topologyKey: kubernetes.io/hostname
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 20m
      memory: 128Mi
