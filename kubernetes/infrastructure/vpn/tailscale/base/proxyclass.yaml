apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: ha-subnet-router
spec:
  statefulSet:
    pod:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    tailscale.com/parent-resource: talos-homelab-connector
                topologyKey: kubernetes.io/hostname
      tailscaleContainer:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
