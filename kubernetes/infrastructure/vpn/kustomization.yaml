apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonLabels:
  app.kubernetes.io/managed-by: argocd
  infrastructure.domain: vpn

commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"

resources:
  # Tailscale: für Mac-Direct-Access zu Cluster-IPs (umgeht CF-Trailer-Strip-Limit
  # für NetBird gRPC-CLI). Browser-Dashboard läuft weiter via CF.
  - tailscale/application.yaml
  - netbird/application.yaml
