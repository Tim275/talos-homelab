apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 🎯 TRUE KUSTOMIZE CONTROL - COMMENT/UNCOMMENT = ENABLE/DISABLE!
# ===============================================================
# VPN Domain control - following controllers pattern

commonLabels:
  app.kubernetes.io/managed-by: argocd
  infrastructure.domain: vpn

# 🌊 Sync Wave 3: VPN (After Controllers)
commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"

resources:
  # 🎯 CHILD APPLICATIONS - APPEAR IN ARGOCD UI
  # ===========================================
  # These application.yaml files create child apps in ArgoCD UI
  # - tailscale-operator/application.yaml  # ✅ MOVED to controllers/operators
  # - tailscale/  # ❌ DEPRECATED: Manual deployment (replaced by operator)
