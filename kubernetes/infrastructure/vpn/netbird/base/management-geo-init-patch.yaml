# Patch: pre-fetch NetBird geolocation DBs to avoid auto-download race-condition.
# NetBird's built-in downloader has been observed crashing during init when SHA256
# verification or file-extraction fails silently. We download deterministically
# in an init-container with proper query-string + permissions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-management
  namespace: netbird
spec:
  template:
    spec:
      initContainers:
        - name: geo-init
          image: docker.io/curlimages/curl:8.10.1
          command: [/bin/sh, -c]
          args:
            - |
              set -e
              cd /var/lib/netbird

              if [ ! -f GeoLite2-City.mmdb ]; then
                echo "→ Downloading GeoLite2-City.mmdb (tar.gz)…"
                curl -sfL --retry 3 -o /tmp/geo.tar.gz \
                  "https://pkgs.netbird.io/geolocation-dbs/GeoLite2-City/download?suffix=tar.gz"
                tar -xzf /tmp/geo.tar.gz -C /tmp/
                find /tmp -name "GeoLite2-City.mmdb" -exec mv {} /var/lib/netbird/GeoLite2-City.mmdb \;
                rm -rf /tmp/geo.tar.gz /tmp/GeoLite2*
              fi

              if [ ! -f geonames.db ]; then
                echo "→ Downloading geonames CSV (will be imported to SQLite)…"
                curl -sfL --retry 3 -o /tmp/geo-csv.zip \
                  "https://pkgs.netbird.io/geolocation-dbs/GeoLite2-City-CSV/download?suffix=zip"
                # Note: NetBird's own importer creates geonames.db from this CSV at first start.
                # Just ensure the zip is present in /var/lib/netbird/ for NetBird to find.
                cp /tmp/geo-csv.zip /var/lib/netbird/GeoLite2-City-CSV.zip
                rm -f /tmp/geo-csv.zip
              fi

              # Make sure files readable by NetBird (any uid)
              chmod -R a+r /var/lib/netbird/ 2>/dev/null || true
              chmod a+wx /var/lib/netbird/ 2>/dev/null || true
              ls -la /var/lib/netbird/
              echo "✓ Geo files staged"
          volumeMounts:
            - name: management
              mountPath: /var/lib/netbird
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 10m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
