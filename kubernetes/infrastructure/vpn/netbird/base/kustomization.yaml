apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"

resources:
  - namespace.yaml
  - policy-exception.yaml
  - relay-secret-sealed.yaml
  - keycloak-oidc-sealed.yaml
  - management-secret-sealed.yaml
  - agent-setup-key-sealed.yaml
  - backend-traffic-policy.yaml

helmCharts:
  - name: netbird
    repo: https://vehagn.github.io/helms
    version: "1.11.4"
    releaseName: netbird
    namespace: netbird
    valuesFile: netbird-values.yaml

patches:
  - path: management-geo-init-patch.yaml
    target:
      kind: Deployment
      name: netbird-management

labels:
  - pairs:
      app.kubernetes.io/name: netbird
      app.kubernetes.io/part-of: vpn-infrastructure
