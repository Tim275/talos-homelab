apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: netbird
  namespace: netbird
spec:
  background: false
  match:
    any:
      - resources:
          kinds:
            - Pod
            - Deployment
            - DaemonSet
          namespaces:
            - netbird
  exceptions:
    - policyName: disallow-capabilities
      ruleNames:
        - adding-capabilities
        - autogen-adding-capabilities
    - policyName: disallow-capabilities-strict
      ruleNames:
        - require-drop-all
        - autogen-require-drop-all
    - policyName: disallow-sysctls
      ruleNames:
        - check-sysctls
        - autogen-check-sysctls
    - policyName: require-resource-limits
      ruleNames:
        - check-resource-limits
        - autogen-check-resource-limits
    - policyName: require-resource-requests
      ruleNames:
        - check-resource-requests
        - autogen-check-resource-requests
