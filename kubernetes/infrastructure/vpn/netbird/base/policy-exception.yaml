apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: netbird
  namespace: netbird
spec:
  background: false
  match:
    any:
      - resources:
          kinds:
            - Pod
            - Deployment
            - DaemonSet
            - ReplicaSet
          namespaces:
            - netbird
  exceptions:
    - policyName: disallow-capabilities
      ruleNames:
        - adding-capabilities
        - autogen-adding-capabilities
    - policyName: disallow-capabilities-strict
      ruleNames:
        - require-drop-all
        - autogen-require-drop-all
    - policyName: disallow-sysctls
      ruleNames:
        - check-sysctls
        - autogen-check-sysctls
    - policyName: require-resource-limits
      ruleNames:
        - check-resource-limits
        - autogen-check-resource-limits
    - policyName: require-resource-requests
      ruleNames:
        - check-resource-requests
        - autogen-check-resource-requests
    # NetBird-Container laufen als root (NET_ADMIN braucht root in default-Setup).
    # Capabilities sind via drop:[ALL]+add:[NET_ADMIN,NET_RAW,BPF] eingeschränkt.
    - policyName: require-run-as-non-root
      ruleNames:
        - check-run-as-non-root
        - autogen-check-run-as-non-root
    # NetBird-Images kommen aus ghcr.io/netbirdio (offiziell) + docker.io/netbirdio.
    # Beide nicht in cluster-default-allowlist — daher exception nur für netbird ns.
    - policyName: restrict-image-registries
      ruleNames:
        - check-image-registry
        - autogen-check-image-registry
    # NetBird-Helm-Chart shipped probes mit timeoutSeconds=1 — unter Last reicht 1s nicht.
    # In-cluster traffic ist eh schnell, daher exception solange Helm-Chart das nicht patcht.
    - policyName: require-probe-timeouts
      ruleNames:
        - check-liveness-probe-timeout
        - autogen-check-liveness-probe-timeout
        - check-readiness-probe-timeout
        - autogen-check-readiness-probe-timeout
