# Split-DNS fuer VPN-Clients: *.timourhomelab.org -> gateway-vpn ClusterIP (10.101.57.12).
# So erreichen VPN-Clients die Apps via altem Hostnamen (argo.timourhomelab.org) durch den
# Envoy-Gateway -> echtes Cert + Host-Routing + funktionierendes SSO. NetBird-Nameserver
# (Match-Domain timourhomelab.org, nur admins-Gruppe) zeigt auf den split-dns ClusterIP.
apiVersion: v1
kind: ConfigMap
metadata:
  name: split-dns
  namespace: netbird
data:
  Corefile: |
    timourhomelab.org:53 {
        errors
        template IN A {
            answer "{{ .Name }} 60 IN A 10.101.57.12"
        }
        template IN AAAA {
            rcode NOERROR
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: split-dns
  namespace: netbird
spec:
  replicas: 2
  selector:
    matchLabels:
      app: split-dns
  template:
    metadata:
      labels:
        app: split-dns
    spec:
      containers:
        - name: coredns
          image: coredns/coredns:1.14.3@sha256:b21d26b915e10acb5bc78715c1e8b6047ab2675389b2bcc18b3a6499d90e74c0
          args: ["-conf", "/etc/coredns/Corefile"]
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE"]
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
      volumes:
        - name: config
          configMap:
            name: split-dns
---
apiVersion: v1
kind: Service
metadata:
  name: split-dns
  namespace: netbird
spec:
  type: ClusterIP
  clusterIP: 10.101.57.13
  selector:
    app: split-dns
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      protocol: TCP
