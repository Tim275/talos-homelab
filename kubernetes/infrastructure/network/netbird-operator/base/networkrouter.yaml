apiVersion: netbird.io/v1alpha1
kind: NetworkRouter
metadata:
  name: homelab
  namespace: netbird
spec:
  # DNS-Zone muss im NetBird-Dashboard existieren (DNS -> Zones). Operator legt darin
  # Records pro exposed Service an (service.namespace.zone).
  dnsZoneRef:
    name: k8s.timourhomelab.org
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private
  namespace: netbird
spec:
  gatewayClassName: netbird-private
  listeners:
    - name: homelab # MUSS = NetworkRouter-Name
      protocol: gateway.netbird.io/NetworkRouter
      port: 443
      allowedRoutes:
        namespaces:
          from: All
