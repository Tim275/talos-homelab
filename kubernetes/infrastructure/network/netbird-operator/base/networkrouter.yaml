# Persistenter Setup-Key (ephemeral=FALSE). Der Operator-Default-Key ist ephemeral=true
# → NetBird löscht die Routing-Peer-Pods nach ~10min Offline → Login ungültig → Routing tot.
# Diese CR + workloadOverride unten biegen NB_SETUP_KEY auf den persistenten Key.
apiVersion: netbird.io/v1alpha1
kind: SetupKey
metadata:
  name: networkrouter-persistent
  namespace: netbird
spec:
  name: networkrouter-persistent
  ephemeral: false
  allowExtraDnsLabels: false
  autoGroups:
    - name: networkrouter-homelab
---
apiVersion: netbird.io/v1alpha1
kind: NetworkRouter
metadata:
  name: homelab
  namespace: netbird
spec:
  # DNS-Zone muss im NetBird-Dashboard existieren (DNS -> Zones). Operator legt darin
  # Records pro exposed Service an (service.namespace.zone).
  dnsZoneRef:
    name: k8s.timourhomelab.org
  # NB_SETUP_KEY auf den persistenten Key umbiegen (sonst ephemeral → Peers gelöscht).
  workloadOverride:
    replicas: 3
    podTemplate:
      spec:
        containers:
          - name: netbird
            env:
              - name: NB_SETUP_KEY
                valueFrom:
                  secretKeyRef:
                    name: setup-key-networkrouter-persistent
                    key: setup-key
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private
  namespace: netbird
spec:
  gatewayClassName: netbird-private
  listeners:
    - name: homelab # MUSS = NetworkRouter-Name
      protocol: gateway.netbird.io/NetworkRouter
      port: 443
      allowedRoutes:
        namespaces:
          from: All
