apiVersion: v1
kind: Namespace
metadata:
  name: netbird
  labels:
    # Routing-Peers brauchen NET_ADMIN (WireGuard) -> privileged (wie Cilium in kube-system)
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
