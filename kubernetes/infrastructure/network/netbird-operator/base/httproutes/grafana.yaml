# VPN-only Exposure: grafana -> netbird-private Gateway
# Erreichbar via NetBird-DNS: grafana-service.grafana.k8s.timourhomelab.org -> ClusterIP
# Pattern fuer weitere Services: HTTPRoute kopieren, namespace/backendRef anpassen.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-netbird
  namespace: grafana
spec:
  parentRefs:
    - name: private
      namespace: netbird
  hostnames:
    - grafana.k8s.timourhomelab.org
  rules:
    - backendRefs:
        - name: grafana-service
          port: 3000
