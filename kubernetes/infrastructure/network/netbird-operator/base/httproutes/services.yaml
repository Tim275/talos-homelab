  namespace: elastic-system
spec:
  parentRefs: [{ name: private, namespace: netbird }]
  hostnames: [kibana.k8s.timourhomelab.org]
  rules: [{ backendRefs: [{ name: production-kibana-kb-http, port: 5601 }] }]
---
