# VPN-only Exposure der restlichen Management-Services via netbird-private.
# Erreichbar via NetBird-DNS: <backend-service>.<namespace>.k8s.timourhomelab.org
# (Operator benennt Records nach service.namespace.zone — nicht nach hostname).
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-netbird
  namespace: argocd
spec:
  parentRefs: [{ name: private, namespace: netbird }]
  hostnames: [argocd.k8s.timourhomelab.org]
  rules: [{ backendRefs: [{ name: argocd-server, port: 80 }] }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
