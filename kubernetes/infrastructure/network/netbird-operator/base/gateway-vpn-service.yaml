# ClusterIP-Mirror des Envoy-Gateway (LoadBalancer) — der NetBird-Operator routet nur
# ClusterIP-Services. Damit erreichen VPN-Clients den Gateway (echte *.timourhomelab.org
# Certs + Host-basiertes Routing) statt der nackten Service-ClusterIPs (HTTP, kein Cert).
# ClusterIP gepinnt fuer stabile Split-DNS-Aufloesung.
apiVersion: v1
kind: Service
metadata:
  name: gateway-vpn
  namespace: gateway
spec:
  type: ClusterIP
  clusterIP: 10.101.57.12
  selector:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    app.kubernetes.io/name: envoy
    gateway.envoyproxy.io/owning-gateway-name: envoy-gateway
    gateway.envoyproxy.io/owning-gateway-namespace: gateway
  ports:
    - name: https-443
      port: 443
      targetPort: 10443
      protocol: TCP
    - name: http-80
      port: 80
      targetPort: 10080
      protocol: TCP
