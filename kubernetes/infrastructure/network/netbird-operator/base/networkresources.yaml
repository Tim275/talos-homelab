# VPN-only Exposure via explizite NetworkResources (statt HTTPRoutes).
# Vorteil: groups-Feld → Resources persistent in k8s-svc Gruppe (Operator-managed,
# kein Revert). NBPolicy "homelab-users -> k8s-svc" (nbpolicy.yaml) greift dann stabil.
# Erreichbar: <serviceRef>.<namespace>.k8s.timourhomelab.org
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: grafana
  namespace: grafana
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: grafana-service }
  groups: [{ name: k8s-svc }]
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: argocd
  namespace: argocd
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: argocd-server }
  groups: [{ name: k8s-svc }]
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: kibana
  namespace: elastic-system
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: production-kibana-kb-http }
  groups: [{ name: k8s-svc }]
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: jaeger
  namespace: jaeger
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: jaeger-collector }
  groups: [{ name: k8s-svc }]
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: hubble
  namespace: kube-system
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: hubble-ui }
  groups: [{ name: k8s-svc }]
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: lldap
  namespace: lldap
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: lldap }
  groups: [{ name: k8s-svc }]
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: renovate
  namespace: renovate-operator
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: renovate-operator-renovate-operator }
  groups: [{ name: k8s-svc }]
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: ceph
  namespace: rook-ceph
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: rook-ceph-mgr-dashboard }
  groups: [{ name: k8s-svc }]
---
# Gateway-VPN: VPN-Clients erreichen alle Apps via altem Hostnamen + echtem Cert
# (argo.timourhomelab.org statt argocd-server.argocd.k8s...). Braucht Split-DNS.
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: gateway
  namespace: gateway
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: gateway-vpn }
  groups: [{ name: k8s-svc }]
---
# split-dns CoreDNS erreichbar machen (NetBird-Nameserver zeigt hierauf).
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: split-dns
  namespace: netbird
spec:
  networkRouterRef: { name: homelab, namespace: netbird }
  serviceRef: { name: split-dns }
  groups: [{ name: k8s-svc }]
