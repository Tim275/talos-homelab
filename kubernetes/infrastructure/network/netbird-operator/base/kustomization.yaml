apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: netbird-operator
    repo: oci://ghcr.io/netbirdio/helm-charts
    version: "0.6.0"
    releaseName: netbird-operator
    namespace: netbird
    valuesFile: values.yaml

resources:
  - namespace.yaml
  - pat-sealedsecret.yaml
  - networkrouter.yaml
  - clusterproxy.yaml
  - gateway-vpn-service.yaml
  - split-dns.yaml
  - networkresources.yaml
  - nbpolicy.yaml
  - audit-export-cronjob.yaml
