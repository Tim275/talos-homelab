# Istio Control Plane managed by Sail Operator
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  namespace: istio-system
  version: v1.30.0
  profile: ambient

  updateStrategy:
    type: InPlace

  values:
    global:
      meshID: mesh1
      network: network1

    pilot:
      # cni.enabled: Sidecar-Injection nutzt die (schon für Ambient installierte)
      # istio-cni statt eines istio-init-Containers mit NET_ADMIN/NET_RAW.
      # OHNE das: Sidecar-Pods scheitern an PodSecurity (baseline/restricted).
      # Prerequisite fuer STRICT-mTLS via Sidecar-Mode (Ambient-STRICT ist am
      # Cilium-kubeProxyReplacement-Bug blockiert). Betrifft NUR Namespaces mit
      # istio-injection=enabled — Ambient (drova) unberuehrt.
      cni:
        enabled: true
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 512Mi
      replicaCount: 1
      autoscaleEnabled: false

    meshConfig:
      extensionProviders:
        - name: opentelemetry
          opentelemetry:
            service: otel-collector-collector.opentelemetry.svc.cluster.local
            port: 4317
