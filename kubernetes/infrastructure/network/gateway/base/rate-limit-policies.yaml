---
# Keycloak
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: keycloak-rate-limit
  namespace: keycloak
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: keycloak
  # Sticky Session (Phase 6 KC HA): ConsistentHash auf CF-Connecting-IP HEADER.
  # KEIN SourceIP weil ALLE Requests durch cloudflared-Pod kommen → derselbe
  # source-IP für alle User → kein Load-Balancing.
  # CF-Connecting-IP wird von Cloudflare injected (echte User-IP).
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Header
      header:
        name: CF-Connecting-IP
  rateLimit:
    type: Local
    local:
      rules:
        - limit:
            requests: 100
            unit: Minute
          clientSelectors:
            - headers:
                - name: CF-Connecting-IP
                  type: Distinct
