# EnvoyProxy CR — controls how Envoy-Pod is deployed.
# Default: 1 replica = SPOF for ALL public traffic. Scale to 2 for HA.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-gateway-ha
  namespace: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        pod:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        gateway.envoyproxy.io/owning-gateway-name: envoy-gateway
                    topologyKey: kubernetes.io/hostname
      envoyService:
        externalTrafficPolicy: Local  # preserve client-IP
