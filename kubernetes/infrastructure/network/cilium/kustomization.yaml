apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization


commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"

resources:
  #  L2 ANNOUNCEMENTS (CURRENT - ARP based)
  - announce.yaml
  - ip-pool.yaml
  # - l7-visibility-policy.yaml  # DISABLED: Caused cluster crash - needs proper testing before re-enabling

  #  BGP PEERING (FUTURE - eBGP with UniFi)
  # Migration: 1) Uncomment BGP resources  2) Enable bgpControlPlane in values.yaml
  #            3) Disable l2announcements  4) Upload FRR config to UniFi router
  #            5) Remove announce.yaml     6) Update ip-pool.yaml to BGP CIDR
  # - bgp-cluster-config.yaml    # ASN 65200, peers UniFi (ASN 65100)
  # - bgp-peer-config.yaml       # gracefulRestart + auth
  # - bgp-advertisement.yaml     # advertise LoadBalancerIP services
  # - bgp-password-secret.yaml   # BGP auth password (namespace: cilium-secrets)

  # Dashboards moved to infrastructure/monitoring/grafana/dashboards/networking/
  # - dashboards/cilium.yaml
  # - dashboards/cilium-operator.yaml

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.18.0 # renovate: github-releases=cilium/cilium
    releaseName: "cilium"
    namespace: kube-system
    includeCRDs: true
    valuesFile: values.yaml
