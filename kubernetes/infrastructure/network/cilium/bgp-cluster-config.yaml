apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-unifi
spec:
  # BGP peering only on control-plane nodes
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/control-plane: ""
  bgpInstances:
    - name: "65200"
      localASN: 65200
      peers:
        - name: "unifi-router-65100"
          peerASN: 65100
          peerAddress: 192.168.68.1  # TODO: UniFi router/gateway IP anpassen
          peerConfigRef:
            name: unifi-peer-config
