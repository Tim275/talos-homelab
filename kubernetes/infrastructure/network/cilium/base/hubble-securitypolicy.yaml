---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: hubble-oidc
  namespace: kube-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hubble
  oidc:
    provider:
      issuer: https://iam.timourhomelab.org/realms/kubernetes
    clientIDRef:
      name: hubble-oidc-credentials
      group: ""
      kind: Secret
    clientSecret:
      name: hubble-oidc-credentials
    cookieNames:
      accessToken: AccessToken-Hubble
      idToken: IdToken-Hubble
    redirectURL: https://hubble.timourhomelab.org/oauth2/callback
    logoutPath: /oauth2/logout
    forwardAccessToken: true
    refreshToken: true
    scopes:
      - openid
      - profile
      - email
      - groups
