apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: ip-pool
  namespace: kube-system
spec:
  blocks:
    # Updated 2026-05-06 — match LAN subnet 192.168.0.0/24 after Proxmox migration.
    # Old block 192.168.68.150-170 was stale, made envoy-gateway LB-IP unreachable.
    - start: 192.168.0.150
      stop: 192.168.0.170