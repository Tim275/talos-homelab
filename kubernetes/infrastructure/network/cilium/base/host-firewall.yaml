---
# Host Firewall: Schützt die Talos Nodes selbst
# Nur erlaubter Traffic darf die Nodes direkt erreichen
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: host-firewall
spec:
  # nodeSelector: {} = gilt für alle Nodes
  nodeSelector: {}
  ingress:
    # SSH (Talos API) — nur vom Heimnetz
    - fromCIDR:
        - "192.168.0.0/24"
      toPorts:
        - ports:
            - port: "50000"
              protocol: TCP  # Talos API
            - port: "6443"
              protocol: TCP  # Kubernetes API
    # Tailscale VPN — von überall (VPN-Traffic)
    - fromCIDR:
        - "100.64.0.0/10"  # Tailscale CGNAT Range
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # WireGuard zwischen Nodes
    - fromEntities:
        - remote-node
      toPorts:
        - ports:
            - port: "51871"
              protocol: UDP  # Cilium WireGuard Port
    # NetBird WireGuard (P2P VPN-Mesh) — LAN-Clients + Cluster/Nodes.
    # Ohne diese Rule landen NetBird-Routing-Peers (networkrouter) auf Relay,
    # und Subnet-Routing zu den ClusterIP-Resources (gateway-vpn 10.101.57.12 /
    # split-dns .13) funktioniert nicht → interne Apps via VPN unerreichbar.
    - fromCIDR:
        - "192.168.0.0/24"
      toPorts:
        - ports:
            - port: "51820"
              protocol: UDP
    - fromEntities:
        - cluster
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "51820"
              protocol: UDP
    # Pods im Cluster kube-apiserver + Hubble peer + Ceph MON + Monitoring
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "4244"
              protocol: TCP  # Hubble peer gRPC
            - port: "3300"
              protocol: TCP  # Ceph msgr2 (MON)
            - port: "6789"
              protocol: TCP  # Ceph msgr1 (MON)
            # Ceph OSD/MDS/MGR binary heartbeat range — required for same-node
            # pod→host routing (OSD/MGR/RGW), otherwise rados ops timeout.
            - port: "6800"
              endPort: 7568
              protocol: TCP
            # Ceph RGW (S3 API) — hostNetwork. Pods auf demselben Node wie der RGW
            # Pod erreichen ohne diese Allow-Rule weder Service-VIP noch Pod-IP der
            # RGW. Auch der Rook-Operator nutzt das (admin/user via HTTPS) zur
            # OBC-Provisionierung.
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
            - port: "10250"
              protocol: TCP  # Kubelet metrics (Prometheus scraping)
            - port: "9100"
              protocol: TCP  # Node exporter
            - port: "9090"
              protocol: TCP  # Vector agent metrics
            - port: "9962"
              protocol: TCP  # Cilium agent metrics
            - port: "9963"
              protocol: TCP  # Cilium operator metrics
            - port: "9964"
              protocol: TCP  # Cilium envoy metrics
            - port: "9965"
              protocol: TCP  # Hubble metrics
            - port: "2112"
              protocol: TCP  # Tetragon agent metrics
            - port: "9926"
              protocol: TCP  # Rook-Ceph exporter
            - port: "9283"
              protocol: TCP  # Rook-Ceph MGR metrics
    # Kubelet / Node-interne Kommunikation
    - fromEntities:
        - host
        - remote-node
