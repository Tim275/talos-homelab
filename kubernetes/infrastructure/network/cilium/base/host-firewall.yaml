---
# Host Firewall: Schützt die Talos Nodes selbst
# Nur erlaubter Traffic darf die Nodes direkt erreichen
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: host-firewall
spec:
  # nodeSelector: {} = gilt für alle Nodes
  nodeSelector: {}
  ingress:
    # SSH (Talos API) — nur vom Heimnetz
    - fromCIDR:
        - "192.168.0.0/24"
      toPorts:
        - ports:
            - port: "50000"
              protocol: TCP  # Talos API
            - port: "6443"
              protocol: TCP  # Kubernetes API
    # Tailscale VPN — von überall (VPN-Traffic)
    - fromCIDR:
        - "100.64.0.0/10"  # Tailscale CGNAT Range
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # WireGuard zwischen Nodes
    - fromEntities:
        - remote-node
      toPorts:
        - ports:
            - port: "51871"
              protocol: UDP  # Cilium WireGuard Port
    # Pods im Cluster kube-apiserver + Hubble peer + Ceph MON + Monitoring
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "4244"
              protocol: TCP  # Hubble peer gRPC
            - port: "3300"
              protocol: TCP  # Ceph msgr2 (MON)
            - port: "6789"
              protocol: TCP  # Ceph msgr1 (MON)
            - port: "10250"
              protocol: TCP  # Kubelet metrics (Prometheus scraping)
            - port: "9100"
              protocol: TCP  # Node exporter
            - port: "9090"
              protocol: TCP  # Vector agent metrics
            - port: "9962"
              protocol: TCP  # Cilium agent metrics
            - port: "9963"
              protocol: TCP  # Cilium operator metrics
            - port: "9964"
              protocol: TCP  # Cilium envoy metrics
            - port: "9965"
              protocol: TCP  # Hubble metrics
            - port: "9926"
              protocol: TCP  # Rook-Ceph exporter
            - port: "9283"
              protocol: TCP  # Rook-Ceph MGR metrics
    # Kubelet / Node-interne Kommunikation
    - fromEntities:
        - host
        - remote-node
