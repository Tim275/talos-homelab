apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - announce.yaml
  - ip-pool.yaml
  - host-firewall.yaml
  - hubble-oidc-sealed.yaml
  - hubble-httproute.yaml

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    version: 1.19.6
    releaseName: "cilium"
    namespace: kube-system
    includeCRDs: true
    valuesFile: values.yaml

