---
# Erlaubt Egress zu bekannten externen Domains (verhindert Data Exfiltration)
# Gilt für alle Pods im Cluster
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-external-egress
spec:
  endpointSelector: {}
  egress:
    # Container Registries
    - toFQDNs:
        - matchPattern: "*.ghcr.io"
        - matchPattern: "ghcr.io"
        - matchPattern: "*.docker.io"
        - matchPattern: "docker.io"
        - matchPattern: "registry-1.docker.io"
        - matchPattern: "*.quay.io"
        - matchPattern: "registry.k8s.io"
        - matchPattern: "*.gcr.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Helm / Git
    - toFQDNs:
        - matchPattern: "*.github.com"
        - matchPattern: "github.com"
        - matchPattern: "*.githubusercontent.com"
        - matchPattern: "*.helm.sh"
        - matchPattern: "charts.jetstack.io"
        - matchPattern: "*.cilium.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Cloudflare + Let's Encrypt
    - toFQDNs:
        - matchPattern: "*.cloudflare.com"
        - matchPattern: "cloudflare.com"
        - matchPattern: "*.letsencrypt.org"
        - matchPattern: "acme-v02.api.letsencrypt.org"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Tailscale
    - toFQDNs:
        - matchPattern: "*.tailscale.com"
        - matchPattern: "*.tailscale.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "3478"
              protocol: UDP
    # Heimnetz (Proxmox, Router)
    - toCIDR:
        - "192.168.0.0/24"
    # Kubernetes API Server
    - toEntities:
        - kube-apiserver
