---
# Default-Deny: Kein Pod darf mit einem anderen sprechen außer explizit erlaubt
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  endpointSelector: {}
  ingress:
    # kube-system darf alles erreichen (DNS, health checks, metrics)
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
    # Pods dürfen sich selbst innerhalb des Namespaces erreichen
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": ""
---
# System-Namespaces dürfen alle Pods erreichen (Monitoring, ArgoCD, cert-manager)
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-system-namespaces
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": argocd
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": monitoring
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": cert-manager
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": sealed-secrets
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": cnpg-system
---
# Egress: Pods dürfen DNS (CoreDNS) und kube-apiserver erreichen
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  endpointSelector: {}
  egress:
    # CoreDNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Pods dürfen innerhalb des eigenen Namespace kommunizieren
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": ""
