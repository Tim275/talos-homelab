# ============================================================
# CILIUM mTLS POLICY - SPIRE-based Mutual TLS
# ============================================================
# Requires SPIRE to be running and all agents healthy.
# Enable by adding to kustomization.yaml.
#
# What this does:
# - All traffic between pods that have SPIFFE identities MUST
#   use mTLS (Cilium WireGuard handles encryption, SPIRE handles
#   identity verification)
# - Pods without a valid SPIFFE identity are REJECTED
#
# Activation checklist:
#   kubectl get pods -n cilium-spire  (all Running)
#   cilium status | grep SPIRE        (Connected)
#   Then: uncomment in kustomization.yaml
# ============================================================

---
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: mtls-ingress
spec:
  description: "Require mTLS for all pod-to-pod traffic (SPIRE-based)"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - {}
      authentication:
        mode: "required"
