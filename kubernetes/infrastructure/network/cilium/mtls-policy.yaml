# ============================================================
# CILIUM mTLS POLICY - SPIRE-based Mutual TLS
# ============================================================
# Requires SPIRE running: kubectl get pods -n cilium-spire (all Running)
# Requires Cilium SPIRE connected: cilium status | grep SPIRE
#
# Activation: uncomment in kustomization.yaml
#
# What this does:
# - Pod-to-pod traffic (cluster-internal) → mTLS SVID required
# - External traffic (world, cloudflared, host) → no mTLS (passthrough)
#
# Architecture note:
# This adds authentication ON TOP of existing CiliumNetworkPolicies.
# Without explicit allow rules here, this policy would default-deny
# all ingress → so we must allow world + host + remote-node explicitly.
# ============================================================

---
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: require-mtls
spec:
  description: "mTLS required for pod-to-pod traffic, external traffic passthrough"
  endpointSelector: {}

  ingress:
    # Pod-to-pod: require valid SPIFFE SVID (mTLS)
    - fromEndpoints:
        - {}
      authentication:
        mode: "required"

    # External traffic: no mTLS (Cloudflare tunnel, health checks, nodes)
    - fromEntities:
        - world
        - host
        - remote-node
        - health
