# L7 VISIBILITY POLICY - HTTP Inspection for Application Pods
# =============================================================
# Enables L7 (HTTP) visibility for Hubble metrics in application namespaces.
#
# IMPORTANT FIXES:
# - DNS on ingress is NOT supported by Cilium (removed)
# - Port 443 removed - HTTPS cannot be inspected at L7 without TLS termination
# - Excludes kube-system to prevent blocking CoreDNS/API server access
#
# METRICS ENABLED:
# - hubble_flows_processed_total{http_method="GET|POST|..."}
# - hubble_flows_processed_total{http_status="200|404|500|..."}
# - Full L7 visibility in Hubble UI for plain HTTP traffic
#
# PORTS MONITORED (HTTP only, NOT HTTPS):
# - 80/TCP, 8080/TCP: Plain HTTP traffic
# - 3000/TCP: Common app port (Grafana, Node apps)
# - 9090-9115/TCP: Metrics/observability ports
# - 53/UDP: DNS queries (egress only)
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: global-l7-visibility
spec:
  description: "Enable L7 HTTP visibility for app pods (excludes kube-system)"

  # Apply to pods NOT in kube-system namespace
  # Use label selector to exclude system namespaces
  endpointSelector:
    matchExpressions:
      - key: io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - cilium-secrets

  # Ingress rules - HTTP traffic TO pods (NO DNS - not supported on ingress)
  ingress:
    - fromEntities:
        - all
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "3000"
              protocol: TCP
            - port: "8080"
              protocol: TCP
            - port: "9090"
              protocol: TCP
            - port: "9091"
              protocol: TCP
            - port: "9093"
              protocol: TCP
            - port: "9100"
              protocol: TCP
            - port: "9115"
              protocol: TCP
          rules:
            http:
              - method: "GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS"

  # Egress rules - HTTP and DNS traffic FROM pods
  egress:
    - toEntities:
        - all
      toPorts:
        # HTTP egress (NOT 443 - HTTPS can't be inspected at L7)
        - ports:
            - port: "80"
              protocol: TCP
            - port: "3000"
              protocol: TCP
            - port: "8080"
              protocol: TCP
            - port: "9090"
              protocol: TCP
            - port: "9091"
              protocol: TCP
            - port: "9093"
              protocol: TCP
            - port: "9100"
              protocol: TCP
            - port: "9115"
              protocol: TCP
          rules:
            http:
              - method: "GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS"

        # DNS egress - allowed on egress
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
