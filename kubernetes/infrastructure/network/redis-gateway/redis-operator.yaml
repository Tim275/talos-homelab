apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/name: redis-gateway
    app.kubernetes.io/component: rate-limit-store
spec:
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.4.8@sha256:b3bbb254bfe964f4333c581e1461e738853ec2351aa3a620a5fff45b94fba2b3
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  redisConfig:
    additionalRedisConfig: redis-gateway-external-config
  redisExporter:
    enabled: false
    image: quay.io/opstree/redis-exporter:v1.80.2@sha256:d01cb919c12b66b07214de0ad86fe4426fc168819bdefd4ecb211da7cffcef18
