apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/name: redis-gateway
    app.kubernetes.io/component: rate-limit-store
spec:
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.4.7@sha256:b6dd75f518d7ab1b23cc377bbc4cae0c04bb8c99b9b17e7855d820ec98d6bdbc
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  redisConfig:
    additionalRedisConfig: redis-gateway-external-config
  redisExporter:
    enabled: false
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-block-enterprise
        resources:
          requests:
            storage: 256Mi
