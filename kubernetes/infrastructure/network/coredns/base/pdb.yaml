# CoreDNS-PDB — Deployment gehört Talos (kube-system), das PDB-Objekt können wir
# trotzdem via GitOps stellen. Ohne PDB kann ein Drain/Upgrade BEIDE DNS-Pods
# gleichzeitig räumen → clusterweiter DNS-Ausfall ("alles kaputt"-Symptom).
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coredns
  namespace: kube-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      k8s-app: kube-dns
