# CoreDNS Day-2 owner (ArgoCD selfHeal).
# Day-0 bootstrap: tofu/talos/inline-manifests/coredns-config.yaml — keep in sync!
# Reason: talosctl upgrade-k8s overrides Day-0 config; ArgoCD restores it within 1-3min.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        log . {
            class error
        }
        prometheus :9153

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }

        # Split-horizon DNS — fix CF-WAF blocking server-side OIDC backchannel:
        # ArgoCD/Grafana pods fetch https://iam.timourhomelab.org/.well-known/openid-configuration
        # CF Bot-Score blocks them (no browser User-Agent).
        # Cluster-internal: rewrite to envoy-gateway (has wildcard TLS + HTTPRoute → KC).
        # Browsers continue using public DNS → CF Tunnel (unaffected).
        rewrite name exact iam.timourhomelab.org envoy-gateway-envoy-gateway-ee418b6e.gateway.svc.cluster.local

        forward . 192.168.0.1 8.8.8.8 1.1.1.1 {
           max_concurrent 1000
           policy sequential
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
