# DISASTER RECOVERY - Tier 0 Backup

# Velero Configuration
image:
  repository: velero/velero
  tag: v1.18.1@sha256:11459094b1b21ec7c817b08f8067d9e89380835547915cac9c4132ff05b55b90

# Enterprise HA Configuration
replicas: 2

# Credentials for backup storage (Ceph RGW S3 + Restic encryption)
credentials:
  useSecret: true
  existingSecret: velero-s3-credentials  # SealedSecret mit Ceph RGW credentials
  extraSecretRef: velero-restic-credentials  # SealedSecret with encryption key

# Backup Configuration
configuration:
  # Default Backup TTL (7 days for Homelab)
  defaultBackupTTL: 168h

  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      config:
        region: eu-west-1  # Berlin
        s3ForcePathStyle: "true"
        s3Url: http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80

  # Volume Snapshot Location (for PV snapshots)
  volumeSnapshotLocation:
    - name: default
      provider: csi

# Enable CSI Snapshots
snapshotsEnabled: true

# Resource Configuration (Homelab-optimized)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m       # Homelab: reduced from 500m
    memory: 128Mi

# Monitoring
metrics:
  enabled: true
  scrapeInterval: 30s
  scrapeTimeout: 10s
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8085"
      prometheus.io/path: "/metrics"

# Node Agent (for pod volume backup with Kopia encryption)
nodeAgent:
  podVolumePath: /var/lib/kubelet/pods
  privileged: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m       # Homelab: reduced from 500m (DaemonSet on every node!)
      memory: 256Mi

# ENCRYPTION - Client-Side with Kopia
# Backups are encrypted BEFORE upload to S3!
uploaderType: kopia  # Kopia replaces deprecated restic

# Security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# Service Account
serviceAccount:
  server:
    create: true
    name: velero

# Init Containers (for S3 plugin support)
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.1@sha256:1493a0039cd5cb31004cfbb52f8a1990bc0ed81497ce72516bc76fa9e21506c1
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 64Mi

# Upgrade CRDs Job Configuration
# DISABLED 2026-05-15 (final): bitnamilegacy/kubectl:1.36 returns 404 on DockerHub
# (Bitnami deprecation October 2025). Cannot run hook with broken image.
# CRDs already installed manually → no upgrade-job needed.
# The stuck-hook in ArgoCD was caused by previous stale-Job; deleted manually.
upgradeCRDs: false
upgradeJobResources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi

upgradeCRDsJob:
  podLabels:
    app.kubernetes.io/name: velero
    app.kubernetes.io/instance: velero
    app.kubernetes.io/component: upgrade-crds
