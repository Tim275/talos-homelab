---
# Create elasticsearch-snapshots S3 Bucket

apiVersion: batch/v1
kind: Job
metadata:
  name: create-elasticsearch-snapshots-bucket
  namespace: rook-ceph
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: create-bucket
        bucket: elasticsearch-snapshots
    spec:
      restartPolicy: OnFailure
      serviceAccountName: rook-ceph-system
      containers:
        - name: create-bucket
          image: amazon/aws-cli:2.33.31@sha256:6fb1a97d06113e082dc4f0f5b3d4b358b464aab87e370a5b78b9a79827a5561b
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-object-user-homelab-objectstore-elasticsearch-snapshots
                  key: AccessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-object-user-homelab-objectstore-elasticsearch-snapshots
                  key: SecretKey
            - name: AWS_ENDPOINT
              value: "http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80"
            - name: BUCKET_NAME
              value: "elasticsearch-snapshots"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Creating S3 bucket: ${BUCKET_NAME}"

              # Create bucket
              aws s3 mb s3://${BUCKET_NAME} \
                --endpoint-url ${AWS_ENDPOINT} \
                --region us-east-1

              # Verify bucket creation
              aws s3 ls s3://${BUCKET_NAME} \
                --endpoint-url ${AWS_ENDPOINT} \
                --region us-east-1

              echo "Bucket ${BUCKET_NAME} created successfully!"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
