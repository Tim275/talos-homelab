---
# Create velero-pv-backups S3 Bucket

apiVersion: batch/v1
kind: Job
metadata:
  name: create-velero-pv-backups-bucket
  namespace: rook-ceph
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: create-bucket
        bucket: velero-pv-backups
    spec:
      restartPolicy: OnFailure
      serviceAccountName: rook-ceph-system
      containers:
        - name: create-bucket
          image: amazon/aws-cli:2.36.2@sha256:964336bffb17b82d2e84a2526b0672e70a2c881544e1a281acaca1d9aa41b536
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-object-user-homelab-objectstore-velero-pv-backups
                  key: AccessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-object-user-homelab-objectstore-velero-pv-backups
                  key: SecretKey
            - name: AWS_ENDPOINT
              value: "http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80"
            - name: BUCKET_NAME
              value: "velero-pv-backups"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Creating S3 bucket: ${BUCKET_NAME}"

              # Create bucket
              aws s3 mb s3://${BUCKET_NAME} \
                --endpoint-url ${AWS_ENDPOINT} \
                --region us-east-1

              # Verify bucket creation
              aws s3 ls s3://${BUCKET_NAME} \
                --endpoint-url ${AWS_ENDPOINT} \
                --region us-east-1

              echo "Bucket ${BUCKET_NAME} created successfully!"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
