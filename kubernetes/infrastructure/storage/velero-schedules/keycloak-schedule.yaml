apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: keycloak-daily
  namespace: velero
spec:
  schedule: "0 3 * * *"
  template:
    includedNamespaces:
      - keycloak
    storageLocation: cluster-backups
    ttl: 168h0m0s
    snapshotVolumes: true
    includeClusterResources: false
    # Battle-tested 2026-05-18 — pre-hook entfernt.
    # Bug-history: pg_dump -f /tmp/... failed dauerhaft mit "Read-only file system"
    # weil CNPG postgres-container readOnlyRootFilesystem=true hat.
    # Konsequenz: Velero-backups failed seit Tagen → 0 Backups für keycloak.
    #
    # Lösung: pre-hook DROP. Velero snapshotted das PVC mit Kopia.
    # Datenbank-konsistente Backups erfolgen über CNPG's eigenes Barman-System
    # (siehe ScheduledBackup `keycloak-db` in keycloak ns) — das läuft separat
    # täglich um 03:00 UTC und ist battle-tested mit PITR-recovery.
