# BackendTrafficPolicy to configure TLS 1.3 for Ceph Dashboard backend connections
#
# Fixes: TLS_error:|268436526:SSL_routines:OPENSSL_internal:TLSV1_ALERT_PROTOCOL_VERSION
# Ceph Dashboard requires TLS 1.3, Envoy default backend TLS was too low
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: ceph-dashboard-tls
  namespace: rook-ceph
spec:
  targetRefs:
    - group: ''
      kind: Service
      name: rook-ceph-mgr-dashboard
  tls:
    minVersion: "1.3"
    maxVersion: "1.3"
