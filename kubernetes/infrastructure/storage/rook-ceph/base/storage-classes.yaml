kind: StorageClass
metadata:
  name: rook-ceph-bucket
  annotations:
    argocd.argoproj.io/sync-wave: "3"
provisioner: rook-ceph.ceph.rook.io/bucket
parameters:
  objectStoreName: homelab-objectstore
  objectStoreNamespace: rook-ceph
  region: us-east-1
reclaimPolicy: Delete

# PRODUCTION-SAFE STORAGE CLASSES WITH RETAIN POLICY

# These storage classes use reclaimPolicy: Retain instead of Delete
# to prevent accidental data loss when PVCs are deleted.
# Use for tier-0 databases: PostgreSQL, MongoDB, Elasticsearch

---
# Enterprise RBD Storage Class - RETAIN POLICY (Production Databases)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rook-ceph-block-enterprise-retain
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    argocd.argoproj.io/sync-wave: "3"
    storageclass.kubernetes.io/description: "Default. Reclaim=Retain — PVCs deleted leave PV behind for recovery."
provisioner: rook-ceph.rbd.csi.ceph.com
parameters:
  clusterID: rook-ceph
  pool: replicapool-enterprise
  imageFormat: "2"
  imageFeatures: layering
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
  csi.storage.k8s.io/fstype: ext4
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
---
# Immediate-binding RBD SC — für PVCs deren einziger Consumer ein CronJob/Job ist
# (z.B. keycloak-realm-export). WaitForFirstConsumer ließe solche PVCs ewig Pending
# → ArgoCD health-gatet darauf → Bootstrap-Deadlock. Immediate bindet sofort ohne Consumer.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rook-ceph-block-enterprise-immediate
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    storageclass.kubernetes.io/description: "Immediate binding — für delayed-consumer PVCs (cronjob-only). Reclaim=Retain."
provisioner: rook-ceph.rbd.csi.ceph.com
parameters:
  clusterID: rook-ceph
  pool: replicapool-enterprise
  imageFormat: "2"
  imageFeatures: layering
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
  csi.storage.k8s.io/fstype: ext4
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: Immediate
