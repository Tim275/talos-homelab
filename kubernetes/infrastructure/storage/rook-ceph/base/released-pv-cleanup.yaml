apiVersion: v1
kind: ServiceAccount
metadata:
  name: released-pv-cleanup
  namespace: rook-ceph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: released-pv-cleanup
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: released-pv-cleanup
subjects:
  - kind: ServiceAccount
    name: released-pv-cleanup
    namespace: rook-ceph
roleRef:
  kind: ClusterRole
  name: released-pv-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: released-pv-cleanup
  namespace: rook-ceph
spec:
  schedule: "37 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: released-pv-cleanup
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: docker.io/alpine/k8s:1.33.0@sha256:60333a52c38e9a8df0a9b93a5a24a4870f0db2c7ea3266b185386bd0a500d7dc
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              command:
                - /bin/bash
                - -c
                - |
                  set -eo pipefail
                  THRESHOLD_HOURS=1
                  REMOVED=0
                  echo "[$(date)] Scanning Released PVs older than ${THRESHOLD_HOURS}h"
                  while IFS=$'\t' read -r NAME STATUS AGE_TS; do
                    [ "$STATUS" != "Released" ] && continue
                    [ -z "$AGE_TS" ] && continue
                    AGE_S=$(( $(date +%s) - $(date -d "$AGE_TS" +%s) ))
                    AGE_H=$(( AGE_S / 3600 ))
                    if [ $AGE_H -ge $THRESHOLD_HOURS ]; then
                      echo "  delete $NAME (Released ${AGE_H}h)"
                      kubectl delete pv "$NAME" --wait=false 2>&1 | tail -1
                      REMOVED=$((REMOVED+1))
                    fi
                  done < <(kubectl get pv -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\t"}{.metadata.creationTimestamp}{"\n"}{end}')
                  echo "[$(date)] Done. Removed $REMOVED Released PVs."
