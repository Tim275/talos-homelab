apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "4"

# Rook-Ceph Storage Infrastructure (CRDs Operator Cluster)

namespace: rook-ceph

resources:
  # Upstream Rook-Ceph components (v1.18.7 - Latest December 2025)
  # https://github.com/rook/rook/releases
  - https://raw.githubusercontent.com/rook/rook/v1.18.7/deploy/examples/crds.yaml
  - https://raw.githubusercontent.com/rook/rook/v1.18.7/deploy/examples/common.yaml
  - https://raw.githubusercontent.com/rook/rook/v1.18.7/deploy/examples/operator.yaml
  # CRITICAL: CSI Operator required for Rook v1.18+ (manages CSI drivers)
  # The csi-operator.yaml deploys the ceph-csi-controller-manager and all CSI-related RBAC
  - https://raw.githubusercontent.com/rook/rook/v1.18.7/deploy/examples/csi-operator.yaml

  # Enterprise components
  - priority-classes.yaml
  - cluster.yaml
  - pools.yaml
  - storage-classes.yaml
  - toolbox.yaml

  # Monitoring
  - servicemonitor-ceph-mgr.yaml
  - servicemonitor-ceph-exporter.yaml
  - ceph-dashboard-prometheus-config.yaml

  # Crash archiver — auto-archive ceph crashes every 6h
  - ceph-crash-archive.yaml

  # CSI orphan omap cleanup — runs daily, removes stale csi.volume.* keys
  # whose PVC no longer exists. Prevents "operation already exists" deadlocks.
  - csi-orphan-cleanup.yaml

  # Gateway routing
  - http-route.yaml

  # S3 users for Velero / Loki
  - velero-users.yaml

# Enterprise and Talos-specific patches
patches:
  # Wave -10: CRDs must deploy first
  - target:
      kind: CustomResourceDefinition
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "-10"
          argocd.argoproj.io/sync-options: ServerSideApply=true

  # Wave -10: Namespace and RBAC with CRDs
  - target:
      kind: Namespace
      name: rook-ceph
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "-10"

  # Wave -5: Operator deployment after CRDs are ready
  - target:
      kind: Deployment
      name: rook-ceph-operator
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "-5"
          argocd.argoproj.io/sync-options: Prune=false

  # Wave 0: Cluster resources after operator is ready
  - target:
      kind: CephCluster
      name: rook-ceph
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "0"
          argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

  # CSI Controller Plugin: resource limits to prevent OOM-kill mid-operation.
  # OOM-kill during CreateVolume/DeleteVolume leaves orphaned goroutines holding
  # in-memory volume locks "operation already exists" on every retry.
  - target:
      kind: Deployment
      name: rook-ceph.rbd.csi.ceph.com-ctrlplugin
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

  # CSI Node Plugin (DaemonSet): mount/unmount only — 256Mi is sufficient
  - target:
      kind: DaemonSet
      name: csi-rbdplugin
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/1/resources
        value:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "10m"
            memory: "64Mi"

  # CSI Timeout Fix: lower from 150s to 30s
  # Root cause of "operation already exists" deadlock:
  # goroutine gets stuck (Ceph slow / RST_STREAM), holds in-memory volume lock
  # for up to 150s. With 30s timeout goroutines fail fast lock released retry works.
  # ROOK_CEPH_COMMANDS_TIMEOUT_SECONDS=15s so 30s gives 2x buffer.
  # CSI_ENABLE_LIVENESS=true Kubernetes restarts the CSI pod if stuck.
  - target:
      kind: ConfigMap
      name: rook-ceph-operator-config
    patch: |-
      - op: replace
        path: /data/CSI_GRPC_TIMEOUT_SECONDS
        value: "30"
      - op: replace
        path: /data/CSI_ENABLE_LIVENESS
        value: "true"

  # CRITICAL: Add Prometheus discovery labels to Ceph services
  - target:
      kind: Service
      name: rook-ceph-mgr
    patch: |-
      - op: add
        path: /metadata/labels/ceph_daemon_type
        value: mgr
      - op: add
        path: /metadata/labels/release
        value: prometheus-operator

  # Namespace enterprise labeling
  - target:
      kind: Namespace
      name: rook-ceph
    patch: |-
      - op: replace
        path: /metadata/labels
        value:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
          app.kubernetes.io/name: rook-ceph
          app.kubernetes.io/instance: enterprise
          environment: production
          tier: storage

  # Enterprise operator configuration (NOT a Ceph daemon - limits are OK here)
  - target:
      kind: Deployment
      name: rook-ceph-operator
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: "2000m"   # Increased for reconciliation under load
            memory: "2Gi"  # Increased for large cluster management
          requests:
            cpu: "500m"    # Enterprise baseline
            memory: "1Gi"  # Enterprise baseline
      - op: add
        path: /spec/template/spec/priorityClassName
        value: system-cluster-critical
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ROOK_LOG_LEVEL
          value: "INFO"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ROOK_CEPH_ALLOW_LOOP_DEVICES
          value: "false"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ROOK_ENABLE_DISCOVERY_DAEMON
          value: "true"
      # ENABLED: CephFS for GitLab shared storage
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ROOK_CSI_ENABLE_CEPHFS
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ROOK_CSI_ENABLE_RBD
          value: "true"
      - op: add
        path: /spec/template/metadata/annotations
        value:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
          prometheus.io/path: "/metrics"
