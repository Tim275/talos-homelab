# Enterprise RBD Pool - High Performance with 3x Replication
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: replicapool-enterprise
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  failureDomain: host
  replicated:
    size: 3
    requireSafeReplicaSize: true
  parameters:
    min_size: "2"
    pg_num: "32"
    pgp_num: "32"
    # Optimized for enterprise workloads
    compression_algorithm: "lz4"
    compression_mode: "aggressive"
    compression_required_ratio: "0.875"
    compression_max_blob_size: "131072"
    compression_min_blob_size: "8192"
  # Enable mirroring for disaster recovery
  mirroring:
    enabled: false
    mode: image

---
# Kafka-Fast Pool - msa2proxmox zone only (OSD 0,3,4,5 = 5ms).
# size 2 (min_size 1): storage-level redundancy (survives 1 OSD loss) on top of
# Kafka's own RF=3 — defense-in-depth, and clears the POOL_NO_REDUNDANCY warning.
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: kafka-fast
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  failureDomain: host
  crushRoot: msa2proxmox
  replicated:
    size: 2
    requireSafeReplicaSize: true
  parameters:
    min_size: "1"
    pg_num: "16"
    pgp_num: "16"

---
# Replicapool-Fast — Hot-DB-Tier (Postgres, Redis) — Phase 2 IaC-tune (2026-05-17)
# Uses device-class "fast-ssd" → nur msa2-OSDs (0,3,4,5) = 5ms latency
# replication=3, failureDomain=host (3 separate K8s-Workers für PG-replicas)
# Trade-off: alle 4 OSDs auf physischen msa2-host
#   → wenn msa2-Proxmox-host stirbt: fast-pool kurz unavailable
#   → CNPG-Backups + Velero schützen Daten
#   → für Solo-Homelab: acceptable
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: replicapool-fast
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  failureDomain: host
  deviceClass: fast-ssd          # ← ONLY msa2-OSDs
  replicated:
    size: 3
    requireSafeReplicaSize: true
  parameters:
    min_size: "2"
    pg_num: "32"
    pgp_num: "32"
    # Same compression settings as enterprise-pool
    compression_algorithm: "lz4"
    compression_mode: "aggressive"
    compression_required_ratio: "0.875"
  mirroring:
    enabled: false

# DISABLED POOLS - Unused, saves resources (MDS, extra pools)
# Re-enable by uncommenting if needed

