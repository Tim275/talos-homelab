# Ceph Crash Archive Automation
# Automatically archives Ceph daemon crashes every 6 hours to prevent HEALTH_WARN
# This prevents RECENT_CRASH warnings from cluttering cluster health status
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ceph-crash-archive
  namespace: rook-ceph
  labels:
    app: ceph-crash-archive
    tier: storage
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  suspend: false  # Active: ceph crash archive-all every 6h to prevent HEALTH_WARN buildup
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ceph-crash-archive
        spec:
          serviceAccountName: rook-ceph-system
          restartPolicy: OnFailure
          initContainers:
            - name: config-init
              image: quay.io/ceph/ceph:v19.2.3
              command:
                - /bin/bash
                - -c
                - |
                  cat > /etc/ceph/ceph.conf << EOF
                  [global]
                  mon_host = $(cat /etc/rook/mon_host)
                  [client.admin]
                  keyring = /etc/ceph/keyring
                  EOF
                  cp /etc/ceph-keyring/keyring /etc/ceph/keyring
                  chmod 600 /etc/ceph/keyring
              volumeMounts:
                - name: ceph-config
                  mountPath: /etc/ceph
                - name: mon-config
                  mountPath: /etc/rook
                - name: ceph-admin-keyring
                  mountPath: /etc/ceph-keyring
          containers:
            - name: ceph-crash-archiver
              image: quay.io/ceph/ceph:v19.2.3
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "=== Ceph Cluster Health Before ==="
                  ceph health detail || true
                  echo ""
                  echo "=== Archiving Ceph Crashes ==="
                  ceph crash archive-all
                  echo ""
                  echo "=== Ceph Cluster Health After ==="
                  ceph health detail
                  echo ""
                  echo "Crash archive completed successfully"
              volumeMounts:
                - name: ceph-config
                  mountPath: /etc/ceph
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          volumes:
            - name: ceph-config
              emptyDir: {}
            - name: mon-config
              secret:
                secretName: rook-ceph-config
            - name: ceph-admin-keyring
              secret:
                secretName: rook-ceph-admin-keyring
