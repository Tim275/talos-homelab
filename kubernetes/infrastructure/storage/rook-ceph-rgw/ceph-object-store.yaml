apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: homelab-objectstore
  namespace: rook-ceph
spec:
  metadataPool:
    replicated:
      size: 3
  dataPool:
    replicated:
      size: 3
  preservePoolsOnDelete: false
  gateway:
    port: 80
    securePort: 443
    # TLS configuration for HTTPS
    sslCertificateRef: ceph-rgw-tls-secret
    # Enterprise HA: 2 instances for high availability and load balancing
    instances: 2
    # Enterprise best practice: NO LIMITS, only requests
    resources:
      requests:
        cpu: "500m"
        memory: "2560Mi"  # 2.5GB for moderate homelab usage

  healthCheck:
    readinessProbe:
      probe:
        timeoutSeconds: 10
        periodSeconds: 15
        failureThreshold: 5
    startupProbe:
      probe:
        timeoutSeconds: 10
        periodSeconds: 10
        failureThreshold: 30

  zone:
    name: "homelab"
