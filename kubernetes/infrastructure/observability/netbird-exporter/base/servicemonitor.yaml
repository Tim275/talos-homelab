apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: netbird-exporter
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: netbird-exporter
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /metrics
      relabelings:
        - targetLabel: job
          replacement: netbird-exporter
