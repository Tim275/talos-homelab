apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: netbird
  namespace: grafana
spec:
  allowCrossNamespaceImport: true
  folder: NetBird
  resyncPeriod: 30m
  instanceSelector:
    matchLabels:
      app: grafana
  url: "https://raw.githubusercontent.com/matanbaruch/netbird-api-exporter/main/grafana-dashboard.json"
