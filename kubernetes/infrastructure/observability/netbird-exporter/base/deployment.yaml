apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: netbird-exporter
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbird-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbird-exporter
    spec:
      containers:
        - name: exporter
          image: ghcr.io/matanbaruch/netbird-api-exporter:v0.2.2
          env:
            - name: NETBIRD_API_URL
              value: "https://api.netbird.io"
            - name: LISTEN_ADDRESS
              value: ":8080"
            - name: LOG_LEVEL
              value: "info"
            - name: NETBIRD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: netbird-exporter-token
                  key: api-token
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: netbird-exporter
spec:
  selector:
    app.kubernetes.io/name: netbird-exporter
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
