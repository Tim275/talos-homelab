apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gatus
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: gatus-endpoints
      rules:
        - alert: GatusEndpointDown
          expr: gatus_results_endpoint_success == 0
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Endpoint {{ $labels.name }} ({{ $labels.group }}) is DOWN"
            description: "Gatus health check '{{ $labels.key }}' has been failing for 3+ minutes. Check the service and its dependencies."
