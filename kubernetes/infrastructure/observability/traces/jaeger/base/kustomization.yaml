apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "5"

resources:
  # POD SECURITY: Baseline compliant namespace
  - pod-security-exception.yaml

  # JAEGER V2: Production deployment with OpenTelemetry Operator
  - jaeger-v2.yaml  # Jaeger v2 with Elasticsearch storage
  - elasticsearch-sealed-secret.yaml  # Legacy: 'elastic' superuser pass (Step B will remove this)
  - jaeger-client-sealed.yaml         # New: dedicated 'jaeger' user with jaeger_writer role
  - servicemonitor.yaml  # Prometheus metrics
  # poddisruptionbudgets.yaml entfernt - jaeger-collector hat eigenes PDB
  - httproute.yaml          # Gateway API route + BasicAuth SecurityPolicy
  - basic-auth-sealed.yaml  # Sealed credentials (jaeger user)
  # - custom-index-cleaner.yaml  # OPTIONAL: Custom index cleaner (fixes Operator bug)

namespace: jaeger
