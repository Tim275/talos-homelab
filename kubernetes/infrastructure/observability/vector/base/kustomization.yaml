apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "5"

namespace: elastic-system

resources:
  - rbac.yaml
  - vector-agent.yaml
  - vector-aggregator.yaml
  # talos-comprehensive-monitoring.yaml removed 2026-07-14 — hardcoded stale pre-migration
  # node IPs (192.168.68.x) → monitored dead nodes, redundant with node-exporter + vector-agents.
  # kibana-dataviews-bootstrap.yaml removed - now in elasticsearch/kibana-data-views.yaml
  - elasticsearch-ilm-policies.yaml
  # logging-alerts.yaml consolidated 2026-07-14 → alerts tree (8 dead + 5 dup rules dropped);
  # its ServiceMonitor survives in vector-servicemonitor.yaml
  - vector-servicemonitor.yaml
  - kube-audit-logs.yaml

configMapGenerator:
  - name: vector-agent-config
    files:
      - vector.toml=vector-agent.toml
  - name: vector-aggregator-config
    files:
      - vector.toml=vector-aggregator.toml  # SERVICE-BASED CONFIG!

labels:
  - pairs:
      app.kubernetes.io/part-of: observability-stack
      app.kubernetes.io/component: log-collection
