# Aggregator ist 2-Replica (SIEM-Pipeline nach ES/Loki) — ohne PDB darf ein Drain
# beide gleichzeitig räumen und die Log-Pipeline reißt ab.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vector-aggregator
  namespace: elastic-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
      app.kubernetes.io/component: aggregator
