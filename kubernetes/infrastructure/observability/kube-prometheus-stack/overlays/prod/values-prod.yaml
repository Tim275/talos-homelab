# yamllint disable rule:line-length
# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
prometheus:
  # PodDisruptionBudget — Talos-upgrade-resilience (battle-tested 2026-05-14):
  # Ohne PDB konnte Talos-upgrade alle prometheus-Pods evicten → "Completed"-loop.
  podDisruptionBudget:
    enabled: true
    minAvailable: null
    maxUnavailable: 1
  prometheusSpec:
    # 1 Replica — RAM-Spar auf RAM-engen Hosts; Mimir hält die Long-Term-Daten.
    # (war 2 für HA; bei Pod-Restart kurze Scrape-Lücke, sonst nichts verloren.)
    replicas: 1

    # Bare-metal hypervisor scrape jobs (node_exporter :9100 + smartctl :9633 on
    # msa2/nipogi). Secret defined in pve-exporter/base/scrape-config.yaml.
    additionalScrapeConfigsSecret:
      enabled: true
      name: additional-scrape-configs-proxmox
      key: prometheus-additional.yaml

    externalLabels:
      cluster: prod-talos
      environment: prod
      region: homelab-de
      # grafana_url: used by Alertmanager template "alert.dashboard_url" to compose
      # full grafana-URL from path-only annotations. Multi-cluster pattern:
      # staging-overlay would override to "https://grafana-staging.timourhomelab.org".
      grafana_url: "https://grafana.timourhomelab.org"

    retention: 15d
    retentionSize: "45GB"

    # Resource limits — prevents Prometheus from being OOMKilled or starving the node.
    # 2026-05-16: bumped 2Gi → 4Gi after 54 restarts/41h. Compaction was hitting
    # 94% memory pressure, livenessProbe timeouts, kubelet kill loop.
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Probe overrides MUST live under `containers` (strategic-merged by prometheus-operator).
    # prometheusSpec.livenessProbe/startupProbe are SILENTLY IGNORED — verified 2026-05-23:
    # live pods ran the 3s/5s/6 default (~30s tolerance), so a slow Ceph compaction (>30s)
    # tripped liveness → crashloop → alert for:-timers reset → no alerts delivered.
    # These actually apply (verify: kubectl get pod ... livenessProbe.timeoutSeconds == 10).
    containers:
      - name: prometheus
        startupProbe:
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 300        # ~2.5h WAL-replay tolerance on slow Ceph
        livenessProbe:
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 6          # ~3min — survives slow compactions (was 30s default)
        readinessProbe:
          timeoutSeconds: 10
          periodSeconds: 15
          failureThreshold: 6

    # Prometheus 3.x: remote-write-receiver via enableFeatures is deprecated
    # Must use additionalArgs with --web.enable-remote-write-receiver
    additionalArgs:
      - name: web.enable-remote-write-receiver
        value: ""
      # Exemplars Storage — Three-Pillar-Correlation
      # (click histogram bucket → trace_id → opens Tempo trace)
      - name: enable-feature
        value: exemplar-storage

    # Out-of-order ingestion (10m window) — accepts samples up to 10min stale.
    # NOT a CLI flag — configured via prometheus-operator's tsdb field.
    tsdb:
      outOfOrderTimeWindow: 10m

    podMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    # nodeSelector:
    #   topology.kubernetes.io/zone: abel
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block-enterprise  # Use your correct storage class
          # volumeName: pv-prometheus  # Let Kubernetes auto-provision
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50G
          # selector:  # Remove specific PV selector, let Kubernetes handle it
          #   matchLabels:
          #     app: prometheus

# https://github.com/siderolabs/talos/discussions/7214
# Control-plane scrape DISABLED on this single-node Talos: kcm/scheduler/etcd are not
# reachable for scraping by default (the discussions/7214 relabelings alone don't fix
# reachability) → permanent up==0 = false TargetDown + EtcdQuorumLoss noise with zero data.
# Their component-alerting is already off (defaultRules below). Real control-plane failure
# surfaces as ClusterAPIServerDown + ControlPlaneNodeDown (symptom, not cause).
# Re-enable needs proper Talos metrics-exposure (+ etcd client-cert for kubeEtcd).
kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false  # unscrapable on Talos w/o etcd client-cert → was the EtcdQuorumLoss false-source

kubeProxy:
  # Cilium replaces Kube Proxy
  enabled: false

kubeScheduler:
  enabled: false  # see kubeControllerManager note — unscrapable on Talos
  serviceMonitor:
    relabelings:
      - sourceLabels: [ __meta_kubernetes_pod_node_name ]
        separator: ;
        regex: ^(.*)$
        targetLabel: nodename
        replacement: $1
        action: replace
    metricRelabelings:
      - action: labeldrop
        regex: pod

nodeExporter:
  enabled: true

grafana:
  enabled: false
  forceDeployDatasources: false
  forceDeployDashboards: false
  defaultDashboardsEnabled: false
  defaultDashboardsTimezone: Europe/Berlin  # Fixed timezone for Germany
  operator:
    dashboardsConfigMapRefEnabled: true
    matchLabels:
      app: grafana
    folder: Kubernetes

defaultRules:
  create: true
  # Upstream default-rules run DELIBERATELY alongside the curated base/alerts/ tree — but
  # de-duped (audit 2026-07-14): any upstream alert that duplicates a tree alert is disabled
  # below (the tree version is canonical: tuned thresholds, action-runbooks, promtool unit
  # tests). Upstream gems we do NOT have ourselves stay active: KubeDeploymentReplicasMismatch,
  # KubeStatefulSet*/KubeDaemonSet*, KubeJobFailed (the DR-verify CronJobs alert through it!),
  # KubePersistentVolumeInodesFillingUp, Watchdog (→ healthchecks.io dead-man — NEVER disable).
  disabled:
    # Upstream math bugs — replaced by corrected rules in
    # base/alerts/observability/alertmanager.yaml (ex alertmanager-fixed.yaml).
    AlertmanagerFailedToSendAlerts: true
    AlertmanagerClusterFailedToSendAlerts: true
    # Noisy on a Ceph cluster — rbd/OSD disks are IO-busy by design (aqu-sq>10 false-fires).
    # Replaced by the service-level CephSlowOps alert (base/alerts/storage/rook-ceph.yaml).
    NodeDiskIOSaturation: true
    # ── Dedup vs curated tree (2026-07-14) ──
    TargetDown: true                    # = PrometheusTargetDown
    KubeAPIDown: true                   # = ClusterAPIServerDown
    KubeNodeNotReady: true              # SAME alertname as the tree rule → double-fire
    KubeNodePressure: true              # = NodeMemoryPressure + NodeDiskPressure
    KubePodCrashLooping: true           # = PodCrashLooping
    KubePodNotReady: true               # = PodNotReady
    KubePersistentVolumeFillingUp: true # = PVCFillingUp/PVCCriticallyFull (cnpg-partitioned)
    PrometheusRuleFailures: true        # = tree version (unit-tested, action-annotated)
    # ── Noise cuts (2026-07-14) ──
    CPUThrottlingHigh: true             # upstream fires at 25% — ContainerCPUThrottlingHigh@75% is the tuned one
    KubeCPUOvercommit: true             # homelab is deliberately overcommitted (nipogi)
    KubeMemoryOvercommit: true
  rules:
    alertmanager: true
    configReloaders: true
    general: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

    etcd: false
    k8s: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubelet: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    network: false
    node: false
    windows: false

prometheusOperator:
  admissionWebhooks:
    enabled: false  # Disable admission webhooks completely
    patch:
      enabled: false
    certManager:
      enabled: false
  # Disable TLS completely to avoid cert mount issues
  tls:
    enabled: false
  # Homelab Stability: Resource limits for Prometheus Operator
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m     # 10x burst for CRD operations
      memory: 1Gi    # 4x headroom for operator

# Homelab Stability: Resource limits for Kube State Metrics
kube-state-metrics:
  resources:
    requests:
      cpu: 50m       # Actual: ~7m CPU
      memory: 64Mi   # Actual: ~27Mi memory
    limits:
      cpu: 500m      # 10x burst for metrics collection
      memory: 512Mi  # ~20x headroom for cluster growth

  # KSM tolerates slow API-server (talos single-node control-plane occasionally
  # returns 503 → KSM /livez returns 503 → kubelet kills → restart loop).
  # failureThreshold: 10 gives 100s tolerance for transient API-server slowness.
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 6

  # CNPG backup monitoring (#33): the barman-cloud PLUGIN backs up out-of-band, so the core
  # cnpg collector never populates cnpg_collector_last_available_backup_timestamp (the old
  # alerts watched a dead metric). Expose the Backup CR's stoppedAt instead — KSM Gauge
  # auto-parses the RFC3339 value to a unix timestamp. (A bad value is skipped gracefully;
  # only a malformed config STRUCTURE would crash KSM, so this uses the standard schema.)
  rbac:
    extraRules:
      - apiGroups: ["postgresql.cnpg.io"]
        resources: ["backups"]
        verbs: ["list", "watch"]
  customResourceState:
    enabled: true
    config:
      spec:
        resources:
          - groupVersionKind:
              group: postgresql.cnpg.io
              version: v1
              kind: Backup
            metricNamePrefix: cnpg_backup
            labelsFromPath:
              namespace: [metadata, namespace]
              name: [metadata, name]
              cluster: [spec, cluster, name]
            metrics:
              - name: stopped_at_timestamp_seconds
                help: "CNPG Backup stoppedAt as a unix timestamp, per Backup CR"
                each:
                  type: Gauge
                  gauge:
                    path: [status, stoppedAt]
                    labelsFromPath:
                      phase: [status, phase]

alertmanager:
  # PodDisruptionBudget — gossip-mesh-resilience (battle-tested 2026-05-14):
  # Heute war alertmanager-0 16h silent-dead nach Talos-upgrade. minAvailable: 2
  # → bei 3 Replicas darf nur 1 gleichzeitig evicted werden → gossip-mesh
  # behält Quorum (3/3 → 2/3 OK, 1/3 disruptionsAllowed=0 → next evict blocked).
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  alertmanagerSpec:
    replicas: 3
    retention: 720h
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block-enterprise
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    secrets:
      - slack-webhook-url
      - watchdog-webhook-url
      - telegram-bot-token
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url

    templates:
      - '/etc/alertmanager/config/*.tmpl'

    # ROUTING TREE - Priority-based with severity fallback

    route:
      receiver: 'slack-default'
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:

        # Watchdog → healthchecks.io Dead-Mans-Switch (2026-05-17 enabled)
        # InfoInhibitor stays silent-dropped via 'null'.
        # Separate routes: Watchdog matched alone (NOT regex with InfoInhibitor)
        # to keep webhook-pings clean (no garbage InfoInhibitor pings).
        - matchers:
            - alertname="Watchdog"
          receiver: 'watchdog-heartbeat'
          group_wait: 0s
          group_interval: 1m
          repeat_interval: 1m
        - matchers:
            - alertname="InfoInhibitor"
          receiver: 'null'
        # TargetDown noise — too noisy during rolling restarts
        # Route to slack-info (silent channel), longer repeat-interval
        - matchers:
            - alertname=~"TargetDown|KubeDeploymentReplicasMismatch|KubeJobFailed"
          receiver: 'slack-default'
          group_wait: 5m
          group_interval: 30m
          repeat_interval: 12h
          continue: false

        - matchers:
            - severity="critical"
            - priority=~"p0|P0"
          receiver: 'slack-critical'
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 30m
          continue: false

        # Major degradation, users actively impacted
        - matchers:
            - severity="critical"
          receiver: 'slack-critical'
          group_wait: 10s
          group_interval: 2m
          repeat_interval: 1h
          continue: false

        - matchers:
            - priority=~"p1|P1"
          receiver: 'slack-critical'
          group_wait: 15s
          group_interval: 3m
          repeat_interval: 1h
          continue: false

        # Partial issues, workaround available
        - matchers:
            - severity="warning"
          receiver: 'slack-default'
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 2h
          continue: false

        - matchers:
            - priority=~"p2|P2"
          receiver: 'slack-default'
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 2h
          continue: false

        # Minor issues, informational → suppressed (Dashboard, no notification)
        - matchers:
            - severity="info"
          receiver: 'null'
          continue: false

        - matchers:
            - priority=~"p3|P3|p4|P4"
          receiver: 'slack-info'
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 12h
          continue: false

    # INHIBITION — Alert-Storm-Schutz. REWRITTEN 2026-07-14: der alte Block referenzierte
    # Geister-Alertnames (NodeDown, KubeAPIServerDown, KubeletDown, PodOOMKilled,
    # PostgreSQLReplicationLag, ElasticsearchIndexUnassigned, …) und die Priority-Ladder
    # (equal: [job, namespace]) über-suppresste still: FEHLENDE Labels zählen in
    # Alertmanager als GLEICH → ein P1 ohne job/namespace hätte JEDES label-lose P2
    # unterdrückt. Jede Regel unten nutzt NUR real existierende Alertnames (Inventar:
    # CLAUDE.md 🔔) und dokumentiert ihren Blast-Radius. Pages (critical) werden nie
    # von warnings unterdrückt — nur andersrum.

    inhibit_rules:
      # Severity-Leiter: critical unterdrückt warning/info DERSELBEN Alert-Familie.
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname', 'namespace']
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="info"
        equal: ['alertname', 'namespace']

      # VOLL-AUSFALL: API-Server/Control-Plane down → jedes Ticket ist Kollateral-Noise
      # (die criticals pagen weiter). Bewusst OHNE equal = global während des Events.
      - source_matchers:
          - alertname=~"ClusterAPIServerDown|ControlPlaneNodeDown"
        target_matchers:
          - severity="warning"

      # HOST-AUSFALL (msa2 = worker-3/4/5, nipogi = ctrl-0/1/2): der klassische Storm.
      # Kein equal möglich — Host-instance (IP) und k8s-node-Label korrelieren nicht;
      # im 2-Host-Lab ist global korrekt: ein toter Host macht das halbe Warning-
      # Grundrauschen zu Kollateral. Criticals (CephHealthError, PVCCriticallyFull, …)
      # pagen weiter.
      - source_matchers:
          - alertname="ProxmoxHostDown"
        target_matchers:
          - alertname=~"KubeNodeNotReady|CiliumNodeUnreachable|PodNotReady|PodCrashLooping|ImagePullBackoff|ContainerOOMKilled|PrometheusTargetDown|VectorPipelineDown|GatusEndpointDown|GatusEndpointSlow|TalosNodeRebootedRecently|NodeMemoryPressure|NodeDiskPressure|CephOSDDown|CephOSDFlapping|CephSlowOps|CephPGsNotActive|EnvoyGatewayNoEndpoints"

      # Internet weg → alles Externe ist Folge (auch das critical CloudflaredAllDown —
      # ein Page reicht, der Root-Cause).
      - source_matchers:
          - alertname="InternetConnectivityLost"
        target_matchers:
          - alertname=~"CloudflaredAllDown|ExternalDNSResolutionFailed"

      # Ceph-Kaskade: HealthError/QuorumLost (P) → Einzelsymptome derselben Störung.
      - source_matchers:
          - alertname=~"CephHealthError|CephQuorumLost"
        target_matchers:
          - alertname=~"CephOSDDown|CephOSDNearFull|CephPGsNotActive|CephSlowOps|CephMonClockSkew|CephOSDFlapping"

      # Edge-SLO: FastBurn (Page) → SlowBurn + 5xx-Ticket sind dasselbe Ereignis.
      - source_matchers:
          - alertname="EnvoyEdgeSLOFastBurn"
        target_matchers:
          - alertname=~"EnvoyEdgeSLOSlowBurn|EnvoyGateway5xxRateHigh"

      # SSO down → der 5xx-Ticket derselben Instanz ist Folge.
      - source_matchers:
          - alertname="KeycloakDown"
        target_matchers:
          - alertname="KeycloakHttp5xxRateHigh"
        equal: ['namespace']

      # CNPG: Primary weg → Replication-Lag ist Folge (namespace = gleiches DB-Cluster).
      - source_matchers:
          - alertname="CnpgPrimaryDown"
        target_matchers:
          - alertname="CnpgReplicationLagHigh"
        equal: ['namespace']

      # Kafka: Quorum weg → ISR/Lag sind Folge.
      - source_matchers:
          - alertname="KafkaQuorumLeaderless"
        target_matchers:
          - alertname=~"KafkaUnderMinISR|KafkaConsumerLagCritical"

      # Velero down → Backup-Symptome sind Folge.
      - source_matchers:
          - alertname="VeleroDown"
        target_matchers:
          - alertname=~"VeleroNoRecentBackup|VeleroNoRecentWeeklyBackup|VeleroBackupPartialFailure"

      # CoreDNS down → SERVFAIL/Forward/extern-DNS sind Folge.
      - source_matchers:
          - alertname="CoreDNSDown"
        target_matchers:
          - alertname=~"CoreDNSHighSERVFAIL|CoreDNSForwardUnhealthy|ExternalDNSResolutionFailed"

    receivers:

      - name: 'null'

      # Dead-man's-switch external receiver. The webhook URL must be a
      # healthchecks.io ping URL (or equivalent silent-alarm service). It must
      # be sealed because the URL itself is the secret. To set up:
      #   1. Create a check at https://healthchecks.io/ with period=1m, grace=2m
      #   2. Copy the ping URL (looks like https://hc-ping.com/<uuid>)
      #   3. Update the watchdog-webhook-sealed.yaml in this overlay
      #   4. Configure healthchecks.io to email/SMS you when silent for >2m
      - name: 'watchdog-heartbeat'
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/watchdog-webhook-url/url
            send_resolved: false
            max_alerts: 1

      # ── PAGE tier (critical) → Slack #alerts + Telegram (phone) ──
      # The ONLY receiver that buzzes the phone. Page + ticket SHARE #alerts on purpose
      # (one channel is fine) — Telegram is what separates "act now" from "look later".
      # To split Slack later: change channel to '#alerts-critical' (create it in Slack first).
      - name: 'slack-critical'
        slack_configs:
          - channel: '#alerts'   # shared with warnings; Telegram (this receiver only) is the page separator
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.body" . }}'
            color: '{{ template "slack.color" . }}'
            actions: &critical-actions
              - type: button
                text: 'Runbook :book:'
                url: '{{ if (index .Alerts 0).Annotations.runbook_url }}{{ (index .Alerts 0).Annotations.runbook_url }}{{ else }}https://github.com/Tim275/talos-homelab/tree/main/docs/runbooks{{ end }}'
              - type: button
                text: 'Dashboard :bar_chart:'
                # Multi-cluster: composes URL from external_labels.grafana_url + annotation path.
                # Path-only annotations like "/d/drova-slo" get prefixed automatically.
                url: '{{ if (index .Alerts 0).Annotations.dashboard_url }}{{ template "alert.dashboard_url" . }}{{ else }}{{ if .CommonLabels.grafana_url }}{{ .CommonLabels.grafana_url }}{{ else }}https://grafana.timourhomelab.org{{ end }}{{ end }}'
              - type: button
                text: 'Query :mag:'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: 'Silence 2h :no_bell:'
                url: '{{ template "slack.silenceURL" . }}'
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/telegram-bot-token/token
            chat_id: 8449184586
            parse_mode: ""
            send_resolved: true
            message: '{{ template "telegram.body" . }}'

      # ── TICKET tier (warning) → Slack #alerts ONLY, no Telegram ──
      # Tickets must NOT buzz the phone. This is the page/ticket split: phone =
      # the 25 criticals, Slack = the full digest of everything (warnings included).
      - name: 'slack-default'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.body" . }}'
            color: '{{ template "slack.color" . }}'
            actions: *critical-actions

      - name: 'slack-info'
        slack_configs:
          - channel: '#alerts'
            send_resolved: false
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.body" . }}'
            color: '{{ template "slack.color" . }}'
            actions:
              - type: button
                text: 'Query :mag:'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: 'Silence 2h :no_bell:'
                url: '{{ template "slack.silenceURL" . }}'

      # ─────────────────────────────────────────────────────────────────────
      # EMAIL receiver — prepared, COMMENTED (activate when wanted).
      # Activation = 4 steps, ~5 min:
      # ─────────────────────────────────────────────────────────────────────
      # 1) Outlook app password: account.microsoft.com → Security → App passwords
      #    (requires 2FA; the normal login password will NOT work for SMTP).
      #
      # 2) Seal it (bootstrap cert → rebuild-safe) into monitoring ns:
      #      kubectl create secret generic smtp-password -n monitoring \
      #        --from-literal=password='<app-password>' --dry-run=client -o yaml \
      #      | kubeseal --cert tofu/bootstrap/sealed-secrets/certificate/sealed-secrets.crt -o yaml
      #    + add `smtp-password` to alertmanagerSpec.secrets (top of this file).
      #
      # 3) Add to `global:` (top of this config):
      #      smtp_smarthost: 'smtp-mail.outlook.com:587'
      #      smtp_from: 'sagichdirnicht259@outlook.de'
      #      smtp_auth_username: 'sagichdirnicht259@outlook.de'
      #      smtp_auth_password_file: /etc/alertmanager/secrets/smtp-password/password
      #      smtp_require_tls: true
      #
      # 4) Uncomment the receiver below + add the route (step 5).
      #    BEST PRACTICE at scale: point `to:` at a distribution list (oncall@...) —
      #    onboarding a teammate = mail-provider change only, zero IaC change.
      # - name: 'email-critical'
      #   email_configs:
      #     - to: 'sagichdirnicht259@outlook.de'
      #       send_resolved: true
      #       headers:
      #         subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
      #
      # 5) Route critical → email too (add under route.routes, next to slack-critical):
      #      - matchers: [ severity="critical" ]
      #        receiver: 'email-critical'
      #        continue: true   # ← REQUIRED: keep delivering to Slack/Telegram as well

  templateFiles:
    homelab.tmpl: |-
      {{ define "slack.icon" -}}
      {{ if eq .Status "resolved" }}:white_check_mark:
      {{- else if eq .CommonLabels.severity "critical" }}:rotating_light:
      {{- else if eq .CommonLabels.severity "warning" }}:warning:
      {{- else }}:information_source:
      {{- end -}}
      {{ end }}

      {{ define "slack.title" -}}
      [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ template "slack.icon" . }} {{ .CommonLabels.alertname }}
      {{- end }}

      {{ define "slack.color" -}}
      {{ if eq .Status "resolved" }}good
      {{- else if eq .CommonLabels.severity "critical" }}danger
      {{- else if eq .CommonLabels.severity "warning" }}warning
      {{- else }}#439FE0
      {{- end -}}
      {{ end }}

      {{ define "resource.slack" -}}
      {{ if .Labels.deployment }}*Resource:* `deployment/{{ .Labels.deployment }}`
      {{- else if .Labels.statefulset }}*Resource:* `statefulset/{{ .Labels.statefulset }}`
      {{- else if .Labels.daemonset }}*Resource:* `daemonset/{{ .Labels.daemonset }}`
      {{- else if .Labels.persistentvolumeclaim }}*Resource:* `pvc/{{ .Labels.persistentvolumeclaim }}`
      {{- else if and .Labels.pod (ne .Labels.job "kube-state-metrics") (ne .Labels.service "kube-state-metrics") }}*Resource:* `pod/{{ .Labels.pod }}`
      {{- else if .Labels.instance }}*Resource:* `instance/{{ .Labels.instance }}`
      {{- else if .Labels.node }}*Resource:* `node/{{ .Labels.node }}`
      {{- end -}}
      {{ end }}

      {{ define "resource.telegram" -}}
      {{ if .Labels.deployment }}<b>Resource:</b> <code>deployment/{{ .Labels.deployment }}</code>
      {{- else if .Labels.statefulset }}<b>Resource:</b> <code>statefulset/{{ .Labels.statefulset }}</code>
      {{- else if .Labels.daemonset }}<b>Resource:</b> <code>daemonset/{{ .Labels.daemonset }}</code>
      {{- else if .Labels.persistentvolumeclaim }}<b>Resource:</b> <code>pvc/{{ .Labels.persistentvolumeclaim }}</code>
      {{- else if and .Labels.pod (ne .Labels.job "kube-state-metrics") (ne .Labels.service "kube-state-metrics") }}<b>Resource:</b> <code>pod/{{ .Labels.pod }}</code>
      {{- else if .Labels.instance }}<b>Resource:</b> <code>instance/{{ .Labels.instance }}</code>
      {{- else if .Labels.node }}<b>Resource:</b> <code>node/{{ .Labels.node }}</code>
      {{- end -}}
      {{ end }}

      {{ define "slack.body" -}}
      {{ range .Alerts -}}
      *Severity:* `{{ .Labels.severity | toUpper }}`{{ if .Labels.priority }}  ·  *Priority:* `{{ .Labels.priority | toUpper }}`{{ end }}{{ if .Labels.component }}  ·  *Component:* `{{ .Labels.component }}`{{ end }}
      {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`  {{ end }}{{ template "resource.slack" . }}

      *Summary:* {{ .Annotations.summary }}
      {{ if .Annotations.description }}*Description:* {{ .Annotations.description }}
      {{ end }}{{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}
      {{ end }}{{ if .Annotations.action }}*Action:* {{ .Annotations.action }}
      {{ end }}
      {{ end -}}
      {{ end }}

      {{ define "telegram.body" -}}
      {{ if eq .Status "firing" }}🔥 [FIRING:{{ .Alerts.Firing | len }}]{{ else }}✅ [RESOLVED]{{ end }} {{ .CommonLabels.alertname }}

      {{ range $i, $a := .Alerts -}}
      {{- if lt $i 5 -}}
      ━━━━━━━━━━━━━━━━━━━━
      Severity: {{ .Labels.severity | toUpper }}{{ if .Labels.priority }} · Priority: {{ .Labels.priority | toUpper }}{{ end }}
      {{ if .Labels.namespace }}Namespace: {{ .Labels.namespace }}
      {{ end }}{{ template "resource.telegram" . }}
      Summary: {{ .Annotations.summary }}
      {{ if .Annotations.dashboard_url }}{{ .Annotations.dashboard_url }}{{ else }}https://grafana.timourhomelab.org{{ end }}
      {{ end -}}
      {{ end -}}
      {{ if gt (len .Alerts) 5 }}…and more alerts in this group (see Slack){{ end }}
      {{ end }}

      {{ define "slack.silenceURL" -}}
      {{ .ExternalURL }}/#/silences/new?filter=%7B
      {{- range $k, $v := .CommonLabels -}}
      {{- if ne $k "alertname" -}}
      {{ $k }}%3D%22{{ $v }}%22%2C
      {{- end -}}
      {{- end -}}
      alertname%3D%22{{ .CommonLabels.alertname }}%22%7D
      {{- end }}

      {{ define "alert.dashboard_url" -}}
      {{- $grafana := "https://grafana.timourhomelab.org" -}}
      {{- if .CommonLabels.grafana_url -}}{{- $grafana = .CommonLabels.grafana_url -}}{{- end -}}
      {{ $grafana }}{{ (index .Alerts 0).Annotations.dashboard_url }}
      {{- end }}
