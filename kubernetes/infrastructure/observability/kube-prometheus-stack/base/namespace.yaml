# monitoring runs node-exporter (hostNetwork/hostPID/hostPath/hostPort) which the
# cluster-default PodSecurity "baseline" forbids → DaemonSet 0/N. privileged is required.
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
