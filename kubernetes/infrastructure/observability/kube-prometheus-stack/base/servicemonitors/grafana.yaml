# Grafana self-metrics (port 3000/metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    argocd.argoproj.io/tracking-id: kube-prometheus-stack:monitoring.coreos.com/ServiceMonitor:monitoring/grafana
  labels:
    argocd.argoproj.io/instance: kube-prometheus-stack
    app: grafana
    release: kube-prometheus-stack  # CRITICAL for Prometheus discovery
spec:
  namespaceSelector:
    matchNames:
      - grafana
  selector:
    matchLabels:
      app: grafana  # Matches Grafana pod label
  endpoints:
    - port: http    # Port name from grafana-service (3000)
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
