apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jaeger
  namespace: monitoring
  annotations:
    argocd.argoproj.io/tracking-id: kube-prometheus-stack:monitoring.coreos.com/ServiceMonitor:monitoring/jaeger
  labels:
    argocd.argoproj.io/instance: kube-prometheus-stack
    release: prometheus-operator
    app: jaeger
    team: platform
spec:
  namespaceSelector:
    matchNames:
      - jaeger
  # Jaeger v2 = OTel-Collector image. The OTel-Operator generates a separate
  # *-monitoring Service that exposes the collector's self-metrics on port 8888.
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger-collector-monitoring
      app.kubernetes.io/managed-by: opentelemetry-operator
  endpoints:
    - port: monitoring
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
