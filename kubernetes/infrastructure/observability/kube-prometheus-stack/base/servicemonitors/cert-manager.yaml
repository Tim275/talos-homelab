# cert-manager metrics (controller + cainjector + webhook, port 9402)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cert-manager
  namespace: monitoring
  annotations:
    argocd.argoproj.io/tracking-id: kube-prometheus-stack:monitoring.coreos.com/ServiceMonitor:monitoring/cert-manager
  labels:
    argocd.argoproj.io/instance: kube-prometheus-stack
    app: cert-manager
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - cert-manager
  selector:
    matchLabels:
      app.kubernetes.io/instance: cert-manager
  endpoints:
    - port: tcp-prometheus-servicemonitor  # Port 9402
      path: /metrics
      interval: 60s  # SSL metrics don't change frequently
      scrapeTimeout: 30s
      scheme: http
