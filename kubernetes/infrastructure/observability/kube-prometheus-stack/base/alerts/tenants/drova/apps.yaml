apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apps-drova
  labels:
    release: kube-prometheus-stack
spec:
  # Drova = demo tenant. Only availability is alert-worthy here; error-budget burn
  # lives in slos.yaml (the Google-SRE signal). Latency/throttling/saturation/anomaly/
  # kafka-lag/span-emission → Grafana "Drova Golden Signals" + "SLO & Health" dashboards.
  groups:
    - name: drova-availability
      interval: 1m
      rules:
        - alert: DrovaServiceDown
          expr: |
            kube_deployment_status_replicas_available{namespace="drova",deployment=~"api-gateway|user-service|trip-service|driver-service|chat-service|payment-service"} == 0
          for: 2m
          labels:
            severity: warning
            priority: P2
            component: apps
            tenant: drova
          annotations:
            summary: "Drova service down: {{ $labels.deployment }}"
            description: "0 ready replicas for {{ $labels.deployment }} >2min."

        - alert: DrovaPodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="drova",container=~"api-gateway|user-service|trip-service|driver-service|chat-service|payment-service"}[5m]) * 60 > 0.5
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.container }} crash-looping"
            description: "Container {{ $labels.container }} in {{ $labels.pod }} restarting >0.5/min"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.container }}"
