apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-drova-latency
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ─────────────────────────────────────────────────────────────────────
    # Drova p99 Latency Alerts (Google SRE Golden Signal #1: Latency)
    # Source: SRE Workbook §5 — latency SLI complementing availability SLI
    #
    # Thresholds chosen for Drova-services in homelab:
    #   p99 < 500ms = good (target)
    #   p99 > 1s    = warning (slow burn)
    #   p99 > 2s    = critical (fast burn — user-perceptible)
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.latency.recording
      interval: 60s
      rules:
        # HTTP p99 latency per service
        - record: drova:http_p99_latency_seconds:5m
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (
                rate(http_server_request_duration_seconds_bucket{service_name=~"api-gateway|chat-service|user-service"}[5m])
              )
            )
        - record: drova:http_p99_latency_seconds:30m
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (
                rate(http_server_request_duration_seconds_bucket{service_name=~"api-gateway|chat-service|user-service"}[30m])
              )
            )

        # gRPC p99 latency per service
        - record: drova:grpc_p99_latency_seconds:5m
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (
                rate(rpc_server_call_duration_seconds_bucket{service_name=~"trip-service|driver-service|user-service"}[5m])
              )
            )
        - record: drova:grpc_p99_latency_seconds:30m
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (
                rate(rpc_server_call_duration_seconds_bucket{service_name=~"trip-service|driver-service|user-service"}[30m])
              )
            )

    - name: drova.latency.alerts
      interval: 1m
      rules:
        # HTTP p99 > 2s = user-perceptible delay
        - alert: DrovaHttpLatencyP99HighCritical
          expr: drova:http_p99_latency_seconds:5m > 2
          for: 5m
          labels:
            severity: critical
            priority: P1
            tenant: drova
            slo: latency
          annotations:
            summary: "Drova HTTP p99 latency >2s on {{ $labels.service_name }}"
            description: "p99={{ $value | humanizeDuration }} over 5m — user-perceptible delay"
            dashboard_url: "/d/drova-service-detail"

        # HTTP p99 > 1s sustained 30m = degradation
        - alert: DrovaHttpLatencyP99HighWarning
          expr: drova:http_p99_latency_seconds:30m > 1
          for: 15m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            slo: latency
          annotations:
            summary: "Drova HTTP p99 latency >1s on {{ $labels.service_name }} (30m)"
            description: "p99={{ $value | humanizeDuration }} over 30m — service degradation"
            dashboard_url: "/d/drova-service-detail"

        # gRPC p99 > 1s = downstream-service slow
        - alert: DrovaGrpcLatencyP99HighCritical
          expr: drova:grpc_p99_latency_seconds:5m > 1
          for: 5m
          labels:
            severity: critical
            priority: P1
            tenant: drova
            slo: latency
          annotations:
            summary: "Drova gRPC p99 latency >1s on {{ $labels.service_name }}"
            description: "p99={{ $value | humanizeDuration }} — downstream-service slow, may cascade to api-gateway 504s"
            dashboard_url: "/d/drova-service-detail"

        - alert: DrovaGrpcLatencyP99HighWarning
          expr: drova:grpc_p99_latency_seconds:30m > 0.5
          for: 15m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            slo: latency
          annotations:
            summary: "Drova gRPC p99 latency >500ms on {{ $labels.service_name }} (30m)"
            description: "p99={{ $value | humanizeDuration }} over 30m"
            dashboard_url: "/d/drova-service-detail"
