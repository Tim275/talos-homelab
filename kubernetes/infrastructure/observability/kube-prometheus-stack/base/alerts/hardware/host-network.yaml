apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hardware-host-network
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: host-network
      interval: 1m
      rules:
        - alert: HostNetworkReceiveDrops
          expr: |
            rate(node_network_receive_drop_total{device!~"lo|veth.*|cni.*|tap.*|fwbr.*|fwln.*|fwpr.*|cilium.*|lxc.*"}[5m]) > 1
          for: 10m
          labels:
            severity: warning
            component: hardware
          annotations:
            summary: "{{ $labels.instance }} NIC {{ $labels.device }} dropping RX packets ({{ $value | humanize }}/s)"
            description: "Receive drops indicate NIC saturation, buffer overrun, or driver issue."

        - alert: HostNetworkTransmitDrops
          expr: |
            rate(node_network_transmit_drop_total{device!~"lo|veth.*|cni.*|tap.*|fwbr.*|fwln.*|fwpr.*|cilium.*|lxc.*"}[5m]) > 1
          for: 10m
          labels:
            severity: warning
            component: hardware
          annotations:
            summary: "{{ $labels.instance }} NIC {{ $labels.device }} dropping TX packets ({{ $value | humanize }}/s)"
            description: "Transmit drops indicate NIC congestion or downstream backpressure."

        - alert: HostNetworkErrors
          expr: |
            rate(node_network_receive_errs_total{device!~"lo|veth.*|cni.*|tap.*|fwbr.*|fwln.*|fwpr.*|cilium.*|lxc.*"}[5m]) > 0
            or
            rate(node_network_transmit_errs_total{device!~"lo|veth.*|cni.*|tap.*|fwbr.*|fwln.*|fwpr.*|cilium.*|lxc.*"}[5m]) > 0
          for: 5m
          labels:
            severity: critical
            component: hardware
          annotations:
            summary: "{{ $labels.instance }} NIC {{ $labels.device }} reporting errors"
            description: "Hardware/link errors on physical NIC. Check cable, port, driver. Ceph replication runs over this link."

        - alert: HostBridgeDown
          expr: |
            node_network_up{device=~"vmbr.*"} == 0
          for: 2m
          labels:
            severity: critical
            component: hardware
          annotations:
            summary: "{{ $labels.instance }} bridge {{ $labels.device }} is DOWN"
            description: "Proxmox bridge down. All VM and host traffic on this bridge is cut. Cluster/Ceph link affected."

        - alert: HostActiveLinkLost
          expr: |
            node_network_up{device!~"lo|veth.*|cni.*|tap.*|fwbr.*|fwln.*|fwpr.*|cilium.*|lxc.*|vmbr.*"} == 0
            and on (instance, device) (node_network_receive_bytes_total offset 1h > 0)
          for: 5m
          labels:
            severity: warning
            component: hardware
          annotations:
            summary: "{{ $labels.instance }} NIC {{ $labels.device }} lost link (was active)"
            description: "A physical NIC that carried traffic in the last hour is now down. Unused/unplugged ports are not alerted."

        - alert: HostNetworkSaturation
          expr: |
            rate(node_network_receive_bytes_total{device!~"lo|veth.*|cni.*|tap.*|fwbr.*|fwln.*|fwpr.*|cilium.*|lxc.*"}[5m]) * 8 > 0.9 * 2.5e9
          for: 15m
          labels:
            severity: warning
            component: hardware
          annotations:
            summary: "{{ $labels.instance }} NIC {{ $labels.device }} >90% of 2.5G link"
            description: "Network link near saturation. Ceph rebalance or backup traffic may be throttled."
