apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-operators
  labels:
    release: kube-prometheus-stack
spec:
  # Deduped: SealedSecrets had 3 copies (2 wrong job-labels + 1 Info), Kyverno-down
  # duplicated compliance/kyverno.yaml. Kept one SealedSecrets + the CNPG operator.
  groups:
    - name: operators
      interval: 60s
      rules:
        - alert: SealedSecretsControllerDown
          expr: up{job="sealed-secrets-controller"} == 0
          for: 10m
          labels:
            severity: warning
            component: platform
            priority: P2
          annotations:
            dashboard_url: "/d/argocd-overview"
            summary: "Sealed-Secrets controller down"
            description: "New SealedSecrets cannot be decrypted while the controller is down — deployments referencing fresh secrets will stall."
            action: "kubectl -n sealed-secrets rollout restart deploy/sealed-secrets-controller; verify its decrypt key is present."

        - alert: CloudNativePGOperatorDown
          expr: up{job="cloudnative-pg-operator"} == 0
          for: 5m
          labels:
            severity: warning
            component: platform
            priority: P2
          annotations:
            dashboard_url: "/d/argocd-overview"
            summary: "CloudNativePG operator down"
            description: "PostgreSQL cluster management blocked (failover/scaling/backup orchestration) — running DBs keep serving."
            action: "kubectl -n cnpg-system rollout restart deploy/cnpg-controller-manager; running DBs keep serving meanwhile."

        - alert: KEDAScalerErrors
          expr: sum(rate(keda_scaler_detail_errors_total[10m])) > 0
          for: 15m
          labels:
            severity: warning
            component: platform
            priority: P2
          annotations:
            summary: "KEDA scaler errors — autoscaling frozen"
            description: "Scaler cannot query its source (Kafka lag / Prometheus) — workloads stay at current replica count."
            action: "kubectl -n keda logs deploy/keda-operator | grep -i error; check ScaledObject source reachability."
