apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apps-n8n
  labels:
    release: kube-prometheus-stack
spec:
  # n8n is a workload → ticket-tier (degrades automation, not infra-fatal). Workflow
  # failure-rate (Info) → Grafana / the n8n UI.
  groups:
    - name: n8n
      interval: 1m
      rules:
        - alert: N8NMainDown
          expr: kube_deployment_status_replicas_available{namespace="n8n-prod",deployment="n8n-main"} == 0
          for: 2m
          labels:
            severity: warning
            component: apps
            priority: P2
          annotations:
            summary: "n8n main pod down"
            description: "n8n-main 0 ready replicas >2min — workflow execution halted."

        - alert: N8NWorkerDown
          expr: kube_deployment_status_replicas_available{namespace="n8n-prod",deployment="n8n-worker"} == 0
          for: 5m
          labels:
            severity: warning
            component: apps
            priority: P2
          annotations:
            summary: "n8n worker down"
            description: "n8n worker pool empty — async workflows queue up (Redis-backed)."
