apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: network-istio
  labels:
    release: kube-prometheus-stack
spec:
  # Seit Phase 3 traegt das Mesh drova-Prod-Traffic → Istiod/Ztunnel = critical.
  groups:
    - name: istio-page
      interval: 60s
      rules:
        - alert: IstiodDown
          expr: absent(up{job="istiod"} == 1)
          for: 5m
          labels:
            severity: critical
            component: network
            priority: P1
          annotations:
            summary: "istiod down — Mesh-Control-Plane weg"
            description: "Keine xDS-Config/Cert-Ausstellung mehr; laufender ambient-Traffic laeuft weiter, neue Pods/Cert-Rotation blockiert."
            action: "kubectl -n istio-system rollout restart deploy/istiod; sail-operator Status pruefen."
        - alert: ZtunnelNodeDown
          expr: sum(up{job=~".*ztunnel.*"} == 1) < 6
          for: 10m
          labels:
            severity: critical
            component: network
            priority: P1
          annotations:
            summary: "ztunnel fehlt auf mind. einem Worker"
            description: "Ambient-mTLS-Datapath auf betroffenem Node tot — enrollte Pods dort verlieren Mesh-Traffic."
            action: "kubectl -n istio-system get pods -l app=ztunnel -o wide; DaemonSet-Events pruefen."
    - name: istio-ticket
      interval: 60s
      rules:
        - alert: IstioRootCertExpiringSoon
          expr: (citadel_server_root_cert_expiry_timestamp - time()) < 30 * 24 * 3600
          for: 1h
          labels:
            severity: warning
            component: network
            priority: P2
          annotations:
            summary: "Istio Root-CA laeuft in <30d ab"
            description: "Alle Workload-Identitaeten haengen an dieser CA — Ablauf = Mesh-weiter mTLS-Ausfall."
            action: "Root-Cert-Rotation planen (istiod self-signed CA, 10y default — Alert = Anomalie)."
        - alert: IstioCertIssuanceFailing
          expr: rate(citadel_server_csr_count[10m]) - rate(citadel_server_success_cert_issuance_count[10m]) > 0
          for: 10m
          labels:
            severity: warning
            component: network
            priority: P2
          annotations:
            summary: "istiod stellt Workload-Certs nicht aus"
            description: "CSRs kommen an, aber Issuance schlaegt fehl — neue Pods kriegen keine mTLS-Identity, Rotation stockt."
            action: "kubectl -n istio-system logs deploy/istiod | grep -i csr; ztunnel↔istiod-Verbindung pruefen."
        - alert: IstioXdsConfigRejected
          expr: rate(pilot_total_xds_rejects[10m]) > 0
          for: 10m
          labels:
            severity: warning
            component: network
            priority: P2
          annotations:
            summary: "Proxies lehnen istiod-Config ab (xDS reject)"
            description: "Ausgerollte Mesh-Config ist fuer ztunnel/waypoints ungueltig — Daten-Ebene laeuft auf alter Config weiter."
            action: "kubectl -n istio-system logs deploy/istiod | grep -i reject; letzte Istio-/mesh-Config-Aenderung pruefen."
