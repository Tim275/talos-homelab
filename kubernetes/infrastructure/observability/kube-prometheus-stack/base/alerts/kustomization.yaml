apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Enforce release-label on EVERY PrometheusRule so kube-prometheus-stack's
# ruleSelector picks them up. Without this, individual files can forget
# the label and become silent-ignored (27/55 outage on 2026-05-18).
labels:
  - pairs:
      release: kube-prometheus-stack
    includeSelectors: false

resources:
  # Cluster-wide alert categories (by layer)
  - kubernetes
  - infrastructure
  - hardware
  - storage
  - data
  - network
  - apps           # multi-tenant app alerts (n8n, keycloak)
  - platform
  - observability
  - compliance
  # slo            # empty now — drova SLOs moved to tenants/drova/
  # Tenant-specific bundles (DAX-pattern: tenant-alerts grouped per-tenant)
  - tenants/drova
