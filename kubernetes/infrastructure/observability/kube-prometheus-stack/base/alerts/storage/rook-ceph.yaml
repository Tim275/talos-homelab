apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: storage-rook-ceph
  labels:
    release: kube-prometheus-stack
spec:
  # CephClusterDown (==3) removed — ceph_health_status is only 0/1/2, so it never fired.
  # CephHealthError(==2) is the real cluster-error page. Dropped HEALTH_WARN (too noisy —
  # benign warns), the OSDDown/SlowOps/Capacity Info+Warning duplicates, and PG-recovery/
  # slow-ops internals → Grafana "Ceph - Cluster" / "Ceph - OSD" dashboards.
  groups:
    # ── PAGE ──
    - name: ceph-page
      interval: 30s
      rules:
        - alert: CephHealthError
          expr: ceph_health_status == 2
          for: 5m
          labels:
            severity: critical
            component: storage
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Ceph cluster HEALTH_ERR"
            description: "Rook-Ceph reports HEALTH_ERR — data integrity at risk."
            action: "Toolbox: 'ceph health detail' → root cause; often full OSD or inconsistent PG ('ceph pg repair <id>')."

        - alert: CephQuorumLost
          expr: sum(ceph_osd_up) / count(ceph_osd_up) < 0.5
          for: 1m
          labels:
            severity: critical
            component: storage
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Ceph lost quorum — majority of OSDs down"
            description: "More than 50% of OSDs down — DATA LOSS RISK, storage unavailable."
            action: "kubectl -n rook-ceph get pod -l app=rook-ceph-osd; check node/disk of down OSDs; do NOT restart all OSDs at once."

    # ── TICKET ──
    - name: ceph-ticket
      interval: 60s
      rules:
        - alert: CephOSDDown
          expr: ceph_osd_up == 0
          for: 10m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Ceph OSD {{ $labels.ceph_daemon }} down"
            description: "OSD down >10min — replication degraded (replica=2, msa2 still holds copies)."
            action: "kubectl -n rook-ceph logs -l app=rook-ceph-osd; check host SSD SMART (smartctl); reschedule OSD pod if node-local."

        - alert: CephPGsNotActive
          # Targeted replacement for the dropped (noisy) blanket HEALTH_WARN: fires ONLY when
          # PGs are genuinely not active (stuck peering / inactive = data unavailable), which
          # benign warns (scrub, nearfull) never cause. A 12h stuck-peering deadlock from a
          # broken cross-node WireGuard link (encrypt-node, 2026-05-24) went completely unalerted.
          expr: (ceph_pg_total - ceph_pg_active) > 0
          for: 15m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Ceph {{ $value }} PGs not active for 15m — data availability degraded"
            description: "PGs stuck inactive/peering — clients on them block (slow-ops cascade → RGW/CNPG timeouts). Check 'ceph pg dump_stuck inactive' + cross-node OSD heartbeats / Cilium NodeEncryption."
            action: "Toolbox: 'ceph pg dump_stuck inactive'; check cross-node OSD heartbeats + Cilium NodeEncryption (encrypt-node deadlock 2026-05-24)."

        - alert: CephOSDNearFull
          expr: ceph_osd_stat_bytes_used / ceph_osd_stat_bytes > 0.75
          for: 30m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Ceph OSD {{ $labels.ceph_daemon }} >75% full"
            description: "OSD at {{ $value | humanizePercentage }} — add capacity before it blocks writes."
            action: "Toolbox: 'ceph osd df'; 'ceph osd reweight-by-utilization' if imbalanced, else add capacity."

        - alert: RookCephOperatorDown
          expr: up{job="rook-ceph-operator"} == 0
          for: 5m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Rook-Ceph operator down"
            description: "Operator unreachable >5min — Ceph reconcile/management operations blocked."
            action: "kubectl -n rook-ceph rollout restart deploy/rook-ceph-operator; check operator logs."

        # RGWBucketQuotaWarning removed: the Ceph mgr prometheus module doesn't export
        # ceph_rgw_bucket_* (no per-bucket quota metrics) → was a permanently-blind alert.

        - alert: CephSlowOps
          # Service-level signal for BlueStore slow-ops (HEALTH_WARN). Replaces the noisy
          # upstream NodeDiskIOSaturation (disabled in values-prod) which false-fires on
          # Ceph disks. Ticket-tier: slow-ops = degraded performance, not an outage.
          expr: ceph_health_detail{name="BLUESTORE_SLOW_OP_ALERT"} > 0
          for: 15m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Ceph BlueStore slow operations on OSDs"
            description: "Slow-ops sustained >15min — OSDs can't keep up (usually consumer-SSD write pressure, e.g. msa2 Crucial running 3 OSDs). Degraded, not failure."
            action: "Toolbox: 'ceph health detail' (which OSDs) + 'ceph osd perf' (latency); check disk SMART + the heaviest write-load on that node."

        - alert: CephMonClockSkew
          # mon clock skew → quorum instability + cert/SVID/SA-token auth risk (same NTP root
          # as TalosNodeClockSkew / SPIRE). Service-level via ceph_health_detail.
          expr: ceph_health_detail{name="MON_CLOCK_SKEW"} > 0
          for: 10m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            dashboard_url: "/d/ceph-cluster"
            summary: "Ceph mon clock skew detected"
            description: "A Ceph mon's clock drifted — risks quorum instability + cert/token auth. Same NTP root cause as TalosNodeClockSkew."
            action: "Toolbox: 'ceph time-sync-status'; check NTP on the Proxmox hosts + Talos nodes ('talosctl time')."
