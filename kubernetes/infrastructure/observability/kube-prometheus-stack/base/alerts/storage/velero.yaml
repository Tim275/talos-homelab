apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: storage-velero
  labels:
    release: kube-prometheus-stack
spec:
  # Collapsed 5× "backup failed/stale" duplicates into one RPO symptom-alert
  # (VeleroNoRecentBackup >24h) — Google-SRE: alert on the outcome (no recent backup),
  # not each cause. Partial-failure + controller-down stay as tickets.
  groups:
    # ── PAGE ──
    - name: velero-page
      interval: 60s
      rules:
        - alert: VeleroNoRecentBackup
          expr: time() - velero_backup_last_successful_timestamp{schedule!=""} > 86400
          for: 10m
          labels:
            severity: critical
            component: backup
          annotations:
            summary: "No successful Velero backup in 24h for {{ $labels.schedule }}"
            description: "RPO exceeded — covers failed/partial/not-running causes. DR-readiness compromised."
            action: "velero backup get ; velero backup logs <name> ; check RGW bucket quota + creds"

    # ── TICKET ──
    - name: velero-ticket
      interval: 60s
      rules:
        - alert: VeleroDown
          expr: up{job="velero"} == 0
          for: 5m
          labels:
            severity: warning
            component: backup
            priority: P2
          annotations:
            summary: "Velero controller down"
            description: "Velero unreachable >5min — no backups will run until restored."

        - alert: VeleroBackupPartialFailure
          expr: sum(increase(velero_backup_partial_failure_total[1h])) > 0
          for: 30m
          labels:
            severity: warning
            component: backup
            priority: P2
          annotations:
            summary: "Velero partial-failure backup ({{ $value }})"
            description: "Backup completed with errors — some volumes may be missing from the restore point."
