apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: storage-csi
  labels:
    release: kube-prometheus-stack
spec:
  # Disk-full has one page (PVCCriticallyFull <10%); the <20% Warning + 4h/7d predictive
  # variants → Grafana "Persistent Volumes" dashboard. PVCPending deduped to the 30min
  # rule. VolumeAttachment/Volume-stuck internals → dashboard.
  groups:
    # ── PAGE ──
    - name: csi-page
      interval: 30s
      rules:
        - alert: PVCCriticallyFull
          expr: |
            (kubelet_volume_stats_available_bytes{job="kubelet"} / kubelet_volume_stats_capacity_bytes{job="kubelet"}) < 0.10
          for: 5m
          labels:
            severity: critical
            component: storage
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} <10% free ({{ $value | humanizePercentage }})"
            description: "Disk nearly full — app may fail / data loss. Expand the PVC now."

    # ── TICKET ──
    - name: csi-ticket
      interval: 60s
      rules:
        - alert: PVCPendingCritical
          expr: |
            (kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1)
            and on (namespace, persistentvolumeclaim)
              kube_pod_spec_volumes_persistentvolumeclaims_info
          for: 30m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} pending >30min"
            description: "Workload blocked. Likely stuck CSI omap-lock — see PVC-recovery runbook."
            action: "kubectl exec -n rook-ceph deploy/rook-ceph-tools -- rados -p replicapool-enterprise rmomapkey csi.volumes.default csi.volume.<PVC-UID>"

        - alert: CSIProvisionerDown
          expr: kube_deployment_status_replicas_available{deployment=~".*csi.ceph.com-ctrlplugin"} < 1
          for: 5m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            summary: "Ceph CSI provisioner {{ $labels.deployment }} has 0 replicas"
            description: "PVC creation/deletion blocked cluster-wide while provisioner is down."

        - alert: ReleasedPVsAccumulating
          expr: count(kube_persistentvolume_status_phase{phase="Released"}) > 3
          for: 30m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            summary: "{{ $value }} Released PVs — CSI cleanup not keeping up"
            description: "Released PVs accumulate when CSI deletion sticks on omap-locks. Hourly cleanup CronJob should handle it."

        - alert: CephOSDFlapping
          expr: changes(ceph_osd_up[10m]) > 2
          for: 5m
          labels:
            severity: warning
            component: storage
            priority: P2
          annotations:
            summary: "Ceph OSD {{ $labels.ceph_daemon }} flapping (>2 state changes in 10min)"
            description: "OSD bouncing up/down — investigate disk health, network, or memory pressure."
