apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: data-elasticsearch
  labels:
    release: kube-prometheus-stack
spec:
  # Single-node ES is permanently YELLOW (replicas unassigned) → ClusterYellow removed
  # (would alert forever). UnassignedPrimaryShards == ClusterRed (dup) removed.
  # Heap/GC-internals → Grafana "Elasticsearch" dashboard.
  groups:
    - name: elasticsearch
      interval: 1m
      rules:
        - alert: ElasticsearchClusterRed
          expr: elasticsearch_cluster_health_status{color="red"} == 1
          for: 5m
          labels:
            severity: warning
            component: data
            priority: P2
          annotations:
            dashboard_url: "/d/elasticsearch"
            summary: "Elasticsearch cluster RED"
            description: "Primary shards unassigned — log/SIEM data unavailable. Check disk + node health."
            action: "'GET _cluster/allocation/explain' for unassigned primaries; free disk if a watermark is hit; check node health."

        # ElasticsearchClusterYellow — BEWUSST DEAKTIVIERT (nur auskommentiert, 2026-07-14):
        # single-node ES = Replicas nie zuweisbar = IMMER yellow → Dauer-Noise. Wurde beim
        # 05-23-Prune entfernt, überlebte aber als Zombie in vector/logging-alerts.yaml (dort
        # konsolidiert + gelöscht). Re-enable NUR bei echtem Multi-Node-ES.
        # - alert: ElasticsearchClusterYellow
        #   expr: elasticsearch_cluster_health_status{color="yellow"} == 1
        #   for: 15m
        #   labels:
        #     severity: warning
        #     component: data
        #     priority: P2
        #   annotations:
        #     dashboard_url: "/d/elasticsearch"
        #     summary: "Elasticsearch cluster YELLOW"
        #     description: "Replicas unassigned >15min — nur relevant bei Multi-Node."

        - alert: ElasticsearchDiskFillingUp
          expr: |
            (elasticsearch_filesystem_data_size_bytes - elasticsearch_filesystem_data_free_bytes)
            / elasticsearch_filesystem_data_size_bytes > 0.85
          for: 10m
          labels:
            severity: warning
            component: data
            priority: P2
          annotations:
            dashboard_url: "/d/elasticsearch"
            summary: "Elasticsearch disk >85% on {{ $labels.instance }}"
            description: "{{ $value | humanizePercentage }} used. ES blocks writes at 95% (flood watermark)."
            action: "Free ES disk: delete old indices or lower ILM retention before the 95% flood watermark blocks writes."

        - alert: ElasticsearchSnapshotStale
          expr: |
            (time() - elasticsearch_slm_stats_last_success_timestamp_seconds) > 86400 * 2
          for: 1h
          labels:
            severity: warning
            component: data
            priority: P2
          annotations:
            dashboard_url: "/d/elasticsearch"
            summary: "Elasticsearch last successful snapshot >48h old"
            description: "SLM policy not running — check repository + cluster health."
            action: "'GET _slm/policy'; check the snapshot repo (Ceph-RGW); 'POST _slm/policy/<id>/_execute' to retry."
