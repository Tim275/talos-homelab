apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernetes-workloads
  labels:
    release: kube-prometheus-stack
spec:
  # Generic, namespace-wide workload health → covers EVERY app incl drova (no per-app
  # duplicates needed). HighPodRestartRate(info) + PodPendingTooLong(dup of PodNotReady)
  # → dashboard.
  groups:
    - name: kubernetes-workloads
      interval: 1m
      rules:
        - alert: PodCrashLooping
          expr: |
            max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) == 1
          for: 5m
          labels:
            severity: warning
            component: application
            priority: P2
          annotations:
            dashboard_url: "/d/k8s-pod-overview"
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} in CrashLoopBackOff >5min."
            action: "kubectl logs -n {{ $labels.namespace }} {{ $labels.pod }} --previous; describe for the crash reason; fix config/image/resources."

        - alert: ContainerOOMKilled
          expr: increase(kube_pod_container_status_terminated_reason{reason="OOMKilled"}[15m]) > 0
          labels:
            severity: warning
            component: application
            priority: P2
          annotations:
            dashboard_url: "/d/k8s-pod-overview"
            summary: "OOM kill: {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
            description: "Container OOM-killed in last 15min — raise memory limit or fix a leak."
            action: "Raise {{ $labels.container }}'s memory limit or fix the leak; kubectl describe pod -n {{ $labels.namespace }} {{ $labels.pod }}."

        - alert: PodNotReady
          expr: kube_pod_status_phase{phase!~"Running|Succeeded|Failed"} == 1
          for: 15m
          labels:
            severity: warning
            component: application
            priority: P2
          annotations:
            dashboard_url: "/d/k8s-pod-overview"
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod stuck in {{ $labels.phase }} for 15+ min — scheduling failure or PVC unbound."
            action: "kubectl describe pod -n {{ $labels.namespace }} {{ $labels.pod }}; check events — scheduling, PVC-unbound, or failing readiness."

        - alert: ContainerCPUThrottlingHigh
          # A container pinned against its CPU limit >75% of CFS periods = busy-loop or under-
          # sized limit. Blind spot before: the argocd redis-ha sentinel busy-looped at ~1 core
          # UNCAPPED (no limit → no throttling → no signal) and cooked msa2 to 95°C. Now that
          # runaways carry a limit, a recurrence surfaces here with the pod name before it heats.
          expr: |
            sum by (namespace, pod, container) (rate(container_cpu_cfs_throttled_periods_total{container!=""}[5m]))
              /
            sum by (namespace, pod, container) (rate(container_cpu_cfs_periods_total{container!=""}[5m]))
              > 0.75
          for: 15m
          labels:
            severity: warning
            component: application
            priority: P2
          annotations:
            dashboard_url: "/d/k8s-pod-overview"
            summary: "{{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} throttled {{ $value | humanizePercentage }}"
            description: "Container throttled >75% of CFS periods for 15min — busy-loop or under-sized CPU limit."
            action: "kubectl top pod -n {{ $labels.namespace }} {{ $labels.pod }} --containers; busy-loop → fix root cause, else raise the cpu limit."
