apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-alertmanager-fixed
spec:
  groups:
    - name: alertmanager.fixed
      interval: 1m
      rules:
        # Replacement for upstream AlertmanagerFailedToSendAlerts.
        # Upstream uses `ignoring(reason) group_left` which returns per-reason
        # rates that SUM above 1.0 → gives "300%" / "+Inf%" nonsense.
        # Fix: `sum without(reason)` first, then divide.
        - alert: AlertmanagerFailedToSendAlerts
          expr: |
            (
              sum without(reason) (rate(alertmanager_notifications_failed_total[5m]))
              /
              clamp_min(
                sum without(reason) (rate(alertmanager_notifications_total[5m])),
                1
              )
            ) > 0.01
            and
            sum without(reason) (rate(alertmanager_notifications_total[5m])) > 0
          for: 15m
          keep_firing_for: 5m
          labels:
            severity: warning
            component: monitoring
          annotations:
            summary: "Alertmanager {{ $labels.pod }} failed to send notifications via {{ $labels.integration }}"
            description: "Alertmanager {{ $labels.namespace }}/{{ $labels.pod }} failed to send {{ $value | humanizePercentage }} of notifications to {{ $labels.integration }}."

        - alert: AlertmanagerClusterFailedToSendAlerts
          expr: |
            min by (cluster, integration) (
              sum without(reason, pod) (rate(alertmanager_notifications_failed_total[5m]))
              /
              clamp_min(
                sum without(reason, pod) (rate(alertmanager_notifications_total[5m])),
                1
              )
            ) > 0.01
            and on (cluster, integration)
            sum without(reason, pod) (rate(alertmanager_notifications_total[5m])) > 0
          for: 15m
          keep_firing_for: 5m
          labels:
            severity: critical
            component: monitoring
          annotations:
            summary: "All Alertmanager instances failed to send {{ $labels.integration }} notifications"
            description: "ALL Alertmanager instances failed to send {{ $value | humanizePercentage }} of {{ $labels.integration }} notifications. Notification pipeline broken."
