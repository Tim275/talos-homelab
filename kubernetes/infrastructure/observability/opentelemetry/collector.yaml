# ============================================================================
# OPENTELEMETRY COLLECTOR - Enterprise Unified Observability (2025)
# ============================================================================
# Single pipeline for ALL telemetry signals:
# - Traces  → Jaeger + Tempo
# - Logs    → Loki + Elasticsearch
# - Metrics → Prometheus (Remote Write)
#
# Architecture:
# ┌─────────────────────────────────────────────────────────────────────────┐
# │                    Applications (OMS, n8n, etc.)                        │
# │                    via OpenTelemetry SDK                                │
# └─────────────────────────────────────────────────────────────────────────┘
#                          │ OTLP (4317/4318)
#                          ▼
# ┌─────────────────────────────────────────────────────────────────────────┐
# │                    OTel Collector (DaemonSet)                           │
# │  Receivers: OTLP (traces, logs, metrics)                                │
# │  Processors: batch, memory_limiter, resource, k8sattributes             │
# └─────────────────────────────────────────────────────────────────────────┘
#          │                    │                    │
#          ▼                    ▼                    ▼
#    ┌──────────┐        ┌──────────┐        ┌──────────────┐
#    │  Traces  │        │   Logs   │        │   Metrics    │
#    │──────────│        │──────────│        │──────────────│
#    │ • Jaeger │        │ • Loki   │        │ • Prometheus │
#    │ • Tempo  │        │ • ES     │        │   (remote)   │
#    └──────────┘        └──────────┘        └──────────────┘
# ============================================================================
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: opentelemetry
  annotations:
    prometheus.io/scrape: "false"
spec:
  mode: daemonset
  image: otel/opentelemetry-collector-contrib:0.150.1@sha256:a516c26968aa1feb5e5fc0562e3338ea13755cb4f373603226bcc4e276374ad0
  podAnnotations:
    prometheus.io/scrape: "false"
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1536Mi
      cpu: 1000m
  env:
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
  config:
    # =========================================================================
    # RECEIVERS - Accept telemetry from applications
    # =========================================================================
    receivers:
      # OTLP receiver for all signals (traces, logs, metrics)
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Kubernetes pod log collection (CRI/containerd format)
      # Reads from host /var/log/pods, filters to drova namespace
      filelog:
        include:
          - /var/log/pods/drova_*/*/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Parse CRI format: timestamp stream flags message
          - type: regex_parser
            id: cri-parser
            regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<flags>[^ ]*) (?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          # Extract namespace/pod/container from file path
          - type: regex_parser
            id: filepath-parser
            regex: '^\/var\/log\/pods\/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^\/]+\/(?P<container>[^\/]+)\/[^\/]+\.log$'
            parse_from: attributes["log.file.path"]
            cache:
              size: 128
          - type: move
            from: attributes.log
            to: body
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.container
            to: resource["k8s.container.name"]
          - type: remove
            field: attributes.flags

    # =========================================================================
    # PROCESSORS - Transform and enrich telemetry
    # =========================================================================
    processors:
      # Batch processor for efficient exports
      batch:
        timeout: 10s
        send_batch_size: 1024
        send_batch_max_size: 2048

      # Memory limiter to prevent OOM
      memory_limiter:
        limit_mib: 1400
        spike_limit_mib: 400
        check_interval: 1s

      # Add cluster-level attributes
      resource:
        attributes:
          - key: cluster
            value: talos-homelab
            action: upsert
          - key: collector.name
            value: ${env:K8S_POD_NAME}
            action: upsert

      # Add Kubernetes metadata to all signals
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.job.name
            - k8s.cronjob.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.container.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: app.kubernetes.io/name
              key: app.kubernetes.io/name
              from: pod
            - tag_name: app.kubernetes.io/component
              key: app.kubernetes.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

    # =========================================================================
    # EXPORTERS - Send telemetry to backends
    # =========================================================================
    exporters:
      # --- TRACES ---
      # Jaeger (stores in Elasticsearch)
      otlp/jaeger:
        endpoint: jaeger-collector.jaeger:4317
        tls:
          insecure: true
        headers:
          x-scope-orgid: talos-homelab

      # Tempo (stores in S3/Ceph)
      otlp/tempo:
        endpoint: tempo-distributor.monitoring:4317
        tls:
          insecure: true
        headers:
          x-scope-orgid: talos-homelab

      # --- LOGS ---
      # Loki via native OTLP endpoint (lokiexporter removed in otelcol-contrib 0.116+)
      otlphttp/loki:
        endpoint: http://loki-gateway.monitoring:80/otlp
        headers:
          X-Scope-OrgID: talos-homelab
        tls:
          insecure: true

      # Elasticsearch for log search/analytics
      elasticsearch:
        endpoints:
          - https://production-cluster-es-http.elastic-system.svc.cluster.local:9200
        logs_index: logs-otel
        tls:
          insecure_skip_verify: true
        auth:
          authenticator: basicauth/es
        retry:
          enabled: true
          initial_interval: 1s
          max_interval: 30s

      # --- METRICS ---
      # Prometheus Remote Write
      prometheusremotewrite:
        endpoint: http://kube-prometheus-stack-prometheus.monitoring:9090/api/v1/write
        headers:
          X-Scope-OrgID: talos-homelab
        resource_to_telemetry_conversion:
          enabled: true
        target_info:
          enabled: true

      # Debug exporter (for troubleshooting)
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200

    # =========================================================================
    # EXTENSIONS - Additional functionality
    # =========================================================================
    extensions:
      # Basic auth for Elasticsearch
      basicauth/es:
        client_auth:
          username: elastic
          password: ${env:ES_PASSWORD}

      # Health check endpoint
      health_check:
        endpoint: 0.0.0.0:13133

    # =========================================================================
    # SERVICE - Wire everything together
    # =========================================================================
    service:
      extensions:
        - basicauth/es
        - health_check

      pipelines:
        # Traces pipeline → Jaeger + Tempo
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          exporters:
            - otlp/jaeger
            - otlp/tempo

        # Logs pipeline → Loki + Elasticsearch
        logs:
          receivers:
            - otlp
            - filelog
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          exporters:
            - otlphttp/loki
            - elasticsearch

        # Metrics pipeline → Prometheus
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          exporters:
            - prometheusremotewrite

      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888

  # Environment variables for secrets
  envFrom:
    - secretRef:
        name: otel-collector-secrets

  # Host log access for filelog receiver
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
        type: Directory

  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
