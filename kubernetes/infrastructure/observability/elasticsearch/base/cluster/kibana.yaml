apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: production-kibana
  namespace: elastic-system
spec:
  # UPGRADED: 8.16.1 8.17.0 (Match Elasticsearch version!)
  version: 8.17.0
  # Homelab right-size: 1 replica reicht (UI-Frontend, kein HA-kritisch).
  count: 1
  elasticsearchRef:
    name: production-cluster
  config:
    server.publicBaseUrl: "https://kibana.timourhomelab.org"
  podTemplate:
    spec:
      containers:
        - name: kibana
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1
  http:
    service:
      spec:
        type: ClusterIP
    tls:
      selfSignedCertificate:
        # Disable TLS - handled by Envoy Gateway + Cloudflare
        disabled: true
