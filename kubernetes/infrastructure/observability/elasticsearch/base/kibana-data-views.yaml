
# KIBANA DATA VIEWS - matched to actually-ingested data streams
#
# Only streams that really exist in ES (verified 2026-06-11). One view per
# real dataset, grouped by domain. No ghost views for sources that aren't shipped.
#
# Structure:
# 1. [Ops]      cross-cutting by severity (all / critical / warn / info)
# 2. [SIEM]     audit & security (kube-audit, tetragon, hubble, envoy, netbird, security)
# 3. [App]      drova, n8n-prod, audiobookshelf
# 4. [Identity] keycloak, lldap
# 5. [Infra]    kyverno, velero, cilium-spire, kube-system, redis-operator
# 6. [Data]     postgres (cnpg), kafka, cloudbeaver
#
# To add a view: FIRST add the namespace to Vector's filter_sensitive_for_es
# allowlist (vector-aggregator.toml) so the stream exists, THEN add the view here.

apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-data-views
  namespace: elastic-system
  annotations:
    argocd.argoproj.io/sync-wave: "10"
data:
  # WICHTIG: Kibana unterstützt KEINE Brace-Expansion {a,b,c} - nur Wildcards und Komma-Listen!
  data-views.ndjson: |
    {"attributes":{"allowNoIndex":true,"name":"[Ops] All Logs","timeFieldName":"@timestamp","title":".ds-logs-*"},"id":"ops-all-logs","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Ops] Critical/Errors","timeFieldName":"@timestamp","title":".ds-logs-*.critical-*"},"id":"ops-critical","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Ops] Warnings","timeFieldName":"@timestamp","title":".ds-logs-*.warn-*"},"id":"ops-warnings","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Ops] Info","timeFieldName":"@timestamp","title":".ds-logs-*.info-*"},"id":"ops-info","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[SIEM] Kube-Audit","timeFieldName":"@timestamp","title":".ds-logs-kube-audit.*"},"id":"siem-kube-audit","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[SIEM] Tetragon","timeFieldName":"@timestamp","title":".ds-logs-tetragon.*"},"id":"siem-tetragon","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[SIEM] Hubble Drops","timeFieldName":"@timestamp","title":".ds-logs-hubble-drops.*"},"id":"siem-hubble-drops","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[SIEM] Envoy Access","timeFieldName":"@timestamp","title":".ds-logs-envoy-access.*"},"id":"siem-envoy-access","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[SIEM] NetBird","timeFieldName":"@timestamp","title":".ds-logs-netbird.*"},"id":"siem-netbird","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[SIEM] Security","timeFieldName":"@timestamp","title":".ds-logs-security.*"},"id":"siem-security","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[App] Drova","timeFieldName":"@timestamp","title":".ds-logs-drova.*"},"id":"app-drova","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[App] n8n Prod","timeFieldName":"@timestamp","title":".ds-logs-n8n-prod.*"},"id":"app-n8n-prod","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[App] Audiobookshelf","timeFieldName":"@timestamp","title":".ds-logs-audiobookshelf-prod.*"},"id":"app-audiobookshelf","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Identity] Keycloak","timeFieldName":"@timestamp","title":".ds-logs-keycloak.*"},"id":"identity-keycloak","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Identity] LLDAP","timeFieldName":"@timestamp","title":".ds-logs-lldap.*"},"id":"identity-lldap","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Infra] Kyverno","timeFieldName":"@timestamp","title":".ds-logs-kyverno.*"},"id":"infra-kyverno","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Infra] Velero","timeFieldName":"@timestamp","title":".ds-logs-velero.*"},"id":"infra-velero","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Infra] Cilium SPIRE","timeFieldName":"@timestamp","title":".ds-logs-cilium-spire.*"},"id":"infra-cilium-spire","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Infra] Kube-System","timeFieldName":"@timestamp","title":".ds-logs-kube-system.*"},"id":"infra-kube-system","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Data] PostgreSQL (CNPG)","timeFieldName":"@timestamp","title":".ds-logs-cloudnative-pg.*"},"id":"data-postgres","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Data] Kafka","timeFieldName":"@timestamp","title":".ds-logs-kafka.*"},"id":"data-kafka","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Infra] Redis Operator","timeFieldName":"@timestamp","title":".ds-logs-redis-operator-system.*"},"id":"infra-redis-operator","type":"index-pattern"}
    {"attributes":{"allowNoIndex":true,"name":"[Data] CloudBeaver","timeFieldName":"@timestamp","title":".ds-logs-cloudbeaver.*"},"id":"data-cloudbeaver","type":"index-pattern"}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-dataviews-bootstrap
  namespace: elastic-system
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: kibana-dataviews-bootstrap
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: curlimages/curl:8.20.0@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Use external URL to bypass Istio mTLS
              KIBANA_URL="https://kibana.timourhomelab.org"

              echo "=== Tier-0 Kibana Data Views Bootstrap ==="
              echo "Waiting for Kibana to be ready..."

              # Wait for Kibana
              for i in $(seq 1 30); do
                if curl -s -k -u "elastic:${ELASTIC_PASSWORD}" "${KIBANA_URL}/api/status" | grep -q '"level":"available"'; then
                  echo "Kibana is ready!"
                  break
                fi
                echo "Attempt $i/30 - Kibana not ready, waiting..."
                sleep 10
              done

              echo ""
              echo "Step 1: Deleting existing data views..."
              # Get all data view IDs
              EXISTING=$(curl -s -k -u "elastic:${ELASTIC_PASSWORD}" \
                -H "kbn-xsrf: true" \
                "${KIBANA_URL}/api/data_views" 2>/dev/null || echo '{"data_view":[]}')

              # Parse and delete each data view
              echo "$EXISTING" | grep -o '"id":"[^"]*"' | sed 's/"id":"//g' | sed 's/"//g' | while read id; do
                if [ -n "$id" ]; then
                  echo "  Deleting: $id"
                  curl -s -k -X DELETE -u "elastic:${ELASTIC_PASSWORD}" \
                    -H "kbn-xsrf: true" \
                    "${KIBANA_URL}/api/data_views/data_view/${id}" 2>/dev/null || true
                fi
              done

              echo ""
              echo "Step 2: Importing Tier-0 Data Views..."
              RESULT=$(curl -s -k -X POST "${KIBANA_URL}/api/saved_objects/_import?overwrite=true" \
                -H "kbn-xsrf: true" \
                -u "elastic:${ELASTIC_PASSWORD}" \
                -F file=@/config/data-views.ndjson)

              echo "$RESULT"

              # Set default data view
              echo ""
              echo "Step 3: Setting default data view..."
              curl -s -k -X POST "${KIBANA_URL}/api/data_views/default" \
                -H "kbn-xsrf: true" \
                -H "Content-Type: application/json" \
                -u "elastic:${ELASTIC_PASSWORD}" \
                -d '{"data_view_id":"ops-all-logs","force":true}'

              echo ""
              echo "=== Tier-0 Data Views Bootstrap Complete ==="
              echo "Created views: Ops (4), SIEM (6), App (3), Identity (2), Infra (5), Data (3)"
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: production-cluster-es-elastic-user
                  key: elastic
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: kibana-data-views
