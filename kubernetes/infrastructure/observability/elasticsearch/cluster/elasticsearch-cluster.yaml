apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: production-cluster
  namespace: elastic-system
spec:
  version: 8.16.1

  # S3 Snapshot Repository Credentials (Ceph RGW)
  # These credentials are injected into Elasticsearch keystore
  # Created by: kubernetes/infrastructure/observability/elasticsearch/snapshots/create-s3-credentials-job.yaml
  secureSettings:
    - secretName: elasticsearch-s3-credentials

  # 3-node production cluster
  nodeSets:
    - name: master-data
      count: 3
      config:
        # Master + Data + Ingest roles
        node.roles: ["master", "data", "ingest"]
        # CRITICAL FIX: Allow ALL indices for logging pipeline
        # Previously was "+fluent*,-*" which blocked logstash*
        # indices - this was the ROOT CAUSE of the EFK stack
        # failure. FluentBit -> Fluentd -> Elasticsearch
        # requires logstash format
        action.auto_create_index: "true"
        # Note: cluster.initial_master_nodes and xpack.security.enabled
        # are managed by ECK Operator automatically

        # 🔧 ENTERPRISE CEPH STORAGE TUNING - Based on Elastic Docs + Internet Research
        # Reference: https://www.elastic.co/guide/en/elasticsearch/reference/current/cluster-fault-detection.html
        # Reference: https://opster.com/analysis/elasticsearch-failing-s-failed-to-commit-cluster-state-version-s/
        #
        # Problem: Ceph block storage on Proxmox VMs has 50-70s I/O latency spikes
        # Solution: Increase ALL timeouts to 120s (2x worst-case observed latency)

        # Discovery timeouts (peer finding during cluster formation)
        discovery.request_peers_timeout: "120s"          # Default: 3s - health checks take 56-69s!
        discovery.probe.connect_timeout: "120s"          # Default: 30s
        discovery.probe.handshake_timeout: "120s"        # Default: 30s

        # Cluster state publication (CRITICAL for "failed to commit" errors)
        cluster.publish.timeout: "180s"                  # Default: 30s - cluster state writes take 69s!
        cluster.publish.info_timeout: "180s"             # Default: 10s

        # Fault detection (prevent false node removals during I/O spikes)
        cluster.fault_detection.leader_check.timeout: "120s"   # Default: 10s
        cluster.fault_detection.leader_check.interval: "10s"   # Default: 1s - reduce check frequency
        cluster.fault_detection.leader_check.retry_count: "6"  # Default: 3 - more retries
        cluster.fault_detection.follower_check.timeout: "120s" # Default: 10s
        cluster.fault_detection.follower_check.interval: "10s" # Default: 1s
        cluster.fault_detection.follower_check.retry_count: "6" # Default: 3

        # Storage health monitoring (reduce false positives)
        monitor.fs.health.slow_path_logging_threshold: "120s"  # Default: 5s
        monitor.fs.health.refresh_interval: "120s"             # Default: 60s
      podTemplate:
        metadata:
          labels:
            app.kubernetes.io/component: elasticsearch
        spec:
          # 🔧 CEPH STORAGE OPTIMIZATION: Set proper ownership for ES data directory
          # Elasticsearch runs as UID 1000, GID 1000 - fsGroup ensures volume ownership
          # OnRootMismatch: Only change ownership if root dir doesn't match fsGroup (faster on Ceph)
          securityContext:
            fsGroup: 1000
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroupChangePolicy: OnRootMismatch
          # Install S3 repository plugin for Rook Ceph snapshots
          initContainers:
            - name: install-plugins
              command:
                - sh
                - -c
                - |
                  bin/elasticsearch-plugin install --batch repository-s3
          # 🏭 PRODUCTION SPECS: Small Cluster (1-3 nodes)
          # Memory: 4GB per node, Heap: 2GB (50%), CPU: 2 cores
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: 4Gi
                  cpu: 1000m
                limits:
                  memory: 4Gi
                  cpu: 2000m
              env:
                - name: ES_JAVA_OPTS
                  # 50% of container memory (4GB → 2GB heap)
                  value: "-Xms2g -Xmx2g"
          # Affinity - spread across nodes
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        elasticsearch.k8s.elastic.co/cluster-name: production-cluster
                    topologyKey: kubernetes.io/hostname
      # Storage mit Rook-Ceph
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: rook-ceph-block-enterprise
            resources:
              requests:
                storage: 10Gi
  # HTTP service configuration
  http:
    service:
      spec:
        type: ClusterIP
        ports:
          - name: https
            port: 9200
            targetPort: 9200
    tls:
      selfSignedCertificate:
        disabled: false
