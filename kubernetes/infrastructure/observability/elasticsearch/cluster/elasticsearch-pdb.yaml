# Elasticsearch PodDisruptionBudget
# Enterprise Best Practice: Ensure cluster quorum during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: elasticsearch-production-cluster
  namespace: elastic-system
  labels:
    elasticsearch.k8s.elastic.co/cluster-name: production-cluster
spec:
  # For 3-node cluster: minAvailable=2 ensures quorum
  minAvailable: 2
  selector:
    matchLabels:
      elasticsearch.k8s.elastic.co/cluster-name: production-cluster
