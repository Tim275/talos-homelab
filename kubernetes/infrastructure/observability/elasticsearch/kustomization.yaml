apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 🏢 ELASTICSEARCH STACK - Production Best Practice Structure
# =========================================================
# Wave 1: operator/  → ECK Operator + CRDs (MUST deploy first)
# Wave 5: cluster/   → Elasticsearch cluster + Kibana + Monitoring

resources:
  - ns.yaml
  # - operator  # Wave 1: ECK Operator installation - MOVED to controllers/operators/elasticsearch-operator
  - cluster   # Wave 5: Elasticsearch workload

labels:
  - pairs:
      app.kubernetes.io/part-of: observability-stack
      app.kubernetes.io/managed-by: argocd
