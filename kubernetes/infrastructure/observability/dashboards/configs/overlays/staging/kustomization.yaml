apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana

# Staging Edge-Cluster (Pi/arm64): same dashboards as prod.
# Grafana-Operator-CRs are arch-agnostic (the dashboards are JSON-data),
# only the Grafana instance itself needs arm64. Use same dashboard set,
# the cluster_name label from external_labels differentiates the source.
resources:
  - ../../base
