apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: drova-overview
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Drova
  json: |
    {
      "title": "Drova — Service Overview (RED)",
      "uid": "drova-overview",
      "tags": ["drova","red"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {
          "id": 1,
          "title": "HTTP Request Rate (req/s) — api-gateway, chat, user",
          "type": "timeseries",
          "gridPos": {"x":0,"y":0,"w":12,"h":8},
          "targets": [{
            "expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[5m]))",
            "legendFormat": "{{service_name}}"
          }]
        },
        {
          "id": 2,
          "title": "HTTP Error Rate %",
          "type": "timeseries",
          "gridPos": {"x":12,"y":0,"w":12,"h":8},
          "targets": [{
            "expr": "100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\",http_response_status_code=~\"5..\"}[5m])) / sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[5m]))",
            "legendFormat": "{{service_name}}"
          }],
          "fieldConfig": {"defaults": {"unit": "percent", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}}
        },
        {
          "id": 3,
          "title": "HTTP P99 Latency (s)",
          "type": "timeseries",
          "gridPos": {"x":0,"y":8,"w":12,"h":8},
          "targets": [{
            "expr": "histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~\"api-gateway|chat-service|user-service\"}[5m])))",
            "legendFormat": "{{service_name}}"
          }],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 4,
          "title": "gRPC Request Rate — trip, driver",
          "type": "timeseries",
          "gridPos": {"x":12,"y":8,"w":12,"h":8},
          "targets": [{
            "expr": "sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~\"trip-service|driver-service\"}[5m]))",
            "legendFormat": "{{service_name}}"
          }]
        },
        {
          "id": 5,
          "title": "gRPC Error Rate %",
          "type": "timeseries",
          "gridPos": {"x":0,"y":16,"w":12,"h":8},
          "targets": [{
            "expr": "100 * sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~\"trip-service|driver-service\",rpc_grpc_status_code!=\"0\"}[5m])) / sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~\"trip-service|driver-service\"}[5m]))",
            "legendFormat": "{{service_name}}"
          }],
          "fieldConfig": {"defaults": {"unit": "percent"}}
        },
        {
          "id": 6,
          "title": "gRPC P99 Latency (s)",
          "type": "timeseries",
          "gridPos": {"x":12,"y":16,"w":12,"h":8},
          "targets": [{
            "expr": "histogram_quantile(0.99, sum by (service_name, le) (rate(rpc_server_call_duration_seconds_bucket{service_name=~\"trip-service|driver-service\"}[5m])))",
            "legendFormat": "{{service_name}}"
          }],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 7,
          "title": "Pod Replicas — Drova Services",
          "type": "stat",
          "gridPos": {"x":0,"y":24,"w":24,"h":4},
          "targets": [{
            "expr": "sum by (deployment) (kube_deployment_status_replicas_available{namespace=\"drova\",deployment=~\"api-gateway|chat-service|user-service|trip-service|driver-service|payment-service\"})",
            "legendFormat": "{{deployment}}"
          }]
        }
      ]
    }
