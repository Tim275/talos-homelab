apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: drova-overview
  namespace: grafana
spec:
  uid: drova-overview
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Drova
  resyncPeriod: 5m
  json: |
    {
      "title": "Drova — Tenant Overview (SRE Executive)",
      "uid": "drova-overview",
      "tags": ["drova","tier0","sre","executive"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {"list": []},
      "annotations": {
        "list": [
          {"name": "Deploys", "datasource": {"type": "prometheus", "uid": "prometheus"}, "enable": true, "iconColor": "rgba(0, 211, 255, 1)", "expr": "changes(kube_deployment_status_observed_generation{namespace=\"drova\"}[1m]) > 0", "titleFormat": "Deploy: {{deployment}}", "tagKeys": "deployment,namespace"},
          {"name": "ArgoCD-Syncs", "datasource": {"type": "prometheus", "uid": "prometheus"}, "enable": true, "iconColor": "rgba(255, 153, 0, 1)", "expr": "changes(argocd_app_info{name=~\"drova.*\"}[1m]) > 0", "titleFormat": "ArgoCD-Sync: {{name}}", "tagKeys": "name,sync_status"}
        ]
      },
      "panels": [
        {"id":900,"type":"row","title":"🎯 SLO & Health (HTTP-Edge: api-gateway, user-service)","gridPos":{"x":0,"y":0,"w":24,"h":1}},
        {"id":1,"type":"stat","title":"30d SLO Compliance (HTTP-Edge)",
         "gridPos":{"x":0,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * (1 - (sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[30d])) / clamp_min(sum(rate(http_server_request_duration_seconds_count[30d])), 0.001)))"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":3,"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":99},{"color":"green","value":99.5}]}}}},
        {"id":2,"type":"stat","title":"Error Budget Remaining (0.5%)",
         "gridPos":{"x":4,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * (1 - ((sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[30d])) / clamp_min(sum(rate(http_server_request_duration_seconds_count[30d])), 0.001)) / 0.005))"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":1,"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":50},{"color":"green","value":80}]}}}},
        {"id":3,"type":"stat","title":"Kafka Event-Rate (msg/s)",
         "gridPos":{"x":8,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(kafka_server_brokertopicmetrics_messagesin_total{topic!~\"__.*\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"short","decimals":2,"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"green","value":0.001}]}}},
         "options":{"colorMode":"background","graphMode":"area"}},
        {"id":4,"type":"stat","title":"Pod Replicas Ready",
         "gridPos":{"x":12,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(kube_deployment_status_replicas_available{namespace=\"drova\"})"}],
         "fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":5},{"color":"green","value":8}]}}}},
        {"id":5,"type":"stat","title":"Crashlooping Pods (1h)",
         "gridPos":{"x":16,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(increase(kube_pod_container_status_restarts_total{namespace=\"drova\"}[1h]) > 0)"}],
         "fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":3}]}}}},
        {"id":6,"type":"stat","title":"Tenant CPU%",
         "gridPos":{"x":20,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum(rate(container_cpu_usage_seconds_total{namespace=\"drova\",container!=\"\"}[5m])) / clamp_min(sum(kube_pod_container_resource_limits{namespace=\"drova\",resource=\"cpu\"}), 0.001)"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":1,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":90}]}}}},

        {"id":905,"type":"row","title":"💪 Per-Service Snapshot (alle 6 Services — CPU / Memory / Health)","gridPos":{"x":0,"y":5,"w":24,"h":1}},
        {"id":7,"type":"table","title":"All Drova Services — Snapshot",
         "gridPos":{"x":0,"y":6,"w":24,"h":9},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (service) (label_replace(kube_pod_status_ready{namespace=\"drova\",condition=\"true\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}, \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"Ready"},
           {"expr":"sum by (service) (label_replace(rate(container_cpu_usage_seconds_total{namespace=\"drova\",container!=\"\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}[5m]), \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"CPU"},
           {"expr":"sum by (service) (label_replace(container_memory_working_set_bytes{namespace=\"drova\",container!=\"\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}, \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"Memory"},
           {"expr":"sum by (service) (label_replace(increase(kube_pod_container_status_restarts_total{namespace=\"drova\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}[1h]), \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"Restarts"}
         ],
         "transformations":[
           {"id":"merge","options":{}},
           {"id":"organize","options":{"excludeByName":{"Time":true},"renameByName":{"service":"Service","Value #Ready":"Pods Ready","Value #CPU":"CPU (cores)","Value #Memory":"Memory","Value #Restarts":"Restarts (1h)"},"indexByName":{"service":0,"Value #Ready":1,"Value #CPU":2,"Value #Memory":3,"Value #Restarts":4}}}
         ],
         "fieldConfig":{
           "defaults":{"custom":{"align":"auto"}},
           "overrides":[
             {"matcher":{"id":"byName","options":"CPU (cores)"},"properties":[{"id":"unit","value":"short"},{"id":"decimals","value":3},{"id":"custom.cellOptions","value":{"type":"gauge","mode":"gradient"}},{"id":"max","value":2}]},
             {"matcher":{"id":"byName","options":"Memory"},"properties":[{"id":"unit","value":"bytes"},{"id":"custom.cellOptions","value":{"type":"gauge","mode":"gradient"}}]},
             {"matcher":{"id":"byName","options":"Restarts (1h)"},"properties":[{"id":"thresholds","value":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":3}]}},{"id":"custom.cellOptions","value":{"type":"color-background"}}]},
             {"matcher":{"id":"byName","options":"Pods Ready"},"properties":[{"id":"thresholds","value":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"green","value":1}]}},{"id":"custom.cellOptions","value":{"type":"color-background"}}]}
           ]
         }},

        {"id":910,"type":"row","title":"📊 HTTP-Edge Golden Signals (api-gateway, user-service)","gridPos":{"x":0,"y":15,"w":24,"h":1}},
        {"id":11,"type":"timeseries","title":"Traffic (RPS) per Service",
         "gridPos":{"x":0,"y":16,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (service_name) (rate(http_server_request_duration_seconds_count[5m]))","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps","custom":{"fillOpacity":10,"showPoints":"never"}}},
         "options":{"legend":{"displayMode":"list","placement":"bottom"}}},
        {"id":10,"type":"timeseries","title":"Latency p50/p95/p99",
         "gridPos":{"x":8,"y":16,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"histogram_quantile(0.50, sum by (le) (rate(http_server_request_duration_seconds_bucket[5m])))","legendFormat":"p50"},
           {"expr":"histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket[5m])))","legendFormat":"p95"},
           {"expr":"histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket[5m])))","legendFormat":"p99"}
         ],
         "fieldConfig":{"defaults":{"unit":"s","custom":{"fillOpacity":5,"showPoints":"never"}}}},
        {"id":12,"type":"timeseries","title":"Errors (5xx %) per Service",
         "gridPos":{"x":16,"y":16,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[5m])) / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count[5m])), 0.001)","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"percent","custom":{"fillOpacity":15,"lineWidth":2}}}},
        {"id":13,"type":"table","title":"Top HTTP Routes (RPS)",
         "gridPos":{"x":0,"y":23,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(12, sum by (service_name, http_route, http_request_method) (rate(http_server_request_duration_seconds_count[5m])))","instant":true,"format":"table"}],
         "transformations":[{"id":"organize","options":{"excludeByName":{"Time":true,"__name__":true},"renameByName":{"Value":"RPS","service_name":"Service","http_route":"Route","http_request_method":"Method"}}}],
         "fieldConfig":{"defaults":{"unit":"reqps","decimals":2}}},
        {"id":14,"type":"timeseries","title":"Saturation — CPU vs Limit per Pod",
         "gridPos":{"x":12,"y":23,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"drova\",container!=\"\"}[5m])) / clamp_min(sum by (pod) (kube_pod_container_resource_limits{namespace=\"drova\",resource=\"cpu\"}), 0.001)","legendFormat":"{{pod}}"}],
         "fieldConfig":{"defaults":{"unit":"percent","max":100,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":90}]}}}},

        {"id":920,"type":"row","title":"📨 Kafka Event-Backbone (trip · driver · chat · payment kommunizieren hier)","gridPos":{"x":0,"y":31,"w":24,"h":1}},
        {"id":20,"type":"timeseries","title":"Event-Rate per Topic (msg/s)",
         "gridPos":{"x":0,"y":32,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (topic) (rate(kafka_server_brokertopicmetrics_messagesin_total{topic!~\"__.*\"}[5m]))","legendFormat":"{{topic}}"}],
         "fieldConfig":{"defaults":{"unit":"short","custom":{"fillOpacity":15,"showPoints":"never","stacking":{"mode":"normal"}}}},
         "options":{"legend":{"displayMode":"table","placement":"right","calcs":["mean","lastNotNull"]}}},
        {"id":21,"type":"timeseries","title":"Throughput per Topic (bytes/s in)",
         "gridPos":{"x":12,"y":32,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (topic) (rate(kafka_server_brokertopicmetrics_bytesin_total{topic!~\"__.*\"}[5m]))","legendFormat":"{{topic}}"}],
         "fieldConfig":{"defaults":{"unit":"Bps","custom":{"fillOpacity":10,"showPoints":"never"}}},
         "options":{"legend":{"displayMode":"list","placement":"bottom"}}},
        {"id":22,"type":"timeseries","title":"Failed Produce / Fetch Requests (Fehler-Signal)",
         "gridPos":{"x":0,"y":40,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum(rate(kafka_server_brokertopicmetrics_failedproducerequests_total[5m]))","legendFormat":"failed produce"},
           {"expr":"sum(rate(kafka_server_brokertopicmetrics_failedfetchrequests_total[5m]))","legendFormat":"failed fetch"}
         ],
         "fieldConfig":{"defaults":{"unit":"short","color":{"mode":"fixed","fixedColor":"red"},"custom":{"fillOpacity":10}}}},
        {"id":23,"type":"timeseries","title":"Retry-Topics (drova.retry.*) — Backpressure-Indikator",
         "gridPos":{"x":12,"y":40,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (topic) (rate(kafka_server_brokertopicmetrics_messagesin_total{topic=~\"drova.retry.*\"}[5m]))","legendFormat":"{{topic}}"}],
         "fieldConfig":{"defaults":{"unit":"short","color":{"mode":"fixed","fixedColor":"orange"},"custom":{"fillOpacity":10,"showPoints":"never"}}}},

        {"id":930,"type":"row","title":"⚙️ Service Runtime (Go: alle Services, v.a. event-driven trip/driver/chat/payment)","gridPos":{"x":0,"y":47,"w":24,"h":1}},
        {"id":30,"type":"timeseries","title":"Goroutines per Service",
         "gridPos":{"x":0,"y":48,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (service_name) (go_goroutine_count)","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"short","custom":{"fillOpacity":5,"showPoints":"never"}}},
         "options":{"legend":{"displayMode":"table","placement":"right","calcs":["lastNotNull"]}}},
        {"id":31,"type":"timeseries","title":"Memory Used (Go) per Service",
         "gridPos":{"x":8,"y":48,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (service_name) (go_memory_used_bytes)","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"bytes","custom":{"fillOpacity":5,"showPoints":"never"}}},
         "options":{"legend":{"displayMode":"table","placement":"right","calcs":["lastNotNull"]}}},
        {"id":32,"type":"timeseries","title":"Memory Working Set / Limit per Pod",
         "gridPos":{"x":16,"y":48,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (pod) (container_memory_working_set_bytes{namespace=\"drova\",container!=\"\"})","legendFormat":"{{pod}}"}
         ],
         "fieldConfig":{"defaults":{"unit":"bytes","custom":{"fillOpacity":5,"showPoints":"never"}}},
         "options":{"legend":{"displayMode":"list","placement":"bottom"}}},

        {"id":950,"type":"row","title":"🔗 Dependencies","gridPos":{"x":0,"y":55,"w":24,"h":1}},
        {"id":50,"type":"stat","title":"Postgres Replicas Up",
         "gridPos":{"x":0,"y":56,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(cnpg_collector_up{namespace=\"drova\"} == 1) OR on() vector(0)"}]},
        {"id":51,"type":"stat","title":"Kafka Brokers Up",
         "gridPos":{"x":6,"y":56,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(up{namespace=\"drova\",pod=~\"drova-kafka-broker-.*\"} == 1) OR on() vector(0)"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":2},{"color":"green","value":3}]}}}},
        {"id":52,"type":"stat","title":"Redis Up",
         "gridPos":{"x":12,"y":56,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(redis_up{namespace=\"drova\"} == 1) OR on() vector(0)"}]},
        {"id":53,"type":"stat","title":"Kafka Topics (aktiv)",
         "gridPos":{"x":18,"y":56,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(group by (topic) (kafka_server_brokertopicmetrics_messagesin_total{topic!~\"__.*\"}))"}],
         "fieldConfig":{"defaults":{"unit":"short"}}}
      ]
    }
