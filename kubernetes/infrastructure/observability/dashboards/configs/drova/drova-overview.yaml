apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: drova-overview
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Drova
  json: |
    {
      "title": "Drova — Tenant Overview (SRE Executive)",
      "uid": "drova-overview",
      "tags": ["drova","tier0","sre","executive"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {"id":900,"type":"row","title":"🎯 SLO & Health (Google SRE)","gridPos":{"x":0,"y":0,"w":24,"h":1}},
        {"id":1,"type":"stat","title":"30d SLO Compliance",
         "gridPos":{"x":0,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * (1 - (sum(rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\",http_response_status_code=~\"5..\"}[30d])) / clamp_min(sum(rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[30d])), 0.001)))"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":3,"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":99},{"color":"green","value":99.5}]}}}},
        {"id":2,"type":"stat","title":"Error Budget Remaining",
         "gridPos":{"x":4,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * (1 - ((sum(rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\",http_response_status_code=~\"5..\"}[30d])) / clamp_min(sum(rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[30d])), 0.001)) / 0.005))"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":1,"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":50},{"color":"green","value":80}]}}}},
        {"id":3,"type":"stat","title":"Active P1 Alerts",
         "gridPos":{"x":8,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(ALERTS{tenant=\"drova\",alertstate=\"firing\",priority=~\"P1|p1\"}) OR on() vector(0)"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"red","value":1}]}}}},
        {"id":4,"type":"stat","title":"Pod Replicas Ready",
         "gridPos":{"x":12,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(kube_deployment_status_replicas_available{namespace=\"drova\"})"}],
         "fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":5},{"color":"green","value":8}]}}}},
        {"id":5,"type":"stat","title":"Crashlooping Pods (1h)",
         "gridPos":{"x":16,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(increase(kube_pod_container_status_restarts_total{namespace=\"drova\"}[1h]) > 0)"}],
         "fieldConfig":{"defaults":{"unit":"short","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":3}]}}}},
        {"id":6,"type":"stat","title":"Tenant CPU%",
         "gridPos":{"x":20,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum(rate(container_cpu_usage_seconds_total{namespace=\"drova\",container!=\"\"}[5m])) / sum(kube_pod_container_resource_limits{namespace=\"drova\",resource=\"cpu\"})"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":1,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":90}]}}}},

        {"id":905,"type":"row","title":"💪 Per-Service Resources (CPU / Memory / Health)","gridPos":{"x":0,"y":5,"w":24,"h":1}},
        {"id":7,"type":"table","title":"All Drova Services — Snapshot",
         "gridPos":{"x":0,"y":6,"w":24,"h":9},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (service) (label_replace(kube_pod_status_ready{namespace=\"drova\",condition=\"true\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}, \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"Ready"},
           {"expr":"sum by (service) (label_replace(rate(container_cpu_usage_seconds_total{namespace=\"drova\",container!=\"\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}[5m]), \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"CPU"},
           {"expr":"sum by (service) (label_replace(kube_pod_container_resource_limits{namespace=\"drova\",resource=\"cpu\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}, \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"CPULimit"},
           {"expr":"sum by (service) (label_replace(container_memory_working_set_bytes{namespace=\"drova\",container!=\"\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}, \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"Memory"},
           {"expr":"sum by (service) (label_replace(kube_pod_container_resource_limits{namespace=\"drova\",resource=\"memory\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}, \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"MemoryLimit"},
           {"expr":"sum by (service) (label_replace(increase(kube_pod_container_status_restarts_total{namespace=\"drova\",pod=~\"(api-gateway|chat-service|user-service|trip-service|driver-service|payment-service)-.*\"}[1h]), \"service\", \"$1\", \"pod\", \"(.*)-[a-z0-9]+-[a-z0-9]+\"))","instant":true,"format":"table","refId":"Restarts"}
         ],
         "transformations":[
           {"id":"merge","options":{}},
           {"id":"organize","options":{"excludeByName":{"Time":true},"renameByName":{"service":"Service","Value #Ready":"Pods Ready","Value #CPU":"CPU (cores)","Value #CPULimit":"CPU Limit","Value #Memory":"Memory","Value #MemoryLimit":"Memory Limit","Value #Restarts":"Restarts (1h)"},"indexByName":{"service":0,"Value #Ready":1,"Value #CPU":2,"Value #CPULimit":3,"Value #Memory":4,"Value #MemoryLimit":5,"Value #Restarts":6}}}
         ],
         "fieldConfig":{
           "defaults":{"custom":{"align":"auto"}},
           "overrides":[
             {"matcher":{"id":"byName","options":"CPU (cores)"},"properties":[{"id":"unit","value":"short"},{"id":"decimals","value":3},{"id":"custom.cellOptions","value":{"type":"gauge","mode":"gradient"}},{"id":"max","value":2}]},
             {"matcher":{"id":"byName","options":"CPU Limit"},"properties":[{"id":"unit","value":"short"},{"id":"decimals","value":2}]},
             {"matcher":{"id":"byName","options":"Memory"},"properties":[{"id":"unit","value":"bytes"},{"id":"custom.cellOptions","value":{"type":"gauge","mode":"gradient"}}]},
             {"matcher":{"id":"byName","options":"Memory Limit"},"properties":[{"id":"unit","value":"bytes"}]},
             {"matcher":{"id":"byName","options":"Restarts (1h)"},"properties":[{"id":"thresholds","value":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":3}]}},{"id":"custom.cellOptions","value":{"type":"color-background"}}]},
             {"matcher":{"id":"byName","options":"Pods Ready"},"properties":[{"id":"thresholds","value":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"green","value":1}]}},{"id":"custom.cellOptions","value":{"type":"color-background"}}]}
           ]
         }},

        {"id":910,"type":"row","title":"📊 Four Golden Signals — Tenant-Wide","gridPos":{"x":0,"y":15,"w":24,"h":1}},
        {"id":10,"type":"timeseries","title":"Latency (p50/p95/p99)",
         "gridPos":{"x":0,"y":16,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"histogram_quantile(0.50, sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=~\"api-gateway|chat-service|user-service\"}[5m])))","legendFormat":"p50"},
           {"expr":"histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=~\"api-gateway|chat-service|user-service\"}[5m])))","legendFormat":"p95"},
           {"expr":"histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=~\"api-gateway|chat-service|user-service\"}[5m])))","legendFormat":"p99"}
         ],
         "fieldConfig":{"defaults":{"unit":"s"}}},
        {"id":11,"type":"timeseries","title":"Traffic (RPS) per Service",
         "gridPos":{"x":12,"y":16,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[5m]))","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":12,"type":"timeseries","title":"Errors (5xx %) per Service",
         "gridPos":{"x":0,"y":23,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\",http_response_status_code=~\"5..\"}[5m])) / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[5m])), 0.001)","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"percent","custom":{"fillOpacity":15,"lineWidth":2}}}},
        {"id":13,"type":"timeseries","title":"Saturation — CPU vs Limit",
         "gridPos":{"x":12,"y":23,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"drova\",container!=\"\"}[5m])) / sum by (pod) (kube_pod_container_resource_limits{namespace=\"drova\",resource=\"cpu\"})","legendFormat":"{{pod}}"}],
         "fieldConfig":{"defaults":{"unit":"percent","max":100,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":90}]}}}},

        {"id":920,"type":"row","title":"🌡 Latency Distribution (Heatmap — Uber-style)","gridPos":{"x":0,"y":30,"w":24,"h":1}},
        {"id":20,"type":"heatmap","title":"All HTTP requests — Latency Distribution",
         "gridPos":{"x":0,"y":31,"w":24,"h":9},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=~\"api-gateway|chat-service|user-service\"}[5m]))","format":"heatmap","legendFormat":"{{le}}"}],
         "options":{"calculate":false,"yAxis":{"unit":"s"},"color":{"scheme":"Spectral","mode":"scheme","steps":128,"reverse":true}}},

        {"id":930,"type":"row","title":"🔥 Top 10 — Hot Routes & Slow Routes","gridPos":{"x":0,"y":40,"w":24,"h":1}},
        {"id":30,"type":"table","title":"Top 10 Endpoints by Rate (RPS)",
         "gridPos":{"x":0,"y":41,"w":12,"h":9},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(10, sum by (service_name, http_route, http_request_method) (rate(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[5m])))","instant":true,"format":"table"}],
         "transformations":[{"id":"organize","options":{"excludeByName":{"Time":true,"__name__":true},"renameByName":{"Value":"RPS","service_name":"Service","http_route":"Route","http_request_method":"Method"}}}]},
        {"id":31,"type":"table","title":"Top 10 Slowest Routes (p99)",
         "gridPos":{"x":12,"y":41,"w":12,"h":9},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(10, histogram_quantile(0.99, sum by (service_name, http_route, le) (rate(http_server_request_duration_seconds_bucket{service_name=~\"api-gateway|chat-service|user-service\"}[5m]))))","instant":true,"format":"table"}],
         "transformations":[{"id":"organize","options":{"excludeByName":{"Time":true,"__name__":true},"renameByName":{"Value":"p99 (s)","service_name":"Service","http_route":"Route"}}}]},

        {"id":940,"type":"row","title":"💾 Resources (USE Method)","gridPos":{"x":0,"y":50,"w":24,"h":1}},
        {"id":40,"type":"timeseries","title":"CPU Usage / Limit per Pod",
         "gridPos":{"x":0,"y":51,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"drova\",container!=\"\"}[5m]))","legendFormat":"{{pod}} (used)"},
           {"expr":"sum by (pod) (kube_pod_container_resource_limits{namespace=\"drova\",resource=\"cpu\"})","legendFormat":"{{pod}} (limit)"}
         ],
         "fieldConfig":{"defaults":{"unit":"short"}}},
        {"id":41,"type":"timeseries","title":"Memory Working Set / Limit per Pod",
         "gridPos":{"x":12,"y":51,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (pod) (container_memory_working_set_bytes{namespace=\"drova\",container!=\"\"})","legendFormat":"{{pod}} (used)"},
           {"expr":"sum by (pod) (kube_pod_container_resource_limits{namespace=\"drova\",resource=\"memory\"})","legendFormat":"{{pod}} (limit)"}
         ],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},

        {"id":950,"type":"row","title":"🔗 Dependencies","gridPos":{"x":0,"y":58,"w":24,"h":1}},
        {"id":50,"type":"stat","title":"Postgres Replicas Up",
         "gridPos":{"x":0,"y":59,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(cnpg_collector_up{namespace=\"drova\"} == 1) OR on() vector(0)"}]},
        {"id":51,"type":"stat","title":"Kafka Brokers Up",
         "gridPos":{"x":4,"y":59,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(up{namespace=\"drova\",pod=~\"drova-kafka-.*\"} == 1) OR on() vector(0)"}]},
        {"id":52,"type":"stat","title":"Redis Up",
         "gridPos":{"x":8,"y":59,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(redis_up{namespace=\"drova\"} == 1) OR on() vector(0)"}]},
        {"id":53,"type":"stat","title":"Active gRPC Outgoing",
         "gridPos":{"x":12,"y":59,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(rpc_client_call_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":54,"type":"timeseries","title":"gRPC Client Latency (downstream calls)",
         "gridPos":{"x":16,"y":59,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"histogram_quantile(0.95, sum by (le, rpc_service) (rate(rpc_client_call_duration_seconds_bucket{service_name=~\"api-gateway|chat-service|user-service\"}[5m])))","legendFormat":"{{rpc_service}}"}],
         "fieldConfig":{"defaults":{"unit":"s"}}}
      ]
    }
