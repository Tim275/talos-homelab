apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: drova-service-detail
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Drova
  json: |
    {
      "title": "Drova — Service Detail",
      "uid": "drova-service-detail",
      "tags": ["drova","service","red","golden-signals"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {"name":"service","label":"Service","type":"query",
           "datasource":{"type":"prometheus","uid":"prometheus"},
           "query":"label_values(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service|trip-service|driver-service|payment-service\"}, service_name)",
           "refresh":1,"current":{"text":"api-gateway","value":"api-gateway"}}
        ]
      },
      "links": [
        {"title":"Drova Tenant Overview","url":"/d/drova-overview","type":"link","icon":"dashboard"},
        {"title":"Drova SLO","url":"/d/drova-slo","type":"link","icon":"dashboard"},
        {"title":"Drova Dependencies","url":"/d/drova-dependencies","type":"link","icon":"dashboard"},
        {"title":"Logs in Explore","url":"/explore?left={\"datasource\":\"loki\",\"queries\":[{\"expr\":\"{namespace=\\\"drova\\\",app=\\\"$service\\\"}\"}]}","type":"link","icon":"external link","targetBlank":true},
        {"title":"Traces in Explore","url":"/explore?left={\"datasource\":\"tempo\",\"queries\":[{\"query\":\"{ resource.k8s.namespace.name=\\\"drova\\\" && resource.service.name=\\\"$service\\\" }\"}]}","type":"link","icon":"external link","targetBlank":true}
      ],
      "panels": [
        {"id":1000,"type":"row","title":"4 Golden Signals — $service","gridPos":{"x":0,"y":0,"w":24,"h":1}},
        {"id":1,"type":"stat","title":"Latency p99",
         "gridPos":{"x":0,"y":1,"w":6,"h":5},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=\"$service\"}[5m])))"}],
         "fieldConfig":{"defaults":{"unit":"s","decimals":3,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.5},{"color":"red","value":2}]}}},
         "options":{"graphMode":"area","colorMode":"background"}},
        {"id":2,"type":"stat","title":"Traffic (RPS)",
         "gridPos":{"x":6,"y":1,"w":6,"h":5},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(http_server_request_duration_seconds_count{service_name=\"$service\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"reqps","decimals":1}},
         "options":{"graphMode":"area","colorMode":"background"}},
        {"id":3,"type":"stat","title":"Error Rate (5xx %)",
         "gridPos":{"x":12,"y":1,"w":6,"h":5},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum(rate(http_server_request_duration_seconds_count{service_name=\"$service\",http_response_status_code=~\"5..\"}[5m])) / clamp_min(sum(rate(http_server_request_duration_seconds_count{service_name=\"$service\"}[5m])), 0.001)"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":2,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":1},{"color":"red","value":5}]}}},
         "options":{"graphMode":"area","colorMode":"background"}},
        {"id":4,"type":"stat","title":"Saturation (CPU %)",
         "gridPos":{"x":18,"y":1,"w":6,"h":5},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"100 * sum(rate(container_cpu_usage_seconds_total{namespace=\"drova\",pod=~\"$service.*\",container!=\"\"}[5m])) / clamp_min(sum(kube_pod_container_resource_limits{namespace=\"drova\",pod=~\"$service.*\",resource=\"cpu\"}), 0.001)"}],
         "fieldConfig":{"defaults":{"unit":"percent","decimals":1,"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":90}]}}},
         "options":{"graphMode":"area","colorMode":"background"}},

        {"id":1100,"type":"row","title":"Latency Heatmap (HTTP)","gridPos":{"x":0,"y":6,"w":24,"h":1}},
        {"id":10,"type":"heatmap","title":"Request Latency Distribution",
         "gridPos":{"x":0,"y":7,"w":24,"h":9},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=\"$service\"}[5m]))","format":"heatmap","legendFormat":"{{le}}"}],
         "options":{"calculate":false,"yAxis":{"unit":"s"},"color":{"scheme":"Spectral","mode":"scheme","steps":128,"reverse":true}}},

        {"id":1200,"type":"row","title":"Per-Endpoint (HTTP)","gridPos":{"x":0,"y":16,"w":24,"h":1}},
        {"id":20,"type":"table","title":"Endpoints — Rate / p99 / Error %",
         "gridPos":{"x":0,"y":17,"w":24,"h":10},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (http_route, http_request_method) (rate(http_server_request_duration_seconds_count{service_name=\"$service\"}[5m]))","instant":true,"format":"table","refId":"RPS"},
           {"expr":"histogram_quantile(0.99, sum by (http_route, le) (rate(http_server_request_duration_seconds_bucket{service_name=\"$service\"}[5m])))","instant":true,"format":"table","refId":"p99"},
           {"expr":"100 * sum by (http_route) (rate(http_server_request_duration_seconds_count{service_name=\"$service\",http_response_status_code=~\"5..\"}[5m])) / clamp_min(sum by (http_route) (rate(http_server_request_duration_seconds_count{service_name=\"$service\"}[5m])), 0.001)","instant":true,"format":"table","refId":"errors"}
         ],
         "transformations":[
           {"id":"merge","options":{}},
           {"id":"organize","options":{"excludeByName":{"Time":true,"__name__":true,"job":true,"app":true,"app_kubernetes_io_name":true,"cluster":true,"collector_name":true,"deployment_environment":true,"k8s_container_name":true,"k8s_deployment_name":true,"k8s_namespace_name":true,"k8s_node_name":true,"k8s_pod_name":true,"k8s_pod_uid":true,"network_protocol_name":true,"network_protocol_version":true,"otel_scope_name":true,"otel_scope_version":true,"server_address":true,"service_name":true,"url_scheme":true,"http_response_status_code":true},"renameByName":{"http_route":"Route","http_request_method":"Method","Value #RPS":"RPS","Value #p99":"p99 (s)","Value #errors":"5xx %"}}}
         ]},

        {"id":1300,"type":"row","title":"gRPC RED (server + client)","gridPos":{"x":0,"y":27,"w":24,"h":1}},
        {"id":30,"type":"timeseries","title":"gRPC Server — Rate per Method",
         "gridPos":{"x":0,"y":28,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (rpc_service, rpc_method) (rate(rpc_server_call_duration_seconds_count{service_name=\"$service\"}[5m]))","legendFormat":"{{rpc_service}}.{{rpc_method}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":31,"type":"timeseries","title":"gRPC Server — p99 Latency",
         "gridPos":{"x":12,"y":28,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"histogram_quantile(0.99, sum by (rpc_method, le) (rate(rpc_server_call_duration_seconds_bucket{service_name=\"$service\"}[5m])))","legendFormat":"{{rpc_method}}"}],
         "fieldConfig":{"defaults":{"unit":"s"}}},
        {"id":32,"type":"timeseries","title":"gRPC Client (downstream calls) — Rate",
         "gridPos":{"x":0,"y":35,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (rpc_service, rpc_method) (rate(rpc_client_call_duration_seconds_count{service_name=\"$service\"}[5m]))","legendFormat":"→ {{rpc_service}}.{{rpc_method}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":33,"type":"timeseries","title":"gRPC Client — p99 Latency",
         "gridPos":{"x":12,"y":35,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"histogram_quantile(0.99, sum by (rpc_service, le) (rate(rpc_client_call_duration_seconds_bucket{service_name=\"$service\"}[5m])))","legendFormat":"{{rpc_service}}"}],
         "fieldConfig":{"defaults":{"unit":"s"}}},

        {"id":1400,"type":"row","title":"Go Runtime","gridPos":{"x":0,"y":42,"w":24,"h":1}},
        {"id":40,"type":"timeseries","title":"Goroutines",
         "gridPos":{"x":0,"y":43,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"go_goroutine_count{service_name=\"$service\"}","legendFormat":"{{k8s_pod_name}}"}],
         "fieldConfig":{"defaults":{"unit":"short"}}},
        {"id":41,"type":"timeseries","title":"Memory Used",
         "gridPos":{"x":8,"y":43,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"go_memory_used_bytes{service_name=\"$service\"}","legendFormat":"{{k8s_pod_name}}"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":42,"type":"timeseries","title":"GC Goal Bytes",
         "gridPos":{"x":16,"y":43,"w":8,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"go_memory_gc_goal_bytes{service_name=\"$service\"}","legendFormat":"{{k8s_pod_name}}"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},

        {"id":1500,"type":"row","title":"Pod Resources","gridPos":{"x":0,"y":50,"w":24,"h":1}},
        {"id":50,"type":"timeseries","title":"CPU Usage / Limit",
         "gridPos":{"x":0,"y":51,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"drova\",pod=~\"$service.*\",container!=\"\"}[5m]))","legendFormat":"{{pod}} (used)"},
           {"expr":"sum by (pod) (kube_pod_container_resource_limits{namespace=\"drova\",pod=~\"$service.*\",resource=\"cpu\"})","legendFormat":"{{pod}} (limit)"}
         ],
         "fieldConfig":{"defaults":{"unit":"short"}}},
        {"id":51,"type":"timeseries","title":"Memory Working Set / Limit",
         "gridPos":{"x":12,"y":51,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (pod) (container_memory_working_set_bytes{namespace=\"drova\",pod=~\"$service.*\",container!=\"\"})","legendFormat":"{{pod}} (used)"},
           {"expr":"sum by (pod) (kube_pod_container_resource_limits{namespace=\"drova\",pod=~\"$service.*\",resource=\"memory\"})","legendFormat":"{{pod}} (limit)"}
         ],
         "fieldConfig":{"defaults":{"unit":"bytes"}}}
      ]
    }
