apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: drova-service-detail
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Drova
  json: |
    {
      "title": "Drova — Service Detail",
      "uid": "drova-service-detail",
      "tags": ["drova"],
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "query": "label_values(http_server_request_duration_seconds_count{service_name=~\"api-gateway|chat-service|user-service|trip-service|driver-service|payment-service\"}, service_name)",
            "datasource": {"type":"prometheus","uid":"prometheus"},
            "refresh": 2,
            "includeAll": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate by Endpoint",
          "type": "timeseries",
          "gridPos": {"x":0,"y":0,"w":24,"h":8},
          "targets": [{
            "expr": "sum by (http_route) (rate(http_server_request_duration_seconds_count{service_name=\"$service\"}[5m]))",
            "legendFormat": "{{http_route}}"
          }]
        },
        {
          "id": 2,
          "title": "Latency Heatmap (P50, P95, P99)",
          "type": "timeseries",
          "gridPos": {"x":0,"y":8,"w":12,"h":8},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=\"$service\"}[5m])))","legendFormat":"p50"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=\"$service\"}[5m])))","legendFormat":"p95"},
            {"expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{service_name=\"$service\"}[5m])))","legendFormat":"p99"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 3,
          "title": "Errors by Status Code",
          "type": "timeseries",
          "gridPos": {"x":12,"y":8,"w":12,"h":8},
          "targets": [{
            "expr": "sum by (http_response_status_code) (rate(http_server_request_duration_seconds_count{service_name=\"$service\",http_response_status_code=~\"4..|5..\"}[5m]))",
            "legendFormat": "{{http_response_status_code}}"
          }]
        },
        {
          "id": 4,
          "title": "Go Runtime — Goroutines",
          "type": "timeseries",
          "gridPos": {"x":0,"y":16,"w":12,"h":6},
          "targets": [{"expr":"go_goroutine_count{service_name=\"$service\"}","legendFormat":"goroutines"}]
        },
        {
          "id": 5,
          "title": "Go Runtime — Memory Used",
          "type": "timeseries",
          "gridPos": {"x":12,"y":16,"w":12,"h":6},
          "targets": [{"expr":"go_memory_used_bytes{service_name=\"$service\"}","legendFormat":"used"}],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 6,
          "title": "Pod Restarts (Last 1h)",
          "type": "stat",
          "gridPos": {"x":0,"y":22,"w":24,"h":4},
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"drova\",pod=~\"$service-.*\"}[1h])",
            "legendFormat": "{{pod}}"
          }]
        }
      ]
    }
