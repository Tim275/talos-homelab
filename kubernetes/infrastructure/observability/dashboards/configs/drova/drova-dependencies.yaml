apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: drova-dependencies
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Drova
  json: |
    {
      "title": "Drova — Dependencies Health (PG / Kafka / Redis)",
      "uid": "drova-dependencies",
      "tags": ["drova","dependencies","data-layer"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from":"now-1h","to":"now"},
      "templating": {"list": []},
      "panels": [
        {"id":2000,"type":"row","title":"🐘 PostgreSQL (drova-postgres)","gridPos":{"x":0,"y":0,"w":24,"h":1}},
        {"id":1,"type":"stat","title":"Replicas Up",
         "gridPos":{"x":0,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(cnpg_collector_up{namespace=\"drova\"} == 1) OR on() vector(0)"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":1},{"color":"green","value":2}]}}}},
        {"id":2,"type":"stat","title":"Active Connections",
         "gridPos":{"x":4,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(cnpg_backends_total{namespace=\"drova\"})"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":80},{"color":"red","value":95}]}}}},
        {"id":3,"type":"stat","title":"Replication Lag",
         "gridPos":{"x":8,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"max(cnpg_pg_replication_lag{namespace=\"drova\"})"}],
         "fieldConfig":{"defaults":{"unit":"s","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":10},{"color":"red","value":30}]}}}},
        {"id":4,"type":"stat","title":"DB Size",
         "gridPos":{"x":12,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(cnpg_pg_database_size_bytes{namespace=\"drova\"})"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":5,"type":"stat","title":"Transactions/sec",
         "gridPos":{"x":16,"y":1,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(cnpg_pg_stat_database_xact_commit{namespace=\"drova\"}[5m]) + rate(cnpg_pg_stat_database_xact_rollback{namespace=\"drova\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"ops","decimals":1}}},

        {"id":10,"type":"timeseries","title":"Connection Count over Time",
         "gridPos":{"x":0,"y":5,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"cnpg_backends_total{namespace=\"drova\"}","legendFormat":"{{pod}}"}]},
        {"id":11,"type":"timeseries","title":"Tuples Read/Inserted/Updated/Deleted",
         "gridPos":{"x":12,"y":5,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum(rate(cnpg_pg_stat_database_tup_returned{namespace=\"drova\"}[5m]))","legendFormat":"returned"},
           {"expr":"sum(rate(cnpg_pg_stat_database_tup_inserted{namespace=\"drova\"}[5m]))","legendFormat":"inserted"},
           {"expr":"sum(rate(cnpg_pg_stat_database_tup_updated{namespace=\"drova\"}[5m]))","legendFormat":"updated"},
           {"expr":"sum(rate(cnpg_pg_stat_database_tup_deleted{namespace=\"drova\"}[5m]))","legendFormat":"deleted"}
         ],
         "fieldConfig":{"defaults":{"unit":"ops"}}},
        {"id":12,"type":"timeseries","title":"Cache Hit Ratio",
         "gridPos":{"x":0,"y":12,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(cnpg_pg_stat_database_blks_hit{namespace=\"drova\"}[5m])) / clamp_min(sum(rate(cnpg_pg_stat_database_blks_hit{namespace=\"drova\"}[5m])) + sum(rate(cnpg_pg_stat_database_blks_read{namespace=\"drova\"}[5m])), 1)","legendFormat":"hit ratio"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","min":0,"max":1}}},
        {"id":13,"type":"timeseries","title":"Replication Lag",
         "gridPos":{"x":12,"y":12,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"cnpg_pg_replication_lag{namespace=\"drova\"}","legendFormat":"{{pod}}"}],
         "fieldConfig":{"defaults":{"unit":"s"}}},

        {"id":2100,"type":"row","title":"📨 Kafka (drova-kafka)","gridPos":{"x":0,"y":19,"w":24,"h":1}},
        {"id":20,"type":"stat","title":"Brokers Up",
         "gridPos":{"x":0,"y":20,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(up{namespace=\"drova\",pod=~\"drova-kafka-.*\"} == 1) OR on() vector(0)"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":2},{"color":"green","value":3}]}}}},
        {"id":21,"type":"stat","title":"Total Topics",
         "gridPos":{"x":4,"y":20,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(count by (topic) (kafka_log_log_size{namespace=\"drova\"}))"}]},
        {"id":22,"type":"stat","title":"Under-Replicated Partitions",
         "gridPos":{"x":8,"y":20,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(kafka_server_replicamanager_under_replicated_partitions{namespace=\"drova\"}) OR on() vector(0)"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"red","value":1}]}}}},
        {"id":23,"type":"stat","title":"Active Controllers",
         "gridPos":{"x":12,"y":20,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(kafka_controller_kafkacontroller_active_controller_count{namespace=\"drova\"}) OR on() vector(0)"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"green","value":1}]}}}},
        {"id":24,"type":"stat","title":"Messages In/sec",
         "gridPos":{"x":16,"y":20,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(kafka_server_brokertopicmetrics_messages_in_total{namespace=\"drova\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"ops","decimals":1}}},
        {"id":25,"type":"stat","title":"Bytes In/sec",
         "gridPos":{"x":20,"y":20,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(kafka_server_brokertopicmetrics_bytes_in_total{namespace=\"drova\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"binBps"}}},

        {"id":30,"type":"timeseries","title":"Messages In/Out per Broker",
         "gridPos":{"x":0,"y":24,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (pod) (rate(kafka_server_brokertopicmetrics_messages_in_total{namespace=\"drova\"}[5m]))","legendFormat":"{{pod}} in"},
           {"expr":"-sum by (pod) (rate(kafka_server_brokertopicmetrics_bytes_out_total{namespace=\"drova\"}[5m]))","legendFormat":"{{pod}} out"}
         ],
         "fieldConfig":{"defaults":{"unit":"ops"}}},
        {"id":31,"type":"timeseries","title":"Topics by Log Size (top 10)",
         "gridPos":{"x":12,"y":24,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(10, sum by (topic) (kafka_log_log_size{namespace=\"drova\"}))","legendFormat":"{{topic}}"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":32,"type":"table","title":"Per-Topic Throughput",
         "gridPos":{"x":0,"y":31,"w":24,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(20, sum by (topic) (rate(kafka_server_brokertopicmetrics_messages_in_total{namespace=\"drova\"}[5m])))","instant":true,"format":"table"}]},

        {"id":2200,"type":"row","title":"⚡ Redis (redis-drova)","gridPos":{"x":0,"y":39,"w":24,"h":1}},
        {"id":40,"type":"stat","title":"Redis Up",
         "gridPos":{"x":0,"y":40,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(redis_up{namespace=\"drova\"} == 1) OR on() vector(0)"}]},
        {"id":41,"type":"stat","title":"Connected Clients",
         "gridPos":{"x":4,"y":40,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(redis_connected_clients{namespace=\"drova\"})"}]},
        {"id":42,"type":"stat","title":"Memory Used",
         "gridPos":{"x":8,"y":40,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(redis_memory_used_bytes{namespace=\"drova\"})"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":43,"type":"stat","title":"Hit Rate",
         "gridPos":{"x":12,"y":40,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(redis_keyspace_hits_total{namespace=\"drova\"}[5m])) / clamp_min(sum(rate(redis_keyspace_hits_total{namespace=\"drova\"}[5m])) + sum(rate(redis_keyspace_misses_total{namespace=\"drova\"}[5m])), 1)"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","min":0,"max":1,"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":0.5},{"color":"green","value":0.85}]}}}},
        {"id":44,"type":"stat","title":"Ops/sec",
         "gridPos":{"x":16,"y":40,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(redis_commands_processed_total{namespace=\"drova\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"ops","decimals":1}}},
        {"id":45,"type":"stat","title":"Total Keys",
         "gridPos":{"x":20,"y":40,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(redis_db_keys{namespace=\"drova\"})"}]},

        {"id":50,"type":"timeseries","title":"Commands per Second by Type",
         "gridPos":{"x":0,"y":44,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(10, sum by (cmd) (rate(redis_commands_total{namespace=\"drova\"}[5m])))","legendFormat":"{{cmd}}"}],
         "fieldConfig":{"defaults":{"unit":"ops"}}},
        {"id":51,"type":"timeseries","title":"Memory Usage / Max Memory",
         "gridPos":{"x":12,"y":44,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"redis_memory_used_bytes{namespace=\"drova\"}","legendFormat":"{{pod}} used"},
           {"expr":"redis_memory_max_bytes{namespace=\"drova\"} > 0","legendFormat":"{{pod}} max"}
         ],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":52,"type":"timeseries","title":"Hits vs Misses (cache effectiveness)",
         "gridPos":{"x":0,"y":51,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum(rate(redis_keyspace_hits_total{namespace=\"drova\"}[5m]))","legendFormat":"hits"},
           {"expr":"-sum(rate(redis_keyspace_misses_total{namespace=\"drova\"}[5m]))","legendFormat":"misses"}
         ],
         "fieldConfig":{"defaults":{"unit":"ops"}}},
        {"id":53,"type":"timeseries","title":"Evictions / Expired Keys",
         "gridPos":{"x":12,"y":51,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum(rate(redis_evicted_keys_total{namespace=\"drova\"}[5m]))","legendFormat":"evicted"},
           {"expr":"sum(rate(redis_expired_keys_total{namespace=\"drova\"}[5m]))","legendFormat":"expired"}
         ],
         "fieldConfig":{"defaults":{"unit":"ops"}}}
      ]
    }
