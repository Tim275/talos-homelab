apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kyverno
  namespace: grafana
spec:
  uid: kyverno
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: "Security"
  resyncPeriod: 5m
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "prometheus"
  # Kyverno official dashboard (Policy results, admission rates, top-failures)
  # https://grafana.com/grafana/dashboards/15145
  url: "https://grafana.com/api/dashboards/15145/revisions/2/download"
