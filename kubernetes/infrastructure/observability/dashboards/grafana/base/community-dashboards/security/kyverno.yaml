apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kyverno
  namespace: grafana
spec:
  uid: kyverno
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: "Security"
  resyncPeriod: 5m
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "prometheus"
  # Kyverno official dashboard (policy results, admission rates, rule execution)
  # https://grafana.com/grafana/dashboards/15804 — 15145 was a copy-paste-wrong ID
  # (Terracotta BigMemory!) whose rev 2 404'd → CR stuck InvalidSpec since 2026-06-14.
  url: "https://grafana.com/api/dashboards/15804/revisions/4/download"
