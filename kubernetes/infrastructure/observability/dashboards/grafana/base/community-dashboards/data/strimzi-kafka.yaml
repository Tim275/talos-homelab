apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: strimzi-kafka
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: "Data"
  resyncPeriod: 5m
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "prometheus"
    - inputName: "DS_LOKI"
      datasourceName: "loki"
  # grafana.com/18276 — "Kafka Dashboard". The previous URL (11009) was actually
  # the NGINX Ingress dashboard, which is why a "NGINX Ingress controller" entry
  # was showing up in the Data folder despite us not running NGINX.
  url: "https://grafana.com/api/dashboards/18276/revisions/1/download"
