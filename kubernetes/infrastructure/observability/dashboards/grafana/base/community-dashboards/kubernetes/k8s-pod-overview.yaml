apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-pod-overview
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: "Kubernetes"
  resyncPeriod: 5m
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "prometheus"
    - inputName: "DS_LOKI"
      datasourceName: "loki"
  url: "https://grafana.com/api/dashboards/15760/revisions/49/download"
