apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-kubelet
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: "Kubernetes"
  resyncPeriod: 5m
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "prometheus"
    - inputName: "DS_LOKI"
      datasourceName: "loki"
  # 12119 — "Kubernetes / Compute Resources / Node (Pods)". Was 12116 which is
  # actually "Kubernetes / API server" (collided with k8s-apiserver.yaml).
  url: "https://grafana.com/api/dashboards/12119/revisions/1/download"
