apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Grafana stack — Cloud-Native Pattern (May 2026)
# Strategy:
#   - Community dashboards via spec.url (grafana-operator fetches from grafana.com)
#   - All dashboards use spec.datasources for ${DS_PROMETHEUS}/${DS_LOKI} substitution
#   - Drova-tenant dashboards live separately in configs/drova/
namespace: grafana

resources:
  # Grafana operator instance + ingress + auth
  - grafana.yaml
  - http-route.yaml
  - http-route-http.yaml
  - oidc-sealed.yaml
  - elasticsearch-credentials.yaml

  # Datasources (5)
  - datasources/alertmanager-operated.yaml
  - datasources/prometheus-operated.yaml
  - datasources/loki.yaml
  - datasources/tempo.yaml
  - datasources/elasticsearch.yaml

  # Community Dashboards (24) — spec.url + spec.datasources pattern
  # Kubernetes (6)
  - community-dashboards/kubernetes/k8s-apiserver.yaml
  - community-dashboards/kubernetes/k8s-kubelet.yaml
  - community-dashboards/kubernetes/k8s-coredns.yaml
  - community-dashboards/kubernetes/k8s-cluster-overview.yaml
  - community-dashboards/kubernetes/k8s-node-overview.yaml
  - community-dashboards/kubernetes/k8s-pod-overview.yaml

  # Storage (4)
  - community-dashboards/storage/ceph-cluster.yaml
  - community-dashboards/storage/ceph-osd.yaml
  - community-dashboards/storage/ceph-pools.yaml
  - community-dashboards/storage/velero.yaml

  # Hardware (1)
  - community-dashboards/hardware/smartctl.yaml

  # Network (6)
  - community-dashboards/network/cilium-agent.yaml
  - community-dashboards/network/cilium-operator.yaml
  - community-dashboards/network/hubble.yaml
  - community-dashboards/network/envoy-global.yaml
  - community-dashboards/network/istio-control-plane.yaml
  - community-dashboards/network/istio-ztunnel.yaml

  # Data / Databases (5)
  - community-dashboards/data/cnpg-postgres.yaml
  - community-dashboards/data/strimzi-kafka.yaml
  - community-dashboards/data/kafka-exporter.yaml
  - community-dashboards/data/redis-operator.yaml
  - community-dashboards/data/elasticsearch.yaml

  # Observability self (3)
  - community-dashboards/observability/prometheus.yaml
  - community-dashboards/observability/loki-stack.yaml
  - community-dashboards/observability/otel-collector.yaml

  # GitOps (1)
  - community-dashboards/gitops/argocd-overview.yaml

  # Security (2)
  - community-dashboards/security/cert-manager.yaml
  - community-dashboards/security/kyverno.yaml

  # Custom Dashboards (17) — consolidated 2026-07-14 from the separate configs/-tree
  # (own app "dashboards", ns monitoring) into THIS app/tree: one home, one namespace.
  # Drova tenant (3)
  - custom-dashboards/drova/drova-overview.yaml
  - custom-dashboards/drova/drova-service-detail.yaml
  - custom-dashboards/drova/drova-slo-burnrate.yaml
  # Observability self (4)
  - custom-dashboards/observability/alertmanager-state.yaml
  - custom-dashboards/observability/jaeger-internals.yaml
  - custom-dashboards/observability/tempo-service-graph.yaml
  - custom-dashboards/observability/vector-throughput.yaml
  # Infrastructure (2)
  - custom-dashboards/infrastructure/proxmox.yaml
  - custom-dashboards/infrastructure/talos-os.yaml
  # Network (1)
  - custom-dashboards/network/edge-slo.yaml
  # Security (1)
  - custom-dashboards/security/waf-coraza.yaml
  # Apps / Platform (6)
  - custom-dashboards/apps/cloudflared.yaml
  - custom-dashboards/apps/keycloak-full.yaml
  - custom-dashboards/apps/keycloak-health.yaml
  - custom-dashboards/apps/n8n-health.yaml
  - custom-dashboards/apps/n8n-overview.yaml
  - custom-dashboards/apps/velero-backup-status.yaml
