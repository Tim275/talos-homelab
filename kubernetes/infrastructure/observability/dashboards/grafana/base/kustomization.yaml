apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Minimal Grafana stack — research-validated (May 2026)
# Strategy: grafana-operator CRDs only, ZERO community dashboards.
# Custom dashboards live in configs/drova/ (per-tenant) — that's it.
namespace: grafana

resources:
  # Grafana operator instance + ingress
  - grafana.yaml
  - http-route.yaml
  - http-route-http.yaml

  # Auth
  - oidc-sealed.yaml
  - elasticsearch-credentials.yaml

  # 5 datasources
  - datasources/alertmanager-operated.yaml
  - datasources/prometheus-operated.yaml
  - datasources/loki.yaml
  - datasources/tempo.yaml
  - datasources/elasticsearch.yaml

# Note: dashboards are managed via:
#   kubernetes/infrastructure/observability/dashboards/configs/drova/  (Drova tenant — 4 dashboards)
#   kubernetes/infrastructure/observability/dashboards/configs/platform/  (TODO: K8s/Ceph/ArgoCD — 3 dashboards)
