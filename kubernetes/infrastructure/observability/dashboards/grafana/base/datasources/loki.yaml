apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: datasource
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      app: grafana
  datasource:
    name: Loki
    type: loki
    access: proxy
    url: http://loki-gateway.monitoring.svc.cluster.local:80
    isDefault: false
    uid: loki
    jsonData:
      maxLines: 1000
      timeout: 60s
      derivedFields:
        - name: trace_id
          matcherType: regex
          matcherRegex: "(?:trace_id|traceID|trace-id)[\"=:\\s]+([a-f0-9]{16,32})"
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View trace"
