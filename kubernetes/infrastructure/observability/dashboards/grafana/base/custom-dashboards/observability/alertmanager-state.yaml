apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: alertmanager-state
  namespace: grafana
spec:
  uid: alertmanager-state
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Observability
  json: |
    {
      "title": "Alertmanager — State, Routing, Silences",
      "uid": "am-state",
      "tags": ["observability","alertmanager","sre"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {"id":1,"type":"stat","title":"AM instances up","gridPos":{"x":0,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(up{job=~\"alertmanager.*|kube-prometheus-stack-alertmanager\"})"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"yellow","value":2},{"color":"green","value":3}]}}}},
        {"id":2,"type":"stat","title":"Active alerts (firing)","gridPos":{"x":4,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(ALERTS{alertstate=\"firing\"})"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":10},{"color":"red","value":30}]}}}},
        {"id":3,"type":"stat","title":"Active silences","gridPos":{"x":8,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(alertmanager_silences{state=\"active\"})"}]},
        {"id":4,"type":"stat","title":"Notifications sent (5m rate)","gridPos":{"x":12,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(alertmanager_notifications_total[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":5,"type":"stat","title":"Notification failure rate","gridPos":{"x":16,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(alertmanager_notifications_failed_total[5m])) / clamp_min(sum(rate(alertmanager_notifications_total[5m])), 0.001)"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.01},{"color":"red","value":0.1}]}}}},
        {"id":6,"type":"stat","title":"Cluster mesh peers","gridPos":{"x":20,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"avg(alertmanager_cluster_members)"}]},
        {"id":10,"type":"timeseries","title":"Notifications per integration (5m rate)","gridPos":{"x":0,"y":4,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (integration) (rate(alertmanager_notifications_total[5m]))","legendFormat":"{{integration}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":11,"type":"timeseries","title":"Notification failures per integration","gridPos":{"x":12,"y":4,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (integration) (rate(alertmanager_notifications_failed_total[5m]))","legendFormat":"{{integration}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":20,"type":"table","title":"Currently firing alerts (top 30)","gridPos":{"x":0,"y":12,"w":24,"h":10},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(30, ALERTS{alertstate=\"firing\"})","format":"table","instant":true}],
         "transformations":[{"id":"organize","options":{"excludeByName":{"Time":true,"__name__":true,"prometheus":true},"indexByName":{"alertname":0,"severity":1,"namespace":2,"pod":3,"Value":4}}}]},
        {"id":21,"type":"timeseries","title":"Firing alerts by severity (last 6h)","gridPos":{"x":0,"y":22,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (severity) (ALERTS{alertstate=\"firing\"})","legendFormat":"{{severity}}"}]},
        {"id":22,"type":"timeseries","title":"Alert evaluation latency (config-reload)","gridPos":{"x":12,"y":22,"w":12,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"histogram_quantile(0.99, rate(alertmanager_config_last_reload_success_timestamp_seconds_bucket[5m]))","legendFormat":"p99"}]},
        {"id":30,"type":"stat","title":"PAGE firing (critical -> phone/Telegram)","gridPos":{"x":0,"y":29,"w":12,"h":5},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(ALERTS{alertstate=\"firing\",severity=\"critical\"})"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"red","value":1}]}}}},
        {"id":31,"type":"stat","title":"TICKET firing (warning -> Slack digest)","gridPos":{"x":12,"y":29,"w":12,"h":5},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(ALERTS{alertstate=\"firing\",severity=\"warning\"})"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":1}]}}}}
      ]
    }
