apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: proxmox-cluster
  namespace: grafana
spec:
  uid: proxmox-cluster
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Kubernetes
  json: |
    {
      "title": "Proxmox — Cluster & VMs",
      "uid": "proxmox-cluster",
      "tags": ["infrastructure","proxmox","hypervisor"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1m",
      "time": {"from": "now-3h", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {"id":1,"type":"stat","title":"PVE nodes up","gridPos":{"x":0,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(pve_up{id=~\"node/.*\"})"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"red","value":null},{"color":"green","value":1}]}}}},
        {"id":2,"type":"stat","title":"VMs running","gridPos":{"x":4,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(pve_up{id=~\"qemu/.*\"})"}]},
        {"id":3,"type":"stat","title":"Storage pools","gridPos":{"x":8,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(pve_storage_size_bytes)"}]},
        {"id":4,"type":"stat","title":"Cluster RAM allocated %","gridPos":{"x":12,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(pve_memory_usage_bytes{id=~\"qemu/.*\"}) / clamp_min(sum(pve_memory_size_bytes{id=~\"node/.*\"}),1)"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.8},{"color":"red","value":0.95}]}}}},
        {"id":5,"type":"stat","title":"Cluster CPU usage","gridPos":{"x":16,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"avg(pve_cpu_usage_ratio{id=~\"node/.*\"})"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.7},{"color":"red","value":0.9}]}}}},
        {"id":6,"type":"stat","title":"Worst-storage used %","gridPos":{"x":20,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"max(pve_storage_used_bytes / clamp_min(pve_storage_size_bytes, 1))"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.8},{"color":"red","value":0.95}]}}}},
        {"id":10,"type":"timeseries","title":"VMs RAM consumption (per VM)","gridPos":{"x":0,"y":4,"w":12,"h":10},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"pve_memory_usage_bytes{id=~\"qemu/.*\"}","legendFormat":"{{id}}"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":11,"type":"timeseries","title":"VMs CPU usage (per VM)","gridPos":{"x":12,"y":4,"w":12,"h":10},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"pve_cpu_usage_ratio{id=~\"qemu/.*\"}","legendFormat":"{{id}}"}],
         "fieldConfig":{"defaults":{"unit":"percentunit"}}},
        {"id":20,"type":"bargauge","title":"Storage usage by pool","gridPos":{"x":0,"y":14,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sort_desc(pve_storage_used_bytes / clamp_min(pve_storage_size_bytes,1))","legendFormat":"{{id}}"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","max":1}}},
        {"id":21,"type":"table","title":"VM inventory (top 30 by RAM)","gridPos":{"x":12,"y":14,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"topk(30, pve_memory_size_bytes{id=~\"qemu/.*\"})","format":"table","instant":true}]}
      ]
    }
