apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: talos-os
  namespace: grafana
spec:
  uid: talos-os
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Kubernetes
  json: |
    {
      "title": "Talos OS — Hardware & Kernel",
      "uid": "talos-os",
      "tags": ["infrastructure","talos","node"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "1m",
      "time": {"from": "now-3h", "to": "now"},
      "templating": {
        "list":[
          {"name":"node","label":"Node","type":"query","datasource":{"type":"prometheus","uid":"prometheus"},
           "query":"label_values(node_uname_info, nodename)","includeAll":true,"multi":true,"refresh":2}
        ]
      },
      "panels": [
        {"id":1,"type":"stat","title":"Talos node count","gridPos":{"x":0,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"count(node_uname_info)"}]},
        {"id":2,"type":"stat","title":"Cluster RAM total","gridPos":{"x":4,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(node_memory_MemTotal_bytes)"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":3,"type":"stat","title":"Cluster CPU cores","gridPos":{"x":8,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(count by (cpu, instance) (node_cpu_seconds_total{mode=\"idle\"}))"}]},
        {"id":4,"type":"stat","title":"Avg CPU load (15m)","gridPos":{"x":12,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"avg(node_load15)"}],
         "fieldConfig":{"defaults":{"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":2},{"color":"red","value":4}]}}}},
        {"id":5,"type":"stat","title":"Worst-disk used","gridPos":{"x":16,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"max(1 - node_filesystem_avail_bytes{fstype=\"xfs\"} / node_filesystem_size_bytes{fstype=\"xfs\"})"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.7},{"color":"red","value":0.9}]}}}},
        {"id":6,"type":"stat","title":"Clock-skew max (sec)","gridPos":{"x":20,"y":0,"w":4,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"max(abs(node_timex_offset_seconds))"}],
         "fieldConfig":{"defaults":{"unit":"s","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.1},{"color":"red","value":0.5}]}}}},
        {"id":10,"type":"timeseries","title":"CPU usage per node","gridPos":{"x":0,"y":4,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))","legendFormat":"{{instance}}"}],
         "fieldConfig":{"defaults":{"unit":"percentunit"}}},
        {"id":11,"type":"timeseries","title":"Memory available % per node","gridPos":{"x":12,"y":4,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes","legendFormat":"{{instance}}"}],
         "fieldConfig":{"defaults":{"unit":"percentunit"}}},
        {"id":20,"type":"timeseries","title":"Disk IO (xfs partitions /var)","gridPos":{"x":0,"y":12,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (instance) (rate(node_disk_io_time_seconds_total[5m]))","legendFormat":"{{instance}}"}],
         "fieldConfig":{"defaults":{"unit":"percentunit"}}},
        {"id":21,"type":"timeseries","title":"Network throughput per node","gridPos":{"x":12,"y":12,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[
           {"expr":"sum by (instance) (rate(node_network_receive_bytes_total{device!~\"lo|cali.*|cilium.*|veth.*\"}[5m]))","legendFormat":"{{instance}} RX"},
           {"expr":"sum by (instance) (rate(node_network_transmit_bytes_total{device!~\"lo|cali.*|cilium.*|veth.*\"}[5m]))","legendFormat":"{{instance}} TX"}
         ],
         "fieldConfig":{"defaults":{"unit":"Bps"}}},
        {"id":30,"type":"stat","title":"CPU steal (avg)","gridPos":{"x":0,"y":20,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"avg(rate(node_cpu_seconds_total{mode=\"steal\"}[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"percentunit","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":0.02},{"color":"red","value":0.05}]}}}},
        {"id":31,"type":"timeseries","title":"Node uptime (h)","gridPos":{"x":6,"y":20,"w":18,"h":7},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"(time() - node_boot_time_seconds) / 3600","legendFormat":"{{instance}}"}],
         "fieldConfig":{"defaults":{"unit":"h"}}}
      ]
    }
