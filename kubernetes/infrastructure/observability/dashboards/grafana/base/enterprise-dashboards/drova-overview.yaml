apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: drova-overview
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboard
spec:
  allowCrossNamespaceImport: true
  folder: "Drova"
  instanceSelector:
    matchLabels:
      app: grafana
  json: |
    {
      "title": "Drova — Service Overview",
      "uid": "drova-overview",
      "tags": ["drova", "ridesharing", "microservices"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "query": "label_values(kube_pod_info{namespace=\"drova\"}, pod)",
            "label": "Pod",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "datasource",
            "type": "datasource",
            "pluginId": "prometheus",
            "label": "Datasource"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Pods Ready",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{"color":"red","value":0},{"color":"green","value":1}] },
              "mappings": []
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "count(kube_pod_status_ready{namespace=\"drova\", condition=\"true\"} == 1)",
            "legendFormat": "Ready"
          }]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pod Restarts (1h)",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{"color":"green","value":0},{"color":"yellow","value":1},{"color":"red","value":5}] }
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"drova\"}[1h]))",
            "legendFormat": "Restarts"
          }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "HTTP Request Rate",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "thresholds": { "mode": "absolute", "steps": [{"color":"blue","value":0}] } }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"drova\"}[2m]))",
            "legendFormat": "req/s"
          }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "HTTP Error Rate",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [{"color":"green","value":0},{"color":"yellow","value":0.01},{"color":"red","value":0.05}] }
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"drova\",http_response_status_code=~\"5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{namespace=\"drova\"}[5m]))",
            "legendFormat": "Error %"
          }]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "p95 Latency",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "mode": "absolute", "steps": [{"color":"green","value":0},{"color":"yellow","value":0.5},{"color":"red","value":2}] }
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"drova\"}[5m])) by (le))",
            "legendFormat": "p95"
          }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "HTTP Request Rate per Service",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"drova\"}[2m])) by (job)",
            "legendFormat": "{{ job }}"
          }]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "HTTP Latency p50 / p95 / p99",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "histogram_quantile(0.50, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"drova\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"drova\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{namespace=\"drova\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Pod Restarts",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 6 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"drova\"}[1h])",
            "legendFormat": "{{ pod }}"
          }]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Kafka Consumer Lag (Drova)",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 6 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{"color":"green","value":0},{"color":"yellow","value":100},{"color":"red","value":1000}] }
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "kafka_consumer_fetch_manager_records_lag_max{namespace=\"drova\"}",
            "legendFormat": "{{ client_id }} — {{ topic }}"
          }]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "PostgreSQL Connections (Drova)",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 6 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{"color":"green","value":0},{"color":"yellow","value":70},{"color":"red","value":90}] }
            }
          },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "cnpg_backends_total{namespace=\"drova\"}",
            "legendFormat": "{{ pod }}"
          }]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "CNPG Replication Lag",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 6 },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [{
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "expr": "cnpg_pg_replication_lag{namespace=\"drova\"}",
            "legendFormat": "{{ pod }}"
          }]
        }
      ]
    }
