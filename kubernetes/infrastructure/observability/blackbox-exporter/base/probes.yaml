apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: external-connectivity
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: blackbox-external
  module: http_2xx
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://1.1.1.1
        - https://8.8.8.8
        - https://github.com
        - https://cloudflare.com
      labels:
        env: external
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: external-dns
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: blackbox-dns
  module: dns_external
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        # Cilium FQDN-egress blockt direktes externes :53 (Pods müssen über CoreDNS).
        # CoreDNS einen externen Namen auflösen lassen testet den echten Resolution-Pfad;
        # direkte external-resolver-Targets (1.1.1.1:53 etc.) wären strukturell False-Positives.
        - kube-dns.kube-system.svc.cluster.local:53
      labels:
        env: cluster-dns
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: homelab-public-services
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: blackbox-homelab
  module: http_2xx
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://argocd.timourhomelab.org
        - https://grafana.timourhomelab.org
        - https://drova.timourhomelab.org
        - https://iam.timourhomelab.org
      labels:
        env: prod
        type: public
