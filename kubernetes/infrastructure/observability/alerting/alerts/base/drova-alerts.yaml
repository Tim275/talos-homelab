apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: drova-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack    # required for Prometheus ruleSelector
    prometheus: kube-prometheus-stack-prometheus
    role: alert-rules
spec:
  groups:
    # ─────────────────────────────────────────────────────────────────────
    # PODS / DEPLOYMENTS — Resource layer
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.pods
      interval: 60s
      rules:
        - alert: DrovaPodNotReady
          expr: |
            kube_pod_status_ready{namespace="drova", condition="true"} == 0
            unless on (namespace, pod)
            kube_pod_status_phase{namespace="drova", phase=~"Succeeded|Failed"} == 1
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova pod {{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} not ready for >2min"
            impact: "Reduced capacity"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-overview"

        - alert: DrovaPodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="drova"}[5m]) * 60 > 0.5
          for: 5m
          labels:
            severity: critical
            priority: P1
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.container }} crash-looping"
            description: "Container {{ $labels.container }} in {{ $labels.pod }} restarting >0.5/min"
            impact: "Service instability"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.container }}"

        - alert: DrovaDeploymentUnavailable
          expr: kube_deployment_status_replicas_unavailable{namespace="drova"} > 0
          for: 3m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.deployment }} has unavailable replicas"
            description: "{{ $value }} replicas unavailable >3min"

        - alert: DrovaPodMemoryPressure
          expr: |
            (
              container_memory_working_set_bytes{namespace="drova",container!=""}
              /
              kube_pod_container_resource_limits{namespace="drova",resource="memory"}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.pod }} memory >90% of limit"
            description: "OOMKill risk — memory at {{ $value | humanizePercentage }} of limit"

        - alert: DrovaPodCPUThrottling
          expr: rate(container_cpu_cfs_throttled_periods_total{namespace="drova",container!=""}[5m]) / rate(container_cpu_cfs_periods_total{namespace="drova",container!=""}[5m]) > 0.5
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.pod }} CPU throttled >50%"
            description: "Container is being CPU-throttled — increase limits or scale horizontally"

    # ─────────────────────────────────────────────────────────────────────
    # HTTP — RED method per service (uses service_name, NOT job)
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.http
      interval: 30s
      rules:
        # NOTE: DrovaServiceDown moved to kube-prometheus-stack/base/alerts/apps/drova.yaml.
        # The old definition fired permanently for api-gateway because that service
        # only emits http_server_request_body_size_bytes (no duration histogram), so
        # the absent()/==0 logic incorrectly flagged the service as down. The new
        # definition uses kube_deployment_status_replicas_available which is the
        # correct signal for "is the service running".

        - alert: DrovaHighErrorRate
          expr: |
            100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service",http_response_status_code=~"5.."}[5m]))
            /
            clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[5m])), 0.001)
            > 5
          for: 3m
          labels:
            severity: critical
            priority: P1
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} 5xx rate >5% ({{ $value | humanize }}%)"
            description: "Sustained 5xx errors above 5% threshold"
            impact: "Users experiencing errors"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaHighErrorRateWarning
          expr: |
            100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service",http_response_status_code=~"5.."}[5m]))
            /
            clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[5m])), 0.001)
            > 1
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} 5xx rate >1%"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaP99LatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"api-gateway|chat-service|user-service"}[5m]))
            ) > 2
          for: 5m
          labels:
            severity: critical
            priority: P1
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} p99 latency >2s ({{ $value | humanizeDuration }})"
            description: "Severe latency degradation"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaP99LatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"api-gateway|chat-service|user-service"}[5m]))
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} p99 >500ms"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaTrafficDropped
          expr: |
            (
              sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[5m]))
              <
              sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[1h] offset 1h)) * 0.3
            )
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} traffic dropped >70% vs 1h ago"
            description: "Anomalous traffic drop — possibly client-side issue or upstream outage"

    # ─────────────────────────────────────────────────────────────────────
    # KAFKA — broker-level (drova-kafka cluster)
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.kafka
      interval: 60s
      rules:
        - alert: DrovaKafkaBrokerDown
          expr: count(up{namespace="drova",pod=~"drova-kafka-.*"}==1) < 3
          for: 2m
          labels:
            severity: critical
            priority: P1
            component: drova-kafka
            tenant: drova
          annotations:
            summary: "Drova Kafka: {{ $value }}/3 brokers up"
            description: "Less than 3 Kafka brokers reachable — replication factor at risk"

        - alert: DrovaKafkaUnderReplicatedPartitions
          expr: kafka_server_replicamanager_under_replicated_partitions{namespace="drova"} > 0
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova-kafka
            tenant: drova
          annotations:
            summary: "Drova Kafka: {{ $value }} under-replicated partitions"
            description: "Some partitions have fewer in-sync replicas than configured RF"

        - alert: DrovaKafkaOfflinePartitions
          expr: kafka_controller_kafkacontroller_offline_partitions_count{namespace="drova"} > 0
          for: 1m
          labels:
            severity: critical
            priority: P1
            component: drova-kafka
            tenant: drova
          annotations:
            summary: "Drova Kafka: {{ $value }} offline partitions"
            description: "Partitions completely unavailable — message production blocked"

        - alert: DrovaKafkaConsumerLagHigh
          expr: kafka_consumer_fetch_manager_records_lag_max{namespace="drova"} > 1000
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova-kafka
            tenant: drova
          annotations:
            summary: "Drova Kafka consumer lag >1000 on {{ $labels.topic }}"
            description: "{{ $labels.client_id }} is {{ $value }} messages behind"

        - alert: DrovaKafkaConsumerLagCritical
          expr: kafka_consumer_fetch_manager_records_lag_max{namespace="drova"} > 10000
          for: 2m
          labels:
            severity: critical
            priority: P1
            component: drova-kafka
            tenant: drova
          annotations:
            summary: "Drova Kafka consumer lag >10000 on {{ $labels.topic }}"
            description: "{{ $labels.client_id }} severely behind ({{ $value }} msgs)"

    # ─────────────────────────────────────────────────────────────────────
    # POSTGRES — drova-postgres cluster
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.database
      interval: 60s
      rules:
        - alert: DrovaPostgresDown
          expr: cnpg_collector_up{namespace="drova"} == 0
          for: 2m
          labels:
            severity: critical
            priority: P1
            component: drova-postgres
            tenant: drova
          annotations:
            summary: "Drova Postgres {{ $labels.pod }} down"
            description: "CNPG instance not reachable for >2min"

        - alert: DrovaPostgresReplicationLag
          expr: cnpg_pg_replication_lag{namespace="drova"} > 30
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova-postgres
            tenant: drova
          annotations:
            summary: "Drova Postgres replication lag {{ $value }}s"
            description: "Standby falling behind primary — data loss risk on failover"

        - alert: DrovaPostgresConnectionsHigh
          expr: cnpg_backends_total{namespace="drova"} > 80
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova-postgres
            tenant: drova
          annotations:
            summary: "Drova Postgres connections {{ $value }}/100"
            description: "Approaching max_connections limit"

        - alert: DrovaPostgresWALArchivingFailed
          expr: cnpg_collector_last_failed_wal_archive_seconds{namespace="drova"} > 0
          for: 15m
          labels:
            severity: warning
            priority: P2
            component: drova-postgres
            tenant: drova
          annotations:
            summary: "Drova Postgres WAL archiving failing"
            description: "Last failed archive {{ $value | humanizeTimestamp }} — disk fill risk"

    # ─────────────────────────────────────────────────────────────────────
    # REDIS — drova-redis cluster
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.redis
      interval: 60s
      rules:
        - alert: DrovaRedisDown
          expr: redis_up{namespace="drova"} == 0
          for: 2m
          labels:
            severity: critical
            priority: P1
            component: drova-redis
            tenant: drova
          annotations:
            summary: "Drova Redis {{ $labels.pod }} down"
            description: "Redis instance not reachable >2min"

        - alert: DrovaRedisHighMemory
          expr: |
            (
              redis_memory_used_bytes{namespace="drova"}
              /
              clamp_min(redis_memory_max_bytes{namespace="drova"}, 1)
            ) > 0.9
            and
            redis_memory_max_bytes{namespace="drova"} > 0
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova-redis
            tenant: drova
          annotations:
            summary: "Drova Redis {{ $labels.pod }} memory >90%"
            description: "Redis approaching max-memory — eviction will start"

        - alert: DrovaRedisContainerMemoryPressure
          expr: |
            (
              container_memory_working_set_bytes{namespace="drova",pod=~"redis-drova-.*",container="redis-drova"}
              /
              kube_pod_container_resource_limits{namespace="drova",pod=~"redis-drova-.*",resource="memory",container="redis-drova"}
            ) > 0.85
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova-redis
            tenant: drova
          annotations:
            summary: "Drova Redis {{ $labels.pod }} container memory >85% of limit"
            description: "Container approaching OOM. maxmemory not set — Redis will not evict, kernel will OOM-kill"

        - alert: DrovaRedisLowHitRate
          expr: |
            (
              rate(redis_keyspace_hits_total{namespace="drova"}[5m])
              /
              clamp_min(rate(redis_keyspace_hits_total{namespace="drova"}[5m]) + rate(redis_keyspace_misses_total{namespace="drova"}[5m]), 1)
            ) < 0.5
            and
            (rate(redis_keyspace_hits_total{namespace="drova"}[5m]) + rate(redis_keyspace_misses_total{namespace="drova"}[5m])) > 5
          for: 15m
          labels:
            severity: warning
            priority: P3
            component: drova-redis
            tenant: drova
          annotations:
            summary: "Drova Redis hit rate <50%"
            description: "Cache hit-rate degraded — review key strategy"

        - alert: DrovaRedisReplicationBroken
          expr: |
            redis_connected_slaves{namespace="drova"} < 1
            and on(pod) redis_instance_info{namespace="drova",role="master"}
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova-redis
            tenant: drova
          annotations:
            summary: "Drova Redis master {{ $labels.pod }} has no replica"
            description: "Master has 0 connected replicas — failover impossible"
