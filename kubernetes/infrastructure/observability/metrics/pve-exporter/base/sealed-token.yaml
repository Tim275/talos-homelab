# Placeholder — must be sealed with `kubeseal` after Proxmox API token is created.
# Generate with:
#   kubectl create secret generic pve-exporter-token \
#     --namespace=monitoring \
#     --from-literal=token_value="<TOKEN-FROM-PROXMOX>" \
#     --dry-run=client -o yaml | \
#   kubeseal --cert tofu/bootstrap/sealed-secrets/certificate/sealed-secrets.crt \
#     --format yaml --scope strict > sealed-token.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: pve-exporter-token
  namespace: monitoring
type: Opaque
stringData:
  token_value: "PLACEHOLDER_REPLACE_WITH_SEALED_SECRET"
