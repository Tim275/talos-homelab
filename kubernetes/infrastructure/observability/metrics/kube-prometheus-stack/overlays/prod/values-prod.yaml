# yamllint disable rule:line-length
# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
prometheus:
  prometheusSpec:
    externalLabels:
      cluster: prod-talos
      environment: prod
      region: homelab-de

    retention: 15d
    retentionSize: "45GB"

    # Resource limits — prevents Prometheus from being OOMKilled or starving the node.
    # Without limits the pod can land on a CPU-saturated node and fail liveness probes.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi

    # Extended startup probe for slow Ceph storage WAL loading
    # WAL loading takes ~2-3 min per segment on Ceph block storage
    # With 68 WAL segments, startup can take 1.5-2 hours
    startupProbe:
      enabled: true
      initialDelaySeconds: 60        # Wait 60s before first probe
      periodSeconds: 30              # Check every 30s
      timeoutSeconds: 10             # 10s timeout per probe
      failureThreshold: 300          # Allow 300 failures = 2.5+ hours startup time

    # Liveness/Readiness — explicit timeoutSeconds to tolerate Ceph I/O latency.
    # Default 3s caused "context deadline exceeded" on saturated nodes (52 restarts).
    livenessProbe:
      timeoutSeconds: 10
      periodSeconds: 30
      failureThreshold: 6
    readinessProbe:
      timeoutSeconds: 10
      periodSeconds: 10
      failureThreshold: 3

    # Prometheus 3.x: remote-write-receiver via enableFeatures is deprecated
    # Must use additionalArgs with --web.enable-remote-write-receiver
    additionalArgs:
      - name: web.enable-remote-write-receiver
        value: ""

    podMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    # nodeSelector:
    #   topology.kubernetes.io/zone: abel
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block-enterprise  # Use your correct storage class
          # volumeName: pv-prometheus  # Let Kubernetes auto-provision
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50G
          # selector:  # Remove specific PV selector, let Kubernetes handle it
          #   matchLabels:
          #     app: prometheus

# https://github.com/siderolabs/talos/discussions/7214
kubeControllerManager:
  enabled: true
  serviceMonitor:
    relabelings:
      - sourceLabels: [ __meta_kubernetes_pod_node_name ]
        separator: ;
        regex: ^(.*)$
        targetLabel: nodename
        replacement: $1
        action: replace
    metricRelabelings:
      - action: labeldrop
        regex: pod

kubeEtcd:
  enabled: true
  service:
    selector:
      # etcd doesn't run as a container,
      # but most probably runs on the same nodes that host a controller
      k8s-app: kube-controller-manager
  serviceMonitor:
    relabelings:
      - sourceLabels: [ __meta_kubernetes_pod_node_name ]
        separator: ;
        regex: ^(.*)$
        targetLabel: nodename
        replacement: $1
        action: replace
    metricRelabelings:
      - action: labeldrop
        regex: pod

kubeProxy:
  # Cilium replaces Kube Proxy
  enabled: false

kubeScheduler:
  enabled: true
  serviceMonitor:
    relabelings:
      - sourceLabels: [ __meta_kubernetes_pod_node_name ]
        separator: ;
        regex: ^(.*)$
        targetLabel: nodename
        replacement: $1
        action: replace
    metricRelabelings:
      - action: labeldrop
        regex: pod

nodeExporter:
  enabled: true

grafana:
  enabled: false
  forceDeployDatasources: false
  forceDeployDashboards: false
  defaultDashboardsEnabled: false
  defaultDashboardsTimezone: Europe/Berlin  # Fixed timezone for Germany
  operator:
    dashboardsConfigMapRefEnabled: true
    matchLabels:
      app: grafana
    folder: Kubernetes

defaultRules:
  create: true
  rules:
    alertmanager: true
    configReloaders: true
    general: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

    etcd: false
    k8s: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubelet: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    network: false
    node: false
    windows: false

prometheusOperator:
  admissionWebhooks:
    enabled: false  # Disable admission webhooks completely
    patch:
      enabled: false
    certManager:
      enabled: false
  # Disable TLS completely to avoid cert mount issues
  tls:
    enabled: false
  # Homelab Stability: Resource limits for Prometheus Operator
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m     # 10x burst for CRD operations
      memory: 1Gi    # 4x headroom for operator

# Homelab Stability: Resource limits for Kube State Metrics
kube-state-metrics:
  resources:
    requests:
      cpu: 50m       # Actual: ~7m CPU
      memory: 64Mi   # Actual: ~27Mi memory
    limits:
      cpu: 500m      # 10x burst for metrics collection
      memory: 512Mi  # ~20x headroom for cluster growth

  # Fix CrashLoopBackOff: Increase probe delays (was 5s, now 30s)
  # Root cause: kube-state-metrics needs time to start and expose health endpoints
  livenessProbe:
    initialDelaySeconds: 30  # Changed from default 5s to prevent premature probe failures
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 30  # Changed from default 5s to allow full startup
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

alertmanager:
  alertmanagerSpec:
    replicas: 3
    retention: 720h
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: rook-ceph-block-enterprise
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    secrets:
      - slack-webhook-url
      - watchdog-webhook-url
      - telegram-bot-token
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/slack-webhook-url/url

    templates:
      - '/etc/alertmanager/config/*.tmpl'

    # ROUTING TREE - Priority-based with severity fallback

    route:
      receiver: 'slack-default'
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:

        # Watchdog routed to 'null' until a real healthchecks.io URL is sealed
        # in watchdog-webhook-sealed.yaml. The placeholder URL (example.com)
        # caused 100% webhook delivery failures every 30s, which spammed
        # AlertmanagerFailedToSendAlerts → re-enable when real URL is set.
        - matchers:
            - alertname=~"Watchdog|InfoInhibitor"
          receiver: 'null'

        - matchers:
            - severity="critical"
            - priority=~"p0|P0"
          receiver: 'slack-critical'
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 30m
          continue: false

        # Major degradation, users actively impacted
        - matchers:
            - severity="critical"
          receiver: 'slack-critical'
          group_wait: 10s
          group_interval: 2m
          repeat_interval: 1h
          continue: false

        - matchers:
            - priority=~"p1|P1"
          receiver: 'slack-critical'
          group_wait: 15s
          group_interval: 3m
          repeat_interval: 1h
          continue: false

        # Partial issues, workaround available
        - matchers:
            - severity="warning"
          receiver: 'slack-default'
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 2h
          continue: false

        - matchers:
            - priority=~"p2|P2"
          receiver: 'slack-default'
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 2h
          continue: false

        # Minor issues, informational
        - matchers:
            - severity="info"
          receiver: 'slack-info'
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 12h
          continue: false

        - matchers:
            - priority=~"p3|P3|p4|P4"
          receiver: 'slack-info'
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 12h
          continue: false

    # INHIBITION RULES - Suppress lower priority when higher is firing
    # Based on: https://www.neteye-blog.com/2025/06/alertmanager-alert-filtering-rules/

    inhibit_rules:
      # Critical suppresses Warning for same alert
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname', 'namespace']

      # Critical suppresses Info
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="info"
        equal: ['alertname', 'namespace']

      # Warning suppresses Info
      - source_matchers:
          - severity="warning"
        target_matchers:
          - severity="info"
        equal: ['alertname', 'namespace']

      # P0 suppresses P1/P2/P3/P4
      - source_matchers:
          - priority=~"p0|P0"
        target_matchers:
          - priority=~"p1|P1|p2|P2|p3|P3|p4|P4"
        equal: ['job', 'namespace']

      # P1 suppresses P2/P3/P4
      - source_matchers:
          - priority=~"p1|P1"
        target_matchers:
          - priority=~"p2|P2|p3|P3|p4|P4"
        equal: ['job', 'namespace']

      # Node down suppresses all pod alerts on that node
      - source_matchers:
          - alertname="NodeDown"
        target_matchers:
          - alertname=~"Pod.*|Container.*|Kube.*"
        equal: ['node']

      # Cluster down suppresses node alerts
      - source_matchers:
          - alertname=~".*ClusterDown|.*ClusterUnhealthy"
        target_matchers:
          - alertname=~".*NodeDown|.*OSDDown"
        equal: ['cluster']

      # API Server down suppresses controller alerts
      - source_matchers:
          - alertname="KubeAPIServerDown"
        target_matchers:
          - alertname=~"KubeController.*|KubeScheduler.*|ArgoCD.*"

    receivers:

      - name: 'null'

      # Dead-man's-switch external receiver. The webhook URL must be a
      # healthchecks.io ping URL (or equivalent silent-alarm service). It must
      # be sealed because the URL itself is the secret. To set up:
      #   1. Create a check at https://healthchecks.io/ with period=1m, grace=2m
      #   2. Copy the ping URL (looks like https://hc-ping.com/<uuid>)
      #   3. Update the watchdog-webhook-sealed.yaml in this overlay
      #   4. Configure healthchecks.io to email/SMS you when silent for >2m
      - name: 'watchdog-heartbeat'
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/watchdog-webhook-url/url
            send_resolved: false
            max_alerts: 1

      - name: 'slack-critical'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.body" . }}'
            color: '{{ template "slack.color" . }}'
            actions: &critical-actions
              - type: button
                text: 'Runbook :book:'
                url: '{{ if (index .Alerts 0).Annotations.runbook_url }}{{ (index .Alerts 0).Annotations.runbook_url }}{{ else }}https://github.com/Tim275/talos-homelab/tree/main/docs/runbooks{{ end }}'
              - type: button
                text: 'Dashboard :bar_chart:'
                url: '{{ if (index .Alerts 0).Annotations.dashboard_url }}{{ (index .Alerts 0).Annotations.dashboard_url }}{{ else }}https://grafana.timourhomelab.org{{ end }}'
              - type: button
                text: 'Query :mag:'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: 'Silence 2h :no_bell:'
                url: '{{ template "slack.silenceURL" . }}'
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/telegram-bot-token/token
            chat_id: 8449184586
            parse_mode: ""
            send_resolved: true
            message: '{{ template "telegram.body" . }}'

      - name: 'slack-default'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.body" . }}'
            color: '{{ template "slack.color" . }}'
            actions: *critical-actions
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/telegram-bot-token/token
            chat_id: 8449184586
            parse_mode: ""
            send_resolved: true
            message: '{{ template "telegram.body" . }}'

      - name: 'slack-info'
        slack_configs:
          - channel: '#alerts'
            send_resolved: false
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.body" . }}'
            color: '{{ template "slack.color" . }}'
            actions:
              - type: button
                text: 'Query :mag:'
                url: '{{ (index .Alerts 0).GeneratorURL }}'
              - type: button
                text: 'Silence 2h :no_bell:'
                url: '{{ template "slack.silenceURL" . }}'
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/telegram-bot-token/token
            chat_id: 8449184586
            parse_mode: ""
            send_resolved: false
            message: '{{ template "telegram.body" . }}'

  templateFiles:
    homelab.tmpl: |-
      {{ define "slack.icon" -}}
      {{ if eq .Status "resolved" }}:white_check_mark:
      {{- else if eq .CommonLabels.severity "critical" }}:rotating_light:
      {{- else if eq .CommonLabels.severity "warning" }}:warning:
      {{- else }}:information_source:
      {{- end -}}
      {{ end }}

      {{ define "slack.title" -}}
      [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ template "slack.icon" . }} {{ .CommonLabels.alertname }}
      {{- end }}

      {{ define "slack.color" -}}
      {{ if eq .Status "resolved" }}good
      {{- else if eq .CommonLabels.severity "critical" }}danger
      {{- else if eq .CommonLabels.severity "warning" }}warning
      {{- else }}#439FE0
      {{- end -}}
      {{ end }}

      {{ define "resource.slack" -}}
      {{ if .Labels.deployment }}*Resource:* `deployment/{{ .Labels.deployment }}`
      {{- else if .Labels.statefulset }}*Resource:* `statefulset/{{ .Labels.statefulset }}`
      {{- else if .Labels.daemonset }}*Resource:* `daemonset/{{ .Labels.daemonset }}`
      {{- else if .Labels.persistentvolumeclaim }}*Resource:* `pvc/{{ .Labels.persistentvolumeclaim }}`
      {{- else if and .Labels.pod (ne .Labels.job "kube-state-metrics") (ne .Labels.service "kube-state-metrics") }}*Resource:* `pod/{{ .Labels.pod }}`
      {{- else if .Labels.instance }}*Resource:* `instance/{{ .Labels.instance }}`
      {{- else if .Labels.node }}*Resource:* `node/{{ .Labels.node }}`
      {{- end -}}
      {{ end }}

      {{ define "resource.telegram" -}}
      {{ if .Labels.deployment }}<b>Resource:</b> <code>deployment/{{ .Labels.deployment }}</code>
      {{- else if .Labels.statefulset }}<b>Resource:</b> <code>statefulset/{{ .Labels.statefulset }}</code>
      {{- else if .Labels.daemonset }}<b>Resource:</b> <code>daemonset/{{ .Labels.daemonset }}</code>
      {{- else if .Labels.persistentvolumeclaim }}<b>Resource:</b> <code>pvc/{{ .Labels.persistentvolumeclaim }}</code>
      {{- else if and .Labels.pod (ne .Labels.job "kube-state-metrics") (ne .Labels.service "kube-state-metrics") }}<b>Resource:</b> <code>pod/{{ .Labels.pod }}</code>
      {{- else if .Labels.instance }}<b>Resource:</b> <code>instance/{{ .Labels.instance }}</code>
      {{- else if .Labels.node }}<b>Resource:</b> <code>node/{{ .Labels.node }}</code>
      {{- end -}}
      {{ end }}

      {{ define "slack.body" -}}
      {{ range .Alerts -}}
      *Severity:* `{{ .Labels.severity | toUpper }}`{{ if .Labels.priority }}  ·  *Priority:* `{{ .Labels.priority | toUpper }}`{{ end }}{{ if .Labels.component }}  ·  *Component:* `{{ .Labels.component }}`{{ end }}
      {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`  {{ end }}{{ template "resource.slack" . }}

      *Summary:* {{ .Annotations.summary }}
      {{ if .Annotations.description }}*Description:* {{ .Annotations.description }}
      {{ end }}{{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}
      {{ end }}{{ if .Annotations.action }}*Action:* {{ .Annotations.action }}
      {{ end }}
      {{ end -}}
      {{ end }}

      {{ define "telegram.body" -}}
      {{ if eq .Status "firing" }}🔥 [FIRING:{{ .Alerts.Firing | len }}]{{ else }}✅ [RESOLVED]{{ end }} {{ .CommonLabels.alertname }}

      {{ range $i, $a := .Alerts -}}
      {{- if lt $i 5 -}}
      ━━━━━━━━━━━━━━━━━━━━
      Severity: {{ .Labels.severity | toUpper }}{{ if .Labels.priority }} · Priority: {{ .Labels.priority | toUpper }}{{ end }}
      {{ if .Labels.namespace }}Namespace: {{ .Labels.namespace }}
      {{ end }}{{ template "resource.telegram" . }}
      Summary: {{ .Annotations.summary }}
      {{ if .Annotations.dashboard_url }}{{ .Annotations.dashboard_url }}{{ else }}https://grafana.timourhomelab.org{{ end }}
      {{ end -}}
      {{ end -}}
      {{ if gt (len .Alerts) 5 }}…and {{ sub (len .Alerts) 5 }} more (see Slack){{ end }}
      {{ end }}

      {{ define "slack.silenceURL" -}}
      {{ .ExternalURL }}/#/silences/new?filter=%7B
      {{- range $k, $v := .CommonLabels -}}
      {{- if ne $k "alertname" -}}
      {{ $k }}%3D%22{{ $v }}%22%2C
      {{- end -}}
      {{- end -}}
      alertname%3D%22{{ .CommonLabels.alertname }}%22%7D
      {{- end }}
