# kube-prometheus-stack für Staging Edge-Cluster
# Components: arm64-arch + short-retention (3d statt 30d) + single-replica
# values-pi.yaml: kleinere Resources + disabled HA Alertmanager (3→1)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - ../../base

components:
  - ../../../../../../components/arm64-arch
  - ../../../../../../components/short-retention
  - ../../../../../../components/single-replica

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    includeCRDs: true
    namespace: monitoring
    version: 85.0.3
    releaseName: kube-prometheus-stack
    valuesFile: ./values-staging.yaml
