apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: envoy-ratelimit
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - gateway
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-ratelimit
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
