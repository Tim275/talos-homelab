apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: n8n-prod
  namespace: monitoring
  annotations:
    argocd.argoproj.io/tracking-id: kube-prometheus-stack:monitoring.coreos.com/ServiceMonitor:monitoring/n8n-prod
  labels:
    argocd.argoproj.io/instance: kube-prometheus-stack
    release: kube-prometheus-stack
    app: n8n
    environment: prod
    team: platform
spec:
  # IMPORTANT: n8n exposes /metrics ONLY on the main process (not webhook/worker).
  # The "n8n" (main) Service has NO `component` label; webhook/worker Services do.
  # Excluding services with a `component` label avoids scraping webhook/worker pods
  # which return 404 on /metrics → triggers TargetDown alerts (battle-tested 2026-05-15).
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
    matchExpressions:
      - key: component
        operator: DoesNotExist
  namespaceSelector:
    matchNames:
      - n8n-prod
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
