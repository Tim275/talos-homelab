apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: redis-operator
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - redis-operator-system
  selector:
    matchLabels:
      name: redis-operator
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
