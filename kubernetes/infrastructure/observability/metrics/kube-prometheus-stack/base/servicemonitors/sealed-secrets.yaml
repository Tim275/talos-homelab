apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sealed-secrets
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - sealed-secrets
  selector:
    matchLabels:
      app.kubernetes.io/component: metrics
      app.kubernetes.io/name: sealed-secrets
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
