apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jaeger
  namespace: monitoring
  annotations:
    argocd.argoproj.io/tracking-id: kube-prometheus-stack:monitoring.coreos.com/ServiceMonitor:monitoring/jaeger
  labels:
    argocd.argoproj.io/instance: kube-prometheus-stack
    release: prometheus-operator
    app: jaeger
    team: platform
spec:
  namespaceSelector:
    matchNames:
      - jaeger
  # Jaeger v2 = OTel-Collector image (managed by opentelemetry-operator)
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger-collector
      app.kubernetes.io/managed-by: opentelemetry-operator
  endpoints:
    - port: monitoring     # Jaeger v2 own metrics on this port
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
