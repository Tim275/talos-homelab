apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: storage-csi
spec:
  groups:
    - name: csi-pvc-health
      interval: 1m
      rules:
        - alert: PVCPendingTooLong
          expr: |
            kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 5m
          labels:
            severity: warning
            component: storage
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} pending >5min"
            description: "Likely a stuck CSI provisioning operation. Check `kubectl describe pvc` for `already exists` errors."
            action: "kubectl exec -n rook-ceph deploy/rook-ceph-tools -- rados -p replicapool-enterprise rmomapkey csi.volumes.default csi.volume.<PVC-UID>"

        - alert: PVCPendingCritical
          expr: |
            kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 30m
          labels:
            severity: critical
            component: storage
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} pending >30min"
            description: "Workload {{ $labels.persistentvolumeclaim }} blocked from starting. Investigate stuck CSI lock or unhealthy Ceph."
            impact: "Pods waiting for this PVC cannot start"

        - alert: CSIProvisionerDown
          expr: |
            kube_deployment_status_replicas_available{deployment=~".*csi.ceph.com-ctrlplugin"} < 1
          for: 5m
          labels:
            severity: critical
            component: storage
          annotations:
            summary: "Ceph CSI provisioner {{ $labels.deployment }} has 0 available replicas"
            description: "PVC creation/deletion blocked cluster-wide while CSI provisioner is down."

        - alert: ReleasedPVsAccumulating
          expr: |
            count(kube_persistentvolume_status_phase{phase="Released"}) > 3
          for: 30m
          labels:
            severity: warning
            component: storage
          annotations:
            summary: "{{ $value }} Released PVs — CSI cleanup not keeping up"
            description: "Released PVs accumulate when CSI deletion gets stuck on operation locks. Hourly cleanup CronJob should handle it; if not, manual intervention needed."
            action: "kubectl get pv | awk '$5==\"Released\"' && check rook-ceph-tools omap keys"

        - alert: CephOSDFlapping
          expr: |
            changes(ceph_osd_up[10m]) > 2
          for: 5m
          labels:
            severity: warning
            component: storage
          annotations:
            summary: "Ceph OSD {{ $labels.ceph_daemon }} flapping (>2 state changes in 10min)"
            description: "OSD bouncing up/down — investigate disk health, network, or memory pressure."

    - name: p0.storage.pvc
      interval: 30s
      rules:
        - alert: PVCCriticallyFull
          expr: |
            (kubelet_volume_stats_available_bytes{job="kubelet"} / kubelet_volume_stats_capacity_bytes{job="kubelet"}) < 0.10
          for: 5m
          labels:
            severity: critical
            priority: P0
            component: storage
            pagerduty_severity: critical
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} has less than 10% free space. IMMEDIATE action required."
            impact: "HIGH - Application may fail, potential data loss"

        - alert: PVCPredictedFull
          expr: |
            predict_linear(kubelet_volume_stats_available_bytes{job="kubelet"}[1h], 4 * 3600) < 0
          for: 10m
          labels:
            severity: critical
            priority: P0
            component: storage
            pagerduty_severity: critical
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} will be full in <4 hours"
            description: "PVC {{ $labels.persistentvolumeclaim }} predicted to be full within 4 hours"
            impact: "HIGH - Proactive alert to prevent PVC full"

    - name: p1.storage.pvc
      interval: 60s
      rules:
        - alert: PVCWarningFull
          expr: (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.20
          for: 10m
          labels:
            severity: warning
            priority: P1
            component: storage
            pagerduty_severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} has less than 20% free"
            impact: "Will hit critical threshold soon"

    - name: p3.capacity.pvc
      interval: 300s
      rules:
        - alert: PVCWillFillIn7Days
          expr: predict_linear(kubelet_volume_stats_available_bytes[6h], 7 * 24 * 3600) < 0
          for: 1h
          labels:
            severity: info
            priority: P3
            component: capacity
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} will fill in <7 days"
            description: "PVC predicted to be full within a week based on growth trend"
            impact: "Plan to expand PVC or clean up data"
