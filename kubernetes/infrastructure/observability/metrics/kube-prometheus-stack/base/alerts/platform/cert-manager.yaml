apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-cert-manager
spec:
  groups:
    - name: cert-manager
      interval: 5m
      rules:
        - alert: CertExpiringIn7Days
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
          for: 1h
          labels:
            severity: critical
            component: platform
          annotations:
            summary: "TLS cert expires in <7d: {{ $labels.name }}"
            description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in {{ $value | humanizeDuration }}."

        - alert: CertExpiringIn30Days
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 30 * 24 * 3600
          for: 12h
          labels:
            severity: warning
            component: platform
          annotations:
            summary: "TLS cert expires in <30d: {{ $labels.name }}"

        - alert: CertManagerWebhookDown
          expr: up{job="cert-manager-webhook"} == 0
          for: 10m
          labels:
            severity: critical
            component: platform
          annotations:
            summary: "cert-manager webhook down — renewals blocked"

        - alert: CertManagerDown
          expr: up{job="cert-manager"} == 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            component: operator
            pagerduty_severity: warning
          annotations:
            summary: "Cert-Manager is down"
            description: "Cert-Manager controller unreachable for 5+ minutes"
            impact: "Certificate renewals blocked, new certificates cannot be issued"

        - alert: CertificateExpiringSoon
          expr: (cert_manager_certificate_expiration_timestamp_seconds - time()) / 86400 < 14
          for: 1h
          labels:
            severity: info
            priority: P2
            component: security
          annotations:
            summary: "Certificate {{ $labels.name }} expires in {{ $value }} days"
            description: "Certificate in {{ $labels.namespace }} expires soon"
            impact: "TLS certificate renewal needed"
