apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-operators
spec:
  groups:
    - name: operators
      interval: 5m
      rules:
        - alert: SealedSecretsControllerDown
          expr: up{job="sealed-secrets-controller"} == 0
          for: 10m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: "Sealed-Secrets controller down"
            description: "New SealedSecrets cannot be decrypted while controller is down."

        - alert: KyvernoAdmissionControllerDown
          expr: up{job=~"kyverno.*admission.*"} == 0
          for: 10m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: "Kyverno admission controller down"
            description: "Policy enforcement disabled. Resources can be created without validation."

    - name: p1.operators.warning
      interval: 60s
      rules:
        - alert: SealedSecretsOperatorDown
          expr: up{job="sealed-secrets"} == 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            component: operator
            pagerduty_severity: warning
          annotations:
            summary: "Sealed Secrets controller is down"
            description: "Sealed Secrets controller unreachable for 5+ minutes"
            impact: "Cannot decrypt SealedSecrets, new secret deployments will fail"

        - alert: CloudNativePGOperatorDown
          expr: up{job="cloudnative-pg-operator"} == 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            component: operator
            pagerduty_severity: warning
          annotations:
            summary: "CloudNative PG Operator is down"
            description: "CloudNative PG Operator unreachable for 5+ minutes"
            impact: "PostgreSQL cluster management blocked"


    - name: p2.operators.info
      interval: 120s
      rules:
        - alert: SealedSecretsControllerInfo
          expr: up{job="sealed-secrets"} == 0
          for: 10m
          labels:
            severity: info
            priority: P2
            component: security
          annotations:
            summary: "Sealed Secrets controller is down"
            description: "Cannot decrypt SealedSecrets"
            impact: "New secret deployments will fail"
