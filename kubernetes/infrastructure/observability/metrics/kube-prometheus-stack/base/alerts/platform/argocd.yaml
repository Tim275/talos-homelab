apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-argocd
spec:
  groups:
    - name: argocd
      interval: 1m
      rules:
        - alert: ArgoCDApplicationControllerDown
          expr: up{job="argocd-application-controller"} == 0
          for: 5m
          labels:
            severity: critical
            component: platform
          annotations:
            summary: "ArgoCD Application Controller down"
            description: "GitOps reconciliation halted. No deployments possible."

        - alert: ArgoCDAppOutOfSync
          expr: argocd_app_info{sync_status="OutOfSync"} == 1
          for: 1h
          labels:
            severity: warning
            component: platform
          annotations:
            summary: "ArgoCD app OutOfSync >1h: {{ $labels.name }}"
            description: "Application {{ $labels.name }} has been OutOfSync for >1h."

        - alert: ArgoCDAppUnhealthy
          expr: argocd_app_info{health_status=~"Degraded|Missing"} == 1
          for: 30m
          labels:
            severity: warning
            component: platform
          annotations:
            summary: "ArgoCD app unhealthy: {{ $labels.name }}"
            description: "Application {{ $labels.name }} health is {{ $labels.health_status }}."
