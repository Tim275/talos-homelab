apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-tracing
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: drova.tracing
      interval: 60s
      rules:
        - alert: DrovaServiceNoTraces
          # Only api-gateway is HTTP — it emits http_server_request_duration.
          # The 5 gRPC services (user/trip/driver/chat/payment) need rpc_server_duration
          # which requires otelgrpc.NewServerHandler() (Task #134, not yet implemented).
          # Re-add those services once Task #134 is done.
          expr: absent(http_server_request_duration_seconds_count{service_name="api-gateway"})
          for: 30m
          labels:
            severity: warning
            priority: P2
            component: tracing
            tenant: drova
          annotations:
            summary: "Drova api-gateway missing OTel HTTP metrics"
            description: "api-gateway emits no http_server_request_duration metrics for 30m. Check OTEL_COLLECTOR_ENDPOINT env + SDK init."
            action: "Check OTEL_COLLECTOR_ENDPOINT env + SDK init in api-gateway main.go"
            dashboard_url: "https://jaeger.drova.timourhomelab.org"

        - alert: DrovaTraceVolumeDropped
          expr: |
            (
              sum by (service_name) (rate(http_server_request_duration_seconds_count[5m]))
                <
              sum by (service_name) (rate(http_server_request_duration_seconds_count[1h] offset 1h)) * 0.2
            ) and on (service_name) (
              sum by (service_name) (rate(http_server_request_duration_seconds_count[1h] offset 1h)) > 0.1
            )
          for: 15m
          labels:
            severity: warning
            priority: P3
            component: tracing
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }}: trace-volume dropped >80% vs 1h ago"
            description: "Service emits dramatically fewer spans than usual — possible OTel-exporter issue or service-traffic-drop."

    - name: tracing.pipeline
      interval: 60s
      rules:
        - alert: OtelCollectorExportFailing
          expr: rate(otelcol_exporter_send_failed_spans_total[5m]) > 0
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: tracing
          annotations:
            summary: "OTel-Collector failing to export spans"
            description: "Spans are being dropped — backend (Jaeger/Tempo) unreachable or rate-limited."

        - alert: OtelCollectorQueueFull
          expr: |
            otelcol_exporter_queue_size / otelcol_exporter_queue_capacity > 0.8
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: tracing
          annotations:
            summary: "OTel-Collector queue >80% full"
            description: "Backend slow or down — spans will be dropped soon if queue overflows."
