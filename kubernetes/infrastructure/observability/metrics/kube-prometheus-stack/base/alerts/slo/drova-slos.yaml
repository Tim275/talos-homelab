apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-drova
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # Drova SLO — single SLO for the user-facing path: api-gateway
    # Target: 99.5% availability over 30d (Error budget: 3.6h/Monat)
    # Source: Google SRE Workbook §5 (Alerting on SLOs)
    # Two burn-rate windows: fast (page) + slow (page) — solo-engineer scope.
    #
    # Note: `or vector(1)` defaults availability to 1.0 when no traffic
    # (avoids 0/0=NaN and prevents false-positive burn-rate alerts at idle).
    - name: drova.slo.recording
      interval: 30s
      rules:
        - record: slo:drova_api_gateway_availability:ratio_rate5m
          expr: |
            (
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway",http_response_status_code!~"5.."}[5m]))
              /
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway"}[5m]))
            ) or vector(1)

        - record: slo:drova_api_gateway_availability:ratio_rate30m
          expr: |
            (
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway",http_response_status_code!~"5.."}[30m]))
              /
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway"}[30m]))
            ) or vector(1)

        - record: slo:drova_api_gateway_availability:ratio_rate1h
          expr: |
            (
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway",http_response_status_code!~"5.."}[1h]))
              /
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway"}[1h]))
            ) or vector(1)

        - record: slo:drova_api_gateway_availability:ratio_rate6h
          expr: |
            (
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway",http_response_status_code!~"5.."}[6h]))
              /
              sum(rate(http_server_request_duration_seconds_count{service_name="api-gateway"}[6h]))
            ) or vector(1)

    - name: drova.slo.alerts
      interval: 1m
      rules:
        # Fast burn — 14.4× burn rate exhausts 30d budget in ~2 days
        - alert: DrovaAPIGatewayBurnRateFast
          expr: |
            (1 - slo:drova_api_gateway_availability:ratio_rate5m) > (14.4 * (1 - 0.995))
            and
            (1 - slo:drova_api_gateway_availability:ratio_rate1h) > (14.4 * (1 - 0.995))
          for: 2m
          labels:
            severity: critical
            priority: P1
            tenant: drova
            slo: api-gateway-availability
          annotations:
            summary: "Drova api-gateway: SLO fast burn (14.4× — 2d to budget exhaustion)"
            description: "Error rate exceeds 7.2% (14.4 × 0.5%) on both 5m AND 1h windows."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-slo"

        # Slow burn — 6× burn rate exhausts 30d budget in ~5 days
        - alert: DrovaAPIGatewayBurnRateSlow
          expr: |
            (1 - slo:drova_api_gateway_availability:ratio_rate30m) > (6 * (1 - 0.995))
            and
            (1 - slo:drova_api_gateway_availability:ratio_rate6h) > (6 * (1 - 0.995))
          for: 15m
          labels:
            severity: critical
            priority: P1
            tenant: drova
            slo: api-gateway-availability
          annotations:
            summary: "Drova api-gateway: SLO slow burn (6× — 5d to budget exhaustion)"
            description: "Sustained error rate >3% on both 30m AND 6h windows."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-slo"
