apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernetes-workloads
spec:
  groups:
    - name: kubernetes-workloads
      interval: 1m
      rules:
        - alert: PodCrashLooping
          expr: |
            max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) == 1
          for: 5m
          labels:
            severity: warning
            priority: P1
            component: application
            pagerduty_severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} in CrashLoopBackOff state for >5min"
            impact: "Service degradation"

        - alert: PodPendingTooLong
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 10m
          labels:
            severity: warning
            component: kubernetes
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} pending >10min"
            description: "Likely scheduling failure or PVC unbound."

        - alert: ContainerOOMKilled
          expr: increase(kube_pod_container_status_terminated_reason{reason="OOMKilled"}[15m]) > 0
          labels:
            severity: warning
            component: kubernetes
          annotations:
            summary: "OOM kill: {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
            description: "Container OOM-killed in last 15min."

        - alert: PodNotReady
          expr: kube_pod_status_phase{phase!~"Running|Succeeded"} == 1
          for: 15m
          labels:
            severity: warning
            priority: P1
            component: application
            pagerduty_severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod in phase {{ $labels.phase }} for 15+ minutes"
            impact: "Service degradation"

        - alert: PodOOMKilled
          expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 1m
          labels:
            severity: warning
            priority: P1
            component: application
            pagerduty_severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
            description: "Container {{ $labels.container }} killed due to out of memory"
            impact: "Insufficient memory limits"

    - name: p3.performance.info
      interval: 300s
      rules:
        - alert: HighPodRestartRate
          expr: rate(kube_pod_container_status_restarts_total[1h]) > 0.5
          for: 4h
          labels:
            severity: info
            priority: P3
            component: performance
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"
            description: "Pod restarting {{ $value }} times per hour"
            impact: "Investigate application stability"
