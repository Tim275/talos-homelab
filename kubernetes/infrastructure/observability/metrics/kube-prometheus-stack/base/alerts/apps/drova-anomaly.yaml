apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apps-drova-anomaly
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ─────────────────────────────────────────────────────────────────────
    # Drova anomaly detection via Holt-Winters smoothing
    #
    # Idea: compute an exponentially-smoothed forecast of each SLI signal
    # over a 1h window, then alert when the *actual* current rate deviates
    # by more than 3 standard deviations from the forecast for 10min.
    #
    # holt_winters(metric[range], sf, tf):
    #   sf (smoothing factor)  0.0 = no smoothing, 1.0 = ignore old data → 0.5 balanced
    #   tf (trend factor)      0.0 = ignore trend, 1.0 = full trend → 0.1 mild trend
    #
    # The 3-sigma threshold catches real anomalies (gradual degradation,
    # traffic surges) that fixed thresholds miss. False-positive rate at
    # 3-sigma is ~0.27% under normal Gaussian distribution.
    #
    # `or vector(0)` defaults all forecasts/stddevs to 0 at idle so alerts
    # don't fire on missing data (stddev_over_time of empty range = NaN).
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.anomaly.recording.http
      interval: 1m
      rules:
        # Per-service request rate forecast + stddev
        - record: anomaly:drova_http_rate:forecast
          expr: |
            (
              holt_winters(
                sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"chat-service|user-service"}[5m]))[1h:5m],
                0.5,
                0.1
              )
            ) or vector(0)

        - record: anomaly:drova_http_rate:stddev
          expr: |
            (
              stddev_over_time(
                sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"chat-service|user-service"}[5m]))[1h:5m]
              )
            ) or vector(0)

        # Per-service p99 latency forecast + stddev
        - record: anomaly:drova_http_p99:forecast
          expr: |
            (
              holt_winters(
                histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"chat-service|user-service"}[5m])))[1h:5m],
                0.5,
                0.1
              )
            ) or vector(0)

        - record: anomaly:drova_http_p99:stddev
          expr: |
            (
              stddev_over_time(
                histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"chat-service|user-service"}[5m])))[1h:5m]
              )
            ) or vector(0)

    - name: drova.anomaly.recording.grpc
      interval: 1m
      rules:
        - record: anomaly:drova_grpc_rate:forecast
          expr: |
            (
              holt_winters(
                sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[5m]))[1h:5m],
                0.5,
                0.1
              )
            ) or vector(0)

        - record: anomaly:drova_grpc_rate:stddev
          expr: |
            (
              stddev_over_time(
                sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[5m]))[1h:5m]
              )
            ) or vector(0)

    - name: drova.anomaly.alerts
      interval: 1m
      rules:
        - alert: DrovaHttpRateAnomaly
          expr: |
            abs(
              sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"chat-service|user-service"}[5m]))
              -
              anomaly:drova_http_rate:forecast
            )
            >
            (3 * anomaly:drova_http_rate:stddev > 0.1)
          for: 10m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            kind: anomaly
          annotations:
            summary: "Drova {{ $labels.service_name }}: HTTP rate >3σ from forecast"
            description: "Current rate {{ $value | printf \"%.2f\" }} req/s deviates >3 standard deviations from the 1h Holt-Winters forecast."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaHttpP99Anomaly
          expr: |
            abs(
              histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"chat-service|user-service"}[5m])))
              -
              anomaly:drova_http_p99:forecast
            )
            >
            (3 * anomaly:drova_http_p99:stddev > 0.05)
          for: 10m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            kind: anomaly
          annotations:
            summary: "Drova {{ $labels.service_name }}: HTTP p99 latency >3σ from forecast"
            description: "Current p99 {{ $value | printf \"%.2f\" }}s deviates >3 standard deviations from the 1h Holt-Winters forecast."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaGrpcRateAnomaly
          expr: |
            abs(
              sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[5m]))
              -
              anomaly:drova_grpc_rate:forecast
            )
            >
            (3 * anomaly:drova_grpc_rate:stddev > 0.1)
          for: 10m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            kind: anomaly
          annotations:
            summary: "Drova {{ $labels.service_name }}: gRPC rate >3σ from forecast"
            description: "Current rate {{ $value | printf \"%.2f\" }} req/s deviates >3 standard deviations from the 1h Holt-Winters forecast."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"
