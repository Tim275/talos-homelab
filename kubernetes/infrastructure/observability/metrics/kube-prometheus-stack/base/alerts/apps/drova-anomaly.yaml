apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apps-drova-anomaly
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ─────────────────────────────────────────────────────────────────────
    # Drova anomaly detection via z-score (avg + stddev) over 1h baseline
    #
    # Idea: compute the 1h rolling baseline (avg + stddev) of each SLI signal,
    # alert when the *current* value deviates by more than 3 standard
    # deviations. Catches gradual degradation, traffic surges, and silent
    # drift that fixed thresholds miss.
    #
    # Why z-score and not Holt-Winters: Prometheus 3.x removed holt_winters,
    # and its replacement double_exponential_smoothing requires the
    # promql-experimental-functions feature flag. z-score uses standard
    # PromQL functions and gives equivalent quality on stationary signals.
    #
    # 3-sigma threshold = ~0.27% false-positive rate under Gaussian noise.
    # `or vector(0)` defaults all baselines to 0 at idle so alerts don't
    # fire on missing data (stddev_over_time of empty range = NaN).
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.anomaly.recording.http
      interval: 1m
      rules:
        - record: anomaly:drova_http_rate:avg1h
          expr: |
            (
              avg_over_time(
                sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"chat-service|user-service"}[5m]))[1h:1m]
              )
            ) or vector(0)

        - record: anomaly:drova_http_rate:stddev1h
          expr: |
            (
              stddev_over_time(
                sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"chat-service|user-service"}[5m]))[1h:1m]
              )
            ) or vector(0)

        - record: anomaly:drova_http_p99:avg1h
          expr: |
            (
              avg_over_time(
                histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"chat-service|user-service"}[5m])))[1h:1m]
              )
            ) or vector(0)

        - record: anomaly:drova_http_p99:stddev1h
          expr: |
            (
              stddev_over_time(
                histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"chat-service|user-service"}[5m])))[1h:1m]
              )
            ) or vector(0)

    - name: drova.anomaly.recording.grpc
      interval: 1m
      rules:
        - record: anomaly:drova_grpc_rate:avg1h
          expr: |
            (
              avg_over_time(
                sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[5m]))[1h:1m]
              )
            ) or vector(0)

        - record: anomaly:drova_grpc_rate:stddev1h
          expr: |
            (
              stddev_over_time(
                sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[5m]))[1h:1m]
              )
            ) or vector(0)

    - name: drova.anomaly.alerts
      interval: 1m
      rules:
        # Alert when |current - avg| > 3 * stddev AND stddev > minimum-noise
        # threshold (avoids firing on numerically-tiny noise during idle).
        - alert: DrovaHttpRateAnomaly
          expr: |
            abs(
              sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"chat-service|user-service"}[5m]))
              -
              anomaly:drova_http_rate:avg1h
            )
            > (3 * anomaly:drova_http_rate:stddev1h)
            and
            anomaly:drova_http_rate:stddev1h > 0.1
          for: 10m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            kind: anomaly
          annotations:
            summary: "Drova {{ $labels.service_name }}: HTTP rate >3σ from 1h baseline"
            description: "Current rate {{ $value | printf \"%.2f\" }} req/s deviates >3σ from baseline (avg: {{ with query \"anomaly:drova_http_rate:avg1h\" }}{{ . | first | value | printf \"%.2f\" }}{{ end }})."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaHttpP99Anomaly
          expr: |
            abs(
              histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"chat-service|user-service"}[5m])))
              -
              anomaly:drova_http_p99:avg1h
            )
            > (3 * anomaly:drova_http_p99:stddev1h)
            and
            anomaly:drova_http_p99:stddev1h > 0.05
          for: 10m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            kind: anomaly
          annotations:
            summary: "Drova {{ $labels.service_name }}: HTTP p99 latency >3σ from 1h baseline"
            description: "Current p99 {{ $value | printf \"%.2f\" }}s deviates >3σ from the 1h baseline."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaGrpcRateAnomaly
          expr: |
            abs(
              sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[5m]))
              -
              anomaly:drova_grpc_rate:avg1h
            )
            > (3 * anomaly:drova_grpc_rate:stddev1h)
            and
            anomaly:drova_grpc_rate:stddev1h > 0.1
          for: 10m
          labels:
            severity: warning
            priority: P2
            tenant: drova
            kind: anomaly
          annotations:
            summary: "Drova {{ $labels.service_name }}: gRPC rate >3σ from 1h baseline"
            description: "Current rate {{ $value | printf \"%.2f\" }} req/s deviates >3σ from baseline."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"
