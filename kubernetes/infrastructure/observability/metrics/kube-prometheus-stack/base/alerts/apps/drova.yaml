apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apps-drova
spec:
  groups:
    # NOTE: drova-http group merged into drova.http (lower in this file) to remove
    # duplicate Error+Latency-alerts. Single-source-of-truth for HTTP RED-method.

    - name: drova-grpc
      interval: 30s
      rules:
        - alert: DrovaGrpcErrorRateHigh
          expr: |
            (
              sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service",rpc_grpc_status_code!="0"}[5m]))
              /
              sum by (service_name) (rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            component: apps
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }}: gRPC error rate >5%"
            description: "gRPC errors {{ $value | humanizePercentage }} for service {{ $labels.service_name }}."

        # NEW: gRPC P99-Latency for trip/driver-service inter-service calls
        - alert: DrovaGrpcP99LatencyHigh
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (rate(rpc_server_call_duration_seconds_bucket{service_name=~"trip-service|driver-service"}[5m]))
            ) > 1
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: apps
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} gRPC p99 >1s"
            description: "gRPC p99 latency {{ $value }}s for {{ $labels.service_name }}. Inter-service slow."
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaGrpcP99LatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (rate(rpc_server_call_duration_seconds_bucket{service_name=~"trip-service|driver-service"}[5m]))
            ) > 5
          for: 5m
          labels:
            severity: critical
            priority: P1
            component: apps
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} gRPC p99 >5s — CRITICAL"
            description: "Severe inter-service slowness: {{ $labels.service_name }} p99 = {{ $value }}s"

    # ─────────────────────────────────────────────────────────────────────
    # KAFKA INTEGRATION — Detect "Not Leader For Partition" loops
    # ─────────────────────────────────────────────────────────────────────
    - name: drova-kafka-integration
      interval: 1m
      rules:
        # Detect Kafka-Consumer stuck (zero messages consumed despite active topic)
        - alert: DrovaKafkaConsumerStuck
          expr: |
            sum by (consumergroup, topic) (
              kafka_consumergroup_lag{consumergroup=~"payment-service-.*|trip-service-.*|driver-service-.*|chat-service-.*"}
            ) > 100
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: apps
            tenant: drova
          annotations:
            summary: "Drova consumer-group {{ $labels.consumergroup }} lag >100 on {{ $labels.topic }}"
            description: "Consumer cannot keep up OR is stuck (e.g. NotLeaderForPartition loop). Lag={{ $value }}."
            action: "kubectl logs -n drova deploy/<service> | grep -i kafka  # check for 'Not Leader' loop"

        # Detect Kafka-Consumer with NO consumption (suggests Not Leader / broken)
        - alert: DrovaKafkaConsumerNoActivity
          expr: |
            sum by (consumergroup, topic) (rate(kafka_consumergroup_current_offset{consumergroup=~"payment-.*|trip-.*|driver-.*"}[15m])) == 0
            and on (consumergroup, topic) sum by (consumergroup, topic) (kafka_topic_partitions{topic=~"payment.*|trip.*|driver.*"}) > 0
          for: 30m
          labels:
            severity: critical
            priority: P1
            component: apps
            tenant: drova
          annotations:
            summary: "Drova consumer {{ $labels.consumergroup }} consumed 0 messages from {{ $labels.topic }} in 30min"
            description: "Either no traffic OR consumer is broken (e.g. Not-Leader-For-Partition stuck loop). Check pod logs."

    # ─────────────────────────────────────────────────────────────────────
    # OTel SILENT-BROKEN DETECTION — Service emits 0 spans = broken instrumentation
    # ─────────────────────────────────────────────────────────────────────
    - name: drova-tracing-health
      interval: 5m
      rules:
        - alert: DrovaServiceNoSpansEmitted
          expr: |
            (
              sum by (service_name) (
                rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|user-service|chat-service"}[15m])
              ) == 0
            )
            or
            (
              sum by (service_name) (
                rate(rpc_server_call_duration_seconds_count{service_name=~"trip-service|driver-service"}[15m])
              ) == 0
            )
          for: 30m
          labels:
            severity: warning
            priority: P3
            component: apps
            tenant: drova
            kind: silent-broken
          annotations:
            summary: "Drova {{ $labels.service_name }} emitted 0 spans in 15min"
            description: "Service might be: (a) idle, (b) tracer init failed, (c) network blocking OTel-Collector. Verify via Jaeger UI."
            action: "kubectl logs -n drova deploy/{{ $labels.service_name }} | grep -i 'tracer\\|otel'"

    - name: drova-availability
      interval: 1m
      rules:
        - alert: DrovaServiceDown
          expr: |
            kube_deployment_status_replicas_available{namespace="drova",deployment=~"api-gateway|user-service|trip-service|driver-service|chat-service|payment-service"} == 0
          for: 2m
          labels:
            severity: critical
            component: apps
            tenant: drova
          annotations:
            summary: "Drova service down: {{ $labels.deployment }}"
            description: "0 ready replicas for {{ $labels.deployment }} >2min."

    # ─────────────────────────────────────────────────────────────────────
    # PODS / DEPLOYMENTS — Resource layer
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.pods
      interval: 60s
      rules:
        - alert: DrovaPodNotReady
          expr: |
            kube_pod_status_ready{namespace="drova", condition="true"} == 0
            unless on (namespace, pod)
            kube_pod_status_phase{namespace="drova", phase=~"Succeeded|Failed"} == 1
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova pod {{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} not ready for >2min"
            impact: "Reduced capacity"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-overview"

        - alert: DrovaPodCrashLooping
          # Filter: NUR Drova-Microservices (nicht postgres/kafka/redis-Pods im selben NS)
          expr: rate(kube_pod_container_status_restarts_total{namespace="drova",container=~"api-gateway|user-service|trip-service|driver-service|chat-service|payment-service"}[5m]) * 60 > 0.5
          for: 5m
          labels:
            severity: critical
            priority: P1
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.container }} crash-looping"
            description: "Container {{ $labels.container }} in {{ $labels.pod }} restarting >0.5/min"
            impact: "Service instability"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.container }}"

        - alert: DrovaDeploymentUnavailable
          expr: kube_deployment_status_replicas_unavailable{namespace="drova"} > 0
          for: 3m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.deployment }} has unavailable replicas"
            description: "{{ $value }} replicas unavailable >3min"

        - alert: DrovaPodMemoryPressure
          expr: |
            (
              container_memory_working_set_bytes{namespace="drova",container!=""}
              /
              kube_pod_container_resource_limits{namespace="drova",resource="memory"}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.pod }} memory >90% of limit"
            description: "OOMKill risk — memory at {{ $value | humanizePercentage }} of limit"

        - alert: DrovaPodCPUThrottling
          expr: rate(container_cpu_cfs_throttled_periods_total{namespace="drova",container!=""}[5m]) / rate(container_cpu_cfs_periods_total{namespace="drova",container!=""}[5m]) > 0.5
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.pod }} CPU throttled >50%"
            description: "Container is being CPU-throttled — increase limits or scale horizontally"

    # ─────────────────────────────────────────────────────────────────────
    # HTTP — RED method per service (uses service_name, NOT job)
    # ─────────────────────────────────────────────────────────────────────
    - name: drova.http
      interval: 30s
      rules:
        # NOTE: DrovaServiceDown moved to drova-availability group above.
        # The old definition fired permanently for api-gateway because that service
        # only emits http_server_request_body_size_bytes (no duration histogram), so
        # the absent()/==0 logic incorrectly flagged the service as down. The new
        # definition uses kube_deployment_status_replicas_available which is the
        # correct signal for "is the service running".

        - alert: DrovaHighErrorRate
          expr: |
            100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service",http_response_status_code=~"5.."}[5m]))
            /
            clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[5m])), 0.001)
            > 5
          for: 3m
          labels:
            severity: critical
            priority: P1
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} 5xx rate >5% ({{ $value | humanize }}%)"
            description: "Sustained 5xx errors above 5% threshold"
            impact: "Users experiencing errors"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaHighErrorRateWarning
          expr: |
            100 * sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service",http_response_status_code=~"5.."}[5m]))
            /
            clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[5m])), 0.001)
            > 1
          for: 5m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} 5xx rate >1%"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaP99LatencyCritical
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"api-gateway|chat-service|user-service"}[5m]))
            ) > 2
          for: 5m
          labels:
            severity: critical
            priority: P1
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} p99 latency >2s ({{ $value | humanizeDuration }})"
            description: "Severe latency degradation"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

        - alert: DrovaP99LatencyWarning
          expr: |
            histogram_quantile(0.99,
              sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket{service_name=~"api-gateway|chat-service|user-service"}[5m]))
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} p99 >500ms"
            dashboard_url: "https://grafana.timourhomelab.org/d/drova-service-detail?var-service={{ $labels.service_name }}"

    # ─────────────────────────────────────────────────────────────────────
    # PAYMENT-SERVICE — Kafka-Worker (no HTTP) → custom-coverage
    # ─────────────────────────────────────────────────────────────────────
    - name: drova-payment-service
      interval: 1m
      rules:
        # payment-service should ALWAYS be consuming from payment.* topics
        # 0 consumption for >15min = stuck-loop OR upstream-broken
        - alert: DrovaPaymentServiceConsumerStalled
          expr: |
            sum by (consumergroup) (rate(kafka_consumergroup_current_offset{consumergroup=~"payment-service.*"}[15m])) == 0
          for: 15m
          labels:
            severity: critical
            priority: P1
            component: apps
            tenant: drova
            service: payment-service
          annotations:
            summary: "payment-service Kafka-Consumer 0 progress in 15min"
            description: "Either no payment-events upstream OR consumer broken (Not-Leader-loop). Pod-Logs prüfen."
            action: "kubectl logs -n drova deploy/payment-service --tail=50 | grep -iE 'kafka|leader|partition'"

        # payment-service Pod absent (Deployment scaled to 0 OR all crashed)
        - alert: DrovaPaymentServiceAbsent
          expr: |
            absent(kube_deployment_status_replicas_available{namespace="drova",deployment="payment-service"})
            or
            kube_deployment_status_replicas_available{namespace="drova",deployment="payment-service"} == 0
          for: 5m
          labels:
            severity: critical
            priority: P0
            component: apps
            tenant: drova
            service: payment-service
          annotations:
            summary: "payment-service Deployment absent OR 0 replicas ready"
            description: "Money-Pipeline DOWN. Customer-payments cannot be processed."

        # payment-service span-emission stop = OTel-broken or pod dead
        - alert: DrovaPaymentServiceNoSpans
          expr: |
            sum(rate(traces_spanmetrics_calls_total{service_name="payment-service"}[15m])) == 0
            unless on() (kube_deployment_status_replicas_available{namespace="drova",deployment="payment-service"} == 0)
          for: 30m
          labels:
            severity: warning
            priority: P2
            component: apps
            tenant: drova
            service: payment-service
            kind: silent-broken
          annotations:
            summary: "payment-service emitted 0 traces in 30min (Pod is up)"
            description: "OTel-tracer initialization may have failed. Verify via Jaeger UI."

        - alert: DrovaTrafficDropped
          expr: |
            (
              sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[5m]))
              <
              sum by (service_name) (rate(http_server_request_duration_seconds_count{service_name=~"api-gateway|chat-service|user-service"}[1h] offset 1h)) * 0.3
            )
          for: 10m
          labels:
            severity: warning
            priority: P2
            component: drova
            tenant: drova
          annotations:
            summary: "Drova {{ $labels.service_name }} traffic dropped >70% vs 1h ago"
            description: "Anomalous traffic drop — possibly client-side issue or upstream outage"
