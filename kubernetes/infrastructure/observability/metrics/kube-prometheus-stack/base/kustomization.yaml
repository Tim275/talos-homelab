apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - alerts
  # Platform / GitOps
  - servicemonitors/argo-rollouts.yaml
  - servicemonitors/argocd.yaml
  - servicemonitors/cert-manager.yaml
  - servicemonitors/global-prometheus.yaml
  # Network / Gateway
  - servicemonitors/envoy-gateway.yaml
  # Storage
  # NOTE: rook-ceph + rook-ceph-exporter SMs are shipped by the rook-ceph Helm chart
  # itself (in rook-ceph ns). Don't duplicate them here.
  - servicemonitors/velero.yaml
  # Data — Postgres / CNPG
  - servicemonitors/cnpg-clusters.yaml
  - servicemonitors/cnpg-operator.yaml
  # Data — Kafka / Schema Registry
  - servicemonitors/kafka-brokers.yaml
  - servicemonitors/kafka-exporter.yaml
  - servicemonitors/strimzi-operator.yaml
  - servicemonitors/schema-registry.yaml
  # Data — Redis / TSDB
  - servicemonitors/redis-operator.yaml
  - servicemonitors/influxdb.yaml
  # Logging — Elasticsearch / Vector / Loki
  - servicemonitors/elasticsearch.yaml
  - servicemonitors/elasticsearch-cluster.yaml
  - servicemonitors/elasticsearch-exporter.yaml
  - servicemonitors/loki.yaml
  - servicemonitors/vector.yaml
  # Tracing
  - servicemonitors/jaeger.yaml
  - servicemonitors/opentelemetry-collector.yaml
  # Observability self-monitoring
  - servicemonitors/grafana.yaml
  - servicemonitors/grafana-operator.yaml
  # Security
  - servicemonitors/kyverno.yaml
  # Apps
  - servicemonitors/n8n.yaml
