apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: monitoring-stack
    tier: observability
    release: kube-prometheus-stack   # required for Prometheus-Operator serviceMonitorSelector
spec:
  namespaceSelector:
    matchNames:
      - jaeger
  # Jaeger v2 = OTel-Collector image, labels match what the OTel-Operator generates
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger-collector
      app.kubernetes.io/managed-by: opentelemetry-operator
  endpoints:
    - port: monitoring     # was: admin-http — Jaeger v2 OTel-collector exposes own metrics on this
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
