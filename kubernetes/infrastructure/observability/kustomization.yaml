apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # METRICS
  # kube-prometheus-stack: now managed via ApplicationSet at kubernetes/applicationsets/observability-set.yaml
  - metrics/metrics-server/application.yaml
  - metrics/blackbox-exporter/application.yaml
  - metrics/pve-exporter/application.yaml
  # - metrics/victoriametrics/    # DISABLED: no application.yaml yet
  # - metrics/opencost.disabled/  # DISABLED: cost analysis (optional)

  # LOGS
  - logs/loki/application.yaml
  # TODO ES re-enable: ES Cluster aktuell broken (siehe TODO_ES_REENABLE.md).
  # ES + Kibana + Jaeger ausgeklammert bis dedicated-user-pattern für
  # alle Consumer (vector, otel, grafana) implementiert ist. Tempo+Loki
  # decken Traces+Logs derweil ab.
  # - logs/elasticsearch/application.yaml
  # - logs/kibana/application.yaml
  - logs/vector/application.yaml
  # - logs/fluent-bit/            # DISABLED: alternative log collector
  # - logs/fluentd/               # DISABLED: alternative log aggregator

  # TRACES
  - traces/tempo/application.yaml
  # - traces/jaeger/application.yaml  # DISABLED: depends on ES storage (re-enable with ES)
  - traces/opentelemetry/application.yaml

  # ALERTING
  - alerting/alerts/application.yaml
  # - alerting/keep/application.yaml     # DISABLED
  # - alerting/robusta/application.yaml  # DISABLED: alert enrichment
  # - alerting/ai-alert-enrichment/      # DISABLED: AI enrichment

  # DASHBOARDS
  - dashboards/grafana/application.yaml
  - dashboards/hubble/application.yaml
  - dashboards/configs/application.yaml
  # - dashboards/kiali/application.yaml  # DISABLED: Istio removed
  # - dashboards/simple/                 # DISABLED: simple dashboards

labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: timour-homelab
      app.kubernetes.io/domain: observability
      app.kubernetes.io/layer: infrastructure
      team: timour

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"

