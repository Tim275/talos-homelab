# ECK roles file for least-privilege ES users.
# Referenced from Elasticsearch CR auth.roles[].secretName.
#
# jaeger_writer:
#   - cluster: monitor (read cluster state — needed for client bootstrapping)
#   - indices jaeger-*: all permissions (write traces, manage indices)
#   - indices .ds-jaeger-*: all (data-stream indices)
apiVersion: v1
kind: Secret
metadata:
  name: production-cluster-roles
  namespace: elastic-system
type: Opaque
stringData:
  roles.yml: |
    jaeger_writer:
      cluster:
        - monitor
        - manage_index_templates
        - manage_ilm
      indices:
        - names:
            - "jaeger-*"
            - ".ds-jaeger-*"
          privileges:
            - all
    grafana_reader:
      cluster:
        - monitor
      indices:
        - names:
            - "logs-*"
            - ".ds-logs-*"
            - "jaeger-*"
            - ".ds-jaeger-*"
            - ".kibana*"
          privileges:
            - read
            - view_index_metadata
