apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "5"

commonLabels:
  app.kubernetes.io/name: elasticsearch
  app.kubernetes.io/component: log-storage
  app.kubernetes.io/part-of: observability-stack

resources:
  - elasticsearch-cluster.yaml
  # Least-privilege auth: per-consumer fileRealm users + custom roles
  # Users in multi-filerealm-sealed.yaml: jaeger (jaeger_writer), grafana_reader (grafana_reader)
  - multi-filerealm-sealed.yaml
  - jaeger-roles.yaml
  # PDB is auto-created by ECK Operator (production-cluster-es-default)
  - kibana.yaml
  - elasticsearch-exporter-credentials-sealed.yaml
  - elasticsearch-exporter-deployment.yaml
  - elasticsearch-exporter-service.yaml
  # Enterprise ILM Policies + Index Templates (all-in-one)
  # Creates: 5 ILM policies, 5 index templates, cleanup of legacy policies
  - ilm-policies.yaml
  # Jaeger Index Retention (Jaeger doesn't use rollover-ILM — manual cleanup CronJob)
  - jaeger-retention-cleanup.yaml
  # Cluster tuning: disk-watermarks + force-replicas (renamed concept 2026-05-14).
  # Was single-node (replicas=0). Now: 3-node HA → replicas=1.
  - single-node-tuning.yaml
  # S3 Snapshot Backups (Ceph RGW)
  - ../snapshots
