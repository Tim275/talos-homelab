apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    infrastructure.domain: observability
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/Tim275/talos-homelab
    targetRevision: HEAD
    path: kubernetes/infrastructure/observability/logs/elasticsearch/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
      # Force re-apply on every sync so ES CR can never silently disappear
      # (recurring bug: ECK validation transient + ArgoCD claims "applied" → CR not actually present)
      - Replace=false
      - ApplyOutOfSyncOnly=false
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: elasticsearch.k8s.elastic.co
      kind: Elasticsearch
      jsonPointers:
        - /spec/nodeSets/0/podTemplate/spec/containers/0/resources
        - /spec/nodeSets/0/podTemplate/spec/containers/0/env       # ECK injects -Xms/-Xmx after first apply
        - /spec/nodeSets/0/podTemplate/metadata                    # ECK adds tracking-labels
        - /spec/nodeSets/0/podTemplate/spec/containers/0/ports     # ECK injects protocol:TCP defaults
        - /spec/http/tls/certificate                               # ECK adds empty cert metadata
        - /spec/monitoring                                         # ECK injects monitoring.logs/metrics empty objects
        - /spec/auth                                               # ECK normalizes auth structure
        - /metadata/annotations/elasticsearch.k8s.elastic.co~1config-hash
        - /metadata/annotations/elasticsearch.k8s.elastic.co~1cluster-uuid
        - /metadata/annotations/eck.k8s.elastic.co~1orchestration-hints
        - /metadata/annotations/argocd.argoproj.io~1tracking-id    # ECK strips this annotation
        - /status                                                  # ECK-managed runtime state
      managedFieldsManagers:
        - elastic-operator
    - group: kibana.k8s.elastic.co
      kind: Kibana
      jsonPointers:
        - /metadata/annotations/kibana.k8s.elastic.co~1config-hash
        - /metadata/annotations/association.k8s.elastic.co~1conf
    - group: batch
      kind: Job
      jsonPointers:
        - /spec/selector
        - /spec/template/metadata/labels
