apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "5"

resources:
  - promtail.yaml
  - poddisruptionbudget.yaml
  - loki-logs-bucket.yaml

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: "6.10.2"
    releaseName: loki
    namespace: monitoring
    valuesFile: values.yaml
