# ArgoCD für Staging Edge-Cluster
# Components: arm64-arch + single-replica
# Kein redis-ha auf Pi → values-pi-overrides via patches
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - ../../base

components:
  - ../../../../../components/arm64-arch
  - ../../../../../components/single-replica

# Override redis-ha → single redis on Pi
patches:
  - target:
      kind: HelmRelease    # falls vorhanden
      name: argocd
    patch: |-
      - op: replace
        path: /spec/values/redis-ha/enabled
        value: false
      - op: replace
        path: /spec/values/redis/enabled
        value: true
