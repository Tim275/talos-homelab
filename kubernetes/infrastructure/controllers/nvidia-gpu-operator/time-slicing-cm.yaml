apiVersion: v1
kind: ConfigMap
metadata:
  name: time-slicing-config
  namespace: gpu-operator
data:
  time-slicing: |-
    version: v1
    sharing:
      timeSlicing:
        # Eine GPU auf mehrere Pods aufteilen
        # RTX 3050 8GB 4 virtuelle GPUs (je ~2GB)
        # RTX A2000 12GB 6 virtuelle GPUs (je ~2GB)
        # Anpassen je nach GPU die eingebaut wird
        resources:
          - name: nvidia.com/gpu
            replicas: 4
