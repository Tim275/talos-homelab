apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 🌊 Sync Wave 10: Strimzi Kafka Operator (Infrastructure)
commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"

namespace: kafka

resources:
  - ns.yaml
  - strimzi-operator-service.yaml
  - strimzi-operator-servicemonitor.yaml

helmCharts:
  - name: strimzi-kafka-operator
    repo: https://strimzi.io/charts/
    version: 0.47.0
    releaseName: strimzi-kafka-operator
    namespace: kafka
    includeCRDs: true
    valuesFile: strimzi-values.yaml
