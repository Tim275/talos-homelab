apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 🎯 DATABASE & APPLICATION OPERATORS - KUSTOMIZE CONTROL
# ========================================================
# Comment/Uncomment lines to enable/disable operators
# Uncommented = ✅ DEPLOYED | Commented = ❌ DISABLED

commonLabels:
  app.kubernetes.io/managed-by: argocd
  infrastructure.domain: operators

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"

resources:
  # 🎯 CHILD APPLICATIONS - APPEAR IN ARGOCD UI
  # ===========================================
  - cloudnative-pg/application.yaml       # ✅ PostgreSQL HA Operator
  - elasticsearch-operator/kustomization.yaml # ✅ Elasticsearch ECK Operator
  - grafana-operator/application.yaml     # ✅ Grafana Dashboard Operator
  - percona-mongodb/application.yaml      # MongoDB Operator (Percona)
  - rabbitmq-operator/application.yaml    # ✅ RabbitMQ Cluster Operator
  - redis-operator/application.yaml       # ✅ Redis HA Operator
  - sail-operator/application.yaml        # ✅ Istio Service Mesh Operator (Sail)
  - strimzi-kafka-operator/application.yaml # ✅ Kafka Messaging Operator
  - tailscale-operator/application.yaml   # ✅ Tailscale VPN Operator
