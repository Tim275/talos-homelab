apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: confluent

# 🌊 Sync Wave 0: Operators (before workloads)
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"

commonLabels:
  app.kubernetes.io/name: confluent-operator
  app.kubernetes.io/component: operator
  app.kubernetes.io/part-of: kafka-ecosystem

resources:
  - ns.yaml

helmCharts:
  - name: confluent-for-kubernetes
    repo: https://packages.confluent.io/helm
    version: "0.1351.24"
    namespace: confluent
    includeCRDs: true
    releaseName: confluent-operator
