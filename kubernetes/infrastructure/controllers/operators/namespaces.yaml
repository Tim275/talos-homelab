# 🏢 OPERATOR NAMESPACES - Enterprise Pattern
# ============================================
# Namespaces MUST exist BEFORE Helm Charts deploy
# ArgoCD CreateNamespace=true does NOT work for Kustomize helmCharts!
#
# Ref: https://www.redhat.com/en/blog/operator-installation-with-argo-cd/gitops
---
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    app.kubernetes.io/name: cloudnative-pg
    app.kubernetes.io/component: operator
    enterprise.tier: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: v1
kind: Namespace
metadata:
  name: elastic-system
  labels:
    app.kubernetes.io/name: elastic
    app.kubernetes.io/component: operator
    enterprise.tier: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: v1
kind: Namespace
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: operator
    enterprise.tier: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: v1
kind: Namespace
metadata:
  name: opentelemetry
  labels:
    app.kubernetes.io/name: opentelemetry
    app.kubernetes.io/component: operator
    enterprise.tier: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
