# Keycloak Operator (25.0.6) — official upstream manifests
# Source: https://github.com/keycloak/keycloak-k8s-resources/tree/25.0.6/kubernetes
#
# CRDs:
#   keycloaks.k8s.keycloak.org           — Keycloak instance CR
#   keycloakrealmimports.k8s.keycloak.org — Realm-as-Code CR
#
# Namespace: keycloak (operator runs here, manages Keycloak CR in same NS)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak

resources:
  - crd-keycloaks.yaml
  - crd-realmimports.yaml
  - operator.yaml
