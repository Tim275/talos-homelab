apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
#  OPERATOR PATTERN - RedHat/CNCF  2025

# Single Application deploying ALL operators together at Wave 0
# Source: https://www.redhat.com/en/blog/operator-installation-with-argo-cd/gitops
#
# Pattern:
#   Wave 0: Install ALL operators (this file)
#   Wave 1: Verification Job (optional)
#   Wave 2+: Deploy CRs (Custom Resources)

# NAMESPACES FIRST - Must exist before Helm Charts deploy!
# ArgoCD CreateNamespace=true does NOT work for Kustomize helmCharts!
resources:
  - namespaces.yaml
  - strimzi-cluster-rbac.yaml
  # - rabbitmq-cluster-operator.yaml
  # Keycloak Operator (no Helm chart — vendored upstream YAML)
  - keycloak-operator/

# Labels removed - causes selector immutability errors with existing deployments
# Re-add after fresh install if needed

#  ALL OPERATOR HELM CHARTS - Deployed together as single unit
helmCharts:
  # Database Operators
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: "0.28.0"
    releaseName: cloudnative-pg
    namespace: cnpg-system
    includeCRDs: true

  - name: plugin-barman-cloud
    repo: https://cloudnative-pg.github.io/charts
    version: "0.6.0"
    releaseName: cnpg-plugin-barman-cloud
    namespace: cnpg-system
    includeCRDs: true

  # - name: psmdb-operator
  #   repo: https://percona.github.io/percona-helm-charts
  #   version: "1.18.0"
  #   releaseName: psmdb-operator
  #   namespace: psmdb-operator
  #   includeCRDs: true
  #   valuesFile: ./psmdb-values.yaml

  - name: eck-operator
    repo: https://helm.elastic.co
    version: "3.2.0"
    releaseName: eck-operator
    namespace: elastic-system
    includeCRDs: true
    valuesInline:
      config:
        metrics:
          port: "9090"
        # Single-node: primary shard init takes 1-5s → brief YELLOW on new data streams.
        # 10s poll catches this window too often. 60s reduces false "degraded" events.
        elasticsearchObservationInterval: 60s
      podMonitor:
        enabled: true
        namespace: monitoring
        interval: 30s

  # Messaging Operators
  - name: strimzi-kafka-operator
    repo: https://strimzi.io/charts
    version: "0.51.0"
    releaseName: strimzi-kafka-operator
    namespace: kafka
    includeCRDs: true
    valuesInline:
      resources:
        limits:
          cpu: "1"
          memory: 768Mi
        requests:
          cpu: 200m
          memory: 512Mi

  # OpsTree Redis Operator (handles Redis, RedisCluster, RedisReplication, RedisSentinel CRDs)
  - name: redis-operator
    repo: https://ot-container-kit.github.io/helm-charts/
    version: "0.23.0"
    releaseName: redis-operator
    namespace: redis-operator-system
    includeCRDs: true

  # Observability Operators
  - name: grafana-operator
    repo: oci://ghcr.io/grafana/helm-charts
    version: 5.22.2
    releaseName: grafana-operator
    namespace: grafana
    includeCRDs: true

  - name: opentelemetry-operator
    repo: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: "0.107.2"
    releaseName: opentelemetry-operator
    namespace: opentelemetry
    includeCRDs: true

  # Network Operators
  # - name: sail-operator
  #   repo: https://istio-ecosystem.github.io/sail-operator
  #   version: "1.29.1"
  #   releaseName: sail-operator
  #   namespace: istio-system
  #   includeCRDs: true

  # - name: tailscale-operator
  #   repo: https://pkgs.tailscale.com/helmcharts
  #   version: "1.90.9"
  #   releaseName: tailscale-operator
  #   namespace: tailscale
  #   includeCRDs: true
  #   valuesInline:
  #     operatorConfig:
  #       defaultTags:
  #         - "tag:k8s-operator"

  # Stakater Reloader: auto-restart pods when their Secret/ConfigMap changes.
  # Solves the "ECK rotated elastic password → Vector still has old in env-var → auth storm"
  # class of bugs cluster-wide. Annotate Deployment:
  #   secret.reloader.stakater.com/reload: "production-cluster-es-elastic-user"
  - name: reloader
    repo: https://stakater.github.io/stakater-charts
    version: "2.2.11"
    releaseName: reloader
    namespace: reloader
    includeCRDs: true

  # Renovate Operator (mogenius — MIT-licensed open-source)
  # Replaces previous self-host CronJob — gives us:
  #   - CRD-based scheduling (RenovateJob)
  #   - Web-UI with run-status (HTTPRoute below → renovate.timourhomelab.org)
  #   - Built-in retry-logic (no orphan-PR-opener workaround needed)
  #   - Prometheus-metrics + health-checks
  #   - Parallel execution with concurrency control
  # Source: https://github.com/mogenius/renovate-operator
  - name: renovate-operator
    repo: oci://ghcr.io/mogenius/helm-charts
    version: "4.7.1"
    releaseName: renovate-operator
    namespace: renovate-operator
    includeCRDs: true
    valuesInline:
      # ServiceMonitor for Prometheus scraping
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
      # Resource limits (Kyverno require-resource-limits policy)
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      # HTTPRoute via Envoy-Gateway → public Web-UI
      route:
        enabled: true
        hostnames:
          - renovate.timourhomelab.org
        parentRefs:
          - name: envoy-gateway
            namespace: gateway
            sectionName: https
            group: gateway.networking.k8s.io
            kind: Gateway

patches:
  # Strimzi: watch all namespaces for Kafka CRs
  # ClusterRoleBinding strimzi-cluster-operator-global already grants cluster-wide RBAC.
  # Just override STRIMZI_NAMESPACE to * without touching Helm values (which generate
  # duplicate RoleBindings and conflict with the existing kafka-namespace installation).
  - target:
      kind: Deployment
      name: strimzi-cluster-operator
      namespace: kafka
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0
        value:
          name: STRIMZI_NAMESPACE
          value: "*"
