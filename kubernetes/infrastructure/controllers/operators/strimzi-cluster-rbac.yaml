# Strimzi cluster-wide RBAC for STRIMZI_NAMESPACE=*
# When the operator watches all namespaces, the namespaced roles must be
# bound cluster-wide (ClusterRoleBinding) instead of per-namespace (RoleBinding).
# The Helm chart only creates RoleBindings in the kafka namespace — these
# ClusterRoleBindings are the required addition for wildcard namespace watching.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: strimzi-cluster-operator-namespaced-global
  labels:
    app: strimzi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: strimzi-cluster-operator-namespaced
subjects:
  - kind: ServiceAccount
    name: strimzi-cluster-operator
    namespace: kafka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: strimzi-cluster-operator-watched-global
  labels:
    app: strimzi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: strimzi-cluster-operator-watched
subjects:
  - kind: ServiceAccount
    name: strimzi-cluster-operator
    namespace: kafka
