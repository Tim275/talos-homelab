apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 🌊 Sync Wave 10: Percona Server MongoDB Operator (Infrastructure)
commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"

namespace: psmdb-operator

resources:
  - ns.yaml

helmCharts:
  - name: psmdb-operator
    repo: https://percona.github.io/percona-helm-charts/
    version: 1.21.2
    releaseName: psmdb-operator
    namespace: psmdb-operator
    includeCRDs: true
    valuesInline:
      watchNamespace: ""  # Watch all namespaces
