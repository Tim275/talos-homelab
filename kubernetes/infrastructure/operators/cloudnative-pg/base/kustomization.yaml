apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: "0.27.0"
    releaseName: cloudnative-pg
    namespace: cnpg-system
    includeCRDs: true

  - name: plugin-barman-cloud
    repo: https://cloudnative-pg.github.io/charts
    version: "0.7.0"
    releaseName: cnpg-plugin-barman-cloud
    namespace: cnpg-system
    includeCRDs: true
