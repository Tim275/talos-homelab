gitlabUrl: https://gitlab.com/

runners:
  secret: gitlab-runner-token
  config: |
    concurrent = 4
    check_interval = 30
    [[runners]]
      executor = "kubernetes"
      [runners.kubernetes]
        namespace = "gitlab-runner"
        image = "ubuntu:24.04"
        cpu_request = "200m"
        memory_request = "256Mi"
        cpu_limit = "1"
        memory_limit = "1Gi"
        service_account = "gitlab-runner"

rbac:
  create: true
  serviceAccountName: gitlab-runner
  rules:
    - apiGroups: [""]
      resources: ["pods", "pods/exec", "pods/log", "secrets", "configmaps", "services"]
      verbs: ["get", "list", "watch", "create", "patch", "delete", "update"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
