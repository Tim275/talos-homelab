# NVIDIA GPU Operator - Talos Linux Configuration
# ️  WICHTIG: Vor dem Aktivieren muss die GPU eingebaut sein
# ️  Talos Extensions müssen in der Machine Config aktiviert sein (siehe README)

operator:
  defaultRuntime: containerd

# Talos verwaltet Driver + Toolkit via System Extensions
# Diese werden daher hier DEAKTIVIERT
driver:
  enabled: false

toolkit:
  enabled: false

# Device Plugin bleibt aktiv - macht GPU in K8s sichtbar
devicePlugin:
  enabled: true
  config:
    name: time-slicing-config
    default: time-slicing

# Validator kann auf Talos Probleme machen
validator:
  enabled: false

# DCGM Exporter - GPU Metriken für Prometheus/Grafana
dcgmExporter:
  enabled: true
  serviceMonitor:
    enabled: true
    # Passt zum kube-prometheus-stack Label
    additionalLabels:
      release: kube-prometheus-stack

# Node Feature Discovery
nfd:
  enabled: true

# GFD - GPU Feature Discovery
gfd:
  enabled: true
