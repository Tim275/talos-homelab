provider:
  name: cloudflare

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

sources:
  - gateway-httproute

domainFilters:
  - timourhomelab.org

policy: upsert-only

registry: txt
txtOwnerId: talos-homelab
txtPrefix: _extdns-.

extraArgs:
  - --cloudflare-dns-records-per-page=100

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
