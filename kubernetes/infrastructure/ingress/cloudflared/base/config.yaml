tunnel: b5f4258e-8cd9-4454-b46e-6f4f34219bb4
credentials-file: /etc/cloudflared/credentials/credentials.json
metrics: 0.0.0.0:2000
no-autoupdate: true

warp-routing:
  # Enables CF WARP Layer-3 routing through this tunnel. Combined with
  # CF Zero Trust "Private Networks" (CF Dashboard → Networks → Tunnels →
  # talos-homelab → Private Network), Clients mit WARP-App erreichen
  # Cluster-IPs (10.96.0.0/12, 10.244.0.0/16) UND Heim-LAN (192.168.0.0/24)
  # direkt — KEIN HTTP-Proxy in der Mitte → KEIN gRPC-Trailer-Strip.
  # Das ist DIE Lösung für NetBird-CLI gRPC durch CF Free-Tier.
  # Replikation von vehagn/homelab pattern.
  enabled: true

ingress:
  # NetBird-spezifisch: HTTP/2 zu Origin (gRPC braucht HTTP/2 Ende-zu-Ende).
  # MUSS vor der *.timourhomelab.org Wildcard kommen (Match-Reihenfolge).
  - hostname: netbird.timourhomelab.org
    service: https://envoy-gateway-envoy-gateway-ee418b6e.gateway.svc.cluster.local:443
    originRequest:
      originServerName: netbird.timourhomelab.org
      http2Origin: true

  # Public-Allowlist: NUR drova + n8n (für externe Nutzer). iam (Keycloak) = VPN-only —
  # nur Mitarbeiter-Login; In-Cluster-Apps erreichen Keycloak via Cluster-DNS-Override → Gateway.
  # VPN-only: grafana, argocd, kibana, jaeger, hubble, lldap, renovate, ceph, status, iam.
  - hostname: drova.timourhomelab.org
    service: https://envoy-gateway-envoy-gateway-ee418b6e.gateway.svc.cluster.local:443
    originRequest:
      originServerName: drova.timourhomelab.org

  - hostname: n8n.timourhomelab.org
    service: https://envoy-gateway-envoy-gateway-ee418b6e.gateway.svc.cluster.local:443
    originRequest:
      originServerName: n8n.timourhomelab.org

  - hostname: timourhomelab.org
    service: https://envoy-gateway-envoy-gateway-ee418b6e.gateway.svc.cluster.local:443
    originRequest:
      originServerName: timourhomelab.org

  - service: http_status:404
