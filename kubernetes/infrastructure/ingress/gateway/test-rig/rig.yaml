# Coraza WAF Phase-1 test rig — THROWAWAY, NOT referenced by any kustomization.
# Apply manually, validate WebSocket survives the WASM filter, then delete.
# A separate Gateway (coraza-test-gw) gets its own Envoy -> zero impact on prod.
#
#   kubectl apply -f waf-test.yaml
#   kubectl -n gateway port-forward svc/$(kubectl -n gateway get svc -l gateway.envoyproxy.io/owning-gateway-name=coraza-test-gw -o name | head -1 | cut -d/ -f2) 8888:80
#   # HTTP:  curl -s localhost:8888/ -H 'Host: waf-test.local'
#   # WS:    websocat ws://localhost:8888/ -H 'Host: waf-test.local'   (or wscat -c)
#   # ATTACK: curl -s "localhost:8888/?id=1%27%20OR%201=1" -H 'Host: waf-test.local'  -> passes (DetectionOnly) but logged
#   # Detection: kubectl -n gateway logs -l gateway.envoyproxy.io/owning-gateway-name=coraza-test-gw | grep -i coraza
#   kubectl delete -f waf-test.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: waf-test
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: waf-test
spec:
  replicas: 1
  selector:
    matchLabels: { app: echo }
  template:
    metadata:
      labels: { app: echo }
    spec:
      containers:
        - name: echo
          image: jmalloc/echo-server:v0.3.7
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: waf-test
spec:
  selector: { app: echo }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coraza-test-gw
  namespace: gateway
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: waf-test
spec:
  parentRefs:
    - name: coraza-test-gw
      namespace: gateway
  hostnames:
    - "waf-test.local"
  rules:
    - backendRefs:
        - name: echo
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: coraza-test
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: coraza-test-gw
  wasm:
    - name: coraza
      rootID: coraza
      failOpen: true
      code:
        type: Image
        image:
          url: ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0
      config: |
        {
          "directives_map": {
            "default": [
              "SecRuleEngine DetectionOnly",
              "SecRequestBodyAccess On",
              "SecRule REQUEST_HEADERS:Upgrade \"@streq websocket\" \"id:1000,phase:1,pass,nolog,ctl:ruleEngine=Off\"",
              "Include @owasp_crs/crs-setup.conf.example",
              "Include @owasp_crs/rules/*.conf"
            ]
          },
          "default_directives": "default"
        }
