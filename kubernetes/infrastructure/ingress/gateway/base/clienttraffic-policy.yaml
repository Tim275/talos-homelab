apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: ddos-protection
  namespace: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
  # Use CF-Connecting-IP as the real client IP for all Envoy decisions
  # (access logs, rate limiting, metrics) — cloudflared itself is the TCP source.
  # failClosed: false → intra-cluster pods (Grafana/ArgoCD → KC backchannel) reach
  # Envoy without 403. Public traffic always carries CF-Connecting-IP from cloudflared.
  clientIPDetection:
    customHeader:
      name: CF-Connecting-IP
      failClosed: false
  # Hard cap: 10k concurrent TCP connections to the gateway
  # Prevents SYN-flood / connection-exhaustion at Envoy level
  connection:
    connectionLimit:
      value: 10000
      closeDelay: 5s
  # Reap dead/abandoned downstream sockets fast so their connection slots free up
  # (anti connection-exhaustion). Probes after 60s idle, every 10s, drop after 6 misses.
  tcpKeepalive:
    idleTime: 60s
    interval: 10s
    probes: 6
  # HTTP/2 flood + Rapid-Reset (CVE-2023-44487) mitigation: cap concurrent streams per
  # connection. One HTTP/2 conn opening thousands of streams is the classic amplification
  # vector; 100 is generous for real browsers (~6-100).
  http2:
    maxConcurrentStreams: 100
  timeout:
    http:
      # Slowloris: full request headers must arrive within 10s.
      requestReceivedTimeout: 10s
      idleTimeout: 300s
      # BEWUSST kein streamIdleTimeout: drova nutzt WebSockets (Chat) + Live-Streams —
      # ein aggressiver Stream-Timeout würde die abwürgen. Long-lived Streams erlaubt.
