apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "1"

namespace: gateway

# Envoy Gateway via official Helm chart (was: raw install.yaml).
# Config + the certgen ServerSideApply-fix live in values.yaml.
helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy
    version: 1.8.0
    releaseName: eg
    namespace: gateway
    includeCRDs: true
    valuesFile: values.yaml

resources:
  - namespace.yaml  # MUST stay in source — chart has createNamespace:false; sonst pruned ArgoCD die ns + killt den gateway
  - sealed-cloudflare-api-token.yaml
  - cloudflare-issuer.yaml
  - certificate-timourhomelab.yaml
  - envoy-gatewayclass.yaml
  - envoy-proxy-config.yaml  # EnvoyProxy CR — replicas=2 for HA
  - gateway.yaml
  - http-redirect-to-https.yaml
  - clienttraffic-policy.yaml
  - pdb.yaml  # PodDisruptionBudgets — Talos-upgrade-resilience
  - waf  # Coraza WAF, gateway-wide, DetectionOnly. drova-safe via SecResponseBodyAccess Off (rig-verified 2026-06-11: drova frontend 200 through Coraza, SQLi 942100 detected, WS 101). failOpen. Rollback: re-comment + merge -> ArgoCD prunes.
  # rate-limit-policies.yaml moved to kubernetes/security/foundation/rate-limiting/
  # envoy-patch-ceph-tls.yaml: NOT NEEDED - Ceph Dashboard uses HTTP backend now
labels:
  - pairs:
      app.kubernetes.io/part-of: network-infrastructure

