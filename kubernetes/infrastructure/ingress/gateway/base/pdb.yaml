# PodDisruptionBudget für Envoy Gateway (battle-tested 2026-05-14).
#
# Heute hatte envoy-gateway-envoy-gateway-* 40 Restarts nach Talos-upgrade
# (Exit Code 0 = "Completed" → ReplicaSet recreate-loop). PDB schützt davor.
#
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: envoy-gateway-proxy
  namespace: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
      app.kubernetes.io/managed-by: envoy-gateway
---
# Controller (xDS-Übersetzung) — 2 Replicas seit 2026-07-19 (leader-elected)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: envoy-gateway-controller
  namespace: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      control-plane: envoy-gateway
---
# Global-Rate-Limit-Service (redis-backed) — 2 Replicas seit 2026-07-19
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: envoy-ratelimit
  namespace: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-ratelimit
