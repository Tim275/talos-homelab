---
# OMS Infrastructure ConfigMap
# Provided by Platform Team for OMS Tenant
# Contains non-sensitive connection endpoints
apiVersion: v1
kind: ConfigMap
metadata:
  name: oms-infra-config
  namespace: oms
  labels:
    app.kubernetes.io/name: oms-infra-config
    app.kubernetes.io/part-of: oms
    app.kubernetes.io/managed-by: platform-team
    platform.homelab/tenant: oms
    platform.homelab/type: infrastructure
data:
  # ===========================================
  # DATABASE ENDPOINTS (Platform-Provided)
  # ===========================================

  # MongoDB - Percona Operator (3-replica ReplicaSet)
  MONGO_HOST: "mongodb-oms-rs0.oms.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DATABASE: "orders"
  MONGO_REPLICA_SET: "rs0"

  # PostgreSQL - StatefulSet
  POSTGRES_HOST: "postgres.oms.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DATABASE: "stock"

  # Redis - StatefulSet
  REDIS_HOST: "redis.oms.svc.cluster.local"
  REDIS_PORT: "6379"

  # ===========================================
  # MESSAGING (Platform-Provided)
  # ===========================================

  # RabbitMQ - RabbitMQ Operator
  RABBITMQ_HOST: "rabbitmq.oms.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_MANAGEMENT_PORT: "15672"

  # ===========================================
  # OBSERVABILITY (Platform-Provided)
  # ===========================================

  # OpenTelemetry Collector
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector-collector.opentelemetry.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

  # Jaeger (via OTEL Collector)
  JAEGER_ENDPOINT: "jaeger-collector.jaeger.svc.cluster.local:4317"

  # ===========================================
  # SERVICE DISCOVERY
  # ===========================================

  # Consul disabled - Using Kubernetes DNS
  CONSUL_ENABLED: "false"
