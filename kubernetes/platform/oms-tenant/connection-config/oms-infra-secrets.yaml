---
# OMS Infrastructure Secrets
# Provided by Platform Team for OMS Tenant
# NOTE: In production, use External Secrets Operator to sync from Vault/AWS SM
apiVersion: v1
kind: Secret
metadata:
  name: oms-infra-secrets
  namespace: oms
  labels:
    app.kubernetes.io/name: oms-infra-secrets
    app.kubernetes.io/part-of: oms
    app.kubernetes.io/managed-by: platform-team
    platform.homelab/tenant: oms
    platform.homelab/type: infrastructure
type: Opaque
stringData:
  # ===========================================
  # DATABASE CREDENTIALS
  # ===========================================

  # MongoDB (Percona - uses internal auth, no password needed for now)
  MONGO_USER: ""
  MONGO_PASSWORD: ""

  # PostgreSQL
  POSTGRES_USER: "stock"
  POSTGRES_PASSWORD: "stock123"

  # Redis (no auth configured)
  REDIS_PASSWORD: ""

  # ===========================================
  # MESSAGING CREDENTIALS
  # ===========================================

  # RabbitMQ
  RABBITMQ_USER: "guest"
  RABBITMQ_PASSWORD: "guest"

  # ===========================================
  # FULL CONNECTION STRINGS (Convenience)
  # ===========================================

  # MongoDB URI (3-node ReplicaSet)
  MONGO_URI: "mongodb://mongodb-oms-rs0-0.mongodb-oms-rs0.oms.svc.cluster.local:27017,mongodb-oms-rs0-1.mongodb-oms-rs0.oms.svc.cluster.local:27017,mongodb-oms-rs0-2.mongodb-oms-rs0.oms.svc.cluster.local:27017/orders?replicaSet=rs0"

  # PostgreSQL URI
  POSTGRES_URI: "postgresql://stock:stock123@postgres.oms.svc.cluster.local:5432/stock?sslmode=disable"

  # RabbitMQ URL
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq.oms.svc.cluster.local:5672/"

  # Redis Address
  REDIS_ADDR: "redis.oms.svc.cluster.local:6379"
