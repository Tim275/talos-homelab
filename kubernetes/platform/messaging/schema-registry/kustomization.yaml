apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 🌊 Sync Wave 13: Messaging Clusters (Schema Registry depends on Kafka)
commonAnnotations:
  argocd.argoproj.io/sync-wave: "13"

metadata:
  name: schema-registry
  namespace: kafka

helmCharts:
- name: apicurio-registry
  repo: https://github.com/Apicurio/apicurio-registry-helm/releases/download/1.0.4/apicurio-registry-3.8.0.tgz
  version: 3.8.0
  releaseName: schema-registry
  namespace: kafka
  valuesFile: values.yaml

resources:
- namespace.yaml