# Drova Kafka — Production-Grade KRaft with Dedicated Controllers + Brokers
#
# Architecture: Industry-best-practice split (Strimzi docs recommend this for HA).
# - 3 dedicated controllers (light pods, hold metadata quorum)
# - 3 dedicated brokers (heavy pods, handle data + replication)
# - Dual-role 3pods previously caused KRaft quorum deadlock in Strimzi 0.51 + Kafka 4.1.1
#
# Why split?
#  - Controllers have small, fast-fsync workload (metadata-only)
#  - Brokers have large, throughput-heavy workload (data replication)
#  - Failure-domain separation: broker crash doesn't kill quorum

# ─── CONTROLLER NodePool ─────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: controller
  namespace: drova
  labels:
    strimzi.io/cluster: drova-kafka
    platform.homelab/tenant: drova
spec:
  replicas: 3
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 2Gi
        class: rook-ceph-block-kafka
        deleteClaim: true
        kraftMetadata: shared
  resources:
    requests:
      memory: "1Gi"
      cpu: "100m"
    limits:
      memory: "1500Mi"
      cpu: "1000m"
  jvmOptions:
    "-Xms": "512m"
    "-Xmx": "768m"
  template:
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # REQUIRED anti-affinity for controllers: lose 1 node = lose 1 voter = still have quorum
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: drova-kafka
                  strimzi.io/controller-role: "true"
              topologyKey: kubernetes.io/hostname
---
# ─── BROKER NodePool ─────────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  namespace: drova
  labels:
    strimzi.io/cluster: drova-kafka
    platform.homelab/tenant: drova
spec:
  replicas: 3
  roles:
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        class: rook-ceph-block-kafka
        deleteClaim: true
        kraftMetadata: shared
  resources:
    requests:
      memory: "2Gi"
      cpu: "200m"
    limits:
      memory: "3Gi"
      cpu: "1500m"
  jvmOptions:
    "-Xms": "1g"
    "-Xmx": "1g"
  template:
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Preferred anti-affinity for brokers (homelab has limited nodes)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    strimzi.io/cluster: drova-kafka
                    strimzi.io/broker-role: "true"
                topologyKey: kubernetes.io/hostname
---
# ─── Kafka cluster ───────────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: drova-kafka
  namespace: drova
  labels:
    platform.homelab/tenant: drova
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.1
    # 4.1-IV1 supports KIP-996 Direct-to-Controller (needed by Strimzi 0.51 AdminClient).
    metadataVersion: 4.1-IV1
    # Lenient probes for KRaft cold-start (large metadata replay possible).
    livenessProbe:
      initialDelaySeconds: 180
      timeoutSeconds: 30
      periodSeconds: 30
      failureThreshold: 20
    readinessProbe:
      initialDelaySeconds: 30
      timeoutSeconds: 30
      periodSeconds: 30
      failureThreshold: 20
    # JMX Prometheus Exporter — required for KafkaBrokerDown alerts.
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: drova-kafka-metrics
          key: kafka-metrics-config.yml
    listeners:
      - name: sasl
        port: 9095
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    authorization:
      type: simple
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: "false"
      # KRaft quorum tuning — CRITICAL: election.timeout is when leader-less
      # controllers START an election. Setting it too high (e.g. 600000=10min)
      # causes Controllers to never elect a leader on fresh boot!
      # Defaults are good; only modest bumps for Ceph RBD slow-fsync.
      controller.quorum.election.timeout.ms: 10000
      controller.quorum.fetch.timeout.ms: 20000
      controller.quorum.election.backoff.max.ms: 1000
      num.io.threads: 16
      socket.send.buffer.bytes: 1048576
      socket.receive.buffer.bytes: 1048576
  entityOperator:
    template:
      pod:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          fsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
      topicOperatorContainer:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      userOperatorContainer:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
    topicOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "512Mi"
          cpu: "250m"
    userOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "512Mi"
          cpu: "250m"
