apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: drova
  labels:
    strimzi.io/cluster: drova-kafka
    platform.homelab/tenant: drova
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        class: rook-ceph-block-enterprise
        deleteClaim: true
        kraftMetadata: shared
  resources:
    requests:
      memory: "1536Mi"
      cpu: "250m"
    limits:
      memory: "3Gi"
      cpu: "1500m"
  jvmOptions:
    "-Xms": "1536m"
    "-Xmx": "1536m"
  template:
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    strimzi.io/cluster: drova-kafka
                topologyKey: kubernetes.io/hostname
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: drova-kafka
  namespace: drova
  labels:
    platform.homelab/tenant: drova
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.0.0
    metadataVersion: 4.0-IV3
    # JMX Prometheus Exporter (Port 9404) — broker metrics für PodMonitor
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: drova-kafka-metrics
          key: kafka-metrics-config.yml
    listeners:
      - name: sasl
        port: 9095
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    authorization:
      type: simple
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: "false"
      controller.quorum.election.timeout.ms: 20000
      controller.quorum.fetch.timeout.ms: 10000
      controller.quorum.election.backoff.max.ms: 5000
  entityOperator:
    template:
      pod:
        # Kyverno policy require-run-as-non-root blocks Strimzi default pod spec.
        # Pin a non-root identity so the entity-operator pod passes the policy.
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          fsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
      topicOperatorContainer:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      userOperatorContainer:
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
    topicOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "512Mi"
          cpu: "250m"
    userOperator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "512Mi"
          cpu: "250m"
