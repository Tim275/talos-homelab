apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: drova-kafka-user
  namespace: drova
  labels:
    strimzi.io/cluster: drova-kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      # Topic prefix without trailing hyphen covers both dot-named (Go code: "trip.event.created")
      # and hyphen-named (Strimzi KafkaTopic: "trip-event-created") topics.
      - resource:
          type: topic
          name: "trip"
          patternType: prefix
        operations: [Read, Write, Describe, Create]
        host: "*"
      - resource:
          type: topic
          name: "driver"
          patternType: prefix
        operations: [Read, Write, Describe, Create]
        host: "*"
      - resource:
          type: topic
          name: "payment"
          patternType: prefix
        operations: [Read, Write, Describe, Create]
        host: "*"
      - resource:
          type: topic
          name: "dead"
          patternType: prefix
        operations: [Read, Write, Describe, Create]
        host: "*"
      - resource:
          type: group
          name: "api-gateway"
          patternType: prefix
        operations: [Read, Describe]
        host: "*"
      - resource:
          type: group
          name: "trip-service"
          patternType: prefix
        operations: [Read, Describe]
        host: "*"
      - resource:
          type: group
          name: "driver-service"
          patternType: prefix
        operations: [Read, Describe]
        host: "*"
      - resource:
          type: group
          name: "payment-service"
          patternType: prefix
        operations: [Read, Describe]
        host: "*"
      - resource:
          type: group
          name: "driver_arrived"
          patternType: literal
        operations: [Read, Describe]
        host: "*"
      - resource:
          type: group
          name: "in_progress"
          patternType: literal
        operations: [Read, Describe]
        host: "*"
