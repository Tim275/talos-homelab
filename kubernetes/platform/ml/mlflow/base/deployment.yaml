apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ml
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mlflow
          image: burakince/mlflow:3.14.0
          command:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=sqlite:////data/mlflow.db
            - --artifacts-destination=s3://$(BUCKET_NAME)
            - --serve-artifacts
            # solo-Betrieb: default 4 gunicorn-Worker sprengen das Memory-Limit (OOM)
            - --workers=1
          env:
            - name: BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: mlflow-artifacts
                  key: BUCKET_HOST
            - name: BUCKET_PORT
              valueFrom:
                configMapKeyRef:
                  name: mlflow-artifacts
                  key: BUCKET_PORT
            - name: BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: mlflow-artifacts
                  key: BUCKET_NAME
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-artifacts
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-artifacts
                  key: AWS_SECRET_ACCESS_KEY
            - name: MLFLOW_S3_ENDPOINT_URL
              value: 'http://$(BUCKET_HOST):$(BUCKET_PORT)'
          ports:
            - name: http
              containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: backend
              mountPath: /data
      volumes:
        - name: backend
          persistentVolumeClaim:
            claimName: mlflow-backend
