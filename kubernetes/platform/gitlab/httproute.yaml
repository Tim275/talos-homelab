---
# External service pointing to the GitLab VM (not a K8s pod)
apiVersion: v1
kind: Service
metadata:
  name: gitlab-vm
  namespace: gitlab-runner
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: gitlab-vm
  namespace: gitlab-runner
subsets:
  - addresses:
      - ip: 192.168.0.200
    ports:
      - port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitlab
  namespace: gitlab-runner
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: gateway
  hostnames:
    - "gitlab.timourhomelab.org"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gitlab-vm
          port: 80
