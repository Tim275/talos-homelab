## RenovateJob CR for Tim275/drova repo (Code-Repository)
## Different schedule than talos-homelab — separate parallel job.
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate-drova
  namespace: renovate-operator
spec:
  discoveryFilters:
    - Tim275/drova
  provider:
    name: github
    endpoint: ""
  image: ghcr.io/renovatebot/renovate:43.176.3   # renovate: docker=ghcr.io/renovatebot/renovate
  ## parallelism = "max projects scanned in parallel" (per Mogenius CRD semantics).
  ## Bei 1 Repo per Job ist parallelism>1 wirkungslos. Daher: 1.
  parallelism: 1
  ## schedule */15 — v43-Quirk Workaround: jeder Run abortet nach ~5 PRs,
  ## 15-min-cron = 4 Runs/h × 5 PRs = 20 PRs/h durchgehend.
  ## 56 pending PRs → ~3h durch (statt 24h bei 2h-Intervall).
  schedule: "*/15 * * * *"
  secretRef: renovate-secret
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_GIT_AUTHOR
      value: "Renovate Bot <tim275@users.noreply.github.com>"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 2Gi
