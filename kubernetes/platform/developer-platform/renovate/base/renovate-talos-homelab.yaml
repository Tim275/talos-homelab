## RenovateJob CR for Tim275/talos-homelab repo
## Operator: mogenius/renovate-operator (deployed in operators/ tree)
## Schedule: hourly (default cron-style)
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate-talos-homelab
  namespace: renovate-operator
spec:
  # Discovery: scan ONLY the talos-homelab repo
  discoveryFilters:
    - Tim275/talos-homelab
  provider:
    name: github
    endpoint: ""  # defaults to https://api.github.com
  image: ghcr.io/renovatebot/renovate:43.176.3   # renovate: docker=ghcr.io/renovatebot/renovate
  ## parallelism = "max projects scanned in parallel" (per Mogenius CRD semantics).
  ## Bei 1 Repo per Job ist parallelism>1 wirkungslos. Daher: 1.
  parallelism: 1
  ## schedule */15 — v43-Quirk Workaround: 5 PRs/Run × 4 Runs/h = 20 PRs/h.
  ## Offset minute 7 zu Drova (minute 0,15,30,45) damit nicht alle 4 Pods gleichzeitig.
  schedule: "7-59/15 * * * *"
  secretRef: renovate-secret
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_GIT_AUTHOR
      value: "Renovate Bot <tim275@users.noreply.github.com>"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 2Gi
