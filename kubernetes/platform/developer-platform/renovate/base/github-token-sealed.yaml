# PLACEHOLDER — must be replaced with real sealed secret BEFORE deploying!
# See SETUP.md → step 2 "GitHub-PAT + SealedSecret"
#
# To generate:
#   CERT=tofu/bootstrap/sealed-secrets/certificate/sealed-secrets.crt
#   kubectl create secret generic renovate-secrets \
#     --namespace=renovate \
#     --from-literal=RENOVATE_TOKEN=<github-pat> \
#     --dry-run=client -o yaml | \
#   kubeseal --cert "$CERT" --format yaml --scope strict \
#     > kubernetes/platform/developer-platform/renovate/base/github-token-sealed.yaml
#
# Required env keys:
#   RENOVATE_TOKEN          → GitHub fine-grained PAT (Contents/PRs/Issues read+write)
#   RENOVATE_GITHUB_COM_TOKEN → optional, same PAT for changelog-fetching from GitHub.com
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: renovate-secrets
  namespace: renovate
spec:
  encryptedData:
    RENOVATE_TOKEN: REPLACE_ME_VIA_KUBESEAL_SEE_SETUP_MD
  template:
    metadata:
      name: renovate-secrets
      namespace: renovate
    type: Opaque
