apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: renovate

commonAnnotations:
  argocd.argoproj.io/sync-wave: "20"

resources:
  - namespace.yaml
  - policy-exception.yaml
  - github-token-sealed.yaml

helmCharts:
  - name: renovate
    repo: https://docs.renovatebot.com/helm-charts
    version: "41.107.4"  # renovate: github-releases=renovatebot/helm-charts
    releaseName: renovate
    namespace: renovate
    valuesFile: values.yaml

labels:
  - pairs:
      app.kubernetes.io/name: renovate
      app.kubernetes.io/part-of: devops-platform
