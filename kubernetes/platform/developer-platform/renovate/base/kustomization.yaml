## Renovate via mogenius/renovate-operator
##
## OPERATOR: deployed in kubernetes/infrastructure/controllers/operators/base/
##           (Helm chart, Wave 0)
## CRs:       hier (Wave 20 — needs CRDs from operator)
##
## Renovate-Bot config (per-repo) lives in each repo's renovate.json.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: renovate-operator

commonAnnotations:
  argocd.argoproj.io/sync-wave: "20"

resources:
  - policy-exception.yaml
  - sealed-secret.yaml
  - oidc-sealed.yaml
  - oidc-securitypolicy.yaml
  - renovate-talos-homelab.yaml
  - renovate-drova.yaml
  ## orphan-pr-opener.yaml RE-ENABLED 2026-05-13 mit SAFETY-FILTER:
  ## v43-Quirk lässt Renovate Branches erstellen aber PR-Creation abortet.
  ## Dieser CronJob (*/5 min) öffnet PRs für fresh orphan-branches.
  ## Filter: <24h alt + <5 commits ahead (catches stale-branch bug von Mai-12).
  - orphan-pr-opener.yaml
