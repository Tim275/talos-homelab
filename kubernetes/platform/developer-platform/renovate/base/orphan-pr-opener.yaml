## Auto-PR-Opener — Workaround for Renovate v43 "Repository has changed" Quirk
##
## Renovate v43 has a known bug: after creating a branch + pushing commit,
## the next ref-check detects the push itself as "repo changed" → abort.
## Operator does NOT auto-retry on this specific error.
##
## This CronJob runs 10min after each scheduled Renovate-Run (operator schedule:
## 0/30 */2 * * *), finds orphan-branches, creates PRs via GitHub-API.
##
## Smart title-parsing: detects update-type from branch-name and uses
## Renovate-style commit-prefixes (fix:/feat:/chore:).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-orphan-pr-opener
  namespace: renovate-operator
  labels:
    app.kubernetes.io/name: renovate-orphan-pr-opener
    app.kubernetes.io/part-of: devops-platform
spec:
  schedule: "*/5 * * * *"   # every 5min — catches orphan branches quickly
                            # safety: <24h age + <5 commits ahead filter (siehe Script)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: opener
              image: docker.io/library/python:3.12-alpine
              command: ["/usr/local/bin/python3", "-c"]
              args:
                - |
                  ## v43-Quirk Workaround: Renovate v43 erstellt Branches aber abortet
                  ## vor PR-Creation ("Repository has changed during renovation - aborting").
                  ## Dieser Script öffnet PRs für orphan Renovate-Branches.
                  ##
                  ## SAFETY-FEATURES (battle-tested 2026-05-12):
                  ##   1. Max-age 24h: keine PRs für stale-branches die Wochen alt sind
                  ##   2. Max-ahead 5 commits: stale branches haben oft 30+ commits drift
                  ##   3. Skip if branch can't fast-forward (Konflikte = wahrscheinlich stale)
                  import json, os, re, urllib.request, urllib.error
                  from datetime import datetime, timezone, timedelta
                  REPOS = ["Tim275/drova", "Tim275/talos-homelab"]
                  MAX_AGE = timedelta(hours=24)        # only branches < 24h old
                  MAX_COMMITS_AHEAD = 5                 # stale branches have many more
                  NOW = datetime.now(timezone.utc)
                  TOKEN = os.environ["GH_TOKEN"]
                  HEADERS = {
                    "Authorization": f"Bearer {TOKEN}",
                    "Accept": "application/vnd.github+json",
                    "X-GitHub-Api-Version": "2022-11-28",
                  }
                  def api(method, path, body=None):
                    url = f"https://api.github.com{path}"
                    data = json.dumps(body).encode() if body else None
                    req = urllib.request.Request(url, data=data, headers=HEADERS, method=method)
                    if data: req.add_header("Content-Type", "application/json")
                    try:
                      with urllib.request.urlopen(req) as r:
                        return json.loads(r.read())
                    except urllib.error.HTTPError as e:
                      print(f"  ERR {method} {path}: {e.code} {e.reason}", flush=True)
                      return None

                  def parse_branch(b):
                    name = b.removeprefix("renovate/")
                    if name == "pin-dependencies":
                      return "chore(deps)", "pin dependencies"
                    if name.startswith("patch-"):
                      dep = name.removeprefix("patch-")
                      return "fix(deps)", f"update {dep} (patch)"
                    m = re.match(r"^major-(.+?)-(\d+(?:\.\d+)*\.x)$", name)
                    if m:
                      return "feat(deps)", f"update {m.group(1)} to v{m.group(2).replace('.x','')} (major)"
                    m = re.match(r"^(.+?)-(\d+\.\d+)\.x$", name)
                    if m:
                      return "chore(deps)", f"update {m.group(1)} to v{m.group(2)}"
                    m = re.match(r"^(.+?)-(\d+)\.x$", name)
                    if m:
                      return "chore(deps)", f"update {m.group(1)} to v{m.group(2)}"
                    return "chore(deps)", f"update {name}"

                  for repo in REPOS:
                    print(f"═══ {repo} ═══", flush=True)
                    branches, page = [], 1
                    while True:
                      r = api("GET", f"/repos/{repo}/branches?per_page=100&page={page}")
                      if not r: break
                      branches.extend(b["name"] for b in r if b["name"].startswith("renovate/"))
                      if len(r) < 100: break
                      page += 1
                    prs = api("GET", f"/repos/{repo}/pulls?state=open&per_page=100") or []
                    pr_heads = {p["head"]["ref"] for p in prs}
                    orphans = [b for b in branches if b not in pr_heads]
                    print(f"  total_branches={len(branches)} with_pr={len(pr_heads)} orphans={len(orphans)}", flush=True)
                    fresh_orphans = []
                    for b in orphans:
                      cmp = api("GET", f"/repos/{repo}/compare/main...{b}")
                      if not cmp:
                        print(f"  ⚠ skip {b}: compare-API failed", flush=True)
                        continue
                      ahead = cmp.get("ahead_by", 999)
                      behind = cmp.get("behind_by", 999)
                      last_commit_date = cmp.get("commits", [{}])[-1].get("commit", {}).get("author", {}).get("date") if cmp.get("commits") else None
                      if last_commit_date:
                        commit_age = NOW - datetime.fromisoformat(last_commit_date.replace("Z", "+00:00"))
                      else:
                        commit_age = MAX_AGE * 999
                      if ahead > MAX_COMMITS_AHEAD:
                        print(f"  ⏭ skip {b}: too many commits ahead ({ahead}>{MAX_COMMITS_AHEAD}) — likely stale", flush=True)
                        continue
                      if commit_age > MAX_AGE:
                        print(f"  ⏭ skip {b}: too old ({commit_age}) — likely stale", flush=True)
                        continue
                      if behind > 100:
                        print(f"  ⏭ skip {b}: too far behind main ({behind}) — likely abandoned", flush=True)
                        continue
                      fresh_orphans.append(b)
                    print(f"  fresh_orphans={len(fresh_orphans)} (after age+commits filter)", flush=True)
                    for b in fresh_orphans:
                      prefix, body = parse_branch(b)
                      title = f"{prefix}: {body}"
                      print(f"  → opening PR for {b}  →  '{title}'", flush=True)
                      pr = api("POST", f"/repos/{repo}/pulls", {
                        "title": title,
                        "head": b,
                        "base": "main",
                        "body": f"Auto-PR for orphan Renovate branch (v43 quirk workaround).\n\nBranch: `{b}`\nFilter passed: <24h old, <5 commits ahead.",
                      })
                      if pr:
                        pr_num = pr["number"]
                        print(f"    ✓ PR #{pr_num}", flush=True)
                        api("POST", f"/repos/{repo}/issues/{pr_num}/labels",
                            {"labels": ["renovate", "dependencies"]})
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secret
                      key: RENOVATE_TOKEN
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop: [ALL]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits:   { cpu: 200m, memory: 128Mi }
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
