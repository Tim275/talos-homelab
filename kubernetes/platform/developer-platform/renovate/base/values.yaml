## Self-hosted Renovate-Bot — Helm Chart Values
## Chart: https://github.com/renovatebot/helm-charts/tree/main/charts/renovate
##
## Replaces: Renovate-Cloud GitHub-App (Mend.io SaaS)
## Setup steps see ./SETUP.md
## Per-Repo Renovate-config lives in each repo's /renovate.json

cronjob:
  schedule: "0 */2 * * *"            # alle 2 Stunden
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobBackoffLimit: 1
  jobRestartPolicy: Never

image:
  registry: ghcr.io
  repository: renovatebot/renovate
  tag: 43.175.0                       # renovate: docker=ghcr.io/renovatebot/renovate
  pullPolicy: IfNotPresent

# Renovate-Bot global config (BOT-Level, not per-repo).
# Per-Repo packageRules etc. live in each target-repo's renovate.json.
renovate:
  config: |
    {
      "$schema": "https://docs.renovatebot.com/renovate-schema.json",
      "platform": "github",
      "autodiscover": false,
      "repositories": [
        "Tim275/talos-homelab",
        "Tim275/drova-gitops"
      ],
      "requireConfig": "required",
      "gitAuthor": "Renovate Bot (self-hosted) <renovate-bot@timourhomelab.org>",
      "logLevel": "info",
      "prHourlyLimit": 10,
      "prConcurrentLimit": 30,
      "timezone": "Europe/Berlin",
      "onboarding": false,
      "dryRun": null
    }
  # Container-level securityContext (chart key: .Values.renovate.securityContext)
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 12021
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

# Mount RENOVATE_TOKEN from SealedSecret as env-var
existingSecret: renovate-secrets

# Resources: each CronJob-Run typically 5-15min
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 2Gi

# Pod-level securityContext (chart top-level securityContext = pod-spec)
securityContext:
  runAsNonRoot: true
  runAsUser: 12021                    # Renovate-bot default UID
  runAsGroup: 12021
  fsGroup: 12021
  seccompProfile:
    type: RuntimeDefault

# (Container-level securityContext is set under `renovate.securityContext` above —
#  that's the Helm-chart key. `container.securityContext` would be ignored.)

# Renovate writes to /tmp + workdir — emptyDir volumes
extraVolumes:
  - name: workdir
    emptyDir: {}
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: workdir
    mountPath: /tmp/renovate
  - name: tmp
    mountPath: /tmp
