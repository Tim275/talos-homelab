apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: backstage-backup-store
  namespace: backstage
spec:
  configuration:
    destinationPath: s3://cnpg-backstage-backup/
    endpointURL: http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80
    s3Credentials:
      accessKeyId:
        name: cnpg-backstage-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backstage-backup
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
      jobs: 2
  retentionPolicy: "30d"
  instanceSidecarConfiguration:
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { cpu: 500m, memory: 256Mi }
