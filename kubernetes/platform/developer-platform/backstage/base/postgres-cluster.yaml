# CNPG Postgres-Cluster für Backstage
# Same pattern wie drova-postgres + n8n-postgres + keycloak-db.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: backstage-db
  namespace: backstage
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4-22

  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1, memory: 1Gi }

  affinity:
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname

  storage:
    size: 5Gi
    storageClass: rook-ceph-block-enterprise-retain

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "64MB"
      effective_cache_size: "256MB"

  bootstrap:
    initdb:
      database: backstage
      owner: backstage
      secret:
        name: backstage-db-credentials

  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: backstage-backup-store
        serverName: backstage-db
