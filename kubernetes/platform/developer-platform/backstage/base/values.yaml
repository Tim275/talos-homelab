# Backstage Helm-Chart values
# Chart: https://github.com/backstage/charts/tree/main/charts/backstage
# Pattern: app-config.yaml als ConfigMap-mounted, kein custom-image-build nötig
# (Plugins werden via Backstage's Built-in-Plugin-Registry geladen)

# Image: official Backstage upstream — ohne custom plugins.
# Für eigene Plugins: build custom image in CI + push to Harbor (Phase 5+).
image:
  registry: docker.io
  repository: backstage/backstage
  tag: "1.36.1"

replicas: 1                            # HA Phase 6+

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits: { cpu: 1000m, memory: 1Gi }

# DB connection — Secret-refs
extraEnvVarsSecrets:
  - backstage-db-credentials           # CNPG-generated
  - backstage-oidc-credentials         # KC-Client-Secret
  - backstage-github-token             # GitHub PAT

extraEnvVars:
  - name: POSTGRES_HOST
    value: "backstage-db-rw.backstage.svc.cluster.local"
  - name: POSTGRES_PORT
    value: "5432"
  - name: APP_BASE_URL
    value: "https://backstage.timourhomelab.org"
  - name: BACKEND_BASE_URL
    value: "https://backstage.timourhomelab.org"
  - name: KEYCLOAK_BASE_URL
    value: "https://iam.timourhomelab.org/realms/kubernetes"

# app-config.yaml als ConfigMap (mount-style)
extraVolumes:
  - name: app-config
    configMap:
      name: backstage-app-config

extraVolumeMounts:
  - name: app-config
    mountPath: /app/app-config.yaml
    subPath: app-config.yaml

# HTTPRoute (parent: envoy-gateway in gateway ns)
ingress:
  enabled: false           # Wir nutzen Gateway-API HTTPRoute, nicht Ingress

service:
  type: ClusterIP
  ports:
    backend: 7007

# ServiceMonitor for Prometheus
metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: kube-prometheus-stack

# Backstage application secrets are NOT helm-managed — siehe sealed-secrets/
