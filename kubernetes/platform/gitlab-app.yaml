apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-platform
  namespace: argocd
  labels:

    platform.domain: gitlab
    team: timour
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  project: platform
  source:
    repoURL: https://github.com/Tim275/talos-homelab
    targetRevision: HEAD
    path: kubernetes/platform/gitlab
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
