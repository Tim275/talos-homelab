apiVersion: v1
kind: LimitRange
metadata:
  name: lldap-limits
  namespace: lldap
spec:
  limits:
  - max:
      cpu: "2"
      memory: 2Gi
    min:
      cpu: 10m
      memory: 32Mi
    default:
      cpu: 100m
      memory: 128Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    type: Container
