apiVersion: v1
kind: ServiceAccount
metadata:
  name: drova-admin-sa
  namespace: drova
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: drova-admin
  namespace: drova
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: drova-admin-binding
  namespace: drova
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: drova-admin
subjects:
  # ServiceAccount für CI/CD + automation (existed, bleibt)
  - kind: ServiceAccount
    name: drova-admin-sa
    namespace: drova
  # OIDC Group: jeder User in LLDAP-Group `drova-admins` bekommt
  # admin auf drova ns via kubectl (mit kubelogin → KC → JWT).
  # Onboarding: User in LLDAP-Group `drova-admins` adden — done.
  - kind: Group
    name: "oidc-grp:drova-admins"
    apiGroup: rbac.authorization.k8s.io
