apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: strimzi-entity-operator
  namespace: drova
spec:
  exceptions:
    - policyName: require-run-as-non-root
      ruleNames:
        - check-run-as-non-root
        - autogen-check-run-as-non-root
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - drova
          selector:
            matchLabels:
              strimzi.io/component-type: entity-operator
