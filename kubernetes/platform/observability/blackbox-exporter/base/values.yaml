replicas: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: []
        method: GET
        no_follow_redirects: false
        fail_if_ssl: false
        fail_if_not_ssl: false
        preferred_ip_protocol: "ip4"
    http_post_2xx:
      prober: http
      timeout: 5s
      http:
        method: POST
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: "ip4"
    dns_external:
      prober: dns
      timeout: 5s
      dns:
        query_name: "cloudflare.com"
        query_type: "A"
        valid_rcodes: ["NOSUCHNAME","NOERROR"]
        preferred_ip_protocol: "ip4"
    tcp_connect:
      prober: tcp
      timeout: 5s

serviceMonitor:
  enabled: false

prometheusRule:
  enabled: false
