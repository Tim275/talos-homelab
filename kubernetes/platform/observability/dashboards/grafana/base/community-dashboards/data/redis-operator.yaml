apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: redis-operator
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: "Data"
  resyncPeriod: 5m
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "prometheus"
    - inputName: "DS_LOKI"
      datasourceName: "loki"
  url: "https://grafana.com/api/dashboards/12165/revisions/1/download"
