apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Drova tenant-specific alert rules — co-located for discoverability.
# Cluster-wide alerts remain in ../../{apps,slo,data,network,...}.
resources:
  - apps.yaml         # DrovaPodNotReady, drova-service errors
  - anomaly.yaml      # Anomaly-detection rules for drova metrics
  - slos.yaml         # SLO burn-rate alerts (Drova HTTP/gRPC)
  - latency.yaml      # p99 latency thresholds
