---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: platform-identity
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2

  storage:
    size: 20Gi
    storageClass: rook-ceph-block-enterprise

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      secret:
        name: keycloak-db-credentials

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "90d"
    barmanObjectStore:
      destinationPath: s3://cnpg-keycloak-backup/
      endpointURL: http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80
      s3Credentials:
        accessKeyId:
          name: cnpg-keycloak-backup
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-keycloak-backup
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
        jobs: 2
      serverName: keycloak-db
    target: prefer-standby
