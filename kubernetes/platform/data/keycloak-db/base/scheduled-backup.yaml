apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: keycloak-db-daily-backup
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  schedule: "0 3 * * *"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: keycloak-db
  method: barmanObjectStore
