apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: drova-postgres
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: timour-homelab
    app.kubernetes.io/layer: platform
    app.kubernetes.io/domain: data
    platform.domain: data
    platform.homelab/tenant: drova
    team: timour
spec:
  project: platform
  source:
    repoURL: https://github.com/Tim275/talos-homelab
    targetRevision: HEAD
    path: kubernetes/platform/data/drova-postgres/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: drova
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
      - ServerSideDiff=false
