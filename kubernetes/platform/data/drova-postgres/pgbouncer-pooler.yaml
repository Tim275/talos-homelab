apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: drova-postgres-pooler
  namespace: drova
  labels:
    app.kubernetes.io/name: drova-postgres-pooler
    app.kubernetes.io/component: connection-pooler
    platform.homelab/tenant: drova
spec:
  cluster:
    name: drova-postgres
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "25"
      reserve_pool_size: "5"
      server_idle_timeout: "600"
