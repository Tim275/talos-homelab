apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: drova-backup-store
  namespace: drova
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  configuration:
    destinationPath: s3://cnpg-drova-backup/
    endpointURL: http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80
    s3Credentials:
      accessKeyId:
        name: cnpg-drova-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-drova-backup
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
      jobs: 2
  retentionPolicy: "90d"
  # CPU bump: parallel-jobs=2 + WAL-archiver throttled hard at 200m default
  # → 60-80% CPU throttling visible in metrics (alert: CPUThrottlingHigh).
  instanceSidecarConfiguration:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
