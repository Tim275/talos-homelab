apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: drova-backup-store
  namespace: drova
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  configuration:
    destinationPath: s3://cnpg-drova-backup/
    endpointURL: http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80
    s3Credentials:
      accessKeyId:
        name: cnpg-drova-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-drova-backup
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
      jobs: 2
  retentionPolicy: "30d"
