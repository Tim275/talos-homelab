apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-postgres-daily-backup
  namespace: n8n-prod
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  schedule: "0 2 * * *"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: n8n-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
