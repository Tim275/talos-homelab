apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: n8n-postgres-pooler
  namespace: n8n-prod
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  cluster:
    name: n8n-postgres
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "25"
      reserve_pool_size: "5"
      server_idle_timeout: "600"
