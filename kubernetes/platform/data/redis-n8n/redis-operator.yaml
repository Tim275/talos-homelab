# Redis Operator CR for N8N
# Managed by OpsTree Redis Operator
#
# BEST PRACTICE for Queue Mode:
# - Small PVC (1Gi) - Redis only stores temporary job queue
# - Node Affinity - Prevents Multi-Attach errors on RWO volumes
# - PostgreSQL stores the actual workflow data
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis-n8n
  namespace: n8n-prod
spec:
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.12
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  # Node Affinity - Pin to worker-2 to prevent Multi-Attach errors
  # worker-2 has 32GB RAM (nipogi) - good for stateful workloads
  nodeSelector:
    kubernetes.io/hostname: worker-2
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.79.0
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-block-enterprise
        resources:
          requests:
            storage: 1Gi  # Reduced from 8Gi - Redis queue needs minimal storage
