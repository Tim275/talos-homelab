apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-dev-daily-backup
  namespace: n8n-dev
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  schedule: "0 4 * * *"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: n8n-postgres
  method: barmanObjectStore
