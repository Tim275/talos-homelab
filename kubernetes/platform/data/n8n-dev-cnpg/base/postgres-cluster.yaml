---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-postgres
  namespace: n8n-dev
  labels:
    app.kubernetes.io/name: n8n-postgres
    app.kubernetes.io/component: database
    environment: development
  annotations:
    argocd.argoproj.io/sync-wave: '3'
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.1
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m
  storage:
    size: 2Gi
    storageClass: rook-ceph-block-enterprise
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-n8n-dev-backup/
      endpointURL: http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80
      s3Credentials:
        accessKeyId:
          name: cnpg-n8n-dev-backup
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-n8n-dev-backup
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
      serverName: n8n-postgres-dev
    retentionPolicy: 7d
  bootstrap:
    initdb:
      database: n8n
      owner: n8n
      secret:
        name: n8n-postgres-credentials
  affinity:
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
  monitoring:
    enablePodMonitor: true
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-postgres-credentials
  namespace: n8n-dev
  labels:
    environment: development
  annotations:
    argocd.argoproj.io/sync-wave: '2'
type: kubernetes.io/basic-auth
stringData:
  username: n8n
  password: n8nDevPassword123
