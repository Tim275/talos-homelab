apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: lldap-postgres-pooler
  namespace: lldap
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  cluster:
    name: lldap-postgres
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "200"
      default_pool_size: "10"
      reserve_pool_size: "2"
      server_idle_timeout: "600"
