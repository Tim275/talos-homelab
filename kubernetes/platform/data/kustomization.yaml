apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # DATABASES (CloudNativePG)
  - keycloak-db/application.yaml
  - n8n-prod-cnpg/application.yaml
  # - n8n-dev-cnpg/application.yaml
  # STORES & TIMESERIES
  - redis-n8n/application.yaml
  - drova-postgres/application.yaml
  - influxdb/application.yaml
  # ADMIN
  - cloudbeaver/application.yaml

  # DISABLED
  # - lldap-db/application.yaml      # lldap uses built-in SQLite
  # - infisical-db/application.yaml  # not currently deployed
  # - druid/application.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: timour-homelab
      app.kubernetes.io/domain: data
      app.kubernetes.io/layer: platform
      team: timour

commonAnnotations:
  argocd.argoproj.io/sync-wave: "15"

