apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: redis-drova
  namespace: drova
  labels:
    app.kubernetes.io/name: redis-drova
    app.kubernetes.io/component: cache
    platform.homelab/tenant: drova
spec:
  clusterSize: 2
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.4.7@sha256:b6dd75f518d7ab1b23cc377bbc4cae0c04bb8c99b9b17e7855d820ec98d6bdbc
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    redisSecret:
      name: drova-redis-secret
      key: password
  redisConfig:
    additionalRedisConfig: redis-drova-external-config
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.80.2@sha256:d01cb919c12b66b07214de0ad86fe4426fc168819bdefd4ecb211da7cffcef18
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m       # was 100m, throttled 33%
        memory: 128Mi
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-block-enterprise
        resources:
          requests:
            storage: 2Gi
