---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: oms
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: oms
    app.kubernetes.io/component: database
    platform.homelab/tenant: oms
type: Opaque
stringData:
  POSTGRES_USER: stock
  POSTGRES_PASSWORD: stock123
  POSTGRES_DB: stock
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: oms
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: oms
data:
  init.sql: |
    -- Stock Service Database Schema
    CREATE TABLE IF NOT EXISTS items (
        id VARCHAR(255) PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        price INTEGER NOT NULL,
        stock INTEGER NOT NULL DEFAULT 0
    );

    -- Insert sample menu items
    INSERT INTO items (id, name, price, stock) VALUES
        ('burger', 'Classic Burger', 899, 100),
        ('fries', 'French Fries', 399, 200),
        ('cola', 'Cola', 249, 300),
        ('pizza', 'Margherita Pizza', 1199, 50),
        ('salad', 'Caesar Salad', 699, 75),
        ('coffee', 'Espresso', 299, 150)
    ON CONFLICT (id) DO UPDATE SET
        name = EXCLUDED.name,
        price = EXCLUDED.price;

    -- Create view for menu display
    CREATE OR REPLACE VIEW menu AS
    SELECT id, name, price FROM items WHERE stock > 0;

    -- Create view for stock status
    CREATE OR REPLACE VIEW stock_status AS
    SELECT id, name, stock,
        CASE
            WHEN stock = 0 THEN 'OUT_OF_STOCK'
            WHEN stock < 10 THEN 'LOW_STOCK'
            ELSE 'IN_STOCK'
        END as status
    FROM items;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: oms
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: oms
    app.kubernetes.io/component: database
    platform.homelab/tenant: oms
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: oms
        platform.homelab/tenant: oms
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - stock
                - -d
                - stock
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - stock
                - -d
                - stock
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
          platform.homelab/tenant: oms
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-block-enterprise
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: oms
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: oms
    app.kubernetes.io/component: database
    platform.homelab/tenant: oms
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
