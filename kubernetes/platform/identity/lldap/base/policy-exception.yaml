apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: lldap-bootstrap
  namespace: lldap
spec:
  background: false
  match:
    any:
      - resources:
          kinds: [Job, Pod]
          namespaces: [lldap]
          names: ["lldap-bootstrap*"]
  exceptions:
    - policyName: disallow-privileged-containers
      ruleNames: [privileged-containers, autogen-privileged-containers]
    - policyName: require-run-as-non-root
      ruleNames: [check-run-as-non-root, autogen-check-run-as-non-root]
    - policyName: disallow-capabilities
      ruleNames: [adding-capabilities, autogen-adding-capabilities]
    - policyName: disallow-capabilities-strict
      ruleNames: [require-drop-all, autogen-require-drop-all]
    - policyName: require-resource-limits
      ruleNames: [check-resource-limits, autogen-check-resource-limits]
    - policyName: require-resource-requests
      ruleNames: [check-resource-requests, autogen-check-resource-requests]
