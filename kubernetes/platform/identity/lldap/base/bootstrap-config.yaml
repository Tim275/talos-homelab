apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-env
  namespace: lldap
data:
  LLDAP_URL: "http://lldap:17170"
  DO_CLEANUP: "true"  # Enforced by bootstrap-job cleanup step — deletes LLDAP users not in users.json (admin protected, skips if config empty)

---
# Custom Attributes Schema (LLDAP v0.6+)
apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-user-schemas
  namespace: lldap
data:
  user-schemas.json: |
    [
      {
        "name": "argocd",
        "attributeType": "STRING",
        "isEditable": true,
        "isList": true,
        "isVisible": true
      },
      {
        "name": "n8n",
        "attributeType": "STRING",
        "isEditable": true,
        "isList": true,
        "isVisible": true
      },
      {
        "name": "grafana",
        "attributeType": "STRING",
        "isEditable": true,
        "isList": true,
        "isVisible": true
      }
    ]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-users
  namespace: lldap
data:
  # Git = single source of truth. bootstrap-job reconciles LLDAP to match this list:
  # creates missing users AND deletes drift (anything here missing → removed, admin protected).
  # ONBOARDING a new person: add a block below with a LEAST-PRIV group (developers/viewers —
  # NOT the admin groups). They get a temp password here; on first login they set their own
  # via LLDAP UI, then Keycloak syncs them + forces TOTP (MFA).
  users.json: |
    [
      {
        "id": "tim275",
        "email": "timour.miagol@outlook.de",
        "firstName": "Timour",
        "lastName": "Miagol",
        "displayName": "Timour Miagol - Cluster Admin",
        "password": "${LLDAP_USER_PASSWORD}",
        "groups": ["cluster-admins", "lldap_admin"]
      },
      {
        "id": "anna",
        "email": "anna@timourhomelab.org",
        "firstName": "Anna",
        "lastName": "Weber",
        "displayName": "Anna Weber (Demo — Developer)",
        "password": "${LLDAP_ANNA_PASSWORD}",
        "groups": ["developers"]
      },
      {
        "id": "ben",
        "email": "ben@timourhomelab.org",
        "firstName": "Ben",
        "lastName": "Fischer",
        "displayName": "Ben Fischer (Demo — Viewer)",
        "password": "${LLDAP_BEN_PASSWORD}",
        "groups": ["viewers"]
      },
      {
        "id": "clara",
        "email": "clara@timourhomelab.org",
        "firstName": "Clara",
        "lastName": "Schmidt",
        "displayName": "Clara Schmidt (Demo — Drova-Admin)",
        "password": "${LLDAP_CLARA_PASSWORD}",
        "groups": ["drova-admins"]
      }
    ]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-groups
  namespace: lldap
data:
  groups.json: |
    [
      {"name": "cluster-admins"},
      {"name": "developers"},
      {"name": "deployers"},
      {"name": "viewers"},
      {"name": "drova-admins"},
      {"name": "platform-engineers"},
      {"name": "sre-team"},
      {"name": "security-team"},
      {"name": "ml-engineers"}
    ]
