apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-env
  namespace: lldap
data:
  LLDAP_URL: "http://lldap:17170"
  DO_CLEANUP: "true"  # Remove users/groups not in config

---
# Custom Attributes Schema (LLDAP v0.6+)
apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-user-schemas
  namespace: lldap
data:
  user-schemas.json: |
    [
      {
        "name": "argocd",
        "attributeType": "STRING",
        "isEditable": true,
        "isList": true,
        "isVisible": true
      },
      {
        "name": "n8n",
        "attributeType": "STRING",
        "isEditable": true,
        "isList": true,
        "isVisible": true
      },
      {
        "name": "grafana",
        "attributeType": "STRING",
        "isEditable": true,
        "isList": true,
        "isVisible": true
      }
    ]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-users
  namespace: lldap
data:
  users.json: |
    [
      {
        "id": "timour",
        "email": "timour@timourhomelab.org",
        "firstName": "Timour",
        "lastName": "Homelab",
        "displayName": "Timour - Keycloak User",
        "password": "${LLDAP_USER_PASSWORD}",
        "groups": ["cluster-admins", "argocd-admins"]
      },
      {
        "id": "tim275",
        "email": "timour.miagol@outlook.de",
        "firstName": "Timour",
        "lastName": "Miagol",
        "displayName": "Timour Miagol - Cluster Admin",
        "password": "${LLDAP_USER_PASSWORD}",
        "groups": ["cluster-admins", "argocd-admins"]
      },
      {
        "id": "crasher",
        "email": "crasher222220000@gmail.com",
        "firstName": "Crasher",
        "lastName": "Test",
        "displayName": "Crasher Test - Drova Admin",
        "password": "${LLDAP_USER_PASSWORD}",
        "groups": ["drova-admins"]
      }
    ]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bootstrap-groups
  namespace: lldap
data:
  groups.json: |
    [
      {"name": "cluster-admins"},
      {"name": "argocd-admins"},
      {"name": "developers"},
      {"name": "operators"},
      {"name": "viewers"},
      {"name": "drova-admins"},
      {"name": "drova-developers"}
    ]
