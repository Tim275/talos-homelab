
# LLDAP Bootstrap CronJob — runs hourly, idempotent.
# Self-heals if users/groups are deleted/lost (e.g. PVC reset, cluster recreate).
# Script is idempotent: existing users/groups produce "already exists" → no-op.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: lldap-bootstrap
  namespace: lldap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: wait-for-lldap
              image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
              command:
                - sh
                - -c
                - |
                  echo "Waiting for LLDAP to be ready..."
                  for i in $(seq 1 60); do
                    if nc -z lldap 17170 2>/dev/null; then
                      echo "LLDAP is ready!"
                      exit 0
                    fi
                    echo "Attempt $i/60: LLDAP not ready, waiting 5s..."
                    sleep 5
                  done
                  echo "ERROR: LLDAP not ready after 5 minutes"
                  exit 1
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
          containers:
            - name: bootstrap
              image: alpine:3.24@sha256:f5064d3e5f88c467c714509f491853ab2d951932c5cad699c0cb969dcec6f3b4
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl jq gettext

                  echo "============================================"
                  echo "LLDAP Bootstrap - Creating Users and Groups"
                  echo "============================================"

                  # Get auth token
                  echo "Authenticating with LLDAP..."
                  TOKEN=$(curl -sf -X POST http://lldap:17170/auth/simple/login \
                    -H "Content-Type: application/json" \
                    -d "{\"username\":\"$LLDAP_ADMIN_USERNAME\",\"password\":\"$LLDAP_ADMIN_PASSWORD\"}" \
                    | jq -r '.token')

                  if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
                    echo "ERROR: Failed to authenticate with LLDAP"
                    exit 1
                  fi
                  echo "Authentication successful!"

                  # Function to make GraphQL requests
                  gql() {
                    curl -sf -X POST http://lldap:17170/api/graphql \
                      -H "Content-Type: application/json" \
                      -H "Authorization: Bearer $TOKEN" \
                      -d "$1"
                  }

                  # Create groups from ConfigMap
                  echo ""
                  echo "--- Creating Groups ---"
                  cat /config/groups.json | jq -c '.[]' | while read group; do
                    NAME=$(echo "$group" | jq -r '.name')
                    echo "Creating group: $NAME"
                    RESULT=$(gql "{\"query\": \"mutation { createGroup(name: \\\"$NAME\\\") { id } }\"}" 2>&1 || true)
                    if echo "$RESULT" | grep -q '"id"'; then
                      echo "  Created: $NAME"
                    elif echo "$RESULT" | grep -q 'already exists'; then
                      echo "  Exists: $NAME"
                    else
                      echo "  Result: $RESULT"
                    fi
                  done

                  # Get group IDs for later
                  echo ""
                  echo "--- Fetching Group IDs ---"
                  GROUPS_RESPONSE=$(gql '{"query": "{ groups { id displayName } }"}')
                  echo "$GROUPS_RESPONSE" | jq -r '.data.groups[] | "\(.displayName): \(.id)"'

                  # Create users from ConfigMap
                  echo ""
                  echo "--- Creating Users ---"
                  USERS_JSON=$(envsubst '$LLDAP_USER_PASSWORD $LLDAP_ANNA_PASSWORD $LLDAP_BEN_PASSWORD $LLDAP_CLARA_PASSWORD' < /config/users.json)
                  echo "$USERS_JSON" | jq -c '.[]' | while read user; do
                    ID=$(echo "$user" | jq -r '.id')
                    EMAIL=$(echo "$user" | jq -r '.email')
                    FIRST=$(echo "$user" | jq -r '.firstName // ""')
                    LAST=$(echo "$user" | jq -r '.lastName // ""')
                    DISPLAY=$(echo "$user" | jq -r '.displayName // .id')

                    echo "Creating user: $ID ($EMAIL)"

                    # Create user
                    RESULT=$(gql "{\"query\": \"mutation { createUser(user: {id: \\\"$ID\\\", email: \\\"$EMAIL\\\", displayName: \\\"$DISPLAY\\\"}) { id } }\"}" 2>&1 || true)
                    if echo "$RESULT" | grep -q '"id"'; then
                      echo "  Created: $ID"
                    elif echo "$RESULT" | grep -q 'already exists'; then
                      echo "  Exists: $ID"
                    else
                      echo "  Result: $RESULT"
                    fi

                    # Add user to groups
                    USER_GROUPS=$(echo "$user" | jq -r '.groups[]?' 2>/dev/null || true)
                    for GROUP_NAME in $USER_GROUPS; do
                      GROUP_ID=$(echo "$GROUPS_RESPONSE" | jq -r ".data.groups[] | select(.displayName==\"$GROUP_NAME\") | .id")
                      if [ -n "$GROUP_ID" ]; then
                        echo "  Adding to group: $GROUP_NAME (ID: $GROUP_ID)"
                        gql "{\"query\": \"mutation { addUserToGroup(userId: \\\"$ID\\\", groupId: $GROUP_ID) { ok } }\"}" > /dev/null 2>&1 || true
                      fi
                    done
                  done

                  # Set passwords via LDAP (GraphQL doesn't support password setting)
                  echo ""
                  echo "--- Setting Passwords via LDAP ---"
                  apk add --no-cache openldap-clients

                  USERS_JSON=$(envsubst '$LLDAP_USER_PASSWORD $LLDAP_ANNA_PASSWORD $LLDAP_BEN_PASSWORD $LLDAP_CLARA_PASSWORD' < /config/users.json)
                  echo "$USERS_JSON" | jq -c '.[]' > /tmp/users.txt

                  # Redirect from a file (not a pipe) so FAILED survives the loop —
                  # a "echo | while" runs in a subshell and loses the counter.
                  FAILED=0
                  while read user; do
                    ID=$(echo "$user" | jq -r '.id')
                    PASSWORD=$(echo "$user" | jq -r '.password // empty')

                    if [ -n "$PASSWORD" ]; then
                      echo "Setting password for: $ID"

                      # 1. Verify if existing password ALREADY works → skip if yes
                      if ldapwhoami -x -H ldap://lldap-ldap:389 \
                          -D "uid=$ID,ou=people,dc=homelab,dc=local" \
                          -w "$PASSWORD" >/dev/null 2>&1; then
                        echo "  ✓ already correct, skip"
                        continue
                      fi

                      # 2. Set password — if-form so a hard error (LDAP unreachable)
                      #    does not trip set -e and kill the whole job.
                      if ldappasswd -x -H ldap://lldap-ldap:389 \
                          -D "uid=$LLDAP_ADMIN_USERNAME,ou=people,dc=homelab,dc=local" \
                          -w "$LLDAP_ADMIN_PASSWORD" \
                          -s "$PASSWORD" \
                          "uid=$ID,ou=people,dc=homelab,dc=local"; then
                        # 3. Verify the new password actually works (catches dual-store-bug)
                        if ldapwhoami -x -H ldap://lldap-ldap:389 \
                            -D "uid=$ID,ou=people,dc=homelab,dc=local" \
                            -w "$PASSWORD" >/dev/null 2>&1; then
                          echo "  ✓ password verified"
                        else
                          echo "  ✗ ldappasswd reported OK but ldap-bind STILL fails (LLDAP dual-store bug?)"
                          FAILED=$((FAILED+1))
                        fi
                      else
                        echo "  ✗ ldappasswd FAILED for $ID (LDAP unreachable/error)"
                        FAILED=$((FAILED+1))
                      fi
                    fi
                  done < /tmp/users.txt

                  # 2026-05-16: Don't fail the whole CronJob run if 1-2 users have
                  # dual-store-bug. Bootstrap is idempotent reconcile — admins should
                  # be alerted but recurring CronJob-failure-alerts are noise.
                  # Failed users keep getting retried hourly. WHEN ALL users start
                  # failing → real auth-issue, then alert via lldap-bootstrap-script.
                  if [ "${FAILED:-0}" -ge 3 ]; then
                    echo "ERROR: $FAILED password operations failed — job marked failed (≥3 fails = real issue)"
                    exit 1
                  elif [ "${FAILED:-0}" -gt 0 ]; then
                    echo "WARN: $FAILED users hit dual-store-bug — continuing (idempotent retry next hour)"
                  fi

                  # --- Cleanup: delete LLDAP users NOT in config (declarative reconcile) ---
                  # Makes Git the source of truth. Guards: never touch 'admin', skip if config
                  # somehow empty (prevents wiping everyone on a bad mount).
                  echo ""
                  echo "--- Cleanup (drift removal) ---"
                  CONFIG_IDS=$(echo "$USERS_JSON" | jq -r '.[].id')
                  if [ "$(echo "$CONFIG_IDS" | grep -c .)" -lt 1 ]; then
                    echo "  SAFETY: config lists 0 users → skip cleanup (won't wipe)"
                  else
                    LIVE_IDS=$(gql '{"query":"{ users { id } }"}' | jq -r '.data.users[].id')
                    for uid in $LIVE_IDS; do
                      [ "$uid" = "admin" ] && continue
                      if ! echo "$CONFIG_IDS" | grep -qx "$uid"; then
                        echo "  DELETING drift user: $uid (not in config)"
                        gql "{\"query\": \"mutation { deleteUser(userId: \\\"$uid\\\") { ok } }\"}" > /dev/null 2>&1 \
                          || echo "    (delete failed for $uid)"
                      fi
                    done
                  fi

                  # --- Cleanup: delete LLDAP groups NOT in config (declarative) ---
                  # Protect LLDAP built-in groups. Skip if config somehow empty.
                  echo ""
                  echo "--- Group cleanup (drift removal) ---"
                  CFG_GROUPS=$(cat /config/groups.json | jq -r '.[].name')
                  if [ "$(echo "$CFG_GROUPS" | grep -c .)" -lt 1 ]; then
                    echo "  SAFETY: config lists 0 groups → skip"
                  else
                    gql '{"query":"{ groups { id displayName } }"}' \
                      | jq -r '.data.groups[] | "\(.id)|\(.displayName)"' | while IFS='|' read gid gname; do
                      case "$gname" in lldap_admin|lldap_password_manager|lldap_strict_readonly) continue;; esac
                      if ! echo "$CFG_GROUPS" | grep -qx "$gname"; then
                        echo "  DELETING drift group: $gname (id $gid)"
                        gql "{\"query\": \"mutation { deleteGroup(groupId: $gid) { ok } }\"}" > /dev/null 2>&1 \
                          || echo "    (delete failed for $gname)"
                      fi
                    done
                  fi

                  echo ""
                  echo "============================================"
                  echo "Bootstrap Complete!"
                  echo "============================================"
              env:
                - name: LLDAP_ADMIN_USERNAME
                  value: "admin"
                - name: LLDAP_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: lldap-secrets
                      key: admin-password
                - name: LLDAP_USER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: lldap-secrets
                      key: user-password
                - name: LLDAP_ANNA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: lldap-secrets
                      key: anna-password
                - name: LLDAP_BEN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: lldap-secrets
                      key: ben-password
                - name: LLDAP_CLARA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: lldap-secrets
                      key: clara-password
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: config
              projected:
                sources:
                  - configMap:
                      name: bootstrap-users
                  - configMap:
                      name: bootstrap-groups
