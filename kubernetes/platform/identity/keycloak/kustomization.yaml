---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

resources:
  # Secrets
  - admin-sealed-secret.yaml
  - db-credentials-sealed.yaml

  # Database
  - postgres-cluster.yaml

  # Core Keycloak
  - deployment.yaml
  - service.yaml

  # Setup Jobs
  - mfa-setup.yaml
  # - enterprise-config.yaml  # Uncomment to enable all enterprise features (Password Policies, Brute Force Protection, etc.)

  # Networking
  - httproute.yaml
  # certificate.yaml - NOT NEEDED: Gateway uses wildcard cert

labels:
  - pairs:
      app.kubernetes.io/part-of: platform-identity
      app.kubernetes.io/managed-by: argocd
