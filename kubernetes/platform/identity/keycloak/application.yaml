---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: oidc-provider
    app.kubernetes.io/part-of: platform-identity
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/Tim275/talos-homelab.git
    targetRevision: main
    path: kubernetes/platform/identity/keycloak/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    # 2026-05-06: auto-sync DEAKTIVIERT — manuelles Sync only.
    # Grund: setup-jobs (ldap-federation, mfa, oidc-clients) re-creating duplicate
    # entries bei jedem ArgoCD-self-heal. Zudem überschreibt automated sync
    # manuelle kcadm-Fixes (z.B. editMode UNSYNCED, role-bindings).
    # Re-aktivieren NACH: LLDAP-Upgrade (0.6.2-alpha → 2025-stable) +
    # Phase D (Realm-as-Code via KeycloakRealmImport CR ersetzt setup-jobs).
    # automated:
    #   prune: true
    #   selfHeal: true
    #   allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
