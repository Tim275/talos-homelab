# Reconciles secrets the operator's KeycloakRealmImport leaves as unsubstituted
# ${...} placeholders in the kubernetes realm:
#   - lldap-federation bindCredential  (else login → "LDAP error code 49")
#   - argocd / grafana / kubernetes OIDC client secrets  (else SSO token exchange fails)
# Hourly + idempotent. Self-heals after any fresh realm import / cluster rebuild.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-ldap-bind-reconcile
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reconcile
              image: quay.io/keycloak/keycloak:25.0.6@sha256:82c5b7a110456dbd42b86ea572e728878549954cc8bd03cd65410d75328095d2
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  KC=/opt/keycloak/bin/kcadm.sh
                  CONF=/tmp/kcadm.config
                  $KC config credentials --config "$CONF" \
                    --server http://keycloak-service:8080 \
                    --realm master --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASS"

                  FID=$($KC get components --config "$CONF" -r kubernetes \
                    -q type=org.keycloak.storage.UserStorageProvider --fields id \
                    | grep -m1 '"id"' | sed 's/[^:]*: *"//; s/".*//')
                  if [ -n "$FID" ]; then
                    $KC update "components/$FID" --config "$CONF" -r kubernetes \
                      -s "config.bindCredential=[\"$LLDAP_BIND_PASSWORD\"]"
                    echo "OK: lldap-federation bindCredential ($FID)"
                  fi

                  set_secret() {
                    CID="$1"; SEC="$2"
                    ID=$($KC get clients --config "$CONF" -r kubernetes \
                      -q clientId="$CID" --fields id \
                      | grep -m1 '"id"' | sed 's/[^:]*: *"//; s/".*//')
                    if [ -n "$ID" ] && [ -n "$SEC" ]; then
                      $KC update "clients/$ID" --config "$CONF" -r kubernetes -s "secret=$SEC"
                      echo "OK: client secret $CID ($ID)"
                    fi
                  }
                  set_secret argocd "$ARGOCD_CLIENT_SECRET"
                  set_secret grafana "$GRAFANA_CLIENT_SECRET"
                  set_secret kubernetes "$KUBECTL_CLIENT_SECRET"
              env:
                - name: KC_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-initial-admin
                      key: username
                - name: KC_ADMIN_PASS
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-initial-admin
                      key: password
                - name: LLDAP_BIND_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-lldap-admin
                      key: password
                - name: ARGOCD_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: argocd-oidc-client-secret
                      key: clientSecret
                - name: GRAFANA_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-grafana-client-secret
                      key: clientSecret
                - name: KUBECTL_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-kubectl-client-secret
                      key: clientSecret
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
