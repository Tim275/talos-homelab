realm: kubernetes
displayName: "Kubernetes Homelab"
# frontendUrl forces all action-tokens (welcome/reset emails) to use
# the public hostname even if API was called via port-forward.
# Battle-tested 2026-05-09 — vorher leakte port-forward host in welcome-mails.
attributes:
  frontendUrl: "https://iam.timourhomelab.org"
enabled: true
sslRequired: external
registrationAllowed: false
loginWithEmailAllowed: true
duplicateEmailsAllowed: false
resetPasswordAllowed: true # Self-service: forgot-password
editUsernameAllowed: false
rememberMe: true
verifyEmail: true # Email-verify required after first login
bruteForceProtected: true
failureFactor: 5
waitIncrementSeconds: 60
maxFailureWaitSeconds: 900
quickLoginCheckMilliSeconds: 1000
# SMTP — Resend (configured via env-vars from sealed-secret/keycloak-smtp)
smtpServer:
  host: "smtp.resend.com"
  port: "587"
  from: "$(SMTP_FROM:-it@timourhomelab.org)"
  fromDisplayName: "Timour Homelab IAM"
  replyTo: "$(SMTP_REPLY_TO:-it@timourhomelab.org)"
  replyToDisplayName: "Timour Homelab IAM"
  envelopeFrom: "$(SMTP_FROM:-it@timourhomelab.org)"
  ssl: "false"
  starttls: "true"
  auth: "true"
  user: "$(SMTP_USER:-resend)"
  password: "$(SMTP_PASSWORD)"
# Audit Events → stdout → Vector → ES logs-* index
eventsEnabled: true
eventsExpiration: 2592000
eventsListeners:
  - jboss-logging
enabledEventTypes:
  - LOGIN
  - LOGIN_ERROR
  - LOGOUT
  - LOGOUT_ERROR
  - REGISTER
  - REFRESH_TOKEN
  - REFRESH_TOKEN_ERROR
  - CODE_TO_TOKEN
  - CODE_TO_TOKEN_ERROR
  - CLIENT_LOGIN
  - CLIENT_LOGIN_ERROR
  - UPDATE_PASSWORD
  - UPDATE_TOTP
  - REMOVE_TOTP
  - SEND_RESET_PASSWORD
  - RESET_PASSWORD
  - IDENTITY_PROVIDER_LOGIN
adminEventsEnabled: true
adminEventsDetailsEnabled: true
# Token lifetimes
accessTokenLifespan: 3600 # 1h
ssoSessionIdleTimeout: 1800 # 30min
ssoSessionMaxLifespan: 36000 # 10h
# Realm-Roles
roles:
  realm:
    - name: grafana-admin
      description: "Grafana GrafanaAdmin role"
    - name: grafana-editor
      description: "Grafana Editor role"
# Groups (LDAP-Federation will sync these from LLDAP, but defining here ensures they exist)
groups:
  - name: cluster-admins
    path: /cluster-admins
  - name: argocd-admins
    path: /argocd-admins
# Default-roles attached to every user (not modified)
defaultRole:
  name: default-roles-kubernetes
  composite: true
  clientRole: false
# ── 2FA enforcement (TOTP via Authenticator-App) ──────────────────────
# Phase 4 (re-enabled 2026-05-06 nach Phase D fix):
# Jeder neue User → CONFIGURE_TOTP als Required-Action.
# Beim ersten Browser-Login zeigt KC QR-Code für Authy/Google Authenticator.
# WICHTIG: blockt grant_type=password (curl) — Test ausschließlich via Browser.
requiredActions:
  - alias: CONFIGURE_TOTP
    name: "Configure OTP"
    providerId: CONFIGURE_TOTP
    enabled: true
    defaultAction: true
    priority: 10
  - alias: UPDATE_PASSWORD
    name: "Update Password"
    providerId: UPDATE_PASSWORD
    enabled: true
    defaultAction: false
    priority: 30
# OTP Policy
otpPolicyType: totp
otpPolicyAlgorithm: HmacSHA1
otpPolicyDigits: 6
otpPolicyPeriod: 30
otpPolicyLookAheadWindow: 1
# ── CLIENT SCOPES ──────────────────────────────────────────────────────
# 'groups' scope: maps user's KC groups to JWT 'groups' claim.
# ArgoCD/Grafana use this for RBAC: cluster-admins → role:admin etc.
clientScopes:
  - name: groups
    description: "Group membership (mapped to 'groups' JWT claim)"
    protocol: openid-connect
    attributes:
      include.in.token.scope: "true"
      display.on.consent.screen: "true"
      consent.screen.text: "Group membership"
    protocolMappers:
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        consentRequired: false
        config:
          claim.name: "groups"
          full.path: "false" # → "cluster-admins" not "/cluster-admins"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
  # Standard OIDC scopes — a clientScopes block suppresses Keycloak's built-in
  # defaults, so profile/email/roles must be defined here or argocd/grafana
  # requesting them fails with "Invalid scopes".
  - name: profile
    protocol: openid-connect
    attributes:
      include.in.token.scope: "true"
      display.on.consent.screen: "true"
    protocolMappers:
      - name: username
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        config:
          user.attribute: "username"
          claim.name: "preferred_username"
          jsonType.label: "String"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
      - name: given name
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        config:
          user.attribute: "firstName"
          claim.name: "given_name"
          jsonType.label: "String"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
      - name: family name
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        config:
          user.attribute: "lastName"
          claim.name: "family_name"
          jsonType.label: "String"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
  - name: email
    protocol: openid-connect
    attributes:
      include.in.token.scope: "true"
      display.on.consent.screen: "true"
    protocolMappers:
      - name: email
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        config:
          user.attribute: "email"
          claim.name: "email"
          jsonType.label: "String"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
      - name: email verified
        protocol: openid-connect
        protocolMapper: oidc-usermodel-property-mapper
        config:
          user.attribute: "emailVerified"
          claim.name: "email_verified"
          jsonType.label: "boolean"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
  - name: roles
    protocol: openid-connect
    attributes:
      include.in.token.scope: "false"
      display.on.consent.screen: "true"
    protocolMappers:
      - name: realm roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        config:
          claim.name: "realm_access.roles"
          jsonType.label: "String"
          multivalued: "true"
          id.token.claim: "false"
          access.token.claim: "true"
          userinfo.token.claim: "false"
# ── LDAP USER FEDERATION (LLDAP) ──────────────────────────────────────
components:
  org.keycloak.storage.UserStorageProvider:
    - name: lldap-federation
      providerId: ldap
      subComponents:
        org.keycloak.storage.ldap.mappers.LDAPStorageMapper:
          - name: username
            providerId: user-attribute-ldap-mapper
            config:
              ldap.attribute: ["uid"]
              user.model.attribute: ["username"]
              is.mandatory.in.ldap: ["true"]
              read.only: ["false"]
              always.read.value.from.ldap: ["false"]
          - name: email
            providerId: user-attribute-ldap-mapper
            config:
              ldap.attribute: ["mail"]
              user.model.attribute: ["email"]
              is.mandatory.in.ldap: ["false"]
              read.only: ["true"]
              always.read.value.from.ldap: ["true"]
          - name: first-name
            providerId: user-attribute-ldap-mapper
            config:
              ldap.attribute: ["givenName"]
              user.model.attribute: ["firstName"]
              is.mandatory.in.ldap: ["false"]
              read.only: ["true"]
          - name: last-name
            providerId: user-attribute-ldap-mapper
            config:
              ldap.attribute: ["sn"]
              user.model.attribute: ["lastName"]
              is.mandatory.in.ldap: ["false"]
              read.only: ["true"]
          - name: groups
            providerId: group-ldap-mapper
            config:
              groups.dn: ["ou=groups,dc=homelab,dc=local"]
              group.name.ldap.attribute: ["cn"]
              group.object.classes: ["groupOfUniqueNames"]
              membership.attribute.type: ["DN"]
              membership.ldap.attribute: ["member"]
              membership.user.ldap.attribute: ["uid"]
              preserve.group.inheritance: ["false"]
              ignore.missing.groups: ["false"]
              user.roles.retrieve.strategy: ["LOAD_GROUPS_BY_MEMBER_ATTRIBUTE"]
              mode: ["READ_ONLY"]
              groups.path: ["/"]
              drop.non.existing.groups.during.sync: ["false"]
      config:
        enabled: ["true"]
        priority: ["0"]
        vendor: ["other"]
        authType: ["simple"]
        connectionUrl: ["ldap://lldap-ldap.lldap.svc.cluster.local:389"]
        usersDn: ["ou=people,dc=homelab,dc=local"]
        bindDn: ["uid=admin,ou=people,dc=homelab,dc=local"]
        bindCredential: ["$(LLDAP_BIND_PASSWORD)"]
        usernameLDAPAttribute: ["uid"]
        rdnLDAPAttribute: ["uid"]
        uuidLDAPAttribute: ["uid"]
        userObjectClasses: ["person"]
        searchScope: ["1"]
        useTruststoreSpi: ["ldapsOnly"]
        connectionPooling: ["true"]
        pagination: ["false"]
        # UNSYNCED: LDAP = Source-of-Truth for IDENTITY (id, email, groups).
        # KC stores PASSWORDS + TOTP locally → User Self-Service (UPDATE_PASSWORD,
        # CONFIGURE_TOTP) funktioniert ohne LDAP-write.
        # Trade-off: bei KC-DB-Loss sind Passwörter weg (Welcome-Mail re-trigger).
        # Battle-tested 2026-05-09: READ_ONLY → "Federated storage is not writable".
        editMode: ["UNSYNCED"]
        syncRegistrations: ["false"]
        importEnabled: ["true"]
        cachePolicy: ["NO_CACHE"] # KC v25-bug workaround
        batchSizeForSync: ["1000"]
        fullSyncPeriod: ["-1"]
        changedSyncPeriod: ["86400"]
        trustEmail: ["true"]
# ── OIDC CLIENTS ───────────────────────────────────────────────────────
clients:
  - clientId: argocd
    enabled: true
    protocol: openid-connect
    publicClient: false
    secret: "$(ARGOCD_CLIENT_SECRET)"
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: false
    consentRequired: false
    fullScopeAllowed: true
    redirectUris:
      - "https://argo.timourhomelab.org/auth/callback"
      - "https://argo.timourhomelab.org/api/dex/callback"
    webOrigins:
      - "https://argo.timourhomelab.org"
    defaultClientScopes:
      - profile
      - email
      - roles
      - groups
  - clientId: grafana
    enabled: true
    protocol: openid-connect
    publicClient: false
    secret: "$(GRAFANA_CLIENT_SECRET)"
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: false
    consentRequired: false
    fullScopeAllowed: true
    redirectUris:
      - "https://grafana.timourhomelab.org/login/generic_oauth"
    webOrigins:
      - "https://grafana.timourhomelab.org"
    attributes:
      post.logout.redirect.uris: "https://grafana.timourhomelab.org/*"
    defaultClientScopes:
      - profile
      - email
      - roles
      - groups
  - clientId: kubernetes
    enabled: true
    protocol: openid-connect
    publicClient: false
    secret: "$(KUBECTL_CLIENT_SECRET)"
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: false
    consentRequired: false
    fullScopeAllowed: true
    redirectUris:
      - "urn:ietf:wg:oauth:2.0:oob"
      - "http://localhost:18000"
      - "http://localhost:8000"
    webOrigins:
      - "+"
    defaultClientScopes:
      - profile
      - email
      - roles
      - groups
    # offline_access — kubelogin requests it by default for refresh-tokens.
    # battle-tested 2026-05-14: ohne diesen scope → "Invalid scopes:
    # email groups profile offline_access openid" beim Browser-Login →
    # kubectl OIDC komplett broken. Optional-Scope reicht (kubelogin
    # requested es, KC stellt's bereit, andere Clients ignorieren).
    optionalClientScopes:
      - offline_access
  - clientId: hubble
    enabled: true
    protocol: openid-connect
    publicClient: false
    secret: $(HUBBLE_CLIENT_SECRET)
    standardFlowEnabled: true
    redirectUris:
      - https://hubble.timourhomelab.org/oauth2/callback
    webOrigins:
      - https://hubble.timourhomelab.org
    defaultClientScopes:
      - profile
      - email
      - groups
