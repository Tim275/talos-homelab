# Keycloak ServiceMonitor — scrapes /metrics on management port 9000.
#
# The 4 PrometheusRule alerts that lived here were consolidated 2026-07-14 into
# kube-prometheus-stack/base/alerts/apps/keycloak.yaml (single alert inventory):
#   - KeycloakDown            → duplicate of the tree's page alert (and its kube_pod_labels
#                               join was dead — KSM exposes pod labels only via allowlist)
#   - KeycloakClusterDegraded → dead join + KC runs 1 replica (no degraded state to detect)
#   - InfinispanCacheTimeouts → migrated as KeycloakHttp5xxRateHigh (metric verified live)
#   - KeycloakLoginErrorsHigh → keycloak_failed_login_attempts needs the metrics-spi (0 series)
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: oidc-provider
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: keycloak
      app.kubernetes.io/instance: keycloak
      app.kubernetes.io/managed-by: keycloak-operator
  endpoints:
    - port: management
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
