# Keycloak v2alpha1 CR — managed by keycloak-operator (installed via controllers/operators/)
#
# Replaces the plain Deployment + Service. Operator generates:
#   - StatefulSet "keycloak"
#   - Service "keycloak-service" (HTTP on 8080)
#   - Service "keycloak-discovery" (JGroups headless)
#   - PodDisruptionBudget
#
# Adopts existing CNPG keycloak-db (no data migration). Same admin secret.
# Same Realm + Users + Clients survive — Operator just runs Keycloak against the existing DB.
#
# Reload: pods auto-restart when keycloak-db-credentials Secret rotates (via Stakater Reloader).
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: oidc-provider
    app.kubernetes.io/part-of: platform-identity
  annotations:
    secret.reloader.stakater.com/reload: keycloak-db-credentials,keycloak-admin
spec:
  instances: 3                              # HA: 3 Replicas + Sticky-Session via BackendTrafficPolicy + Infinispan
  image: quay.io/keycloak/keycloak:25.0.6
  startOptimized: false                     # JIT optimization for first start

  db:
    vendor: postgres
    host: keycloak-db-rw.keycloak.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-credentials
      key: username
    passwordSecret:
      name: keycloak-db-credentials
      key: password

  hostname:
    hostname: iam.timourhomelab.org
    strict: false                           # Cloudflare Tunnel + Envoy already handle TLS termination
    strictBackchannel: false

  http:
    httpEnabled: true                       # Envoy Gateway terminates TLS, KC speaks HTTP internally
    httpPort: 8080

  proxy:
    headers: xforwarded                     # Trust X-Forwarded-* headers from Envoy

  features:
    enabled:
      - admin-fine-grained-authz            # Per-realm fine-grained admin permissions

  # Phase D iter-2: Env-vars via unsupported.podTemplate für realm-import-CR
  # placeholder substitution. KC liest ${VAR_NAME} aus pod env beim realm-import.
  # SealedSecrets in this NS bereitstellen.
  unsupported:
    podTemplate:
      spec:
        containers:
          - name: keycloak
            env:
              - name: LLDAP_BIND_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: keycloak-lldap-admin
                    key: password
              - name: ARGOCD_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: argocd-oidc-client-secret
                    key: clientSecret
              - name: GRAFANA_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: keycloak-grafana-client-secret
                    key: clientSecret
              - name: KUBECTL_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: keycloak-kubectl-client-secret
                    key: clientSecret

  additionalOptions:
    - name: log-level
      value: INFO
    - name: spi-sticky-session-encoder-infinispan-should-attach-route
      value: "false"
    # Audit log forwarding: emit LOGIN/LOGOUT/UPDATE_PASSWORD/CONSENT events at INFO →
    # Vector scrapes pod stdout → Elasticsearch logs-* index → Kibana queryable.
    - name: spi-events-listener-jboss-logging-success-level
      value: info
    - name: spi-events-listener-jboss-logging-error-level
      value: warn
  # NOTE: admin user already exists in DB (we manually reset earlier).
  # No bootstrap-admin needed for v2alpha1 — Operator inherits the existing admin.

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi
