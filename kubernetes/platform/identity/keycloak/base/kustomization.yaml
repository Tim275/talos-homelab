apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak

# Phase D (2026-05-06): Realm-as-Code via KeycloakRealmImport CR.
# Replaces 5 imperative setup-jobs (mfa, ldap-federation, oidc-client, argocd-client,
# druid-client) with single declarative realm-import.yaml. No more setup-job race
# conditions, no more federation duplicates, no more drift between live + git.

resources:
  - namespace.yaml

  # Sealed Secrets (creds für KC + LDAP + OIDC clients)
  - admin-sealed-secret.yaml             # KC admin login
  - db-credentials-sealed.yaml           # KC ↔ Postgres
  - lldap-admin-sealed-secret.yaml       # LDAP-Federation bindCredential
  - argocd-oidc-client-secret-sealed.yaml  # argocd OIDC client secret
  - grafana-client-sealed-secret.yaml      # grafana OIDC client secret (Phase D iter-2)
  - kubectl-client-sealed-secret.yaml      # kubernetes (kubectl OIDC) client secret

  # Operator-managed KC StatefulSet
  - keycloak-cr.yaml

  # Realm-as-Code (Phase D — replaces all setup-jobs below)
  - realm-import.yaml

  # Phase D iter-2: Enforce CONFIGURE_TOTP für existing LDAP-federated users
  # (defaultAction=true im realm-import wirkt nur für NEW users).
  # PostSync-Hook, idempotent, skippt User die TOTP schon konfiguriert haben.
  - 2fa-enforce-existing-users.yaml

  # Daily DR backup of realm-config to PVC (Phase A)
  - realm-export-cronjob.yaml

  # Public route via envoy gateway
  - httproute.yaml
  - policy-exception.yaml

  # ─── DEPRECATED — replaced by realm-import.yaml ──────────────────────────
  # The following imperative setup-jobs are obsolete after Phase D. They are
  # kept in the repo for git-history but NOT in resources to prevent re-runs:
  #   - mfa-setup.yaml             → realm-import OTP-policy + requiredActions
  #   - ldap-federation-setup.yaml → realm-import.components.UserStorageProvider
  #   - oidc-client-setup.yaml     → realm-import.clients[kubernetes]
  #   - argocd-client-setup.yaml   → realm-import.clients[argocd]
  #   - druid-client-setup.yaml    → druid is gone, no client needed
  #   - grafana-client-setup.yaml  → realm-import.clients[grafana]
  #   - deployment.yaml            → keycloak-cr.yaml (Operator-managed)
  #   - service.yaml               → keycloak-cr.yaml (Operator-managed)
  #   - certificate.yaml           → not needed (HTTPRoute handles TLS)
  #   - enterprise-config.yaml     → ConfigMap that nothing references

labels:
  - pairs:
      app.kubernetes.io/part-of: platform-identity
      app.kubernetes.io/managed-by: argocd
