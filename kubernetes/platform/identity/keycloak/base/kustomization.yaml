apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak

resources:
  - namespace.yaml
  - admin-sealed-secret.yaml
  - db-credentials-sealed.yaml
  - lldap-admin-sealed-secret.yaml
  - argocd-oidc-client-secret-sealed.yaml
  # Phase 2 (2026-05-05): Operator-managed Keycloak.
  # Plain Deployment + Service replaced by Keycloak CR — Operator creates
  # StatefulSet + keycloak-service automatically. Same DB, same secrets.
  - keycloak-cr.yaml
  # - deployment.yaml      # superseded by keycloak-cr.yaml
  # - service.yaml         # superseded by Operator-generated keycloak-service
  - mfa-setup.yaml
  - ldap-federation-setup.yaml
  - oidc-client-setup.yaml
  - argocd-client-setup.yaml
  - policy-exception.yaml
  - httproute.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: platform-identity
      app.kubernetes.io/managed-by: argocd
