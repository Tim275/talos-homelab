# MFA Self-Heal CronJob — SUSPENDED 2026-05-14 (counter-productive).
#
# History: built to compensate for LDAP-Federation editMode=READ_ONLY bug where
# KC re-imports of federated user wiped local TOTP credentials. With editMode=
# UNSYNCED (current state) KC keeps local credentials across re-imports → this
# cron has nothing to fix and instead INTRODUCED a new bug:
#
#   - User loggs in → if requiredActions=[CONFIGURE_TOTP] → Setup-Wizard zwingt
#     QR-Scan. If user closes browser before submit, KC keeps requiredAction.
#     Next cron-run sees: "already has CONFIGURE_TOTP, skip" → loop forever.
#   - For users WITHOUT any TOTP credentials (e.g. brand new federated user),
#     cron re-adds CONFIGURE_TOTP → user is forced to setup MFA on every login
#     even after successful setup if their submit ever fails.
#
# Result: 3 internal users (timour, tim275, crasher) had requiredActions=
# [CONFIGURE_TOTP] permanently set despite never completing setup. Fixed by
# clearing requiredActions + suspending this cron.
#
# Re-enable ONLY if editMode reverted to READ_ONLY (which we won't do anymore).
# Better long-term: enforce MFA via KC realm-level policy, not via cron.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-2fa-enforce
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-2fa-enforce
    app.kubernetes.io/part-of: platform-identity
spec:
  suspend: true   # 2026-05-14 — siehe Header-Kommentar
  schedule: "15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: keycloak-2fa-enforce
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: enforce
              image: quay.io/keycloak/keycloak:25.0.6@sha256:82c5b7a110456dbd42b86ea572e728878549954cc8bd03cd65410d75328095d2
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: [ALL]
              env:
                - name: KC_URL
                  value: "http://keycloak-service.keycloak.svc.cluster.local:8080"
                - name: KC_ADMIN
                  value: admin
                - name: KC_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-admin
                      key: password
                - name: REALM
                  value: kubernetes
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "=== Wait for KC ready ==="
                  for i in $(seq 1 60); do
                    if /opt/keycloak/bin/kcadm.sh config credentials \
                        --server "$KC_URL" --realm master \
                        --user "$KC_ADMIN" --password "$KC_ADMIN_PASSWORD" 2>/dev/null; then
                      break
                    fi
                    sleep 5
                  done

                  echo ""
                  echo "=== Find users without TOTP configured ==="
                  USERS=$(/opt/keycloak/bin/kcadm.sh get users -r "$REALM" --fields username,id 2>/dev/null \
                    | grep -B1 '"username"' | grep -E '"id"|"username"' \
                    | paste -d, - - \
                    | sed 's/.*"id" : "\([^"]*\)".*"username" : "\([^"]*\)".*/\2 \1/')

                  echo "$USERS" | while read username uid; do
                    [ -z "$username" ] && continue
                    [ "$username" = "admin" ] && { echo "  skip $username (admin)"; continue; }

                    CURRENT=$(/opt/keycloak/bin/kcadm.sh get users/$uid -r "$REALM" --fields requiredActions 2>/dev/null)

                    if echo "$CURRENT" | grep -q "CONFIGURE_TOTP"; then
                      echo "  $username: already has CONFIGURE_TOTP"
                    else
                      HAS_TOTP=$(/opt/keycloak/bin/kcadm.sh get users/$uid/credentials -r "$REALM" 2>/dev/null \
                        | grep -c '"type" : "otp"' || echo "0")

                      if [ "$HAS_TOTP" -gt 0 ]; then
                        echo "  $username: TOTP already configured, skip"
                      else
                        /opt/keycloak/bin/kcadm.sh update users/$uid -r "$REALM" \
                          -s 'requiredActions=["CONFIGURE_TOTP"]' 2>&1 | tail -1
                        echo "  $username: CONFIGURE_TOTP enforced"
                      fi
                    fi
                  done

                  echo ""
                  echo "=== Done ==="
              resources:
                requests: { cpu: 50m,  memory: 256Mi }
                limits:   { cpu: 500m, memory: 512Mi }
