# MFA Audit-Only CronJob (smart-rewrite 2026-05-14).
#
# History (DO NOT REPEAT):
#   First version auto-enforced CONFIGURE_TOTP for any user without TOTP-credential.
#   Bug: user closes browser before submit → KC keeps requiredAction → next cron
#   re-sees "no TOTP" → re-enforces → infinite loop. 3 users (timour/tim275/crasher)
#   stuck in TOTP-setup-loop because their previous submits failed.
#
# Smart-Rewrite:
#   - NO auto-enforce. Audit-only.
#   - Lists users WITHOUT TOTP-credential.
#   - Sends Slack-alert listing them.
#   - Admin reviews + manually enforces via KC UI (per-user, controlled).
#
# Why this is safer:
#   - Zero possibility of CONFIGURE_TOTP loop.
#   - Admin gets visibility every day at 06:00 UTC.
#   - User-initiated setup (no surprise QR-Scan on next login).
#
# When to enforce per-user (admin action):
#   KC UI → Users → <username> → Required user actions → add CONFIGURE_TOTP
#   ODER: kcadm update users/<uid> -r kubernetes -s 'requiredActions=["CONFIGURE_TOTP"]'
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-2fa-audit
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-2fa-audit
    app.kubernetes.io/part-of: platform-identity
spec:
  schedule: "0 6 * * *"            # 06:00 UTC daily (1×, not hourly)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: keycloak-2fa-audit
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: audit
              image: quay.io/keycloak/keycloak:25.0.6@sha256:82c5b7a110456dbd42b86ea572e728878549954cc8bd03cd65410d75328095d2
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: [ALL]
              env:
                - name: KC_URL
                  value: "http://keycloak-service.keycloak.svc.cluster.local:8080"
                - name: KC_ADMIN
                  value: admin
                - name: KC_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-admin
                      key: password
                - name: REALM
                  value: kubernetes
                - name: SLACK_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: alertmanager-slack-webhook
                      key: url
                      optional: true
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "=== Wait for KC ready ==="
                  for i in $(seq 1 60); do
                    if /opt/keycloak/bin/kcadm.sh config credentials \
                        --server "$KC_URL" --realm master \
                        --user "$KC_ADMIN" --password "$KC_ADMIN_PASSWORD" 2>/dev/null; then
                      break
                    fi
                    sleep 5
                  done

                  echo ""
                  echo "=== Audit: find users WITHOUT TOTP credential ==="
                  USERS=$(/opt/keycloak/bin/kcadm.sh get users -r "$REALM" --fields username,id 2>/dev/null \
                    | grep -B1 '"username"' | grep -E '"id"|"username"' \
                    | paste -d, - - \
                    | sed 's/.*"id" : "\([^"]*\)".*"username" : "\([^"]*\)".*/\2 \1/')

                  MISSING_TOTP=""
                  echo "$USERS" | while read username uid; do
                    [ -z "$username" ] && continue
                    [ "$username" = "admin" ] && continue
                    [ "$username" = "service-account-"* ] && continue

                    HAS_TOTP=$(/opt/keycloak/bin/kcadm.sh get users/$uid/credentials -r "$REALM" 2>/dev/null \
                      | grep -c '"type" : "otp"' || echo "0")

                    HAS_PENDING=$(/opt/keycloak/bin/kcadm.sh get users/$uid -r "$REALM" --fields requiredActions 2>/dev/null \
                      | grep -c "CONFIGURE_TOTP" || echo "0")

                    if [ "$HAS_TOTP" -gt 0 ]; then
                      echo "  ✓ $username: TOTP configured"
                    elif [ "$HAS_PENDING" -gt 0 ]; then
                      echo "  ⏳ $username: CONFIGURE_TOTP pending (user not yet completed)"
                    else
                      echo "  ✗ $username: NO TOTP + NO pending action — admin review needed"
                      echo "$username" >> /tmp/missing.txt
                    fi
                  done

                  echo ""
                  if [ -s /tmp/missing.txt ]; then
                    USERS_LIST=$(cat /tmp/missing.txt | tr '\n' ',' | sed 's/,$//')
                    COUNT=$(wc -l < /tmp/missing.txt)
                    MSG="{\"username\":\"KC-MFA-Audit\",\"icon_emoji\":\":key:\",\"attachments\":[{\"color\":\"warning\",\"title\":\"⚠ KC Users without MFA ($COUNT)\",\"text\":\"These users have NO TOTP credential AND NO pending CONFIGURE_TOTP requiredAction.\\n\\n*Users:* $USERS_LIST\\n\\n*Action:* Review per-user in KC UI → Users → <name> → Required user actions → add CONFIGURE_TOTP. NEVER auto-enforce (loop risk).\"}]}"
                    if [ -n "$SLACK_WEBHOOK" ]; then
                      curl -sk -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' -d "$MSG"
                      echo "✓ Slack alert sent: $COUNT user(s)"
                    else
                      echo "⚠ SLACK_WEBHOOK not mounted — would have alerted: $USERS_LIST"
                    fi
                  else
                    echo "✓ All users have MFA — no audit-action needed"
                  fi
              resources:
                requests: { cpu: 50m,  memory: 256Mi }
                limits:   { cpu: 500m, memory: 512Mi }
