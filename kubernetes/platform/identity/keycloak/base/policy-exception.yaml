apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: keycloak-setup-jobs
  namespace: keycloak
spec:
  exceptions:
    - policyName: require-run-as-non-root
      ruleNames:
        - check-run-as-non-root
        - autogen-check-run-as-non-root
  match:
    any:
      - resources:
          kinds:
            - Job
            - Pod
          namespaces:
            - keycloak
          names:
            - keycloak-argocd-client-setup*
            - keycloak-ldap-federation-setup*
            - keycloak-mfa-setup*
            - keycloak-oidc-client-setup*
