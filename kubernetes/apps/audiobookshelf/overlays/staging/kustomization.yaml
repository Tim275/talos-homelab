apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: audiobookshelf-staging

resources:
  - ../../base
  - namespace.yaml
  - pvc.yaml

commonLabels:
  app.kubernetes.io/name: audiobookshelf
  environment: staging
  team: timour

commonAnnotations:
  argocd.argoproj.io/sync-wave: "60"

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "200m"
    target:
      kind: Deployment
      name: audiobookshelf
