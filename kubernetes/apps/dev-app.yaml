---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev
  namespace: argocd
  labels:
    apps.environment: dev
    team: timour
  annotations:
    argocd.argoproj.io/sync-wave: '26'
spec:
  project: apps
  source:
    repoURL: https://github.com/Tim275/talos-homelab
    targetRevision: HEAD
    path: kubernetes/apps/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - RespectIgnoreDifferences=true
    - ServerSideDiff=false
  ignoreDifferences:
  - group: argoproj.io
    kind: Application
    jqPathExpressions:
    - ".status"
