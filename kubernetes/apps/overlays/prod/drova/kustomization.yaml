apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: drova

resources:
  - ../../../base/drova/environments/production

labels:
  - pairs:
      app.kubernetes.io/environment: prod
      app.kubernetes.io/managed-by: argocd
      team: timour
      criticality: high

commonAnnotations:
  environment: production
  backup.enabled: "true"
