apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: drova-staging
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    apps.environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "27"
spec:
  project: apps
  source:
    repoURL: https://github.com/Tim275/drova
    targetRevision: HEAD
    path: infra/staging/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: drova-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
