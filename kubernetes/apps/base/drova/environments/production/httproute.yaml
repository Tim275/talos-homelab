# Envoy Gateway — Gateway API HTTPRoute
# parentRefs.name + namespace an deinen Gateway anpassen (kubectl get gateway -A)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: drova-app
  namespace: drova
spec:
  parentRefs:
    - name: envoy-gateway        # TODO: kubectl get gateway -A → Namen anpassen
      namespace: envoy-gateway   # TODO: Gateway-Namespace anpassen
      sectionName: https
  hostnames:
    - "drova.timourhomelab.org"
  rules:
    # WebSocket /ws/chat → chat-service (muss vor dem catch-all stehen)
    - matches:
        - path:
            type: PathPrefix
            value: /ws/chat
      backendRefs:
        - name: chat-service
          port: 8084
    # Alles andere → api-gateway (REST + /ws/riders + /ws/drivers + Stripe Webhook)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api-gateway
          port: 8081
---
# Jaeger UI — separates HTTPRoute (nur intern erreichbar)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: drova-jaeger
  namespace: drova
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - "jaeger.drova.timourhomelab.org"
  rules:
    - backendRefs:
        - name: jaeger
          port: 16686
