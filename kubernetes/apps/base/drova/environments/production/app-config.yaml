apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: drova
data:
  ENVIRONMENT: "production"
  APP_BASE_URL: "https://drova.timourhomelab.org"

  # HTTP/gRPC bind addresses
  GATEWAY_HTTP_ADDR: ":8081"
  USER_HTTP_ADDR:    ":8082"
  TRIP_GRPC_ADDR:    ":9093"
  DRIVER_GRPC_ADDR:  ":9092"
  CHAT_HTTP_ADDR:    ":8084"

  # Intra-Namespace Service Discovery
  TRIP_SERVICE_URL:      "trip-service.drova.svc.cluster.local:9093"
  DRIVER_SERVICE_URL:    "driver-service.drova.svc.cluster.local:9092"
  USER_SERVICE_URL:      "http://user-service.drova.svc.cluster.local:8082"

  # ── Homelab-Infra (vom Homelab provisioniert, nicht von Drova) ──────────────
  # Kafka: Namespace + Service-Name anpassen (kubectl get svc -n <kafka-ns>)
  KAFKA_BROKERS: "my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

  # Jaeger OTLP (4318 = OTLP/HTTP)
  JAEGER_ENDPOINT: "jaeger-collector.jaeger.svc.cluster.local:4318"

  # Redis (OpsTree Redis Operator — drova namespace)
  REDIS_URL: "redis-drova-replication-leader.drova.svc.cluster.local:6379"
  # ────────────────────────────────────────────────────────────────────────────

  # Stripe
  STRIPE_CURRENCY:     "eur"
  STRIPE_SUCCESS_URL:  "https://drova.timourhomelab.org/?payment=success"
  STRIPE_CANCEL_URL:   "https://drova.timourhomelab.org/?payment=cancel"

  # Migrations (in Binary eingebaut)
  MIGRATIONS_PATH: "migrations"
  SEED: "false"
