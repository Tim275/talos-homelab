apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: driver-service
  namespace: drova
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driver-service
  template:
    metadata:
      labels:
        app: driver-service
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/tim275/drova/driver-service:latest
          command: ["/app/driver-service", "migrate"]
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-drivers-creds
                  key: DB_URL
            - name: MIGRATIONS_PATH
              value: "migrations"
      containers:
        - name: driver-service
          image: ghcr.io/tim275/drova/driver-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9092
              name: grpc
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DRIVER_GRPC_ADDR
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKERS
            - name: OTEL_COLLECTOR_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_COLLECTOR_ENDPOINT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: MIGRATIONS_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MIGRATIONS_PATH
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-drivers-creds
                  key: DB_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-redis-secret
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: driver-service
  namespace: drova
spec:
  selector:
    app: driver-service
  ports:
    - name: grpc
      port: 9092
      targetPort: 9092
