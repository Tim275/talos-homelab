apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: chat-service
  namespace: drova
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: ghcr.io/tim275/drova/chat-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CHAT_HTTP_ADDR
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: JWT_SECRET
            - name: OTEL_COLLECTOR_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_COLLECTOR_ENDPOINT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-redis-secret
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: drova
spec:
  selector:
    app: chat-service
  ports:
    - port: 8084
      targetPort: 8084
