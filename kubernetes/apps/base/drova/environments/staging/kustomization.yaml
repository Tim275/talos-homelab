apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOT DEPLOYED — Staging-Cluster wird separat aufgebaut
# Sealed Secrets hier sind Platzhalter und müssen mit dem Staging-Cluster-Cert neu gesealat werden

namespace: drova-staging

resources:
  - redis-config.yaml
  - sealed-secret-redis.yaml
  - redis.yaml
  - sealed-secret-pg-app-creds.yaml
  - postgres-cluster.yaml
  - sealed-secret-app.yaml
  - sealed-secret-pg-users-creds.yaml
  - sealed-secret-pg-trips-creds.yaml
  - sealed-secret-pg-payments-creds.yaml
  - app-config.yaml
  - services/api-gateway.yaml
  - services/user-service.yaml
  - services/trip-service.yaml
  - services/driver-service.yaml
  - services/payment-service.yaml
  - services/chat-service.yaml
  - httproute.yaml

commonLabels:
  app.kubernetes.io/name: drova
  app.kubernetes.io/part-of: drova
  environment: staging
  team: timour
