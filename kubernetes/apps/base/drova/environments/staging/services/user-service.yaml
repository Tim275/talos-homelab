apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: drova
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/Tim275/drova/user-service:latest
          command: ["/app/user-service", "migrate"]
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-users-creds
                  key: DB_URL
            - name: MIGRATIONS_PATH
              value: "migrations"
      containers:
        - name: user-service
          image: ghcr.io/Tim275/drova/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: HTTP_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: USER_HTTP_ADDR
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: JAEGER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JAEGER_ENDPOINT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: APP_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_BASE_URL
            - name: MIGRATIONS_PATH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MIGRATIONS_PATH
            - name: SEED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SEED
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: drova-pg-users-creds
                  key: DB_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-redis-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: JWT_SECRET
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: SMTP_PASSWORD
            - name: FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: drova-app-secrets
                  key: FROM_EMAIL
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: drova
spec:
  selector:
    app: user-service
  ports:
    - port: 8082
      targetPort: 8082
