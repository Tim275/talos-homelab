apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: n8n-websocket-policy
  namespace: n8n-prod
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: n8n-prod
  timeout:
    http:
      connectionIdleTimeout: 3600s
      maxConnectionDuration: 0s
    tcp:
      connectTimeout: 15s
  connection:
    bufferLimit: 32768
  rateLimit:
    type: Local
    local:
      rules:
        # 300 req/min per real client IP (Cloudflare injects CF-Connecting-IP)
        # Normal user: ~20 req on page load, then WebSocket → well within limit
        # DDoS: >5 req/sec from same IP → blocked within first minute
        - limit:
            requests: 300
            unit: Minute
          clientSelectors:
            - headers:
                - name: CF-Connecting-IP
                  type: Distinct
