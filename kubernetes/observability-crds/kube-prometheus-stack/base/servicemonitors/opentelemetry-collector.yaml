apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: opentelemetry-collector
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - opentelemetry
  selector:
    matchLabels:
      operator.opentelemetry.io/collector-monitoring-service: Exists
  endpoints:
    - port: monitoring         # service port-name on monitoring service is just "monitoring"
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
