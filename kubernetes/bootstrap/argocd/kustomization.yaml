# Initial ArgoCD install — referenced by bootstrap/kustomization.yaml
#
# Purpose:
#   `kubectl apply -k kubernetes/bootstrap/` installs ArgoCD as part of the
#   one-shot cluster-bootstrap. Without this, ArgoCD would need a separate
#   manual `helm install` step — breaks reproducibility.
#
# After ArgoCD is running, the `infrastructure/argocd/` Application (deployed
# via controllers-stack AppSet, sync-wave 90) takes over self-management.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../infrastructure/argocd/overlays/prod
