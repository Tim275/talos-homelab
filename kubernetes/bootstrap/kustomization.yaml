apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd

commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"

# Order matters:
#   1. argocd/         — install ArgoCD itself FIRST (Helm via kustomize wrap)
#   2. projects.yaml   — AppProjects must exist before any Application references them
#   3. clusters.yaml   — cluster-secret CRs needed by ApplicationSets cluster-generator
#   4. applicationsets — finally, deploy the AppSets that cascade everything else
resources:
  - argocd
  - projects.yaml
  - clusters.yaml
  - applicationsets.yaml
