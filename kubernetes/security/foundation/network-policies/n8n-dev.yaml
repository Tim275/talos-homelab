---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: n8n-dev
  labels:
    security.category: network-policies
    managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: database
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
    - fromEntities:
        - host
        - remote-node
