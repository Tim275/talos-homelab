# =============================================================================
# Cilium Network Policies for Drova services
# =============================================================================
# IMPORTANT: `authentication.mode: required` was removed because Drova services
# do not yet have SPIRE workload identities. Required-mTLS would block all
# intra-namespace gRPC/HTTP calls (api-gateway → trip-service, etc.) with
# "Operation not permitted" → caused 503 on /trip/start.
#
# Re-enable per service once SPIRE is wired up cluster-wide (see lldap/keycloak
# mtls-policies.yaml comment for the same caveat).
# =============================================================================
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: api-gateway-mtls
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: api-gateway
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: gateway
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
        - matchLabels:
            io.kubernetes.pod.namespace: cloudflared
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
---
