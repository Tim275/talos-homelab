---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: drova-egress-baseline
  namespace: drova
spec:
  endpointSelector:
    matchExpressions:
      - { key: app, operator: In, values: [api-gateway, user-service, trip-service, driver-service, chat-service, payment-service] }
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    - toEntities: [kube-apiserver]
      toPorts:
        - ports:
            - { port: "6443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            strimzi.io/cluster: drova-kafka
      toPorts:
        - ports:
            - { port: "9091", protocol: TCP }
            - { port: "9095", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            cnpg.io/cluster: drova-postgres
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            cnpg.io/poolerName: drova-postgres-pooler
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app: schema-registry
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: opentelemetry
      toPorts:
        - ports:
            - { port: "4317", protocol: TCP }
            - { port: "4318", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app: api-gateway
      toPorts:
        - ports:
            - { port: "8081", protocol: TCP }
#     authentication:
#       mode: required
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app: user-service
      toPorts:
        - ports:
            - { port: "8082", protocol: TCP }
            - { port: "9091", protocol: TCP }
#     authentication:
#       mode: required
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app: trip-service
      toPorts:
        - ports:
            - { port: "9093", protocol: TCP }
#     authentication:
#       mode: required
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app: driver-service
      toPorts:
        - ports:
            - { port: "9092", protocol: TCP }
#     authentication:
#       mode: required
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app: chat-service
      toPorts:
        - ports:
            - { port: "8084", protocol: TCP }
#     authentication:
#       mode: required
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app: payment-service
      toPorts:
        - ports:
            - { port: "8085", protocol: TCP }
#     authentication:
#       mode: required
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: chat-service-redis-egress
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: chat-service
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app.kubernetes.io/name: redis-drova
      toPorts:
        - ports:
            - { port: "6379", protocol: TCP }
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: chat-service-mongodb-atlas-egress
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: chat-service
  egress:
    - toFQDNs:
        - matchPattern: "*.mongodb.net"
        - matchPattern: "*.*.mongodb.net"
        - matchPattern: "*.*.*.mongodb.net"
      toPorts:
        - ports:
            - { port: "27017", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
          rules:
            dns:
              - matchPattern: "*.mongodb.net"
              - matchPattern: "*.*.mongodb.net"
              - matchPattern: "*.*.*.mongodb.net"
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: trip-service-redis-egress
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: trip-service
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
            app.kubernetes.io/name: redis-drova
      toPorts:
        - ports:
            - { port: "6379", protocol: TCP }
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: payment-service-stripe-egress
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: payment-service
  egress:
    - toFQDNs:
        - matchName: api.stripe.com
        - matchPattern: "*.stripe.com"
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
          rules:
            dns:
              - matchPattern: "*.stripe.com"
              - matchName: "api.stripe.com"
---
# trip-service braucht api.mapbox.com für Routing/Directions
# Battle-tested 2026-05-10: ohne diese FQDN-Allow timeout → 500 auf /trip/preview
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: trip-service-mapbox-egress
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: trip-service
  egress:
    - toFQDNs:
        - matchName: api.mapbox.com
        - matchPattern: "*.mapbox.com"
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
          rules:
            dns:
              - matchPattern: "*.mapbox.com"
              - matchName: "api.mapbox.com"
