# ─────────────────────────────────────────────────────────────────────────────
# Drova mTLS — Cilium Mutual Authentication (SPIFFE/SPIRE), eine Policy pro Service.
# Muster (alle 6 Services unten gleich, nur Ports unterscheiden sich):
#   authentication.mode: required → East-West (drova↔drova) MUSS mTLS sein. Cilium prüft
#     per SPIFFE-SVID (von SPIRE) beide Identitäten, WireGuard verschlüsselt — die App
#     selbst braucht KEINEN TLS-Code (eBPF macht's transparent).
#     ⚠ SPIRE down ⇒ dieser Traffic wird still GEDROPPT (siehe SPIREAgentDown-Alert).
#   KEIN auth für: gateway/cloudflared (Edge-Ingress, TLS endet am Envoy/CF-Tunnel),
#     monitoring (Prometheus-Scrape), host/kube-apiserver (kubelet-Health-Probes).
#   Alles andere: default-deny.yaml.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: api-gateway-mtls
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: api-gateway
  ingress:
    # East-West: andere drova-Services → api-gateway:8081 ⇒ mTLS PFLICHT
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
      authentication:
        mode: required          # mutual auth via SPIFFE-SVID (SPIRE)
      toPorts:
        - ports:
            - { port: "8081", protocol: TCP }
    # North-South: Edge-Ingress (Envoy-Gateway + Cloudflare-Tunnel) ⇒ kein mTLS
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: gateway
        - matchLabels:
            io.kubernetes.pod.namespace: cloudflared
      toPorts:
        - ports:
            - { port: "8081", protocol: TCP }
    # Prometheus-Scrape ⇒ kein mTLS
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - { port: "8081", protocol: TCP }
    # kubelet-Health-Probes + apiserver ⇒ kein mTLS
    - fromEntities: [host, kube-apiserver]
      toPorts:
        - ports:
            - { port: "8081", protocol: TCP }
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: user-service-mtls
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app: user-service
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
      authentication:
        mode: required
      toPorts:
        - ports:
            - { port: "8082", protocol: TCP }
            - { port: "9091", protocol: TCP }
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - { port: "8082", protocol: TCP }
    - fromEntities: [host, kube-apiserver]
      toPorts:
        - ports:
            - { port: "8082", protocol: TCP }
            - { port: "9091", protocol: TCP }
