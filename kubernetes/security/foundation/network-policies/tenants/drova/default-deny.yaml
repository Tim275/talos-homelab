# =============================================================================
# Drova Tenant Default-Deny (Cilium NetworkPolicy)
# =============================================================================
#
# Pattern: Per-Tenant Default-Deny statt cluster-wide.
#  - Niedriges Risiko (bricht NICHT andere Tenants/Ceph)
#  - Drova ist mTLS-enabled (6 CNPs aktiv via SPIRE)
#  - Diese Policy SCHLIESST den Default-Deny-Loop für Drova
#
# Pre-existing CNPs (NICHT überschreiben — additive Policies):
#  - api-gateway-mtls, chat-service-mtls, driver-service-mtls,
#    payment-service-mtls, trip-service-mtls, user-service-mtls
#
# Diese Policy fügt cluster-internal default-deny + DNS-egress hinzu.
# =============================================================================

---
# Default-Deny Ingress NUR für Drova-Microservices (haben mTLS)
# NICHT für Kafka/Postgres/Redis — die brauchen eigene Policies wenn überhaupt
# Selector: app.kubernetes.io/part-of=drova matcht nur die 6 services
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: drova-default-deny-ingress
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: drova
  ingress:
    # System-Namespaces dürfen rein (Monitoring, kube-system probes, gateway)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
        - matchLabels:
            io.kubernetes.pod.namespace: gateway
        - matchLabels:
            io.kubernetes.pod.namespace: cloudflared
        # Operators die drova-pods managen müssen (z.B. redis-operator für RedisReplication)
        # 2026-05-16: ohne diese Regel war redis-operator blocked → 2 masters statt 1 master + 1 replica.
        - matchLabels:
            io.kubernetes.pod.namespace: redis-operator-system
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
        - matchLabels:
            io.kubernetes.pod.namespace: kafka                      # Strimzi-operator
    # Drova-intern: Microservice ↔ Microservice (zusätzlich zu mTLS-Policies)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova
    # Kubelet-Probes (von Host)
    - fromEntities:
        - host
        - kube-apiserver

---
# Egress-Allow für Microservices (gleicher Selector — additive zu mTLS-Policies)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: drova-egress-baseline
  namespace: drova
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: drova
  egress:
    # PFLICHT: DNS zu CoreDNS (sonst kein Service-Discovery)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"

    # kube-apiserver für Service-Account-Auth
    - toEntities:
        - kube-apiserver

    # Intra-namespace (drova ↔ drova) für Microservice-Chains
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: drova

    # cnpg-system (Postgres-Operator-Webhook)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system

    # External: Stripe API (Payment-Service braucht das)
    - toFQDNs:
        - matchPattern: "*.stripe.com"
        - matchName: api.stripe.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    # External: Mapbox API (Trip-Service braucht /directions für Routing)
    # Battle-tested 2026-05-10: ohne diese FQDN-Allow → /trip/preview 500
    - toFQDNs:
        - matchPattern: "*.mapbox.com"
        - matchName: api.mapbox.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    # External: Cloudflare STUN (NetBird/WebRTC if used)
    - toFQDNs:
        - matchName: stun.cloudflare.com
      toPorts:
        - ports:
            - port: "3478"
              protocol: UDP

    # External: GitHub API (drova-dispatch-prod-deployed Job sends repo-dispatch)
    # Battle-tested 2026-05-15: ohne diese → dispatch-job hängt → ArgoCD stuck-hook
    - toFQDNs:
        - matchName: api.github.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    - toFQDNs:
        - matchPattern: "*.mongodb.net"
        - matchPattern: "*.*.mongodb.net"
      toPorts:
        - ports:
            - port: "27017"
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: opentelemetry
      toPorts:
        - ports:
            - port: "4318"
              protocol: TCP
            - port: "4317"
              protocol: TCP

    # OIDC: Keycloak via Public-Hostname (für Service-zu-Service Auth wenn nötig)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: keycloak
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
