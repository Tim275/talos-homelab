apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-compliance
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    security.domain: compliance
spec:
  project: security
  source:
    repoURL: https://github.com/Tim275/talos-homelab
    targetRevision: HEAD
    path: kubernetes/security/compliance
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
