# Talos: host-tracefs muss in den Agent gemountet werden — ohne das gingen
# am 2026-05-13 4 Nodes NotReady. Fix verifiziert 2026-06-08 (worker-3).
extraHostPathMounts:
  - name: sys-kernel-tracing
    mountPath: /sys/kernel/tracing
    readOnly: false

tetragon:
  image:
    repository: quay.io/cilium/tetragon
    tag: v1.4.1
  enableProcessCred: true
  enableProcessNs: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  enablePolicyFilter: true
  enableMsgHandlingLatencyMetric: true
  exportFilename: tetragon.log
  exportFileMaxSizeMB: 50
  exportFileRotationInterval: 5m

export:
  mode: stdout

tetragonOperator:
  image:
    repository: quay.io/cilium/tetragon-operator
    tag: v1.4.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    labelsOverride:
      release: kube-prometheus-stack
