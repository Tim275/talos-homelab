---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: file-monitoring-sensitive
spec:
  kprobes:
    - call: security_file_permission
      syscall: false
      return: true
      args:
        - index: 0
          type: file
        - index: 1
          type: int
      returnArg:
        index: 0
        type: int
      returnArgAction: Post
      selectors:
        - matchArgs:
            - index: 0
              operator: Equal
              values:
                - /etc/shadow
                - /etc/passwd
                - /etc/sudoers
                - /root/.ssh/authorized_keys
            - index: 1
              operator: Equal
              values:
                - "4"
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: process-execution-monitoring
spec:
  kprobes:
    - call: security_bprm_check
      syscall: false
      args:
        - index: 0
          type: linux_binprm
      selectors:
        - matchBinaries:
            - operator: In
              values:
                - /usr/bin/curl
                - /usr/bin/wget
                - /bin/nc
                - /usr/bin/nmap
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: privilege-escalation-detection
spec:
  kprobes:
    - call: __sys_setuid
      syscall: true
      args:
        - index: 0
          type: int
      selectors:
        - matchArgs:
            - index: 0
              operator: Equal
              values:
                - "0"
