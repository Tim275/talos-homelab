apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: tetragon
  namespace: kube-system
spec:
  background: false
  match:
    any:
      - resources:
          kinds: [Pod, DaemonSet, Deployment, ReplicaSet]
          namespaces: [kube-system]
          names: ["tetragon*"]
  exceptions:
    - policyName: disallow-privileged-containers
      ruleNames: [privileged-containers, autogen-privileged-containers]
    - policyName: disallow-capabilities
      ruleNames: [adding-capabilities, autogen-adding-capabilities]
    - policyName: disallow-capabilities-strict
      ruleNames: [require-drop-all, autogen-require-drop-all]
    - policyName: disallow-host-namespaces
      ruleNames: [host-namespaces, autogen-host-namespaces]
    - policyName: disallow-host-path
      ruleNames: [host-path, autogen-host-path]
    - policyName: require-non-root-filesystem
      ruleNames: [check-root-filesystem, autogen-check-root-filesystem]
    - policyName: require-run-as-non-root
      ruleNames: [check-run-as-non-root, autogen-check-run-as-non-root]
    - policyName: restrict-image-registries
      ruleNames: [check-image-registry, autogen-check-image-registry]
