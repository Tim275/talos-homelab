apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    # Kubescape runtime-security agent braucht hostPID + privileged caps für
    # eBPF/syscall-tracing → PodSecurity muss auf privileged (statt baseline)
    # battle-tested 2026-05-14: ohne Label warn DaemonSet 0/7 ready für 19h.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
