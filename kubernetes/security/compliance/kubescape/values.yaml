# Override default 'kubescape' namespace — Operator runs in 'security' ns.
# Without this: TLS-cert generated for 'storage.kubescape.svc', but actual
# Service is 'storage.security.svc' → APIService FailedDiscoveryCheck.
# Battle-tested fix 2026-05-10 (Task #98).
ksNamespace: security

capabilities:
  configurationScan: enable
  continuousScan: enable
  nodeScan: enable
  vulnerabilityScan: disable
  relevancy: disable
  runtimeObservability: disable
  networkPolicyService: disable
  malwareDetection: disable
  seccompProfileService: disable

clusterName: in-cluster

configurations:
  otelUrl: ""

nodeAgent:
  resources:
    requests:
      cpu: 100m
      memory: 400Mi
    limits:
      cpu: 500m
      # Bumped 2026-05-14: OOMKilled at 700Mi after 15s (exit 137).
      # node-agent scans all pods cluster-wide via inotify + cAdvisor →
      # memory scales with pod-count, not just node-load. 1.5Gi gives headroom.
      memory: 1500Mi

# Bump CPU limit — was being throttled at 41% with 600m limit
kubescape:
  resources:
    requests:
      cpu: 250m
      memory: 400Mi
    limits:
      cpu: 1500m
      memory: 1Gi
