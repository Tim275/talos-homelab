# Kyverno Policy Engine Configuration
# Helm Chart: kyverno/kyverno 3.7.1

# Cleanup webhooks on uninstall
webhooksCleanup:
  enabled: true

# CRITICAL: Force all webhooks to failurePolicy=Ignore
# Without this, when Kyverno restarts it deadlocks itself:
# - background controller resets webhooks to Fail
# - admission controller pod creation goes through Fail webhook
# - webhook unreachable pod blocked admission controller never starts loop
features:
  forceFailurePolicyIgnore:
    enabled: true

config:
  # Exclude critical system namespaces from webhook calls at the API server level.
  # resourceFilters only works when Kyverno is running; namespaceSelector works
  # even when Kyverno is down (API server skips the webhook call entirely).
  webhooks:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kyverno
            - kube-system
            - kube-public
            - kube-node-lease
            - argocd
            - cert-manager
            - istio-system
            - rook-ceph
            - sealed-secrets
            - cnpg-system
            - elastic-system
            - monitoring

  # Exclude same namespaces from policy evaluation (Kyverno-internal filter)
  resourceFilters:
    - '[Event,*,*]'
    - '[*,kube-system,*]'
    - '[*,kube-public,*]'
    - '[*,kube-node-lease,*]'
    - '[Node,*,*]'
    - '[*,argocd,*]'
    - '[*,kyverno,*]'
    - '[*,istio-system,*]'
    - '[*,rook-ceph,*]'
    - '[*,cert-manager,*]'
    - '[*,sealed-secrets,*]'
    - '[*,cnpg-system,*]'
    - '[*,elastic-system,*]'
    - '[*,monitoring,*]'

admissionController:
  container:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

backgroundController:
  container:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

cleanupController:
  container:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

reportsController:
  container:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
