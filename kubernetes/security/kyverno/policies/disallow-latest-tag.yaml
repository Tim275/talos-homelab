apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          # Envoy Gateway Proxy uses :latest for shutdown-manager sidecar
          # https://github.com/envoyproxy/gateway/issues/4567
          - resources:
              namespaces:
                - gateway
              selector:
                matchLabels:
                  app.kubernetes.io/managed-by: envoy-gateway
      validate:
        failureAction: Enforce
        message: "Image tag ':latest' is not allowed — pin to a specific version."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              image: "!*:latest"
          - list: "request.object.spec.[initContainers, ephemeralContainers][]"
            pattern:
              image: "!*:latest"
