apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Only images from trusted registries may be used. This prevents
      deployment of images from unknown or untrusted sources.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-image-registry
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - kube-public
                      - cilium-spire
                      - rook-ceph
                      - cnpg-system
                      - cert-manager
                      - sealed-secrets
                      - argocd
                      - tailscale
                      - velero
                      - elastic-system
      validate:
        message: >-
          Image "{{ request.object.spec.containers[].image }}" uses an
          untrusted registry. Allowed: ghcr.io/tim275, ghcr.io/siderolabs,
          ghcr.io/vectordotdev, docker.io/bitnami, docker.io/apache,
          registry.k8s.io, quay.io, docker.elastic.co, gcr.io,
          ghcr.io/cloudnative-pg.
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ element.image }}"
                    operator: AnyNotIn
                    value:
                      - "ghcr.io/tim275/*"
                      - "ghcr.io/siderolabs/*"
                      - "ghcr.io/vectordotdev/*"
                      - "ghcr.io/cloudnative-pg/*"
                      - "ghcr.io/cloudflare/*"
                      - "docker.io/cloudflare/*"
                      - "cloudflare/*"
                      - "ghcr.io/open-telemetry/*"
                      - "ghcr.io/cert-manager/*"
                      - "ghcr.io/kyverno/*"
                      - "ghcr.io/argoproj/*"
                      - "ghcr.io/grafana/*"
                      - "ghcr.io/tailscale/*"
                      - "ghcr.io/envoyproxy/*"
                      - "ghcr.io/stakater/*"
                      - "ghcr.io/corazawaf/*"
                      - "docker.io/bitnami/*"
                      - "docker.io/library/*"
                      - "docker.io/rancher/*"
                      - "docker.io/velero/*"
                      - "velero/*"
                      - "docker.io/alpine/*"
                      - "alpine:*"                    # Implicit docker.io/library/alpine — lldap-bootstrap, common base
                      - "docker.io/library/alpine:*"
                      - "docker.io/apache/*"
                      - "docker.io/envoyproxy/*"
                      - "envoyproxy/*"                # Implicit docker.io — eg-gateway-helm-certgen Helm hook
                      - "docker.io/grafana/*"
                      - "docker.io/jaegertracing/*"
                      - "docker.io/strimzi/*"
                      - "docker.io/timberio/*"
                      - "docker.io/aquasec/*"
                      - "docker.io/curlimages/*"
                      - "curlimages/*"                # Implicit docker.io/ — drova-gitops Job
                      - "docker.io/redis/*"
                      - "docker.io/rabbitmqoperator/*"
                      - "docker.io/percona/*"
                      - "docker.io/louislam/*"
                      - "docker.elastic.co/*"
                      - "registry.k8s.io/*"
                      - "quay.io/*"
                      - "gcr.io/*"
                      - "public.ecr.aws/*"
                      - "us-docker.pkg.dev/*"
                      - "ghcr.io/aquasecurity/*"
                      - "ghcr.io/kubescape/*"
                      - "docker.io/otel/*"
                      - "otel/*"
                      - "docker.io/netbirdio/*"
                      - "ghcr.io/netbirdio/*"
                      - "docker.n8n.io/*"
                      - "docker.io/bitnamilegacy/*"
                      - "ghcr.io/renovatebot/*"
                      - "ghcr.io/mogenius/*"
                      - "docker.io/dbeaver/*"     # CloudBeaver DB-Manager Web-UI
