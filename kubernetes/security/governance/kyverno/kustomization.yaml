apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: kyverno
    repo: https://kyverno.github.io/kyverno
    version: "3.8.2"
    releaseName: kyverno
    namespace: kyverno
    includeCRDs: true
    valuesInline:
      admissionController:
        replicas: 1
      backgroundController:
        replicas: 1
      cleanupController:
        replicas: 1
      reportsController:
        replicas: 1
        # 2026-07-14: ContainerMemoryLeakSuspected fing den Controller bei 111Mi/128Mi
        # (87%, steigend) — Chart-Default 128Mi ist für 700+ PolicyReports zu klein.
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
      # Kyverno TUF — Sigstore-Trust-Root (Fulcio/Rekor) für keyless cosign-Verify.
      # DAS ist die Ursache, warum audit-verify-drova-signatures alle Images
      # "unverified" meldet: ohne TUF fehlt Kyverno der Trust-Root (Egress ist OK).
      # AKTIVIEREN (platform-weit! betrifft ALLE verifyImages) → einkommentieren:
      # features:
      #   tuf:
      #     enabled: true
