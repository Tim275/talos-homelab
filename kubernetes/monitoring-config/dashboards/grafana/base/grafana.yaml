apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana
  labels:
    app: grafana
spec:
  disableDefaultAdminSecret: false
  config:
    log:
      mode: console
    server:
      root_url: https://grafana.timourhomelab.org
      serve_from_sub_path: "false"
    security:
      cookie_secure: "true"
      cookie_samesite: "none"      # OAuth round-trip via CF needs SameSite=None
      disable_gravatar: "true"
    auth:
      # Login-Form bleibt aktiv als Break-Glass-Backup für lokalen admin
      # Wenn KC down ist, kannst du dich noch lokal einloggen.
      # Reihenfolge auf Login-Page: "Sign in with Keycloak" Button OBEN, lokales Form unten.
      disable_login_form: "false"
      oauth_auto_login: "false"
      signout_redirect_url: "https://iam.timourhomelab.org/realms/kubernetes/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2Fgrafana.timourhomelab.org"
    auth.generic_oauth:
      enabled: "true"
      name: "Keycloak"
      icon: "signin"
      allow_sign_up: "true"
      client_id: "$__env{OAUTH_CLIENT_ID}"
      client_secret: "$__env{OAUTH_CLIENT_SECRET}"
      scopes: "openid profile email roles"
      # All URLs use public hostname. CoreDNS rewrite resolves `iam.timourhomelab.org`
      # cluster-internally → envoy-gateway (wildcard TLS) → KC. Browsers go via CF tunnel.
      auth_url: "https://iam.timourhomelab.org/realms/kubernetes/protocol/openid-connect/auth"
      token_url: "https://iam.timourhomelab.org/realms/kubernetes/protocol/openid-connect/token"
      api_url: "https://iam.timourhomelab.org/realms/kubernetes/protocol/openid-connect/userinfo"
      role_attribute_path: "contains(roles[*], 'grafana-admin') && 'GrafanaAdmin' || contains(roles[*], 'grafana-editor') && 'Editor' || 'Viewer'"
      role_attribute_strict: "false"
      allow_assign_grafana_admin: "true"
      use_pkce: "true"
      # PFLICHT: ohne diese 3 attribute-paths fail't User-Sync mit "User sync failed".
      # Grafana kann sonst User nicht eindeutig identifizieren wenn es OAuth-Account
      # gegen lokale User-DB merged.
      login_attribute_path: "preferred_username"
      email_attribute_path: "email"
      name_attribute_path: "name || preferred_username"
    feature_toggles:
      enable: "traceqlEditor traceqlSearch correlations"
    users:
      allow_sign_up: "false"
      auto_assign_org: "true"
      auto_assign_org_role: "Viewer"
    analytics:
      reporting_enabled: "false"
      check_for_updates: "false"
  service:
    spec:
      ports:
        - name: http
          port: 3000
          protocol: TCP
          targetPort: 3000
      type: ClusterIP
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              envFrom:
                - secretRef:
                    name: grafana-oauth-secret
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
