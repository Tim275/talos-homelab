apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: tempo-service-graph
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  allowCrossNamespaceImport: true
  folder: Observability
  json: |
    {
      "title": "Tempo — Service Graph & Span Metrics",
      "uid": "tempo-service-graph",
      "tags": ["observability","tempo","tracing"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {"id":1,"type":"stat","title":"Spans ingested (rate)","gridPos":{"x":0,"y":0,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(tempo_distributor_spans_received_total[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":2,"type":"stat","title":"Spans dropped (5m)","gridPos":{"x":6,"y":0,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(rate(tempo_distributor_spans_dropped_total[5m]))"}],
         "fieldConfig":{"defaults":{"unit":"reqps","thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"red","value":1}]}}}},
        {"id":3,"type":"stat","title":"Trace blocks compacted (1h)","gridPos":{"x":12,"y":0,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(increase(tempodb_compaction_blocks_total[1h]))"}]},
        {"id":4,"type":"stat","title":"Ingester memory","gridPos":{"x":18,"y":0,"w":6,"h":4},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum(container_memory_working_set_bytes{namespace=\"monitoring\",pod=~\"tempo-ingester.*\"})"}],
         "fieldConfig":{"defaults":{"unit":"bytes"}}},
        {"id":10,"type":"timeseries","title":"Span ingestion rate by source","gridPos":{"x":0,"y":4,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (receiver) (rate(tempo_receiver_accepted_spans[5m]))","legendFormat":"{{receiver}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":11,"type":"timeseries","title":"Ingester block flush latency p99","gridPos":{"x":12,"y":4,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"histogram_quantile(0.99, sum by (le) (rate(tempo_ingester_flush_duration_seconds_bucket[5m])))","legendFormat":"p99"}],
         "fieldConfig":{"defaults":{"unit":"s"}}},
        {"id":20,"type":"row","title":"Service Graph (from metrics-generator)","gridPos":{"x":0,"y":12,"w":24,"h":1}},
        {"id":21,"type":"timeseries","title":"traces_service_graph_request_total (5m rate)","gridPos":{"x":0,"y":13,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (client, server) (rate(traces_service_graph_request_total[5m]))","legendFormat":"{{client}} → {{server}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":22,"type":"timeseries","title":"traces_service_graph_request_failed_total","gridPos":{"x":12,"y":13,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (client, server) (rate(traces_service_graph_request_failed_total[5m]))","legendFormat":"{{client}} → {{server}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":30,"type":"row","title":"Span Metrics (RED per service)","gridPos":{"x":0,"y":21,"w":24,"h":1}},
        {"id":31,"type":"timeseries","title":"traces_spanmetrics_calls_total","gridPos":{"x":0,"y":22,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"sum by (service_name) (rate(traces_spanmetrics_calls_total[5m]))","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"reqps"}}},
        {"id":32,"type":"timeseries","title":"Span duration p99 per service","gridPos":{"x":12,"y":22,"w":12,"h":8},
         "datasource":{"type":"prometheus","uid":"prometheus"},
         "targets":[{"expr":"histogram_quantile(0.99, sum by (service_name, le) (rate(traces_spanmetrics_latency_bucket[5m])))","legendFormat":"{{service_name}}"}],
         "fieldConfig":{"defaults":{"unit":"s"}}}
      ]
    }
