# Auto-Verify Nightly Restore — Schrödinger's Backup eliminieren.
#
# Backup das nicht restorebar ist = kein Backup. Dieser CronJob restored täglich
# um 04:00 UTC vom letzten Backup in Test-Namespace, validiert Restore.Phase=Completed,
# cleanup, sendet Slack-Alert wenn Restore fehlschlägt.
#
# Backup-Schedule: tier0-databases-6h (alle 6h) → Backup-Name pattern: tier0-databases-6h-<TIMESTAMP>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-restore-verify
  namespace: velero
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-restore-verify
rules:
  - apiGroups: ["velero.io"]
    resources: [backups, restores]
    verbs: [get, list, create, delete]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-restore-verify
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: velero-restore-verify
subjects:
  - kind: ServiceAccount
    name: velero-restore-verify
    namespace: velero
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velero-restore-verify
  namespace: velero
  labels:
    app.kubernetes.io/name: velero-restore-verify
    app.kubernetes.io/part-of: backup-validation
spec:
  schedule: "0 4 * * *"          # täglich 04:00 UTC (nach 03:00 Daily-Backup)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 7      # 7 days history für DR-Drill-Tracking
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 0           # 1 failure = job FAILED (CronJob retries via schedule)
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 7200   # 2h max — 2026-05-16: had stuck-12h job
      template:
        metadata:
          labels:
            app: velero-restore-verify
        spec:
          serviceAccountName: velero-restore-verify
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: verify
              image: alpine/k8s:1.33.0@sha256:60333a52c38e9a8df0a9b93a5a24a4870f0db2c7ea3266b185386bd0a500d7dc
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: [ALL] }
              # Slack-Alert via Prometheus → Alertmanager: CronJob-Fail wird über
              # KubeJobFailed Alert detected (siehe alerts/kubernetes/workloads.yaml).
              # Slack-Webhook nicht direkt mountbar (cross-namespace secret-ref unsupported).
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
              command: [/bin/bash, -c]
              args:
                - |
                  set -uo pipefail
                  TS=$(date +%Y%m%d-%H%M)
                  TEST_NS="dr-verify-${TS}"
                  RESTORE="dr-verify-${TS}"

                  echo "═══ DR-Verify-Run ${TS} ═══"

                  # 1. Latest *Completed* Daily-Backup finden (skip FailedValidation/InProgress)
                  LATEST=$(kubectl get backups.velero.io -n velero \
                    -l velero.io/schedule-name=tier0-databases-6h \
                    --sort-by=.metadata.creationTimestamp \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"|"}{.status.phase}{"\n"}{end}' 2>/dev/null \
                    | grep '|Completed$' | tail -1 | cut -d'|' -f1)

                  if [ -z "$LATEST" ]; then
                    echo "✗ FAIL: kein Completed tier0-databases-6h Backup in letzten 7d gefunden"
                    echo "→ Recent backups:"
                    kubectl get backups.velero.io -n velero \
                      -l velero.io/schedule-name=tier0-databases-6h \
                      --sort-by=.metadata.creationTimestamp 2>/dev/null | tail -5
                    exit 1
                  fi

                  echo "→ Found latest completed backup: $LATEST"

                  # 3. Restore in Test-NS triggern (nur drova-postgres als Smoke-Test)
                  kubectl apply -f - <<EOF
                  apiVersion: velero.io/v1
                  kind: Restore
                  metadata:
                    name: ${RESTORE}
                    namespace: velero
                  spec:
                    backupName: ${LATEST}
                    includedNamespaces: [drova]
                    namespaceMapping:
                      drova: ${TEST_NS}
                    includedResources: [secrets, configmaps]
                    restorePVs: false
                  EOF

                  ERROR_REASON=""
                  # 4. Wait for restore to complete (max 10min)
                  for i in $(seq 1 60); do
                    PHASE=$(kubectl get restores.velero.io -n velero "$RESTORE" -o jsonpath='{.status.phase}' 2>/dev/null)
                    if [ "$PHASE" = "Completed" ]; then
                      echo "✓ Restore Completed"
                      break
                    fi
                    if [ "$PHASE" = "PartiallyFailed" ] || [ "$PHASE" = "Failed" ]; then
                      echo "✗ FAIL: Restore phase=$PHASE"
                      kubectl get restores.velero.io -n velero "$RESTORE" -o yaml | grep -A 5 "errors:" | head -10
                      ERROR_REASON="phase=$PHASE"
                      break
                    fi
                    sleep 10
                  done

                  # 5. Cleanup
                  kubectl delete restores.velero.io -n velero "$RESTORE" --ignore-not-found=true >/dev/null 2>&1
                  kubectl delete ns "$TEST_NS" --ignore-not-found=true >/dev/null 2>&1

                  # 6. Final verdict — exit code triggers KubeJobFailed Prometheus alert
                  if [ "$PHASE" = "Completed" ]; then
                    echo "═══ ✓ DR-Verify SUCCESS for backup $LATEST ═══"
                    exit 0
                  else
                    echo "═══ ✗ DR-Verify FAILED ($ERROR_REASON) for backup $LATEST ═══"
                    exit 1
                  fi
              # Bumped 2026-05-16 — was 500m + had stuck-12h job. Velero-restore
              # orchestrates PVC-snapshot-restores → needs more CPU+RAM headroom.
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits:   { cpu: 1500m, memory: 512Mi }
          volumes:
            - name: tmp
              emptyDir: {}
