apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Prometheus
      group: monitoring.coreos.com
    patch: |
      - op: replace
        path: /spec/retention
        value: 3d
  - target:
      kind: Cluster
      group: postgresql.cnpg.io
    patch: |
      - op: replace
        path: /spec/backup/retentionPolicy
        value: "7d"
