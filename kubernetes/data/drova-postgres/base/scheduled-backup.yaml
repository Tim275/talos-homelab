---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: drova-postgres-daily-backup
  namespace: drova
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  schedule: "0 0 3 * * *"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: drova-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: drova-postgres-weekly-backup
  namespace: drova
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  schedule: "0 0 2 * * 0"
  immediate: false
  backupOwnerReference: self
  cluster:
    name: drova-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
