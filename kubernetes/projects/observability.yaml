apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: "Observability Infrastructure - OpenTelemetry, Jaeger, Elasticsearch"
  sourceRepos:
    - https://github.com/Tim275/talos-homelab
  destinations:
    - namespace: observability
      server: https://kubernetes.default.svc
    - namespace: jaeger-system
      server: https://kubernetes.default.svc
    - namespace: elastic-system
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  syncWindows:
    # Friday-Freeze 16:00 → Sunday 18:00 (50h). Critical infra:
    # NO auto-sync during weekend. Manual sync still allowed (manualSync: true).
    - kind: deny
      schedule: "0 16 * * 5"
      duration: 50h
      timeZone: Europe/Berlin
      applications: ["*"]
      manualSync: true
