apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: timour-homelab
    app.kubernetes.io/layer: platform
    team: timour
spec:
  description: " Enterprise Platform Services - Google/AWS/Netflix Level"

  # Nacht-Freeze 02-05 Uhr (Backup-Fenster, niemand wach): kein Auto-Sync/selfHeal,
  # manueller Sync bleibt als Break-Glass erlaubt
  syncWindows:
    - kind: deny
      schedule: '0 2 * * *'
      duration: 3h
      timeZone: Europe/Berlin
      applications:
        - '*'
      manualSync: true

  # Platform layer — auf echte Namespaces gescoped (kein Wildcard)
  destinations:
    - namespace: drova
      server: https://kubernetes.default.svc
    - namespace: keycloak
      server: https://kubernetes.default.svc
    - namespace: lldap
      server: https://kubernetes.default.svc
    - namespace: n8n-prod
      server: https://kubernetes.default.svc
    - namespace: ml
      server: https://kubernetes.default.svc

  # Platform can use platform layer resources
  sourceRepos:
    - 'https://github.com/Tim275/talos-homelab'
    - 'https://charts.bitnami.com/bitnami'
    - 'https://charts.jetstack.io'
    - 'https://kubernetes-sigs.github.io/gateway-api'
    - 'https://strimzi.io/charts/'
    - 'https://helm.releases.hashicorp.com'
    - 'https://kubernetes.github.io/ingress-nginx'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://grafana.github.io/helm-charts'
    - 'https://charts.konghq.com'

  # Platform resource permissions
  # Cluster-scoped: nur was die Apps LIVE nutzen (Evidenz 2026-07-15 aus
  # app.status.resources; war */* = God-Mode). Neues Kind -> Sync-Fehler
  # "not permitted in project" -> hier nachtragen.
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: scheduling.k8s.io
      kind: PriorityClass

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Platform RBAC
  roles:
    - name: platform-admin
      description: "Full access to platform services"
      policies:
        - p, proj:platform:platform-admin, applications, *, platform/*, allow
        - p, proj:platform:platform-admin, exec, *, platform/*, allow
      groups:
        - timour:platform-admins

    - name: platform-operator
      description: "Operational access to platform services"
      policies:
        - p, proj:platform:platform-operator, applications, get, platform/*, allow
        - p, proj:platform:platform-operator, applications, sync, platform/*, allow
      groups:
        - timour:platform-operators

  # ORPHANED RESOURCES: Enterprise cleanup policy
  orphanedResources:
    warn: false  # Disable warnings - resources managed via excludes
    ignore:
      # Helm chart resources that commonly appear as orphaned
      - kind: Secret
        name: sh.helm.release.v1.*
      - kind: ConfigMap
        name: sh.helm.release.v1.*
      # CloudNative-PG operator resources
      - kind: Secret
        name: "*-cnpg-*"
      - kind: ConfigMap
        name: "*-cnpg-*"
      - kind: Pod
        name: "*-cnpg-*"
      # Platform database secrets and configs
      - kind: Secret
        name: "*-postgres-*"
      - kind: ConfigMap
        name: "*-postgres-*"
      # Platform messaging resources
      - kind: Secret
        name: "*-kafka-*"
      - kind: ConfigMap
        name: "*-kafka-*"
      # Platform identity resources
      - kind: Secret
        name: "*-lldap-*"
      - kind: ConfigMap
        name: "*-lldap-*"
      # Platform developer tools
      - kind: Secret
        name: "*-backstage-*"
      - kind: ConfigMap
        name: "*-backstage-*"
