apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: security
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: timour-homelab
    app.kubernetes.io/layer: security
    team: timour
spec:
  description: " Enterprise Security Foundation - Zero Trust Architecture"

  # Security layer — security-foundation/compliance verteilen NetworkPolicies, Rate-Limits,
  # mTLS-Policies + Tetragon/Honeypot über viele Namespaces → alle Ziel-NS explizit gelistet.
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: kyverno
      server: https://kubernetes.default.svc
    - namespace: security
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: honeytoken
      server: https://kubernetes.default.svc
    - namespace: drova
      server: https://kubernetes.default.svc
    - namespace: gateway
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: grafana
      server: https://kubernetes.default.svc
    - namespace: jaeger
      server: https://kubernetes.default.svc
    - namespace: keycloak
      server: https://kubernetes.default.svc
    - namespace: elastic-system
      server: https://kubernetes.default.svc
    - namespace: uptime-kuma
      server: https://kubernetes.default.svc

  # Security layer resources
  sourceRepos:
    - 'https://github.com/Tim275/talos-homelab'

  # Security resource permissions
  # Cluster-scoped: nur was die Apps LIVE nutzen (Evidenz 2026-07-15 aus
  # app.status.resources; war */* = God-Mode). Neues Kind -> Sync-Fehler
  # "not permitted in project" -> hier nachtragen.
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: kyverno.io
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Security RBAC
  roles:
    - name: security-admin
      description: "Full access to security policies"
      policies:
        - p, proj:security:security-admin, applications, *, security/*, allow
        - p, proj:security:security-admin, exec, *, security/*, allow
      groups:
        - timour:security-admins

    - name: security-operator
      description: "Operational access to security policies"
      policies:
        - p, proj:security:security-operator, applications, get, security/*, allow
        - p, proj:security:security-operator, applications, sync, security/*, allow
      groups:
        - timour:security-operators

  # ORPHANED RESOURCES: Enterprise cleanup policy
  orphanedResources:
    warn: false  # Disable warnings - resources managed via excludes
    ignore:
      # Helm chart resources that commonly appear as orphaned
      - kind: Secret
        name: sh.helm.release.v1.*
      - kind: ConfigMap
        name: sh.helm.release.v1.*
      # Security policy engine resources
      - kind: Secret
        name: "*-kyverno-*"
      - kind: ConfigMap
        name: "*-kyverno-*"
      - kind: Pod
        name: "*-kyverno-*"
      # Falco security monitoring
      - kind: Secret
        name: "*-falco-*"
      - kind: ConfigMap
        name: "*-falco-*"
      # OPA Gatekeeper resources
      - kind: Secret
        name: "*-gatekeeper-*"
      - kind: ConfigMap
        name: "*-gatekeeper-*"
      # Security scanning resources
      - kind: Secret
        name: "*-trivy-*"
      - kind: ConfigMap
        name: "*-trivy-*"
      # Pod Security Standards resources
      - kind: Secret
        name: "*-pss-*"
      - kind: ConfigMap
        name: "*-pss-*"
