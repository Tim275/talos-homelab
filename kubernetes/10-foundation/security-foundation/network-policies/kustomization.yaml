apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Keycloak + LLDAP + n8n NetworkPolicies disabled 2026-05-06.
# Reason: require-mtls + ingress-allowlist blocked KC↔LLDAP federation
# (user_not_found / sync timeouts) and n8n+Drova login flows.
# Drova mTLS bleibt aktiv — funktioniert wie geplant.
# Files für späteres Re-Enable im Repo erhalten:
#   - mtls-policies.yaml  (n8n-prod + keycloak + lldap require-mtls)
#   - keycloak.yaml       (keycloak ingress allowlist)
#   - n8n-prod.yaml       (n8n ingress allowlist)
#   - n8n-dev.yaml
#   - drova-egress.yaml
resources:
  # Cluster-wide network policies
  - envoy-gateway.yaml          # Envoy ingress lock — public-only
  # Tenant-specific (grouped per tenant for discoverability — DAX pattern)
  - tenants/drova

labels:
  - pairs:
      security.category: network-policies
      managed-by: argocd
