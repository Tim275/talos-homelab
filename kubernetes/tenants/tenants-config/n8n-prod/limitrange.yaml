apiVersion: v1
kind: LimitRange
metadata:
  name: n8n-prod-limits
  namespace: n8n-prod
spec:
  limits:
  - max:
      cpu: "4"
      memory: 8Gi
    min:
      cpu: 10m
      memory: 32Mi
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
