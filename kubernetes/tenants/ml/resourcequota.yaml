apiVersion: v1
kind: ResourceQuota
metadata:
  name: ml-quota
  namespace: ml
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "15"
    services.loadbalancers: "0"
    # requests.nvidia.com/gpu: "0"   # aktivieren sobald GPU-Node da (MLOps-Roadmap, notes/CLAUDE-MLOPS.md)
