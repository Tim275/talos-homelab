apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-admin-sa
  namespace: ml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ml-admin
  namespace: ml
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ml-admin-binding
  namespace: ml
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ml-admin
subjects:
  - kind: ServiceAccount
    name: ml-admin-sa
    namespace: ml
  # OIDC-Team-Binding (Enterprise-Pfad): Keycloak-Gruppe -> Namespace-Admin
  # Gruppe in LLDAP/Keycloak anlegen, dann einkommentieren:
  # - kind: Group
  #   name: keycloak-ml-engineers
  #   apiGroup: rbac.authorization.k8s.io
