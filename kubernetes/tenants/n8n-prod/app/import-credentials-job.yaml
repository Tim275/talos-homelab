# Imports the n8n credentials the workflow references (Anthropic/GitHub/Telegram).
# Reproducible-on-bootstrap counterpart to import-workflows-job.yaml:
#   - secret values come from the SealedSecret `n8n-workflow-creds` (env) -> never in git
#   - credential IDs are FIXED and match the ids hardcoded in the workflow JSON
#     (homelab-claude-cred / homelab-github-cred / homelab-telegram-cred) so the
#     imported workflow links to them automatically.
#   - N8N_ENCRYPTION_KEY (from n8n-secrets) encrypts the data at rest, same as the UI.
# Runs as a PostSync hook BEFORE the workflow-import (lower sync-wave).
apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-import-credentials
  namespace: n8n-prod
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "4"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: credential-import
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: import
          image: docker.n8n.io/n8nio/n8n:2.20.9@sha256:2bd5ca1bbc641e7f62339b57cccf3932b5f02b00bdc2fec5a76383bdb9389853
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: n8n-configmap        # DB connection
            - secretRef:
                name: n8n-secrets          # incl. N8N_ENCRYPTION_KEY
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: n8n-workflow-creds, key: ANTHROPIC_API_KEY }
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef: { name: n8n-workflow-creds, key: GITHUB_TOKEN }
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef: { name: n8n-workflow-creds, key: TELEGRAM_TOKEN }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # Build creds.json via node so token values are JSON-escaped safely (never echoed).
              node -e '
                const fs=require("fs");
                const creds=[
                  {id:"homelab-claude-cred",  name:"Anthropic account", type:"anthropicApi",
                   data:{apiKey:process.env.ANTHROPIC_API_KEY}},
                  {id:"homelab-github-cred",  name:"Github Token n8n",  type:"httpBearerAuth",
                   data:{token:process.env.GITHUB_TOKEN}},
                  {id:"homelab-telegram-cred",name:"Telegram account",  type:"telegramApi",
                   data:{accessToken:process.env.TELEGRAM_TOKEN, baseUrl:"https://api.telegram.org"}},
                ];
                fs.writeFileSync("/tmp/creds.json", JSON.stringify(creds));
              '
              # Retry until the (separate) CNPG DB app is reachable, then import.
              for i in $(seq 1 30); do
                if n8n import:credentials --input=/tmp/creds.json; then
                  echo "credentials imported."
                  rm -f /tmp/creds.json
                  exit 0
                fi
                echo "import attempt $i failed (DB not ready yet?) — retry in 10s"
                sleep 10
              done
              echo "ERROR: credential import failed after 30 attempts"
              exit 1
          volumeMounts:
            - name: n8n-home
              mountPath: /home/node/.n8n
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: n8n-home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
