apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-admin-sa
  namespace: n8n-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: n8n-admin
  namespace: n8n-prod
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-admin-binding
  namespace: n8n-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: n8n-admin
subjects:
  - kind: ServiceAccount
    name: n8n-admin-sa
    namespace: n8n-prod
  - kind: Group
    name: "oidc-grp:n8n-admins"
    apiGroup: rbac.authorization.k8s.io
