apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: n8n-prod

# Tenant root — bundles namespace + quota + limits for the n8n-prod namespace.
# Data-services (postgres, redis) and the app itself are deployed as separate
# Applications via the n8n-tenant AppSet.
resources:
  - namespace.yaml
  - resourcequota.yaml
  - limitrange.yaml

labels:
- pairs:
    app.kubernetes.io/managed-by: argocd
    platform.homelab/tenant: n8n-prod
