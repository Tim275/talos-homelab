apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-n8n
  namespace: n8n-prod
  labels:
    app.kubernetes.io/name: redis-n8n-servicemonitor
    app.kubernetes.io/part-of: prometheus-operator
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - n8n-prod
  selector:
    matchLabels:
      app: redis-n8n
  endpoints:
    - port: redis-exporter
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
