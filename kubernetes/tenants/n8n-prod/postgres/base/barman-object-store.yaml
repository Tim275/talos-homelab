apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: n8n-postgres-backup-store
  namespace: n8n-prod
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  configuration:
    destinationPath: s3://cnpg-n8n-prod-backup/
    endpointURL: http://rook-ceph-rgw-homelab-objectstore.rook-ceph.svc:80
    s3Credentials:
      accessKeyId:
        name: cnpg-n8n-prod-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-n8n-prod-backup
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
      jobs: 2
  retentionPolicy: "30d"
  # was missing entirely (drova/keycloak have it) → plugin default limit throttled the
  # sidecar 91% of CFS periods (caught by ContainerCPUThrottlingHigh on day one) → slow WAL-archiving
  instanceSidecarConfiguration:
    resources:
      requests:
        cpu: 200m
        memory: 128Mi
      limits:
        cpu: 1000m           # 1.0 CPU for WAL-archive bursts (compression intensive)
        memory: 256Mi
