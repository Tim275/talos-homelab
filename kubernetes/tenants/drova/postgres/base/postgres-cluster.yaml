---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: drova-postgres
  namespace: drova
  labels:
    app.kubernetes.io/name: drova-postgres
    app.kubernetes.io/component: database
    platform.homelab/tenant: drova
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.1
  # Preemption + Eviction-Reihenfolge: DB wird zuletzt verdraengt
  # (Klasse aus tenants/drova/kafka/base — Requests bewusst schlank gelassen)
  priorityClassName: platform-critical
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m
  storage:
    size: 10Gi
    storageClass: rook-ceph-block-enterprise-retain
  postgresql:
    shared_preload_libraries:
      - pgaudit
    parameters:
      max_connections: '100'
      shared_buffers: 128MB
      pgaudit.log: "ddl,write,role"
      pgaudit.log_parameter: "on"
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: drova-backup-store
      serverName: drova-postgres
  bootstrap:
    initdb:
      database: drova_users
      owner: drova_admin
      secret:
        name: drova-pg-app-creds
      postInitApplicationSQL:
      - CREATE DATABASE drova_trips OWNER drova_admin;
      - CREATE DATABASE drova_payments OWNER drova_admin;
      - CREATE DATABASE drova_drivers OWNER drova_admin;
      - GRANT ALL PRIVILEGES ON DATABASE drova_trips TO drova_admin;
      - GRANT ALL PRIVILEGES ON DATABASE drova_payments TO drova_admin;
      - GRANT ALL PRIVILEGES ON DATABASE drova_drivers TO drova_admin;
  affinity:
    # Required for production: 3-instance HA must NEVER place 2 replicas on same node.
    # 8 worker nodes — plenty of capacity. preferred was a homelab-shortcut.
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  # Zone-Spread HART: nie alle 3 Instanzen auf einem Proxmox-Host.
  # ScheduleAnyway verlor gegen das RAM-Scoring (alle 3 landeten auf msa2 = Totalausfall-Risiko).
  # Trade-off: bei echtem Zonen-Ausfall kann die 3. Instanz Pending bleiben — akzeptiert,
  # dafür überlebt garantiert eine Instanz in der anderen Zone.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          cnpg.io/cluster: drova-postgres
  # Rook-Ceph disk I/O is slow — replicas need more time for WAL replay on startup
  probes:
    startup:
      failureThreshold: 60
      periodSeconds: 10
    readiness:
      timeoutSeconds: 5
    liveness:
      timeoutSeconds: 5
  monitoring:
    enablePodMonitor: true
