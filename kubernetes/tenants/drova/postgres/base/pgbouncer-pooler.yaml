apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: drova-postgres-pooler
  namespace: drova
  labels:
    app.kubernetes.io/name: drova-postgres-pooler
    app.kubernetes.io/component: connection-pooler
    platform.homelab/tenant: drova
spec:
  cluster:
    name: drova-postgres
  instances: 2
  type: rw
  # beide Pooler-Replicas nicht auf denselben Node (worker-1-Klumpen aufloesen).
  # podAntiAffinity wirkt (im Gegensatz zu topologySpread auf diesem Cluster).
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    cnpg.io/poolerName: drova-postgres-pooler
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "25"
      reserve_pool_size: "5"
      server_idle_timeout: "600"
