apiVersion: v1
kind: ConfigMap
metadata:
  name: redpanda-console-config
  namespace: drova
data:
  # sasl.password kommt NICHT hierher — env KAFKA_SASL_PASSWORD (aus dem
  # Strimzi-KafkaUser-Secret) überschreibt den config-Pfad zur Laufzeit.
  console-config.yaml: |
    kafka:
      brokers:
        - drova-kafka-kafka-bootstrap.drova.svc.cluster.local:9095
      clientId: redpanda-console
      sasl:
        enabled: true
        mechanism: SCRAM-SHA-512
        username: redpanda-console
      tls:
        enabled: true
        caFilepath: /etc/kafka-ca/ca.crt
      schemaRegistry:
        enabled: true
        # Apicurio Registry (nicht Confluent) — Confluent-kompatible API liegt
        # unter /apis/ccompat/v7, Root liefert 404 (RESTEASY).
        urls:
          - http://schema-registry.drova.svc.cluster.local:8080/apis/ccompat/v7
