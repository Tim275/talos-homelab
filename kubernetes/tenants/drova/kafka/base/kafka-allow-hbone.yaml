# Strimzi generiert eigene NetworkPolicies (nur Kafka-Ports) — ambient HBONE braucht 15008 additiv.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drova-kafka-allow-hbone
  namespace: drova
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: drova-kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 15008
          protocol: TCP
