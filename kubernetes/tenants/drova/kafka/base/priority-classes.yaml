# App-Tier Priority Classes (cluster-weit, unter den Rook-Ceph-Werten 500M-900M):
# Storage-Layer (Ceph) > Daten-Dienste (Kafka/Postgres) > Apps > Rest.
# Steuert Scheduler-PREEMPTION — die OOM-Reihenfolge steuert die QoS-Klasse.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: platform-critical
  annotations:
    argocd.argoproj.io/sync-wave: "1"
value: 450000000
globalDefault: false
description: "Stateful Daten-Dienste (Kafka, Postgres) - werden zuletzt verdraengt"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: app-standard
  annotations:
    argocd.argoproj.io/sync-wave: "1"
value: 100000000
globalDefault: false
description: "Normale Anwendungen (Drova-Services) - ueber unklassifizierten Pods"
