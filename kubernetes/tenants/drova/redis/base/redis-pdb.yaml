# RedisReplication (master+replica) — Operator legt selbst kein PDB an;
# ohne PDB kann ein Drain beide Pods gleichzeitig räumen.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-drova
  namespace: drova
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: redis-drova
