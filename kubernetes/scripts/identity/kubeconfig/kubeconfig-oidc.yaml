# OIDC-kubeconfig für ALLE Mitarbeiter
# Voraussetzung lokal: brew install int128/kubelogin/kubelogin
# Plus: VPN-Verbindung zum Cluster (Tailscale ODER NetBird)
#
# Speichern unter: ~/.kube/config-oidc
# Verwendung:
#   KUBECONFIG=~/.kube/config-oidc kubectl get pods -n drova
#   → Browser öffnet → KC-Login mit DEINEN Credentials → 2FA
#   → kubectl returns nur was DEINE Group erlaubt
apiVersion: v1
kind: Config
clusters:
  - name: timour-homelab
    cluster:
      server: https://192.168.0.100:6443
      insecure-skip-tls-verify: true
users:
  - name: oidc
    user:
      exec:
        apiVersion: client.authentication.k8s.io/v1beta1
        command: kubectl
        args:
          - oidc-login
          - get-token
          - --oidc-issuer-url=https://iam.timourhomelab.org/realms/kubernetes
          - --oidc-client-id=kubernetes
          - --oidc-client-secret=jDgdBfBSDsCOIn4g0E0tgqkHAG3nRsjJ
          - --oidc-extra-scope=email
          - --oidc-extra-scope=groups
          - --oidc-extra-scope=profile
contexts:
  - name: timour-homelab-oidc
    context:
      cluster: timour-homelab
      user: oidc
current-context: timour-homelab-oidc
