apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
  labels:
    dev.stonegarden: infrastructure
spec:
  generators:
    - git:
        repoURL: https://github.com/Tim275/talos-homelab
        revision: HEAD
        directories:
          # Minimal homelab infrastructure - only essentials
          - path: "kubernetes/infra/controllers"  # ArgoCD needed
          - path: "kubernetes/infra/network"     # Cilium needed
          # Temporarily disabled heavy components:
          # - path: "kubernetes/infra/storage"    # Rook-Ceph disabled to save memory
          # - path: "kubernetes/infra/monitoring" # Prometheus stack disabled to save memory  
          # - path: "kubernetes/infra/backup"     # Velero disabled to save memory
  template:
    metadata:
      name: '{{ path.basename }}'
      labels:
        dev.stonegarden: infrastructure
    spec:
      project: app-of-apps
      source:
        repoURL: https://github.com/Tim275/talos-homelab
        targetRevision: HEAD
        path: '{{ path }}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          selfHeal: true
          prune: true