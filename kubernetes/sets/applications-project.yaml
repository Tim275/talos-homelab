apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: User-facing applications across all environments
  sourceRepos:
    - 'https://github.com/Tim275/talos-homelab.git'
    - 'https://charts.jetstack.io'
    - 'https://helm.releases.hashicorp.com'
    - 'https://charts.bitnami.com'
  destinations:
    - namespace: '*-test'
      server: https://kubernetes.default.svc
    - namespace: '*-staging'
      server: https://kubernetes.default.svc
    - namespace: '*-prod'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: 'Namespace'
    - group: 'rbac.authorization.k8s.io'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: applications-admin
      description: Applications administrator
      policies:
        - p, proj:applications:applications-admin, applications, *, applications/*, allow
      groups:
        - applications-team