apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kubescape
  namespace: security
spec:
  background: false
  match:
    any:
      - resources:
          kinds: [Pod, Deployment, ReplicaSet, StatefulSet, DaemonSet, Job, CronJob]
          namespaces: [security]
          names: ["kubescape*", "node-agent*", "operator*", "synchronizer*", "kollector*", "storage*", "kubevuln*"]
  exceptions:
    ## Kubescape (Helm-Chart von ARMO) hat probes mit timeoutSeconds=1.
    ## Wir koennen den Helm-Chart-Default nicht ueberschreiben ohne Risiko,
    ## daher Exception fuer diesen vendor-managed Stack.
    - policyName: require-probe-timeouts
      ruleNames:
        - check-liveness-probe-timeout
        - check-readiness-probe-timeout
        - autogen-check-liveness-probe-timeout
        - autogen-check-readiness-probe-timeout
    ## node-agent DaemonSet braucht hostPID + privileged caps für
    ## kernel-level runtime-security scanning (eBPF, syscall-tracing).
    ## Battle-tested 2026-05-14: ohne diese Exceptions blockt Kyverno die
    ## Pod-creation → DaemonSet zeigt 0/7 ready → KubeDaemonSetNotScheduled
    ## alert fired für 19h.
    - policyName: disallow-privileged-containers
      ruleNames:
        - host-namespaces
        - privileged-containers
        - autogen-host-namespaces
        - autogen-privileged-containers
    - policyName: require-run-as-non-root
      ruleNames:
        - check-run-as-non-root
        - autogen-check-run-as-non-root
    - policyName: disallow-capabilities
      ruleNames:
        - adding-capabilities
        - autogen-adding-capabilities
    - policyName: disallow-capabilities-strict
      ruleNames:
        - require-drop-all
        - autogen-require-drop-all
