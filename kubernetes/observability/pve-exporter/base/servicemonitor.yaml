apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pve-exporter
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-exporter
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      params:
        target: ["192.168.0.50"]
        cluster: ["1"]
        node: ["1"]
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: __param_target
          replacement: 192.168.0.50
        - sourceLabels: [__param_target]
          targetLabel: instance
        - targetLabel: __address__
          replacement: pve-exporter.monitoring.svc.cluster.local:9221
        - targetLabel: job
          replacement: proxmox-pve
      path: /pve
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      params:
        target: ["192.168.0.57"]
        cluster: ["1"]
        node: ["1"]
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: __param_target
          replacement: 192.168.0.57
        - sourceLabels: [__param_target]
          targetLabel: instance
        - targetLabel: __address__
          replacement: pve-exporter.monitoring.svc.cluster.local:9221
        - targetLabel: job
          replacement: proxmox-pve
      path: /pve
