apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: homelab-email-config
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
    app.kubernetes.io/managed-by: argocd
    release: prometheus-operator
spec:
  route:
    groupBy: ['alertname', 'cluster', 'service']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    receiver: 'homelab-admin'
    routes:
    - matchers:
      - name: severity
        value: critical
      receiver: 'critical-alerts'
      repeatInterval: 15m
    - matchers:
      - name: severity
        value: warning
      receiver: 'warning-alerts'
      repeatInterval: 2h
  receivers:
  - name: 'homelab-admin'
    emailConfigs:
    - to: 'timour@hotmail.de'
      from: 'timour@hotmail.de'
      smarthost: 'smtp-mail.outlook.com:587'
      authUsername: 'timour@hotmail.de'
      authPassword:
        name: outlook-app-password
        key: password
      requireTLS: true
      headers:
        subject: 'Homelab Alert: {{ .GroupLabels.alertname }}'
  - name: 'critical-alerts'  
    emailConfigs:
    - to: 'timour@hotmail.de'
      from: 'timour@hotmail.de'
      smarthost: 'smtp-mail.outlook.com:587'
      authUsername: 'timour@hotmail.de'
      authPassword:
        name: outlook-app-password
        key: password
      requireTLS: true
      headers:
        subject: 'CRITICAL ALERT: {{ .GroupLabels.alertname }}'
  - name: 'warning-alerts'
    emailConfigs:
    - to: 'timour@hotmail.de'
      from: 'timour@hotmail.de'
      smarthost: 'smtp-mail.outlook.com:587'
      authUsername: 'timour@hotmail.de'
      authPassword:
        name: outlook-app-password
        key: password
      requireTLS: true
      headers:
        subject: 'Warning: {{ .GroupLabels.alertname }}'
---
apiVersion: v1
kind: Secret
metadata:
  name: outlook-app-password
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: argocd
    release: prometheus-operator
type: Opaque
stringData:
  password: 'kqzqrxxvcxzyjjrv'