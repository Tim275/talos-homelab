apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: homelab-email-config
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
    app.kubernetes.io/managed-by: argocd
    release: prometheus-operator
spec:
  route:
    groupBy: ['alertname', 'cluster', 'service']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    receiver: 'homelab-admin'
    routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeatInterval: 15m
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeatInterval: 2h
  receivers:
  - name: 'homelab-admin'
    emailConfigs:
    - to: 'timour@hotmail.de'
      subject: '🔔 Homelab Alert: {{ .GroupLabels.alertname }}'
      headers:
        From: 'Talos Homelab <timour@hotmail.de>'
        To: 'Homelab Admin <timour@hotmail.de>'
      body: |
        Alert Details:
        
        Alert Name: {{ .GroupLabels.alertname }}
        Severity: {{ .CommonLabels.severity }}
        Instance: {{ .CommonLabels.instance }}
        Namespace: {{ .CommonLabels.namespace }}
        
        Description: {{ .CommonAnnotations.summary }}
        
        Time: {{ .CommonAnnotations.timestamp }}
        
        ---
        Talos Homelab Monitoring System
      smarthost: 'smtp-mail.outlook.com:587'
      authUsername: 'timour@hotmail.de'
      authPassword:
        name: outlook-app-password
        key: password
      requireTLS: true
  - name: 'critical-alerts'
    emailConfigs:
    - to: 'timour@hotmail.de'
      subject: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
      headers:
        From: 'Talos Homelab CRITICAL <timour@hotmail.de>'
        To: 'Homelab Admin <timour@hotmail.de>'
        Priority: 'high'
      body: |
        ⚠️  CRITICAL ALERT - IMMEDIATE ACTION REQUIRED ⚠️
        
        Alert: {{ .GroupLabels.alertname }}
        Instance: {{ .CommonLabels.instance }}
        Namespace: {{ .CommonLabels.namespace }}
        
        Problem: {{ .CommonAnnotations.summary }}
        Description: {{ .CommonAnnotations.description }}
        
        Timestamp: {{ .CommonAnnotations.timestamp }}
        
        This is a critical system alert requiring immediate attention!
        
        ---
        Talos Homelab Critical Monitoring
      smarthost: 'smtp-mail.outlook.com:587'
      authUsername: 'timour@hotmail.de'
      authPassword:
        name: outlook-app-password
        key: password
      requireTLS: true
  - name: 'warning-alerts'
    emailConfigs:
    - to: 'timour@hotmail.de'
      subject: '⚠️  Warning: {{ .GroupLabels.alertname }}'
      headers:
        From: 'Talos Homelab Warning <timour@hotmail.de>'
        To: 'Homelab Admin <timour@hotmail.de>'
      body: |
        Warning Alert:
        
        Alert: {{ .GroupLabels.alertname }}
        Instance: {{ .CommonLabels.instance }}
        Severity: {{ .CommonLabels.severity }}
        
        Issue: {{ .CommonAnnotations.summary }}
        
        Time: {{ .CommonAnnotations.timestamp }}
        
        Please investigate when convenient.
        
        ---
        Talos Homelab Monitoring
      smarthost: 'smtp-mail.outlook.com:587'
      authUsername: 'timour@hotmail.de'
      authPassword:
        name: outlook-app-password
        key: password
      requireTLS: true
---
apiVersion: v1
kind: Secret
metadata:
  name: outlook-app-password
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: argocd
    release: prometheus-operator
type: Opaque
stringData:
  password: 'kqzqrxxvcxzyjjrv'