apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
  labels:
    dev.homelab: infrastructure
spec:
  generators:
    - git:
        repoURL: https://github.com/Tim275/talos-homelab.git
        revision: HEAD
        directories:
          - path: kubernetes/infra/*
  template:
    metadata:
      name: '{{ path.basename }}'
      labels:
        dev.homelab: infrastructure
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/Tim275/talos-homelab.git
        targetRevision: HEAD
        path: '{{ path }}'
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
