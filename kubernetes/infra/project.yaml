apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
spec:
  sourceRepos:
    - 'https://github.com/Tim275/talos-homelab.git'
    - 'https://helm.cilium.io'
    - 'https://argoproj.github.io/argo-helm'
  destinations:
    - namespace: 'kube-system'
      server: '*'
    - namespace: 'network'
      server: '*'
    - namespace: 'controllers'
      server: '*'
    - namespace: 'argocd'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
