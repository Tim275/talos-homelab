---
# Public Web-UI für LLDAP (User-Lifecycle-Management).
# Subdomain: lldap.timourhomelab.org → CF Tunnel → Envoy → lldap:17170
# Login: admin / <admin-password aus lldap-secrets>
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lldap
  namespace: lldap
  labels:
    app.kubernetes.io/name: lldap
    app.kubernetes.io/component: identity-service
    app.kubernetes.io/part-of: platform-identity
spec:
  hostnames:
    - lldap.timourhomelab.org
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
      namespace: gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: lldap
          port: 17170
          weight: 1
