# CoreDNS ConfigMap Override
# CRITICAL: Override default CoreDNS to use gateway (192.168.0.1) as primary DNS
# instead of Talos link-local DNS (169.254.116.108) which breaks in VMs.
#
# Why 192.168.0.1 and not 8.8.8.8/1.1.1.1 directly:
# UDP port 53 outbound to public DNS IPs times out from within pods in this
# Proxmox setup. The home router (192.168.0.1) is reachable and forwards
# upstream reliably. 8.8.8.8/1.1.1.1 kept as fallback only.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        log . {
            class error
        }
        prometheus :9153

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }
        forward . 192.168.0.1 8.8.8.8 1.1.1.1 {
           max_concurrent 1000
           policy sequential
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
