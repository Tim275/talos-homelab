repos:
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        entry: yamllint -c .yamllint.yaml
        language: system
        types: [yaml]

      - id: tofu-fmt
        name: tofu fmt
        entry: tofu fmt -check -recursive tofu/
        language: system
        files: \.(tf|tofu)$
        pass_filenames: false

      - id: tflint
        name: tflint
        entry: bash -c 'cd tofu && tflint --recursive'
        language: system
        files: \.(tf|tofu)$
        pass_filenames: false
