name: yaml-lint

on:
  push:
    branches: ['**']
    paths:
      - "**.yaml"
      - "**.yml"
      - ".yamllint.yaml"
      - ".github/workflows/yaml-lint.yml"
  pull_request:
    paths:
      - "**.yaml"
      - "**.yml"
      - ".yamllint.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint
        run: yamllint -c .yamllint.yaml .
