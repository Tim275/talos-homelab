name: yaml-lint

on:
  push:
    branches: ['**']
    paths:
      - "**.yaml"
      - "**.yml"
      - ".yamllint.yaml"
      - ".github/workflows/yaml-lint.yml"
  pull_request:
    paths:
      - "**.yaml"
      - "**.yml"
      - ".yamllint.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint
        run: yamllint -c .yamllint.yaml .
