name: alert-lint

on:
  pull_request:
    branches: [main]
    paths:
      - "kubernetes/**/*.yaml"
      - ".github/workflows/alert-lint.yml"
      - ".github/scripts/lint-alerts.py"
  push:
    branches: [main]
    paths:
      - "kubernetes/**/*.yaml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install promtool
        run: |
          PROM_VERSION="2.55.1"
          curl -sLO "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          tar xzf "prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
          promtool --version

      - name: Install python deps
        run: pip install pyyaml

      - name: Lint PrometheusRules (syntax + required annotations/labels)
        run: python3 .github/scripts/lint-alerts.py kubernetes
