name: kustomize-validate

on:
  push:
    branches: ['**']
    paths:
      - "kubernetes/**"
      - ".github/workflows/kustomize-validate.yml"
  pull_request:
    paths:
      - "kubernetes/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.0

      - name: Install kubeconform
        run: |
          VERSION="0.7.0"
          curl -sLO "https://github.com/yannh/kubeconform/releases/download/v${VERSION}/kubeconform-linux-amd64.tar.gz"
          tar xzf "kubeconform-linux-amd64.tar.gz" kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate kustomize builds + manifest schemas
        run: |
          set +e
          FAILED=0
          PASSED=0
          FAILED_DIRS=()
          mkdir -p /tmp/kubeconform-cache

          while IFS= read -r kfile; do
            DIR=$(dirname "$kfile")
            OUTPUT=$(kustomize build "$DIR" --enable-helm --load-restrictor=LoadRestrictionsNone 2>&1)
            STATUS=$?

            if [ $STATUS -ne 0 ]; then
              FAILED=$((FAILED+1))
              FAILED_DIRS+=("$DIR (build)")
              echo "::error file=$kfile::kustomize build failed in $DIR"
              echo "::group::Build error in $DIR"
              echo "$OUTPUT"
              echo "::endgroup::"
              continue
            fi

            CONFORM=$(echo "$OUTPUT" | kubeconform \
              -ignore-missing-schemas \
              -schema-location default \
              -cache /tmp/kubeconform-cache \
              -summary 2>&1)
            if [ $? -ne 0 ]; then
              FAILED=$((FAILED+1))
              FAILED_DIRS+=("$DIR (schema)")
              echo "::error file=$kfile::kubeconform schema validation failed in $DIR"
              echo "::group::Schema error in $DIR"
              echo "$CONFORM"
              echo "::endgroup::"
            else
              PASSED=$((PASSED+1))
            fi
          done < <(find kubernetes -name kustomization.yaml -not -path "*/charts/*")

          echo "Total: $((PASSED + FAILED)), Passed: $PASSED, Failed: $FAILED"

          if [ $FAILED -gt 0 ]; then
            echo "Failed directories:"
            printf '  - %s\n' "${FAILED_DIRS[@]}"
            exit 1
          fi
