name: kustomize-validate

on:
  push:
    branches: ['**']
    paths:
      - "kubernetes/**"
      - ".github/workflows/kustomize-validate.yml"
  pull_request:
    paths:
      - "kubernetes/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install kustomize
        run: |
          VERSION="5.5.0"
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${VERSION}/kustomize_v${VERSION}_linux_amd64.tar.gz" -o /tmp/kustomize.tar.gz
          tar xzf /tmp/kustomize.tar.gz -C /tmp kustomize
          sudo mv /tmp/kustomize /usr/local/bin/
          kustomize version

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.0

      - name: Install kubeconform
        run: |
          VERSION="0.7.0"
          curl -sLO "https://github.com/yannh/kubeconform/releases/download/v${VERSION}/kubeconform-linux-amd64.tar.gz"
          tar xzf "kubeconform-linux-amd64.tar.gz" kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate kustomize builds + manifest schemas
        run: |
          set +e
          FAILED=0
          PASSED=0
          FAILED_DIRS=()
          mkdir -p /tmp/kubeconform-cache

          while IFS= read -r kfile; do
            DIR=$(dirname "$kfile")
            # Retry to survive transient helm-repo errors (external chart pulls, e.g. 503)
            for attempt in 1 2 3; do
              OUTPUT=$(kustomize build "$DIR" --enable-helm --load-restrictor=LoadRestrictionsNone 2>&1)
              STATUS=$?
              [ $STATUS -eq 0 ] && break
              echo "$OUTPUT" | grep -qiE 'cannot be reached|503|Service Unavailable|timeout|temporarily|connection refused|no such host|TLS handshake|i/o timeout' || break
              echo "::warning::transient build failure in $DIR (attempt $attempt/3), retrying"
              sleep $((attempt * 5))
            done

            if [ $STATUS -ne 0 ]; then
              FAILED=$((FAILED+1))
              FAILED_DIRS+=("$DIR (build)")
              echo "::error file=$kfile::kustomize build failed in $DIR"
              echo "::group::Build error in $DIR"
              echo "$OUTPUT"
              echo "::endgroup::"
              continue
            fi

            CONFORM=$(echo "$OUTPUT" | kubeconform \
              -ignore-missing-schemas \
              -schema-location default \
              -cache /tmp/kubeconform-cache \
              -summary 2>&1)
            if [ $? -ne 0 ]; then
              FAILED=$((FAILED+1))
              FAILED_DIRS+=("$DIR (schema)")
              echo "::error file=$kfile::kubeconform schema validation failed in $DIR"
              echo "::group::Schema error in $DIR"
              echo "$CONFORM"
              echo "::endgroup::"
            else
              PASSED=$((PASSED+1))
            fi
          done < <(find kubernetes -name kustomization.yaml -not -path "*/charts/*")

          echo "Total: $((PASSED + FAILED)), Passed: $PASSED, Failed: $FAILED"

          if [ $FAILED -gt 0 ]; then
            echo "Failed directories:"
            printf '  - %s\n' "${FAILED_DIRS[@]}"
            exit 1
          fi
