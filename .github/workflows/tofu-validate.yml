name: tofu-validate

on:
  push:
    branches: ['**']
    paths:
      - "tofu/**"
      - ".github/workflows/tofu-validate.yml"
  pull_request:
    paths:
      - "tofu/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install OpenTofu
        run: |
          VERSION="1.12.0"
          curl -sL "https://github.com/opentofu/opentofu/releases/download/v${VERSION}/tofu_${VERSION}_linux_amd64.tar.gz" -o /tmp/tofu.tar.gz
          tar xzf /tmp/tofu.tar.gz -C /tmp tofu
          sudo mv /tmp/tofu /usr/local/bin/
          tofu version

      - name: Install tflint
        run: |
          VERSION="0.62.1"
          curl -sL "https://github.com/terraform-linters/tflint/releases/download/v${VERSION}/tflint_linux_amd64.zip" -o /tmp/tflint.zip
          unzip -o /tmp/tflint.zip tflint -d /tmp
          sudo mv /tmp/tflint /usr/local/bin/
          tflint --version

      - name: tofu fmt
        working-directory: tofu
        run: tofu fmt -check -recursive -diff

      - name: tofu init (no backend)
        working-directory: tofu
        run: tofu init -backend=false -input=false

      - name: Stage local-only files for validate
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_rsa_proxmox -N "" -q
          echo "placeholder" > tofu/bootstrap/sealed-secrets/certificate/sealed-secrets.key

      - name: tofu validate
        working-directory: tofu
        run: tofu validate

      - name: tflint (advisory)
        working-directory: tofu
        continue-on-error: true
        run: |
          tflint --init
          tflint --recursive
